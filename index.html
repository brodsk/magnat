<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>MAGNA FACTORY - 8bit</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  body {
    background: #000;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    position: fixed;
    font-family: 'Courier New', monospace;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: contain;
    image-rendering: crisp-edges;
    image-rendering: pixelated;
    background: #0a1020;
  }
  .controls {
    position: fixed;
    bottom: 10px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    gap: 6px;
    padding: 8px;
    z-index: 100;
    flex-wrap: wrap;
    pointer-events: none;
  }
  .btn {
    pointer-events: auto;
    background: #1a1a2a;
    border: 2px solid #ffaa66;
    color: #ffdd99;
    font-family: monospace;
    font-weight: bold;
    font-size: 11px;
    padding: 6px 12px;
    cursor: pointer;
    box-shadow: 2px 2px 0 #000;
  }
  .btn:active { transform: translate(1px,1px); background: #2a2a3e; }
  .move-btn { background: #2a2a3e; font-size: 18px; padding: 6px 16px; }
  .action { background: #2a4a2a; border-color: #6a9a6a; }
  .special { background: #4a2a2a; border-color: #aa6a6a; }
  @media (max-width: 700px) {
    .btn { padding: 5px 8px; font-size: 9px; }
    .move-btn { font-size: 16px; padding: 5px 12px; }
  }
  .hud {
    position: fixed;
    top: 5px;
    left: 5px;
    right: 5px;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 4px;
    z-index: 50;
    pointer-events: none;
  }
  .hud-item {
    background: #000000aa;
    border: 2px solid #ffaa66;
    padding: 3px 8px;
    font-size: 10px;
    color: #ffdd99;
    font-family: monospace;
  }
  .task {
    position: fixed;
    top: 45px;
    right: 5px;
    background: #000000aa;
    border: 2px solid #ffaa66;
    padding: 5px;
    font-size: 7px;
    color: #ccc;
    pointer-events: none;
    z-index: 50;
  }
  .task-item { border-left: 2px solid #ffaa66; padding-left: 4px; margin: 2px 0; }
  .task-done { color: #8f8; border-left-color: #8f8; text-decoration: line-through; }
  .notif {
    position: fixed;
    top: 70px;
    left: 50%;
    transform: translateX(-50%);
    background: #000;
    border: 2px solid #ffaa66;
    padding: 6px 12px;
    color: #ffdd99;
    font-size: 9px;
    white-space: nowrap;
    z-index: 150;
    display: none;
  }
  .overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #000000cc;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 200;
  }
  .overlay.visible { display: flex; }
  .window {
    background: #1a1a2a;
    border: 4px solid #ffaa66;
    padding: 20px 30px;
    text-align: center;
    box-shadow: 6px 6px 0 #000;
  }
  .window h1 { color: #ffaa66; font-size: 24px; margin-bottom: 15px; }
  .window button {
    background: #2a2a3e;
    border: 2px solid #ffaa66;
    color: #ffdd99;
    padding: 8px 20px;
    margin: 6px;
    cursor: pointer;
    font-family: monospace;
  }
  .stat-line { color: #ddd; font-size: 11px; margin: 5px 0; text-align: left; }
</style>
</head>
<body>
<canvas id="canvas" width="900" height="675"></canvas>

<div class="controls">
  <button class="btn move-btn" id="leftBtn">◀</button>
  <button class="btn action" id="pickupBtn">🔧 ZOBRAŤ</button>
  <button class="btn action" id="boxBtn">📦 BOX</button>
  <button class="btn action" id="cartBtn">🛒 VOZÍK</button>
  <button class="btn special" id="labelBtn">🏷️ ETIKETA</button>
  <button class="btn special" id="wareBtn">🚛 ODTOZ</button>
  <button class="btn move-btn" id="rightBtn">▶</button>
</div>

<div class="hud">
  <div class="hud-item">🔩 KUSY: <span id="partsVal">0</span></div>
  <div class="hud-item">📦 BOXY: <span id="boxesVal">0</span></div>
  <div class="hud-item">🛒 VOZÍK: <span id="cartVal">0</span>/6</div>
  <div class="hud-item">💰 €: <span id="moneyVal">0</span></div>
</div>

<div class="task">
  <div style="color:#ffaa66;">⚙ ÚLOHY</div>
  <div class="task-item" id="task1">📦 20 kusov = BOX</div>
  <div class="task-item" id="task2">🏭 6 boxov = VOZÍK</div>
  <div class="task-item" id="task3">🏷️ Predačka → ETIKETA</div>
  <div class="task-item" id="task4">🚛 Skladník → ODTOZ</div>
</div>

<div id="notif" class="notif"></div>

<div id="menuOverlay" class="overlay">
  <div class="window"><h1>🏭 MAGNA</h1><p style="color:#88ff88;">PIXEL FACTORY</p><button id="startBtn">▶ ZAČAŤ ZMENU</button><button id="statsBtn">📊 ŠTATISTIKA</button></div>
</div>
<div id="statsOverlay" class="overlay"><div class="window"><h2>ŠTATISTIKA</h2><div id="statsContent"></div><button id="closeStatsBtn">SPÄŤ</button></div></div>
<div id="poruchaOverlay" class="overlay"><div class="window" style="border-color:#ff6666;"><h2 style="color:#ff6666;">⚠ PORUCHA!</h2><p>Prvé kusy sú chybné</p><button id="fixBtn">🔧 OPRAVIŤ</button></div></div>
<div id="endOverlay" class="overlay"><div class="window"><h2>ZMENA SKONČILA</h2><p id="endText"></p><button id="endMenuBtn">MENU</button></div></div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

let gameRunning = false;
let money = 0, totalParts = 0, shiftParts = 0, badPassed = 0;
let boxes = []; let cartBoxes = []; let heldPart = null;
let playerX = 440;
let moveLeft = false, moveRight = false;
let shiftTime = 0, shiftDuration = 180;
let shiftInterval = null, spawnInterval = null, poruchaTimer = null;
let parts = []; let partId = 0;
let labelPrinted = false, poruchaActive = false;
let frame = 0;

function updateUI() {
  document.getElementById('partsVal').innerText = shiftParts;
  document.getElementById('boxesVal').innerText = boxes.filter(b => b.count >= 20).length;
  document.getElementById('cartVal').innerText = cartBoxes.length;
  document.getElementById('moneyVal').innerText = money;
}

function showMsg(msg, err = false) {
  let n = document.getElementById('notif');
  n.innerText = msg;
  n.style.display = 'block';
  setTimeout(() => n.style.display = 'none', 1500);
}

function spawnPart() {
  if (!gameRunning || poruchaActive) return;
  let bad = false;
  if (poruchaActive && shiftParts < 8) bad = true;
  else bad = Math.random() < 0.18;
  parts.push({ id: partId++, x: 150, y: 475, bad: bad });
}

function pickup() {
  if (!gameRunning) return;
  if (heldPart) { showMsg('Už držíš kus!', true); return; }
  let nearest = null, minD = 65;
  for (let p of parts) {
    let d = Math.abs(p.x - playerX);
    if (d < minD) { minD = d; nearest = p; }
  }
  if (nearest) {
    if (nearest.bad) { showMsg('⚠️ CHYBNÝ KUS!', true); parts = parts.filter(p => p.id !== nearest.id); }
    else { heldPart = { bad: false }; parts = parts.filter(p => p.id !== nearest.id); showMsg('✅ Kus v ruke', false); }
  } else showMsg('Žiadny kus!', true);
}

function toBox() {
  if (!gameRunning) return;
  if (!heldPart) { showMsg('Nemáš nič!', true); return; }
  let box = boxes.find(b => b.count < 20);
  if (!box) { box = { count: 0 }; boxes.push(box); }
  box.count++; shiftParts++; totalParts++; heldPart = null;
  if (box.count === 20) showMsg('📦 Box naplnený!', false);
  updateUI();
}

function toCart() {
  if (!gameRunning) return;
  let idx = boxes.findIndex(b => b.count >= 20);
  if (idx === -1) { showMsg('Žiadny plný box!', true); return; }
  if (cartBoxes.length >= 6) { showMsg('Vozík plný!', true); return; }
  cartBoxes.push(boxes[idx]); boxes.splice(idx,1);
  showMsg('📦 Box na vozík', false);
  updateUI();
}

function labelCall() {
  if (!gameRunning) return;
  if (cartBoxes.length === 0) { showMsg('Vozík prázdny!', true); return; }
  if (labelPrinted) { showMsg('Etiketa už je!', true); return; }
  labelPrinted = true;
  showMsg('🏷️ Etiketa vytlačená!', false);
}

function warehouseCall() {
  if (!gameRunning) return;
  if (!labelPrinted) { showMsg('Najprv etiketa!', true); return; }
  if (cartBoxes.length === 0) { showMsg('Vozík prázdny!', true); return; }
  let reward = cartBoxes.length * 11;
  money += reward;
  showMsg(`🚛 Odvoz! +${reward}€`, false);
  cartBoxes = [];
  labelPrinted = false;
  updateUI();
  if (shiftTime >= shiftDuration) endShift();
}

function startPorucha() {
  if (poruchaActive || !gameRunning) return;
  poruchaActive = true;
  document.getElementById('poruchaOverlay').classList.add('visible');
  showMsg('⚠️ PORUCHA! Prvé kusy chybné!', true);
}

function fixPorucha() {
  poruchaActive = false;
  document.getElementById('poruchaOverlay').classList.remove('visible');
  showMsg('🔧 Opravené!', false);
  clearTimeout(poruchaTimer);
  poruchaTimer = setTimeout(() => startPorucha(), 25000 + Math.random() * 20000);
}

function endShift() {
  if (!gameRunning) return;
  gameRunning = false;
  clearInterval(shiftInterval); clearInterval(spawnInterval); clearTimeout(poruchaTimer);
  let bonus = Math.floor(totalParts * 0.5) + (cartBoxes.length * 8);
  money += bonus;
  document.getElementById('endText').innerHTML = `Kusov: ${totalParts}<br>Boxov: ${boxes.filter(b=>b.count>=20).length + cartBoxes.length}<br>€: ${money}`;
  document.getElementById('endOverlay').classList.add('visible');
  updateUI();
}

function startGame() {
  gameRunning = true;
  money = 0; totalParts = 0; shiftParts = 0; badPassed = 0;
  boxes = []; cartBoxes = []; heldPart = null; parts = []; partId = 0;
  labelPrinted = false; poruchaActive = false;
  playerX = 440; moveLeft = false; moveRight = false; shiftTime = 0;
  clearInterval(shiftInterval); clearInterval(spawnInterval); clearTimeout(poruchaTimer);
  shiftInterval = setInterval(() => { if (gameRunning) { shiftTime++; if (shiftTime >= shiftDuration) endShift(); } }, 1000);
  spawnInterval = setInterval(() => spawnPart(), 1900);
  poruchaTimer = setTimeout(() => startPorucha(), 20000);
  updateUI();
  document.querySelectorAll('.overlay').forEach(o => o.classList.remove('visible'));
  showMsg('🔧 ZMENA ZAČALA!', false);
}

function showStats() {
  document.getElementById('statsContent').innerHTML = `
    <div class="stat-line">💰 Celkom: ${money} €</div>
    <div class="stat-line">📦 Kusov: ${totalParts}</div>
    <div class="stat-line">🏭 Boxov: ${boxes.filter(b=>b.count>=20).length + cartBoxes.length}</div>
  `;
  document.getElementById('statsOverlay').classList.add('visible');
}

// ========== DETAILED 8-BIT GRAPHICS ==========
function draw() {
  frame++;
  
  // Sky
  ctx.fillStyle = '#0f1a2a';
  ctx.fillRect(0, 0, 900, 675);
  
  // Clouds
  ctx.fillStyle = '#6a8aaa';
  for(let i=0;i<5;i++) ctx.fillRect(80+i*150, 50, 45, 25);
  
  // Factory background
  ctx.fillStyle = '#4a5a6a';
  for(let i=0;i<10;i++) ctx.fillRect(40+i*70, 100, 45, 140);
  ctx.fillStyle = '#6a8aaa';
  for(let i=0;i<6;i++) ctx.fillRect(450+i*55, 70, 35, 110);
  
  // Floor
  ctx.fillStyle = '#3a3a4a';
  ctx.fillRect(0, 495, 900, 180);
  ctx.fillStyle = '#5a5a6a';
  for(let i=0;i<30;i++) ctx.fillRect(i*30, 492, 18, 6);
  
  // Conveyor
  ctx.fillStyle = '#4a3a2a';
  ctx.fillRect(130, 470, 700, 28);
  let off = (frame * 2) % 24;
  ctx.fillStyle = '#c89a5a';
  for(let i=0;i<35;i++) ctx.fillRect(130 + off + i*24, 474, 18, 20);
  
  // Parts
  for(let p of parts) {
    if(p.bad) {
      ctx.fillStyle = '#aa5555';
      ctx.fillRect(p.x, p.y, 24, 18);
      ctx.fillStyle = '#883333';
      ctx.fillRect(p.x+6, p.y+4, 12, 10);
    } else {
      ctx.fillStyle = '#e8d898';
      ctx.fillRect(p.x, p.y, 24, 18);
      ctx.fillStyle = '#c8a858';
      ctx.fillRect(p.x+5, p.y+3, 14, 12);
      ctx.fillStyle = '#ffffc0';
      ctx.fillRect(p.x+9, p.y+7, 6, 6);
    }
  }
  
  // Engel machine - detailed
  ctx.fillStyle = '#4a6a3a';
  ctx.fillRect(25, 410, 110, 85);
  ctx.fillStyle = '#6a8a5a';
  ctx.fillRect(35, 398, 90, 18);
  ctx.fillStyle = '#2a4a1a';
  ctx.fillRect(40, 405, 80, 10);
  ctx.fillStyle = poruchaActive ? '#ff6666' : '#66ff66';
  ctx.fillRect(105, 415, 14, 14);
  ctx.fillStyle = '#ffdd99';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('ENGEL', 62, 465);
  ctx.fillStyle = '#bbaa88';
  ctx.font = '8px monospace';
  ctx.fillText('ES 200', 68, 480);
  
  // Boxes storage
  let bx = 20;
  for(let i=0;i<boxes.length && i<12;i++) {
    let full = boxes[i].count >= 20;
    ctx.fillStyle = full ? '#f0d870' : '#b89a58';
    ctx.fillRect(bx, 525, 36, 32);
    ctx.fillStyle = '#8a6a3a';
    ctx.fillRect(bx+5, 531, 26, 20);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 9px monospace';
    ctx.fillText(boxes[i].count, bx+13, 549);
    if(full) { ctx.fillStyle = '#ffaa44'; ctx.fillRect(bx+26, 529, 6, 6); }
    bx += 42;
  }
  
  // Roller cart
  ctx.fillStyle = '#6a5a42';
  ctx.fillRect(690, 500, 175, 52);
  ctx.fillStyle = '#4a3a2a';
  ctx.fillRect(694, 504, 167, 45);
  for(let i=0;i<6;i++) {
    let filled = i < cartBoxes.length;
    ctx.fillStyle = filled ? '#6a9a4a' : '#5a4a2a';
    ctx.fillRect(700 + i*27, 508, 23, 36);
    if(filled) {
      ctx.fillStyle = '#ffdd99';
      ctx.fillRect(704 + i*27, 513, 15, 26);
      ctx.fillStyle = '#ccaa66';
      ctx.fillRect(708 + i*27, 532, 7, 8);
    }
  }
  
  // Player - detailed Mario-style
  ctx.fillStyle = '#3a6ea5';
  ctx.fillRect(playerX, 485, 32, 52);
  ctx.fillStyle = '#ffcc88';
  ctx.fillRect(playerX+5, 478, 22, 16);
  ctx.fillStyle = '#2a2a3a';
  ctx.fillRect(playerX+9, 482, 5, 5);
  ctx.fillRect(playerX+18, 482, 5, 5);
  ctx.fillStyle = '#8b5a2b';
  ctx.fillRect(playerX+7, 473, 18, 7);
  ctx.fillStyle = '#aa8866';
  ctx.fillRect(playerX+12, 504, 8, 12);
  ctx.fillStyle = '#2a6a8a';
  ctx.fillRect(playerX+5, 496, 22, 16);
  ctx.fillStyle = '#ffaa66';
  ctx.fillRect(playerX+12, 518, 8, 10);
  if(heldPart) {
    ctx.fillStyle = '#e8d898';
    ctx.fillRect(playerX+36, 500, 20, 16);
    ctx.fillStyle = '#c8a858';
    ctx.fillRect(playerX+40, 504, 12, 10);
  }
  
  // NPC Predačka
  ctx.fillStyle = '#e07a2a';
  ctx.fillRect(620, 485, 32, 52);
  ctx.fillStyle = '#ffccaa';
  ctx.fillRect(625, 478, 22, 16);
  ctx.fillStyle = '#2a1a0a';
  ctx.fillRect(629, 482, 4, 4);
  ctx.fillRect(638, 482, 4, 4);
  ctx.fillStyle = '#cc8844';
  ctx.fillRect(627, 506, 18, 14);
  
  // NPC Skladník
  ctx.fillStyle = '#cc4422';
  ctx.fillRect(780, 485, 32, 52);
  ctx.fillStyle = '#2a8a2a';
  ctx.fillRect(784, 496, 24, 12);
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(788, 500, 16, 5);
  ctx.fillStyle = '#ffccaa';
  ctx.fillRect(785, 478, 22, 16);
  
  // NPC Kvalitár
  ctx.fillStyle = '#3a8a3a';
  ctx.fillRect(520, 485, 32, 52);
  ctx.fillStyle = '#ffccaa';
  ctx.fillRect(525, 478, 22, 16);
  ctx.fillStyle = '#ffff88';
  ctx.fillRect(529, 506, 14, 12);
  
  // NPC Naštavovač - walking
  let navX = 220 + Math.sin(Date.now() / 550) * 14;
  ctx.fillStyle = '#222222';
  ctx.fillRect(navX, 485, 32, 52);
  ctx.fillStyle = '#ffaa66';
  ctx.fillRect(navX+5, 478, 22, 16);
  ctx.fillStyle = '#cc5555';
  ctx.fillRect(navX+10, 518, 12, 12);
  
  // Label indicator
  if(labelPrinted) {
    ctx.fillStyle = '#ffaa66';
    ctx.fillRect(610, 445, 85, 24);
    ctx.fillStyle = '#000';
    ctx.font = 'bold 7px monospace';
    ctx.fillText('PALETOVA ETIKETA', 615, 462);
  }
  
  // Timer bar
  let pct = (shiftTime / shiftDuration) * 260;
  ctx.fillStyle = '#2a2a3a';
  ctx.fillRect(20, 20, 280, 20);
  ctx.fillStyle = '#6a9a3a';
  ctx.fillRect(20, 20, Math.min(pct, 280), 20);
  ctx.fillStyle = '#ffdd99';
  ctx.font = 'bold 10px monospace';
  let m = Math.floor(shiftTime/60);
  let s = shiftTime%60;
  ctx.fillText(`ZMENA ${m}:${s.toString().padStart(2,'0')}`, 25, 17);
  
  // Cart counter
  ctx.fillStyle = '#ffdd99';
  ctx.font = 'bold 12px monospace';
  ctx.fillText(`${cartBoxes.length}/6`, 770, 545);
  
  // Task icons
  ctx.fillStyle = boxes.filter(b=>b.count>=20).length > 0 ? '#88ff88' : '#666';
  ctx.fillRect(20, 605, 12, 12);
  ctx.fillStyle = cartBoxes.length === 6 ? '#88ff88' : '#666';
  ctx.fillRect(20, 625, 12, 12);
  ctx.fillStyle = labelPrinted ? '#88ff88' : '#666';
  ctx.fillRect(20, 645, 12, 12);
  ctx.fillStyle = '#aaa';
  ctx.font = '7px monospace';
  ctx.fillText('BOX', 37, 617);
  ctx.fillText('6/6', 37, 637);
  ctx.fillText('OK', 37, 657);
  
  // Move parts
  for(let p of parts) p.x += 1.25;
  parts = parts.filter(p => p.x < 860);
  
  // Player movement
  if(moveLeft && gameRunning) playerX = Math.max(30, playerX - 5);
  if(moveRight && gameRunning) playerX = Math.min(860, playerX + 5);
  
  requestAnimationFrame(draw);
}

// Event handlers
document.getElementById('leftBtn').addEventListener('touchstart', e => { e.preventDefault(); moveLeft = true; });
document.getElementById('leftBtn').addEventListener('touchend', () => moveLeft = false);
document.getElementById('leftBtn').addEventListener('mousedown', () => moveLeft = true);
document.getElementById('leftBtn').addEventListener('mouseup', () => moveLeft = false);
document.getElementById('rightBtn').addEventListener('touchstart', e => { e.preventDefault(); moveRight = true; });
document.getElementById('rightBtn').addEventListener('touchend', () => moveRight = false);
document.getElementById('rightBtn').addEventListener('mousedown', () => moveRight = true);
document.getElementById('rightBtn').addEventListener('mouseup', () => moveRight = false);

document.getElementById('pickupBtn').onclick = pickup;
document.getElementById('boxBtn').onclick = toBox;
document.getElementById('cartBtn').onclick = toCart;
document.getElementById('labelBtn').onclick = labelCall;
document.getElementById('wareBtn').onclick = warehouseCall;
document.getElementById('startBtn').onclick = startGame;
document.getElementById('statsBtn').onclick = showStats;
document.getElementById('closeStatsBtn').onclick = () => document.getElementById('statsOverlay').classList.remove('visible');
document.getElementById('fixBtn').onclick = fixPorucha;
document.getElementById('endMenuBtn').onclick = () => { document.getElementById('endOverlay').classList.remove('visible'); document.getElementById('menuOverlay').classList.add('visible'); };

// Keyboard
document.addEventListener('keydown', e => {
  if(e.key === 'ArrowLeft') moveLeft = true;
  if(e.key === 'ArrowRight') moveRight = true;
  if(e.key === ' ' || e.key === 'Space') pickup();
  if(e.key === 'b') toBox();
  if(e.key === 'c') toCart();
  if(e.key === 'l') labelCall();
  if(e.key === 's') warehouseCall();
});
document.addEventListener('keyup', e => {
  if(e.key === 'ArrowLeft') moveLeft = false;
  if(e.key === 'ArrowRight') moveRight = false;
});

document.getElementById('menuOverlay').classList.add('visible');
draw();
</script>
</body>
</html>
