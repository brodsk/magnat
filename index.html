<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LISOVNA</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0a;}

#app{
  width:100%;height:100%;
  display:flex;flex-direction:column;
  align-items:center;
  background:#0a0a0a;
  position:relative;
  overflow:hidden;
}

canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;}

/* Pixel font everywhere */
.pf{font-family:'Press Start 2P',monospace;}

/* HUD */
#hud{
  width:100%;max-width:600px;
  display:flex;gap:0;
  background:#111;
  border-bottom:4px solid #333;
  flex-shrink:0;
  font-family:'Press Start 2P',monospace;
  font-size:clamp(8px,2vw,11px);
}
#hud .hcell{
  flex:1;padding:6px 4px;
  text-align:center;
  border-right:2px solid #333;
  line-height:1.6;
}
#hud .hcell:last-child{border-right:none;}
.hv{font-size:clamp(10px,2.5vw,14px);font-weight:bold;}
#hScore .hv{color:#ff0;}
#hLives .hv{color:#f55;}
#hLevel .hv{color:#0ff;}

/* Canvas wrap */
#gw{
  position:relative;flex:1;
  width:100%;max-width:600px;
  overflow:hidden;
}
#gc{width:100%;height:100%;}

/* Banners */
.banner{
  position:absolute;top:0;left:0;right:0;
  font-family:'Press Start 2P',monospace;
  font-size:clamp(7px,1.8vw,10px);
  text-align:center;padding:5px 4px;
  z-index:15;display:none;
  animation:slideD 0.2s steps(4) forwards;
}
#bPredak{background:#e86820;color:#fff;}
#bNast{background:#111;color:#ff0;border-bottom:2px solid #ff0;}
@keyframes slideD{from{transform:translateY(-100%);}to{transform:translateY(0);}}

/* Controls */
#ctrl{
  width:100%;max-width:600px;
  display:flex;gap:6px;padding:6px;
  background:#111;border-top:4px solid #333;
  flex-shrink:0;
}
#ctrl button{
  flex:1;
  font-family:'Press Start 2P',monospace;
  font-size:22px;
  background:#1a1a2e;
  color:#0ff;
  border:3px solid #0ff;
  padding:10px 0;
  cursor:pointer;
  border-radius:0;
  touch-action:manipulation;
  image-rendering:pixelated;
  transition:background 0.05s;
}
#ctrl button:active,#ctrl button.held{background:#002244;color:#fff;border-color:#fff;}

/* Overlay */
#ov{
  position:absolute;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.0);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:20;
  font-family:'Press Start 2P',monospace;
}
#ov.hidden{display:none;}

/* Menu */
#sMenu{
  display:flex;flex-direction:column;
  align-items:center;gap:10px;
  background:rgba(0,0,8,0.92);
  border:3px solid #0ff;
  padding:16px 20px;
  max-width:340px;width:90%;
  image-rendering:pixelated;
}
.mtitle{
  font-size:clamp(14px,4vw,22px);
  color:#ff0;
  text-shadow:3px 3px 0 #880,2px 2px 0 #880;
  letter-spacing:2px;
  text-align:center;
}
.msub{font-size:clamp(6px,1.5vw,9px);color:#888;text-align:center;line-height:1.8;}
.msel-label{font-size:clamp(7px,1.8vw,10px);color:#0ff;}

/* Char cards */
.ccards{display:flex;gap:10px;justify-content:center;}
.ccard{
  border:3px solid #444;
  background:#0a0a1a;
  padding:8px;cursor:pointer;
  text-align:center;
  transition:border-color 0.1s;
  min-width:90px;
}
.ccard.sel{border-color:#0ff;background:#001122;}
.ccard canvas{display:block;margin:0 auto;image-rendering:pixelated;}
.ccard .cn{font-size:clamp(6px,1.5vw,8px);color:#aaa;margin-top:4px;}

/* Buttons */
.mbtn{
  font-family:'Press Start 2P',monospace;
  font-size:clamp(9px,2.5vw,13px);
  background:#003300;color:#0f0;
  border:3px solid #0f0;
  padding:10px 24px;cursor:pointer;
  letter-spacing:1px;
  transition:background 0.08s;
}
.mbtn:hover,.mbtn:active{background:#005500;color:#fff;}
.mbtn.sec{background:#1a1a1a;color:#888;border-color:#444;font-size:clamp(7px,2vw,10px);padding:8px 16px;}

/* Game over */
#sOver{
  display:none;flex-direction:column;
  align-items:center;gap:10px;
  background:rgba(0,0,8,0.94);
  border:3px solid #f00;
  padding:16px 20px;
  max-width:340px;width:90%;
}
.go-title{font-size:clamp(14px,4vw,20px);color:#f00;text-shadow:2px 2px 0 #800;}
.go-score{font-size:clamp(9px,2.5vw,13px);color:#ff0;}
.go-quote{font-size:clamp(6px,1.5vw,8px);color:#f99;text-align:center;line-height:1.8;max-width:260px;}
.go-btns{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
#majPrev{image-rendering:pixelated;}
</style>
</head>
<body>
<div id="app">
  <div id="hud">
    <div class="hcell pf" id="hScore"><div style="color:#888;font-size:0.7em;">SCORE</div><div class="hv" id="hSv">0</div></div>
    <div class="hcell pf" id="hLives"><div style="color:#888;font-size:0.7em;">LIVES</div><div class="hv" id="hLv">❤❤❤</div></div>
    <div class="hcell pf" id="hLevel"><div style="color:#888;font-size:0.7em;">LEVEL</div><div class="hv" id="hLLv">1</div></div>
  </div>

  <div id="gw">
    <canvas id="gc"></canvas>
    <div class="banner" id="bPredak">⚠ PREDAK: VEZMI AJ DRUHY LIS! ⚠</div>
    <div class="banner" id="bNast">▶ NASTAVOVAC: PORUCHA FORMY! ◀</div>

    <div id="ov">
      <!-- MENU -->
      <div id="sMenu">
        <div class="mtitle">🏭 LISOVNA</div>
        <div class="msub">Chytaj diely z konvejera!<br>Stoj pri lise a ber diely!</div>
        <div class="msel-label">— VYBER POSTAVU —</div>
        <div class="ccards">
          <div class="ccard sel" id="cM" onclick="selChar('m')">
            <canvas id="pM" width="40" height="56"></canvas>
            <div class="cn">MUZ</div>
          </div>
          <div class="ccard" id="cF" onclick="selChar('f')">
            <canvas id="pF" width="40" height="56"></canvas>
            <div class="cn">ZENA</div>
          </div>
        </div>
        <button class="mbtn" onclick="startGame()">▶ HRAT</button>
        <div class="msub" style="font-size:0.6em;color:#444;">← → tlacidla alebo klavesy</div>
      </div>

      <!-- GAME OVER -->
      <div id="sOver">
        <div class="go-title">GAME OVER</div>
        <canvas id="majPrev" width="60" height="90"></canvas>
        <div class="go-score" id="goS">SCORE: 0</div>
        <div class="go-quote" id="goQ"></div>
        <div class="go-btns">
          <button class="mbtn sec" onclick="showMenu()">MENU</button>
          <button class="mbtn" onclick="startGame()">▶ ZNOVA</button>
        </div>
      </div>
    </div>
  </div>

  <div id="ctrl">
    <button id="bL"
      ontouchstart="sl(event)" ontouchend="el()"
      onmousedown="sl()" onmouseup="el()" onmouseleave="el()">◀</button>
    <button id="bR"
      ontouchstart="sr(event)" ontouchend="er()"
      onmousedown="sr()" onmouseup="er()" onmouseleave="er()">▶</button>
  </div>
</div>

<script>
// ============================================================
// LISOVNA  —  pixel factory game
// ============================================================

const gc = document.getElementById('gc');
const ctx = gc.getContext('2d');
ctx.imageSmoothingEnabled = false;

let GW=400, GH=300;

function resize(){
  const wrap = document.getElementById('gw');
  GW = wrap.clientWidth;
  GH = wrap.clientHeight;
  gc.width  = GW;
  gc.height = GH;
}
window.addEventListener('resize', ()=>{ resize(); if(!running) drawBg(); });
resize();

// ============================================================
// PIXEL ART PALETTE  (Pixel Car Racer style — dark, neon accents)
// ============================================================
const P = {
  bg:    '#0a0a12',
  sky1:  '#0a0a18',
  sky2:  '#12122a',
  ground:'#1a1a1a',
  road:  '#222233',
  stripe:'#ffee00',
  wall:  '#1e2230',
  wallH: '#2a3050',
  blue1: '#1144aa',
  blue2: '#1166cc',
  white: '#eeeeff',
  glass: '#223355',
  neon:  '#00ffff',
  neonG: '#00ff88',
  neonR: '#ff3344',
  neonY: '#ffdd00',
  engGr: '#4a9a20',  // Engel green
  engDk: '#336610',
  engGy: '#444455',
  convBelt:'#333344',
  convLine:'#555566',
};

// ============================================================
// PIXEL DRAW HELPERS
// ============================================================
function px(c,x,y,w,h,col){ c.fillStyle=col; c.fillRect(Math.round(x),Math.round(y),w,h); }
function pxText(c,txt,x,y,col,sz=8){
  c.font=`${sz}px 'Press Start 2P'`;
  c.fillStyle=col; c.fillText(txt,Math.round(x),Math.round(y));
}

// ============================================================
// BACKGROUND  — pixel factory / Magna building
// ============================================================
let bgFrame = 0;

function drawBg(){
  const c = ctx;
  // Sky gradient (pixelated bands)
  const skyH = Math.floor(GH*0.45);
  const bands = 8;
  for(let i=0;i<bands;i++){
    const t=i/bands;
    const r=Math.round(10+t*8), g=Math.round(10+t*10), b=Math.round(18+t*28);
    c.fillStyle=`rgb(${r},${g},${b})`;
    c.fillRect(0,Math.floor(skyH*i/bands),GW,Math.ceil(skyH/bands)+1);
  }

  // Stars (pixel dots)
  const stars=[[12,8],[45,15],[80,5],[130,20],[200,10],[260,18],[320,6],[370,12],[420,8],[480,16],[540,4]];
  c.fillStyle='#ffffff';
  stars.forEach(([sx,sy])=>{ if(sx<GW&&sy<skyH) c.fillRect(sx%GW,sy,2,2); });

  // Ground
  px(c,0,skyH,GW,GH-skyH,P.ground);
  // Road
  const roadY = skyH+Math.floor((GH-skyH)*0.55);
  px(c,0,roadY,GW,8,P.road);
  // Road stripes
  for(let x=(bgFrame*2)%60;x<GW;x+=60){
    px(c,x,roadY+3,30,2,P.stripe);
  }

  // === MAGNA FACTORY BUILDING (pixel art) ===
  const bx = Math.floor(GW*0.08);
  const bw = Math.floor(GW*0.72);
  const bh = Math.floor(GH*0.38);
  const by = skyH - Math.floor(bh*0.7);

  // Main building body — white/light gray panels
  px(c,bx,by,bw,bh,'#c8ccd8');

  // Blue accent strips (top and sides)
  px(c,bx,by,bw,8,P.blue1);
  px(c,bx,by+bh-10,bw,10,P.blue2);
  px(c,bx,by,10,bh,P.blue1);
  px(c,bx+bw-10,by,10,bh,P.blue1);

  // Building panels (horizontal lines)
  for(let py2=by+20;py2<by+bh-10;py2+=18){
    px(c,bx+10,py2,bw-20,2,'#aab0c0');
  }

  // Windows row 1
  const winY1 = by+14;
  const winY2 = by+14+30;
  const winH = 22;
  const winW = Math.floor((bw-20)/8);
  for(let wi=0;wi<7;wi++){
    const wx2=bx+14+wi*(winW+4);
    // Window frame
    px(c,wx2,winY1,winW,winH,P.blue1);
    px(c,wx2+2,winY1+2,winW-4,winH-4,P.glass);
    // Reflection
    px(c,wx2+3,winY1+3,3,3,'#334466');
    // Row 2
    px(c,wx2,winY2,winW,winH,P.blue1);
    px(c,wx2+2,winY2+2,winW-4,winH-4,P.glass);
  }

  // MAGNA logo on building (pixel letters approximation)
  const logoX = bx + Math.floor(bw*0.1);
  const logoY = by + Math.floor(bh*0.1);
  // Red dot (Magna logo)
  px(c,logoX,logoY,8,8,'#cc0000');
  px(c,logoX+2,logoY+2,4,4,'#ff2222');
  // "MAGNA" text
  pxText(c,'MAGNA',logoX+12,logoY+8,'#1a2255',8);

  // Right section of building
  const bx2=bx+bw+4;
  const bw2=Math.floor(GW*0.14);
  const bh2=Math.floor(bh*0.72);
  const by2=by+Math.floor(bh*0.28);
  px(c,bx2,by2,bw2,bh2,'#bcc0cc');
  px(c,bx2,by2,bw2,8,P.blue2);
  px(c,bx2,by2+bh2-6,bw2,6,P.blue1);
  for(let wi=0;wi<2;wi++){
    const wx3=bx2+6+wi*22;
    px(c,wx3,by2+12,16,20,P.blue1);
    px(c,wx3+2,by2+14,12,16,P.glass);
  }
  // Second MAGNA logo
  px(c,bx2+6,by2+2,6,6,'#cc0000');
  pxText(c,'MAGNA',bx2+14,by2+8,'#1a2255',6);

  // Building shadow / ground connection
  px(c,bx-4,by+bh,bw+8,6,'#0f1020');

  // Trees (pixel triangles)
  const treePositions=[bx+bw-20, bx2+bw2+8];
  treePositions.forEach(tx=>{
    if(tx<GW){
      // Trunk
      px(c,tx+6,by+bh-14,6,14,'#553311');
      // Foliage — pixel triangle
      for(let row=0;row<5;row++){
        const tw=4+row*4; const offs=(12-tw)/2;
        px(c,tx+offs,by+bh-32+row*4,tw,4,'#224411');
        px(c,tx+offs+1,by+bh-34+row*4,tw-2,2,'#338822');
      }
    }
  });

  // Cars in parking lot
  const carColors=['#cc2222','#eeeeff','#334488','#888888'];
  for(let ci=0;ci<4;ci++){
    if(ci*40+bx+10<GW){
      const cx2=bx+10+ci*44;
      const cy2=roadY-16;
      // Car body
      px(c,cx2,cy2,34,10,carColors[ci]);
      px(c,cx2+4,cy2-8,26,10,carColors[ci]);
      // Windows
      px(c,cx2+6,cy2-6,10,7,P.glass);
      px(c,cx2+20,cy2-6,8,7,P.glass);
      // Wheels
      px(c,cx2+4,cy2+8,6,5,'#111');
      px(c,cx2+24,cy2+8,6,5,'#111');
    }
  }

  // Fence
  for(let fx=bx-10;fx<bx+bw+bx2+bw2;fx+=12){
    if(fx<GW){
      px(c,fx,roadY-20,2,20,'#334');
      px(c,fx,roadY-22,3,3,'#556');
    }
  }
  px(c,bx-10,roadY-14,bw+60,2,'#445');

  // Neon glow at bottom (pixel effect)
  for(let gi=0;gi<3;gi++){
    c.globalAlpha=0.08-gi*0.02;
    px(c,0,GH-50+gi*15,GW,15,'#0088ff');
  }
  c.globalAlpha=1;
}

// ============================================================
// INJECTION MOLDING MACHINES (Engel-style, pixel art)
// ============================================================
// Each machine occupies a "lane" — player walks between them
// Parts come out on horizontal conveyor from each machine

function drawMachine(c, x, y, w, h, active, cycleT){
  const gh = Math.floor(h*0.85);
  const gy = y + h - gh;

  // Base/bed — dark
  px(c,x,gy+gh-8,w,8,P.engDk);

  // Main body — Engel green
  px(c,x+2,gy,w-4,gh-8,P.engGr);

  // Pixel shading — left edge darker
  px(c,x+2,gy,4,gh-8,P.engDk);
  // Right edge
  px(c,x+w-6,gy,4,gh-8,P.engDk);

  // Panel lines (horizontal)
  for(let py2=gy+10;py2<gy+gh-12;py2+=16){
    px(c,x+8,py2,w-16,2,P.engDk);
  }

  // Control panel (right side, small box)
  const cpx=x+w-24, cpy=gy+8, cpw=18, cph=32;
  px(c,cpx,cpy,cpw,cph,'#222233');
  px(c,cpx+2,cpy+2,cpw-4,12,P.glass);
  // Buttons on panel
  px(c,cpx+3,cpy+16,4,4,'#00ff00');
  px(c,cpx+9,cpy+16,4,4,'#ff0000');
  px(c,cpx+3,cpy+24,14,4,'#ff8800');

  // Injection unit (right side cylinder)
  const injX=x+w-6;
  px(c,injX,gy+Math.floor(gh*0.25),22,Math.floor(gh*0.3),P.engGy);
  px(c,injX+2,gy+Math.floor(gh*0.25)+2,18,Math.floor(gh*0.3)-4,'#3a3a4a');
  // Nozzle tip
  px(c,injX+22,gy+Math.floor(gh*0.35),6,Math.floor(gh*0.1),'#888899');

  // Mold area (center gap)
  const moldX=x+Math.floor(w*0.3), moldW=Math.floor(w*0.35);
  px(c,moldX,gy+4,moldW,gh-12,'#1a1a2a');
  // Mold plates
  px(c,moldX,gy+4,8,gh-12,'#334455');
  px(c,moldX+moldW-8,gy+4,8,gh-12,'#334455');

  // Cycle indicator — flashing when active
  if(active && Math.floor(cycleT/4)%2===0){
    px(c,x+8,gy+4,8,8,P.neonG);
  } else {
    px(c,x+8,gy+4,8,8,P.engDk);
  }

  // "LIS" label
  pxText(c,'LIS',x+Math.floor(w*0.15),gy+Math.floor(gh*0.5),'#ccddcc',6);

  // ENGEL logo approximation
  pxText(c,'ENGEL',x+6,gy+10,'#88cc44',5);

  // Top — safety guard
  px(c,x,y,w,h-gh+2,'#2a3040');
  // Glass panel
  px(c,x+4,y+2,w-8,h-gh-4,P.glass);
}

// ============================================================
// CONVEYOR BELT (horizontal, at mid-height per lane)
// ============================================================
function drawConveyor(c, x, y, w, beltFrame){
  const bh=12;
  // Belt body
  px(c,x,y,w,bh,P.convBelt);
  // Moving lines
  const offset=(beltFrame*3)%20;
  for(let bx2=x-offset;bx2<x+w;bx2+=20){
    if(bx2>=x) px(c,bx2,y+4,10,4,P.convLine);
  }
  // Border
  px(c,x,y,w,2,'#555566');
  px(c,x,y+bh-2,w,2,'#555566');
  // End rollers
  px(c,x,y,4,bh,'#666677');
  px(c,x+w-4,y,4,bh,'#666677');
}

// ============================================================
// PIXEL CHARACTER SPRITES  (Pixel Car Racer aesthetic)
// ============================================================
// 8x16 pixel characters, drawn with rectangles

// Colors
const SP = {
  // Male worker
  mSkin:  '#e8b87a',
  mHair:  '#1a0e06',
  mShirt: '#3a3a3a',  // dark gray
  mPants: '#223344',
  mShoe:  '#111111',
  // Female worker
  fSkin:  '#ecc090',
  fHair:  '#7a3008',
  fShirt: '#3a3a3a',
  fPants: '#224488',
  fShoe:  '#111111',
  // Predak
  prSkin: '#e8b07a',
  prHair: '#aa2800',
  prShirt:'#e86820',
  prPants:'#1a1a2a',
  // Nastavovac
  naSkin: '#d8a060',
  naHair: '#111111',
  naShirt:'#0f0f0f',
  naPants:'#111111',
  naBeard:'#1a1a1a',
  // Skladnik
  skSkin: '#e0a870',
  skHair: '#3a2010',
  skShirt:'#cc1111',
  skStripe:'#ffffff',
  skPants:'#222233',
  // Majster
  maShirt:'#0f0f0f',
};

// Scale factor for pixel chars
const PSCALE = 3;

function pixChar(c, x, y, gender, frame){
  const s = PSCALE;
  const bobY = Math.floor(Math.sin(frame*0.18)*1.5); // walking bob
  x = Math.round(x); y = Math.round(y+bobY);

  if(gender==='m'){
    // Shoes
    px(c,x+0*s,y+14*s,4*s,2*s,SP.mShoe);
    px(c,x+5*s,y+14*s,4*s,2*s,SP.mShoe);
    // Pants
    px(c,x+1*s,y+10*s,3*s,5*s,SP.mPants);
    px(c,x+5*s,y+10*s,3*s,5*s,SP.mPants);
    // Shirt body
    px(c,x+0*s,y+5*s,9*s,6*s,SP.mShirt);
    // Red dot logo
    px(c,x+4*s,y+7*s,2*s,2*s,'#cc0000');
    // Arms (animated)
    const armOff=Math.round(Math.sin(frame*0.18)*2);
    px(c,x-1*s,y+5*s+armOff,2*s,5*s,SP.mSkin);
    px(c,x+9*s,y+5*s-armOff,2*s,5*s,SP.mSkin);
    // Hands
    px(c,x-1*s,y+9*s+armOff,3*s,2*s,SP.mSkin);
    px(c,x+8*s,y+9*s-armOff,3*s,2*s,SP.mSkin);
    // Neck
    px(c,x+3*s,y+3*s,3*s,3*s,SP.mSkin);
    // Head
    px(c,x+1*s,y+0*s,7*s,5*s,SP.mSkin);
    // Hair
    px(c,x+1*s,y+0*s,7*s,2*s,SP.mHair);
    px(c,x+1*s,y+0*s,2*s,4*s,SP.mHair);
    // Eyes
    px(c,x+2*s,y+2*s,1*s,1*s,'#111');

  const bw=text.length*7+10;

  const bx=facing>0 ? x : x-bw;
  const by=y-bh-8;
  // Box
  px(c,bx,by,bw,bh,bg);

  c.strokeStyle=col; c.lineWidth=2;

  px(c,facing>0?bx+6:bx+bw-10,by+bh,6,6,bg);

  pxText(c,text,bx+5,by+13,col,6);
}

// ============================================================
// GAME STATE
// ============================================================
let running=false, raf=null;
let score, lives, level, gframe, speed;
let selectedChar='m';

// Player state
let player;

// Machines (lanes)
let machines;
let numLanes;

// Parts on conveyor
let parts;

// NPC walkers
let predak, nastavovac, skladnik;
let predakActive=false, predakTimer=0;
let nastavovacActive=false, nastavovacTimer=0;
let nastavovacStopX=0;

// Belt animation
let beltAnim=0;
let flashT=0, flashCol='';

const MAJSTER_Q=[
  'CO TO ROBIS?!',
  'MOJA BABICKA\nRYCHLEJSIE!',
  'ZAJTRA AUDIT!!',
  'NESPOKOJNY!!',
  'REKLAMACIA!!',
  'KTO TA NAUCIL?!',
];

// ============================================================
// LAYOUT CALCULATIONS
// ============================================================
let MACHINE_W, MACHINE_H, MACHINE_Y, CONV_Y, FLOOR_Y;
let PLAYER_W = 9*PSCALE;
let PLAYER_H = 16*PSCALE;
let LANE_XS = [];

function computeLayout(){
  numLanes = Math.min(3 + Math.floor(level/3), 5);
  MACHINE_H = Math.floor(GH*0.40);
  MACHINE_W = Math.floor((GW - 16) / numLanes) - 4;
  MACHINE_Y = Math.floor(GH*0.32);
  CONV_Y     = MACHINE_Y + MACHINE_H - 14;
  FLOOR_Y    = MACHINE_Y + MACHINE_H + 4;

  LANE_XS = [];
  for(let i=0;i<numLanes;i++){
    LANE_XS.push(16 + i*(MACHINE_W+4));
  }
  PLAYER_W = 9*PSCALE;
  PLAYER_H = 16*PSCALE;
}

// ============================================================
// INIT / START
// ============================================================

function stopGame(){
  running=false; cancelAnimationFrame(raf); raf=null;
  hideBanners();
}
function hideBanners(){
  document.getElementById('bPredak').style.display='none';
  document.getElementById('bNast').style.display='none';
}

function startGame(){
  hideOverlay();
  score=0; lives=3; level=1; gframe=0; speed=1.8;
  predakActive=false; predakTimer=0;
  nastavovacActive=false; nastavovacTimer=0;
  hideBanners();
  computeLayout();

  // Player starts at lane 0
  player = {
    lane:0,
    x: LANE_XS[0] + MACHINE_W/2 - PLAYER_W/2,
    y: FLOOR_Y,
    frame:0,
    catching:false,
    catchAnim:0,
  };

  parts=[];
  // Predak
  predak={x:GW+40, y:FLOOR_Y, frame:0, dir:-1, bubble:0};
  // Nastavovac
  nastavovac={x:-60, y:FLOOR_Y, frame:0, stopped:false, bubble:0};
  // Skladnik
  skladnik={x:GW+80, y:FLOOR_Y, frame:0, active:false, timer:400+Math.floor(Math.random()*300)};

  beltAnim=0; flashT=0;
  updateHUD();
  running=true;
  cancelAnimationFrame(raf);
  loop();
}

function updateHUD(){
  document.getElementById('hSv').textContent=score;
  document.getElementById('hLv').textContent='❤'.repeat(Math.max(0,lives));
  document.getElementById('hLLv').textContent=level+(predakActive?'🔥':'')+(nastavovacActive?'🔧':'');
}

// ============================================================
// MAIN LOOP
// ============================================================
function loop(){
  if(!running)return;
  gframe++; beltAnim++;
  bgFrame=gframe;
  update();
  draw();
  raf=requestAnimationFrame(loop);
}

// ============================================================
// UPDATE
// ============================================================
function update(){
  // Smooth player move
  const targetX = LANE_XS[player.lane] + MACHINE_W/2 - PLAYER_W/2;
  player.x += (targetX - player.x)*0.22;
  player.frame++;

  // Catch animation
  if(player.catchAnim>0) player.catchAnim--;

  // Belt animation speed up with predak
  const beltSpd = predakActive ? speed*1.8 : speed;

  // ---- SPAWN PARTS ----
  // Parts come out from RIGHT side of each machine's conveyor
  const spawnRate = nastavovacActive ? 9999 : Math.max(30, 90 - level*6 - (predakActive?15:0));
  if(gframe % spawnRate === 0){
    const lane = Math.floor(Math.random()*numLanes);
    const bad = Math.random() < (0.2 + level*0.03 + (predakActive?0.1:0));
    parts.push({
      lane,
      x: LANE_XS[lane] + MACHINE_W - 20, // starts near right side of machine
      y: CONV_Y + 1,
      bad,
      speed: (speed + Math.random()*0.8) * (predakActive?1.4:1),
      caught: false,
    });
  }

  // ---- MOVE PARTS (right to left on conveyor) ----
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];
    p.x -= p.speed; // move LEFT

    // Check catch: player at same lane, part reaches player x zone
    const convEnd = LANE_XS[player.lane]; // left end of current machine
    const playerMidX = player.x + PLAYER_W/2;

    if(!p.caught && p.lane===player.lane && p.x < playerMidX+20 && p.x > playerMidX-60){
      if(!p.bad){
        score += 10*level;
        p.caught=true;
        player.catchAnim=12;
      } else {
        lives--;
        p.caught=true;
        doFlash('#ff000088');
        updateHUD();
        if(lives<=0){gameOver();return;}
      }
    }

    // Part falls off left edge (missed)
    if(p.x < LANE_XS[p.lane] - 30){
      if(!p.bad && !p.caught){
        lives--;
        doFlash('#ff550066');
        updateHUD();
        if(lives<=0){gameOver();return;}
      }
      parts.splice(i,1);
      continue;
    }
    if(p.caught) parts.splice(i,1);
  }

  // ---- LEVEL UP ----
  if(score > 0 && score % (200*level) === 0 && gframe%4===0 && !predakActive){
    level++;
    speed = Math.min(speed+0.15, 5.5);
    updateHUD();
  }

  // ---- PREDAK ----
  if(!predakActive && !nastavovacActive && gframe>200 && gframe%650===0){
    predakActive=true; predakTimer=320;
    predak.x=GW+40; predak.dir=-1;
    document.getElementById('bPredak').style.display='block';
    // Add lane
    const newN=Math.min(numLanes+1,5);
    if(newN!==numLanes){
      numLanes=newN;
      MACHINE_W=Math.floor((GW-16)/numLanes)-4;
      LANE_XS=[];
      for(let i=0;i<numLanes;i++) LANE_XS.push(16+i*(MACHINE_W+4));
    }
    speed=Math.min(speed+1.2,9);
    predak.bubble=180;
    updateHUD();
  }
  if(predakActive){
    predak.x += predak.dir*1.6; predak.frame++;
    predakTimer--;
    if(predak.x<60&&predak.dir<0) predak.dir=1;
    if(predak.x>GW-60&&predak.dir>0) predak.dir=-1;
    if(predak.bubble>0) predak.bubble--;
    if(predakTimer<=0){
      predakActive=false;
      document.getElementById('bPredak').style.display='none';
      speed=Math.max(speed-0.7, 1.8+level*0.15);
      updateHUD();
    }
  }

  // ---- NASTAVOVAC ----
  if(!nastavovacActive && !predakActive && gframe>300 && gframe%850===0){
    nastavovacActive=true; nastavovacTimer=200;
    nastavovac.x=-60; nastavovac.stopped=false;
    nastavovacStopX=Math.floor(GW*0.4);
    document.getElementById('bNast').style.display='block';
    nastavovac.bubble=180;
    updateHUD();
  }
  if(nastavovacActive){
    nastavovac.frame++;
    nastavovac.bubble>0&&nastavovac.bubble--;
    if(!nastavovac.stopped){
      nastavovac.x+=1.3;
      if(nastavovac.x>=nastavovacStopX) nastavovac.stopped=true;
    }
    nastavovacTimer--;
    if(nastavovacTimer<=0){
      nastavovacActive=false;
      document.getElementById('bNast').style.display='none';
      nastavovac.stopped=false;
      updateHUD();
    }
  } else if(nastavovac.x>-60 && nastavovac.x<GW+40){
    // Walk off
    nastavovac.x+=1.5; nastavovac.frame++;
  }

  // ---- SKLADNIK ----
  skladnik.timer--;
  if(skladnik.timer<=0 && !skladnik.active){
    skladnik.active=true; skladnik.x=GW+100; skladnik.frame=0;
    skladnik.timer=700+Math.floor(Math.random()*500);
  }
  if(skladnik.active){
    skladnik.x-=1.4; skladnik.frame++;
    if(skladnik.x<-150) skladnik.active=false;
  }

  if(flashT>0) flashT--;
}

function doFlash(col){flashT=10;flashCol=col;}
function gameOver(){ running=false; hideBanners(); showGameOver(); }

// ============================================================
// DRAW
// ============================================================
function draw(){
  const c=ctx;

  // Background
  drawBg();

  // ---- FLOOR / FACTORY INTERIOR ----
  // Factory floor (below machines)
  px(c,0,FLOOR_Y,GW,GH-FLOOR_Y,'#141420');
  // Floor tiles
  for(let fx=0;fx<GW;fx+=24){
    px(c,fx,FLOOR_Y,22,GH-FLOOR_Y-1,'#181828');
    px(c,fx,FLOOR_Y,22,2,'#222233');
  }
  // Floor highlight line
  px(c,0,FLOOR_Y,GW,2,'#33334a');

  // ---- MACHINES ----
  for(let i=0;i<numLanes;i++){
    const mx=LANE_XS[i];
    const isPlayerLane=(i===player.lane);
    drawMachine(c, mx, MACHINE_Y, MACHINE_W, MACHINE_H,
      isPlayerLane, gframe);
    // Conveyor
    drawConveyor(c, mx, CONV_Y, MACHINE_W, beltAnim);
  }

  // ---- PARTS ON CONVEYORS ----
  for(const p of parts){
    if(p.caught)continue;
    drawPart(c, p.x, p.y, p.bad);
  }

  // ---- SKLADNIK ----
  if(skladnik.active){
    const sy = FLOOR_Y + 2;
    pixCart(c, skladnik.x+32, sy-8*PSCALE);
    pixSkladnik(c, skladnik.x, sy-14*PSCALE, skladnik.frame);
  }

  // ---- PLAYER ----
  {
    const py2 = player.y - PLAYER_H + 4;
    pixChar(c, player.x, py2, selectedChar, player.frame);
    // Catch flash
    if(player.catchAnim>0 && player.catchAnim%3<2){
      c.globalAlpha=0.4;
      px(c,player.x-2,py2-2,PLAYER_W+4,PLAYER_H+4,'#00ffff');
      c.globalAlpha=1;
    }
    // Glowing feet (standing on active conveyor)
    if(Math.floor(gframe/6)%2===0){
      px(c,player.x,player.y,PLAYER_W,3,P.neonG+'44');
    }
  }

  // ---- PREDAK ----
  if(predakActive){
    const py2=predak.y-14*PSCALE;
    pixPredak(c, predak.x-PLAYER_W/2, py2, predak.frame, predak.dir);
    if(predak.bubble>0){
      pixBubble(c, predak.x, py2, 'VEZMI AJ DRUHY LIS!', '#ff8800','rgba(0,0,0,0.9)', predak.dir);
    }
  }

  // ---- NASTAVOVAC ----
  if(nastavovacActive || (nastavovac.x>-60&&nastavovac.x<GW+40)){
    const py2=nastavovac.y-14*PSCALE;
    pixNastavovac(c, nastavovac.x-PLAYER_W/2, py2, nastavovac.frame);
    if(nastavovac.bubble>0 && nastavovacActive){
      pixBubble(c, nastavovac.x+20, py2, 'PORUCHA FORMY!', '#ffff00','rgba(0,0,0,0.9)', 1);
    }
  }

  // ---- FLASH ----
  if(flashT>0){
    c.fillStyle=flashCol; c.fillRect(0,0,GW,GH);
  }

  // ---- SCANLINE EFFECT (pixel aesthetic) ----
  for(let sy=0;sy<GH;sy+=4){
    c.fillStyle='rgba(0,0,0,0.12)';
    c.fillRect(0,sy,GW,2);
  }

  // ---- SCORE POPUP ----
  if(player.catchAnim>6){
    pxText(c,'+'+10*level,
      player.x+PLAYER_W,
      player.y-PLAYER_H-8,
      '#00ff88',8);
  }
}

// Parts (horizontal conveyor)
function drawPart(c, x, y, bad){
  const s=PSCALE-1; // slightly smaller pixel scale
  // Part shape: plastic mirror housing
  c.fillStyle = bad?'#aa1818':'#3a6a99';
  c.fillRect(Math.round(x),Math.round(y),14,8);
  // Inner detail
  c.fillStyle = bad?'#ff5555':'#6699cc';
  c.fillRect(Math.round(x+2),Math.round(y+2),4,4);
  c.fillRect(Math.round(x+8),Math.round(y+2),4,4);
  // Nub
  c.fillStyle = bad?'#881111':'#2255aa';
  c.fillRect(Math.round(x+4),Math.round(y+8),6,3);
  if(bad){
    c.fillStyle='#ffee00';
    c.fillRect(Math.round(x+1),Math.round(y+1),3,3);
    c.fillRect(Math.round(x+10),Math.round(y+4),3,3);
  }
}

// ============================================================
// CONTROLS
// ============================================================
let lHeld=false, rHeld=false, mvInt=null;

function movL(){
  if(player&&player.lane>0) player.lane--;
}
function movR(){
  if(player&&player.lane<numLanes-1) player.lane++;
}

function sl(e){ if(e&&e.cancelable)e.preventDefault(); if(!running)return; movL(); clearInterval(mvInt); mvInt=setInterval(()=>{if(lHeld)movL();},130); lHeld=true; document.getElementById('bL').classList.add('held'); }
function el(){ lHeld=false; clearInterval(mvInt); document.getElementById('bL').classList.remove('held'); }
function sr(e){ if(e&&e.cancelable)e.preventDefault(); if(!running)return; movR(); clearInterval(mvInt); mvInt=setInterval(()=>{if(rHeld)movR();},130); rHeld=true; document.getElementById('bR').classList.add('held'); }
function er(){ rHeld=false; clearInterval(mvInt); document.getElementById('bR').classList.remove('held'); }

document.addEventListener('keydown',e=>{
  if(!running)return;
  if(e.key==='ArrowLeft'){e.preventDefault();movL();}
  if(e.key==='ArrowRight'){e.preventDefault();movR();}
});

// Canvas tap
let tapX=null;
gc.addEventListener('touchstart',e=>{tapX=e.touches[0].clientX;},{passive:true});
gc.addEventListener('touchend',e=>{
  if(tapX===null)return;
  const dx=e.changedTouches[0].clientX-tapX;
  if(Math.abs(dx)>35){dx<0?movL():movR();}
  else{const r=gc.getBoundingClientRect();e.changedTouches[0].clientX-r.left<r.width/2?movL():movR();}
  tapX=null;
},{passive:true});

// ============================================================
// INIT
// ============================================================
window.addEventListener('load',()=>{
  computeLayout();
  drawPreviews();
  drawMajsterPrev();
  showOverlay();
  drawBg();
});
</script>
