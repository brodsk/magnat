<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>MAGNA FACTORY - 8bit Premium</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    background: #0a0c1a;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    position: fixed;
    font-family: 'Courier New', monospace;
  }

  #gameCanvas {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: contain;
    image-rendering: crisp-edges;
    image-rendering: pixelated;
    image-rendering: pixelated;
    cursor: pointer;
    background: #0a1020;
  }

  /* Mobile touch controls - retro style */
  .touch-controls {
    position: fixed;
    bottom: 12px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 8px;
    z-index: 100;
    pointer-events: none;
    flex-wrap: wrap;
  }

  .retro-btn {
    pointer-events: auto;
    background: #1e1e2e;
    border: 3px solid #7a6a4a;
    color: #ffdd99;
    font-family: 'Courier New', monospace;
    font-weight: bold;
    font-size: 13px;
    padding: 8px 14px;
    cursor: pointer;
    image-rendering: pixelated;
    box-shadow: 3px 3px 0 #0a0a0a;
    transition: 0.03s linear;
    text-shadow: 1px 1px 0 #000;
    border-radius: 0;
  }

  .retro-btn:active {
    transform: translate(2px, 2px);
    box-shadow: 1px 1px 0 #0a0a0a;
    background: #3a3a4e;
  }

  .move-btn {
    background: #2a2a3e;
    border-color: #8a8aaa;
    font-size: 20px;
    padding: 8px 18px;
  }

  .action-retro {
    background: #2a4a2a;
    border-color: #6a9a6a;
    color: #ccffcc;
  }

  .special-retro {
    background: #4a2a2a;
    border-color: #aa6a6a;
    color: #ffccaa;
  }

  @media (max-width: 750px) {
    .retro-btn { padding: 6px 10px; font-size: 10px; }
    .move-btn { font-size: 16px; padding: 6px 14px; }
  }

  /* Overlays - retro window style */
  .retro-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 200;
  }

  .retro-overlay.visible { display: flex; }

  .retro-window {
    background: #1a1a2a;
    border: 4px solid #ffaa66;
    padding: 25px 35px;
    text-align: center;
    box-shadow: 8px 8px 0 #000;
    max-width: 85%;
    image-rendering: pixelated;
  }

  .retro-window h1 {
    color: #ffaa66;
    font-size: 28px;
    margin-bottom: 15px;
    text-shadow: 3px 3px 0 #000;
    letter-spacing: 2px;
  }

  .retro-window button {
    background: #2a2a3e;
    border: 3px solid #ffaa66;
    color: #ffdd99;
    padding: 10px 25px;
    margin: 8px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    font-family: monospace;
  }

  .retro-window button:active { transform: translate(2px, 2px); }

  .stat-line {
    color: #ddd;
    font-size: 12px;
    margin: 8px 0;
    text-align: left;
    font-family: monospace;
  }

  .notif-retro {
    position: fixed;
    top: 70px;
    left: 50%;
    transform: translateX(-50%);
    background: #000000dd;
    border: 3px solid #ffaa66;
    padding: 8px 18px;
    color: #ffdd99;
    font-size: 10px;
    font-family: monospace;
    white-space: nowrap;
    z-index: 150;
    display: none;
    text-shadow: 1px 1px 0 #000;
  }

  .hud-retro {
    position: fixed;
    top: 8px;
    left: 8px;
    right: 8px;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 6px;
    z-index: 50;
    pointer-events: none;
  }

  .hud-item {
    background: #0a0a1acc;
    border: 2px solid #ffaa66;
    padding: 5px 12px;
    font-size: 11px;
    font-weight: bold;
    color: #ffdd99;
    font-family: monospace;
    text-shadow: 1px 1px 0 #000;
  }

  .task-retro {
    position: fixed;
    top: 55px;
    right: 8px;
    background: #0a0a1acc;
    border: 2px solid #ffaa66;
    padding: 6px;
    font-size: 7px;
    color: #ccc;
    font-family: monospace;
    pointer-events: none;
    z-index: 50;
    min-width: 125px;
  }

  .task-item {
    margin: 3px 0;
    border-left: 2px solid #ffaa66;
    padding-left: 5px;
  }

  .task-done {
    color: #8f8;
    border-left-color: #8f8;
    text-decoration: line-through;
  }
</style>
</head>
<body>
<canvas id="gameCanvas" width="900" height="675"></canvas>

<div class="touch-controls">
  <button class="retro-btn move-btn" id="btnLeft">◀</button>
  <button class="retro-btn action-retro" id="btnPickup">🔧 ZOBRAŤ</button>
  <button class="retro-btn action-retro" id="btnBox">📦 DO BOXA</button>
  <button class="retro-btn action-retro" id="btnCart">🛒 NA VOZÍK</button>
  <button class="retro-btn special-retro" id="btnLabel">🏷️ ETIKETA</button>
  <button class="retro-btn special-retro" id="btnWarehouse">🚛 ODTOZ</button>
  <button class="retro-btn move-btn" id="btnRight">▶</button>
</div>

<div class="hud-retro">
  <div class="hud-item">🔩 KUSY: <span id="uiParts">0</span></div>
  <div class="hud-item">📦 BOXY: <span id="uiBoxes">0</span></div>
  <div class="hud-item">🛒 VOZÍK: <span id="uiCart">0</span>/6</div>
  <div class="hud-item">💰 €: <span id="uiMoney">0</span></div>
</div>

<div class="task-retro">
  <div style="color:#ffaa66;">⚙ ÚLOHY</div>
  <div class="task-item" id="task1">📦 20 kusov = BOX</div>
  <div class="task-item" id="task2">🏭 6 boxov = VOZÍK</div>
  <div class="task-item" id="task3">🏷️ Predačka → ETIKETA</div>
  <div class="task-item" id="task4">🚛 Skladník → ODTOZ</div>
</div>

<div id="notif" class="notif-retro"></div>

<div id="menuOverlay" class="retro-overlay">
  <div class="retro-window">
    <h1>🏭 MAGNA</h1>
    <p style="color:#88ff88; margin:10px;">PIXEL FACTORY</p>
    <p style="color:#aaa; font-size:9px;">LISY & KUSY - 8bit edícia</p>
    <button id="startBtn">▶ ZAČAŤ ZMENU</button>
    <button id="statsBtn">📊 ŠTATISTIKA</button>
  </div>
</div>

<div id="statsOverlay" class="retro-overlay">
  <div class="retro-window">
    <h2>📊 ŠTATISTIKA</h2>
    <div id="statsContent"></div>
    <button id="closeStatsBtn">SPÄŤ</button>
  </div>
</div>

<div id="poruchaOverlay" class="retro-overlay">
  <div class="retro-window" style="border-color:#ff6666;">
    <h2 style="color:#ff6666;">⚠ PORUCHA FORMY!</h2>
    <p style="color:#ffaa88;">Prvé kusy sú chybné!</p>
    <button id="fixBtn">🔧 OPRAVIŤ</button>
  </div>
</div>

<div id="endOverlay" class="retro-overlay">
  <div class="retro-window">
    <h2>ZMENA SKONČILA</h2>
    <p id="endText" style="color:#ddd; margin:15px;"></p>
    <button id="endMenuBtn">MENU</button>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

// Game state
let gameRunning = false;
let money = 0, totalParts = 0, shiftParts = 0, badPassed = 0;
let boxes = [];
let cartBoxes = [];
let heldPart = null;
let playerX = 420;
let moveLeft = false, moveRight = false;
let shiftTime = 0, shiftDuration = 180;
let shiftInterval = null;
let partsOnConveyor = [];
let partId = 0;
let labelPrinted = false;
let poruchaActive = false;
let poruchaTimer = null;
let spawnInterval = null;
let animFrame = 0;

function updateUI() {
  document.getElementById('uiParts').innerText = shiftParts;
  document.getElementById('uiBoxes').innerText = boxes.filter(b => b.count >= 20).length;
  document.getElementById('uiCart').innerText = cartBoxes.length;
  document.getElementById('uiMoney').innerText = money;
}

function showNotif(msg, isError = false) {
  const n = document.getElementById('notif');
  n.textContent = msg;
  n.style.display = 'block';
  setTimeout(() => n.style.display = 'none', 1500);
}

function spawnPart() {
  if (!gameRunning || poruchaActive) return;
  let isBad = false;
  if (poruchaActive && shiftParts < 8) isBad = true;
  else isBad = Math.random() < 0.18;
  
  partsOnConveyor.push({
    id: partId++,
    x: 160,
    y: 460,
    bad: isBad,
    anim: 0
  });
}

function pickupPart() {
  if (!gameRunning) return;
  if (heldPart) { showNotif('Už držíš kus!', true); return; }
  let nearest = null, minDist = 60;
  for (let p of partsOnConveyor) {
    let dist = Math.abs(p.x - playerX);
    if (dist < minDist) { minDist = dist; nearest = p; }
  }
  if (nearest) {
    if (nearest.bad) {
      showNotif('⚠️ CHYBNÝ KUS! Vyhoď!', true);
      partsOnConveyor = partsOnConveyor.filter(p => p.id !== nearest.id);
    } else {
      heldPart = { bad: false };
      partsOnConveyor = partsOnConveyor.filter(p => p.id !== nearest.id);
      showNotif('✅ Kus v ruke', false);
    }
  } else showNotif('Žiadny kus nablízku!', true);
}

function placeToBox() {
  if (!gameRunning) return;
  if (!heldPart) { showNotif('Nemáš nič v ruke!', true); return; }
  if (heldPart.bad) { showNotif('Chybný kus nejde do boxu!', true); heldPart = null; return; }
  
  let currentBox = boxes.find(b => b.count < 20);
  if (!currentBox) { currentBox = { count: 0 }; boxes.push(currentBox); }
  currentBox.count++;
  shiftParts++;
  totalParts++;
  heldPart = null;
  if (currentBox.count === 20) showNotif('📦 Box naplnený! (20 kusov)', false);
  updateUI();
}

function loadBoxToCart() {
  if (!gameRunning) return;
  let fullBoxIndex = boxes.findIndex(b => b.count >= 20);
  if (fullBoxIndex === -1) { showNotif('Žiadny plný box!', true); return; }
  if (cartBoxes.length >= 6) { showNotif('Vozík je plný (6 boxov)!', true); return; }
  cartBoxes.push(boxes[fullBoxIndex]);
  boxes.splice(fullBoxIndex, 1);
  showNotif('📦 Box naložený na vozík', false);
  updateUI();
}

function callPredacka() {
  if (!gameRunning) return;
  if (cartBoxes.length === 0) { showNotif('Vozík je prázdny!', true); return; }
  if (labelPrinted) { showNotif('Etiketa už je vytlačená!', true); return; }
  labelPrinted = true;
  showNotif('🏷️ Predačka vytlačila paletovú etiketu!', false);
}

function callSkladnik() {
  if (!gameRunning) return;
  if (!labelPrinted) { showNotif('Najprv etiketa od predačky!', true); return; }
  if (cartBoxes.length === 0) { showNotif('Vozík je prázdny!', true); return; }
  
  let reward = cartBoxes.length * 11;
  money += reward;
  showNotif(`🚛 Skladník odviezol vozík! +${reward}€`, false);
  cartBoxes = [];
  labelPrinted = false;
  updateUI();
  if (shiftTime >= shiftDuration) endShift();
}

function startPorucha() {
  if (poruchaActive || !gameRunning) return;
  poruchaActive = true;
  document.getElementById('poruchaOverlay').classList.add('visible');
  showNotif('⚠️ PORUCHA FORMY! Prvé kusy budú chybné!', true);
}

function fixPorucha() {
  poruchaActive = false;
  document.getElementById('poruchaOverlay').classList.remove('visible');
  showNotif('🔧 Porucha opravená!', false);
  clearTimeout(poruchaTimer);
  poruchaTimer = setTimeout(() => startPorucha(), 28000 + Math.random() * 18000);
}

function endShift() {
  if (!gameRunning) return;
  gameRunning = false;
  clearInterval(shiftInterval);
  clearInterval(spawnInterval);
  clearTimeout(poruchaTimer);
  let bonus = Math.floor(totalParts * 0.5) + (cartBoxes.length * 8);
  money += bonus;
  document.getElementById('endText').innerHTML = `Vyrobených: ${totalParts} kusov<br>Boxov: ${boxes.filter(b=>b.count>=20).length + cartBoxes.length}<br>Zárobok: ${money} €`;
  document.getElementById('endOverlay').classList.add('visible');
  updateUI();
}

function startShift() {
  gameRunning = true;
  money = 0; totalParts = 0; shiftParts = 0; badPassed = 0;
  boxes = []; cartBoxes = []; heldPart = null;
  partsOnConveyor = []; partId = 0;
  labelPrinted = false; poruchaActive = false;
  playerX = 420; moveLeft = false; moveRight = false; shiftTime = 0;
  
  clearInterval(shiftInterval); clearInterval(spawnInterval); clearTimeout(poruchaTimer);
  shiftInterval = setInterval(() => { if (gameRunning) { shiftTime++; if (shiftTime >= shiftDuration) endShift(); } }, 1000);
  spawnInterval = setInterval(() => spawnPart(), 1950);
  poruchaTimer = setTimeout(() => startPorucha(), 20000);
  updateUI();
  
  document.getElementById('menuOverlay').classList.remove('visible');
  document.getElementById('statsOverlay').classList.remove('visible');
  document.getElementById('endOverlay').classList.remove('visible');
  document.getElementById('poruchaOverlay').classList.remove('visible');
  showNotif('🔧 ZMENA ZAČALA! Zbieraj kusy, plň boxy!', false);
}

function showStats() {
  document.getElementById('statsContent').innerHTML = `
    <div class="stat-line">💰 Celkom zarobené: ${money} €</div>
    <div class="stat-line">📦 Vyrobených kusov: ${totalParts}</div>
    <div class="stat-line">🏭 Dokončených boxov: ${boxes.filter(b=>b.count>=20).length + cartBoxes.length}</div>
    <div class="stat-line">⚠️ Chybných kusov: ${badPassed}</div>
  `;
  document.getElementById('statsOverlay').classList.add('visible');
}

// ========== PREMIUM 8-BIT GRAPHICS ==========
function drawPixelArt() {
  animFrame++;
  
  // Gradient sky
  const grad = ctx.createLinearGradient(0, 0, 0, 400);
  grad.addColorStop(0, '#1a2a3a');
  grad.addColorStop(1, '#2a3a4a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 900, 675);
  
  // Factory background details
  ctx.fillStyle = '#3a4a5a';
  for(let i=0;i<12;i++) ctx.fillRect(50+i*70, 80, 35, 120);
  ctx.fillStyle = '#4a6a7a';
  for(let i=0;i<8;i++) ctx.fillRect(400+i*55, 60, 25, 100);
  
  // Floor with pattern
  ctx.fillStyle = '#3a3a3a';
  ctx.fillRect(0, 480, 900, 195);
  ctx.fillStyle = '#5a5a5a';
  for(let i=0;i<30;i++) ctx.fillRect(i*30, 478, 18, 5);
  
  // Conveyor belt with animation
  ctx.fillStyle = '#4a3a2a';
  ctx.fillRect(140, 455, 680, 28);
  let beltOffset = (animFrame * 2) % 24;
  ctx.fillStyle = '#b88a4a';
  for(let i=0;i<35;i++) ctx.fillRect(140 + beltOffset + i*24, 459, 16, 20);
  
  // Parts on conveyor - detailed
  for(let p of partsOnConveyor) {
    if(p.bad) {
      ctx.fillStyle = '#aa5555';
      ctx.fillRect(p.x, p.y, 24, 18);
      ctx.fillStyle = '#884444';
      ctx.fillRect(p.x+6, p.y+4, 12, 10);
      ctx.fillStyle = '#ff8888';
      ctx.fillRect(p.x+10, p.y+7, 4, 4);
    } else {
      ctx.fillStyle = '#e8d898';
      ctx.fillRect(p.x, p.y, 24, 18);
      ctx.fillStyle = '#c8a858';
      ctx.fillRect(p.x+5, p.y+3, 14, 12);
      ctx.fillStyle = '#f8f0b8';
      ctx.fillRect(p.x+9, p.y+6, 6, 6);
    }
  }
  
  // Engel machine - detailed
  ctx.fillStyle = '#4a6a3a';
  ctx.fillRect(35, 395, 110, 85);
  ctx.fillStyle = '#6a8a5a';
  ctx.fillRect(45, 385, 90, 15);
  ctx.fillStyle = '#2a4a1a';
  ctx.fillRect(50, 390, 80, 8);
  ctx.fillStyle = poruchaActive ? '#ff6666' : '#66ff66';
  ctx.fillRect(115, 400, 14, 14);
  ctx.fillStyle = '#ffdd99';
  ctx.font = 'bold 12px "Courier New"';
  ctx.fillText('ENGEL', 70, 450);
  ctx.fillStyle = '#ccaa88';
  ctx.font = '8px monospace';
  ctx.fillText('ES 200', 75, 465);
  
  // Storage boxes area
  let bx = 25;
  for(let i=0;i<boxes.length && i<12;i++) {
    let box = boxes[i];
    let isFull = box.count >= 20;
    ctx.fillStyle = isFull ? '#f0d878' : '#b89a58';
    ctx.fillRect(bx, 510, 36, 32);
    ctx.fillStyle = '#8a6a3a';
    ctx.fillRect(bx+5, 516, 26, 20);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 10px monospace';
    ctx.fillText(`${box.count}`, bx+14, 534);
    if(isFull) {
      ctx.fillStyle = '#ffaa44';
      ctx.fillRect(bx+26, 514, 6, 6);
    }
    bx += 42;
  }
  
  // Roller cart - detailed
  ctx.fillStyle = '#6a5a42';
  ctx.fillRect(700, 485, 165, 48);
  ctx.fillStyle = '#4a3a2a';
  ctx.fillRect(704, 488, 157, 42);
  for(let i=0;i<6;i++) {
    let filled = i < cartBoxes.length;
    ctx.fillStyle = filled ? '#6a9a4a' : '#5a4a2a';
    ctx.fillRect(710 + i*25, 492, 21, 32);
    if(filled) {
      ctx.fillStyle = '#ffdd99';
      ctx.fillRect(714 + i*25, 497, 13, 22);
      ctx.fillStyle = '#ccaa66';
      ctx.fillRect(717 + i*25, 514, 7, 6);
    } else {
      ctx.fillStyle = '#7a6a4a';
      ctx.fillRect(714 + i*25, 498, 13, 20);
    }
  }
  
  // Player - detailed Mario-style character
  ctx.fillStyle = '#3a6ea5';
  ctx.fillRect(playerX, 470, 30, 48);
  ctx.fillStyle = '#ffcc88';
  ctx.fillRect(playerX+4, 463, 22, 16);
  ctx.fillStyle = '#2a2a3a';
  ctx.fillRect(playerX+8, 467, 5, 5);
  ctx.fillRect(playerX+17, 467, 5, 5);
  ctx.fillStyle = '#8b5a2b';
  ctx.fillRect(playerX+6, 458, 18, 7);
  ctx.fillStyle = '#aa8866';
  ctx.fillRect(playerX+12, 488, 6, 12);
  ctx.fillStyle = '#5a8acc';
  ctx.fillRect(playerX+6, 498, 18, 12);
  ctx.fillStyle = '#ffaa66';
  ctx.fillRect(playerX+12, 508, 6, 8);
  // Overalls
  ctx.fillStyle = '#2a6a8a';
  ctx.fillRect(playerX+4, 480, 22, 16);
  // Held part
  if(heldPart) {
    ctx.fillStyle = '#e8d898';
    ctx.fillRect(playerX+34, 485, 20, 16);
    ctx.fillStyle = '#c8a858';
    ctx.fillRect(playerX+38, 489, 12, 10);
  }
  
  // NPC Predačka - detailed
  ctx.fillStyle = '#e07a2a';
  ctx.fillRect(620, 470, 30, 48);
  ctx.fillStyle = '#ffccaa';
  ctx.fillRect(624, 463, 22, 16);
  ctx.fillStyle = '#2a1a0a';
  ctx.fillRect(628, 467, 5, 5);
  ctx.fillRect(637, 467, 5, 5);
  ctx.fillStyle = '#cc8844';
  ctx.fillRect(626, 490, 18, 14);
  ctx.fillStyle = '#aa6644';
  ctx.fillRect(630, 500, 10, 12);
  
  // NPC Skladník - with red stripe
  ctx.fillStyle = '#cc4422';
  ctx.fillRect(780, 470, 30, 48);
  ctx.fillStyle = '#2a8a2a';
  ctx.fillRect(784, 480, 22, 12);
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(788, 484, 14, 5);
  ctx.fillStyle = '#ffccaa';
  ctx.fillRect(784, 463, 22, 16);
  
  // NPC Kvalitár
  ctx.fillStyle = '#3a8a3a';
  ctx.fillRect(520, 470, 30, 48);
  ctx.fillStyle = '#ffccaa';
  ctx.fillRect(524, 463, 22, 16);
  ctx.fillStyle = '#ffff88';
  ctx.fillRect(528, 490, 14, 10);
  
  // NPC Naštavovač - walking
  let navX = 230 + Math.sin(Date.now() / 600) * 14;
  ctx.fillStyle = '#222222';
  ctx.fillRect(navX, 470, 30, 48);
  ctx.fillStyle = '#ffaa66';
  ctx.fillRect(navX+4, 463, 22, 16);
  ctx.fillStyle = '#cc5555';
  ctx.fillRect(navX+10, 500, 10, 12);
  
  // Label indicator
  if(labelPrinted) {
    ctx.fillStyle = '#ffaa66';
    ctx.fillRect(610, 435, 70, 22);
    ctx.fillStyle = '#000';
    ctx.font = 'bold 8px monospace';
    ctx.fillText('PALETOVA ETIKETA', 615, 450);
  }
  
  // Shift timer
  let pct = (shiftTime / shiftDuration) * 250;
  ctx.fillStyle = '#2a2a3a';
  ctx.fillRect(20, 25, 260, 18);
  ctx.fillStyle = '#6a9a3a';
  ctx.fillRect(20, 25, Math.min(pct, 260), 18);
  ctx.fillStyle = '#ffdd99';
  ctx.font = 'bold 10px monospace';
  let mins = Math.floor(shiftTime / 60);
  let secs = shiftTime % 60;
  ctx.fillText(`ZMENA ${mins}:${secs.toString().padStart(2,'0')}`, 25, 21);
  
  // Cart counter
  ctx.fillStyle = '#ffdd99';
  ctx.font = 'bold 12px monospace';
  ctx.fillText(`${cartBoxes.length}/6`, 785, 528);
  
  // Task status icons
  ctx.fillStyle = boxes.filter(b=>b.count>=20).length > 0 ? '#88ff88' : '#666';
  ctx.fillRect(25, 590, 14, 14);
  ctx.fillStyle = cartBoxes.length === 6 ? '#88ff88' : '#666';
  ctx.fillRect(25, 610, 14, 14);
  ctx.fillStyle = labelPrinted ? '#88ff88' : '#666';
  ctx.fillRect(25, 630, 14, 14);
  ctx.fillStyle = '#aaa';
  ctx.font = '8px monospace';
  ctx.fillText('BOX', 45, 602);
  ctx.fillText('VOZIK 6', 45, 622);
  ctx.fillText('ETIKETA', 45, 642);
}

// Movement and animation
function gameLoop() {
  if (moveLeft && gameRunning) playerX = Math.max(35, playerX - 5);
  if (moveRight && gameRunning) playerX = Math.min(860, playerX + 5);
  
  for (let p of partsOnConveyor) p.x += 1.25;
  partsOnConveyor = partsOnConveyor.filter(p => p.x < 860);
  
  drawPixelArt();
  requestAnimationFrame(gameLoop);
}

// Event handlers
document.getElementById('btnLeft').addEventListener('touchstart', (e) => { e.preventDefault(); moveLeft = true; });
document.getElementById('btnLeft').addEventListener('touchend', () => { moveLeft = false; });
document.getElementById('btnLeft').addEventListener('mousedown', () => { moveLeft = true; });
document.getElementById('btnLeft').addEventListener('mouseup', () => { moveLeft = false; });

document.getElementById('btnRight').addEventListener('touchstart', (e) => { e.preventDefault(); moveRight = true; });
document.getElementById('btnRight').addEventListener('touchend', () => { moveRight = false; });
document.getElementById('btnRight').addEventListener('mousedown', () => { moveRight = true; });
document.getElementById('btnRight').addEventListener('mouseup', () => { moveRight = false; });

document.getElementById('btnPickup').addEventListener('click', () => pickupPart());
document.getElementById('btnBox').addEventListener('click', () => placeToBox());
document.getElementById('btnCart').addEventListener('click', () => loadBoxToCart());
document.getElementById('btnLabel').addEventListener('click', () => callPredacka());
document.getElementById('btnWarehouse').addEventListener('click', () => callSkladnik());

document.getElementById('startBtn').addEventListener('click', () => startShift());
document.getElementById('statsBtn').addEventListener('click', () => showStats());
document.getElementById('closeStatsBtn').addEventListener('click', () => document.getElementById('statsOverlay').classList.remove('visible'));
document.getElementById('fixBtn').addEventListener('click', () => fixPorucha());
document.getElementById('endMenuBtn').addEventListener('click', () => {
  document.getElementById('endOverlay').classList.remove('visible');
  document.getElementById('menuOverlay').classList.add('visible');
});

// Keyboard
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') moveLeft = true;
  if (e.key === 'ArrowRight') moveRight = true;
  if (e.key === ' ' || e.key === 'Space') pickupPart();
  if (e.key === 'b') placeToBox();
  if (e.key === 'c') loadBoxToCart();
  if (e.key === 'l') callPredacka();
  if (e.key === 's') callSkladnik();
});
document.addEventListener('keyup', (e) => {
  if (e.key === 'ArrowLeft') moveLeft = false;
  if (e.key === 'ArrowRight') moveRight = false;
});

document.getElementById('menuOverlay').classList.add('visible');
gameLoop();
updateUI();
</script>
</body>
</html>
