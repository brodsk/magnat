<!DOCTYPE html><html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LISOVNA PCR</title>
<style>
body{margin:0;background:#000;overflow:hidden}
canvas{display:block;image-rendering:pixelated}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ─────────────────────────────────────
// FULL PCR-STYLE FACTORY GAME
// garage + upgrades + gameplay
// ─────────────────────────────────────const c = document.getElementById('c'); const ctx = c.getContext('2d'); let W,H; function resize(){W=c.width=innerWidth;H=c.height=innerHeight;ctx.imageSmoothingEnabled=false} resize();onresize=resize;

const G={ scene:'menu', money:0, level:1, upgrades:{speed:1,quality:1}, parts:[], lane:1, lanes:3, t:0, shiftTime:0 };

// ───────── DRAW HELPERS function r(x,y,w,h,col){ctx.fillStyle=col;ctx.fillRect(x,y,w,h)} function txt(t,x,y,s=16,col='#fff'){ctx.fillStyle=col;ctx.font=s+'px monospace';ctx.fillText(t,x,y)} function btn(x,y,w,h,label){ r(x,y,w,h,'#111'); r(x,y,w,2,'#555'); txt(label,x+10,y+h/2+5,14,'#0ff'); }

// ───────── MENU function drawMenu(){ r(0,0,W,H,'#050510'); txt('LISOVNA RACER',W/2-120,H/3,30,'#ff8800'); btn(W/2-100,H/2,200,50,'ENTER GARAGE'); }

// ───────── GARAGE (PCR STYLE) function drawGarage(){ r(0,0,W,H,'#0a0a14'); // floor r(0,H/2,W,H/2,'#111');

// machine (car analog) r(W/2-100,H/2-20,200,40,'#222'); r(W/2-100,H/2-20,200,5,'#0ff');

txt('MACHINE LVL '+G.level,20,40,18,'#0ff'); txt('$ '+G.money,20,70,18,'#0f0');

btn(W-220,100,200,50,'START SHIFT'); btn(W-220,170,200,50,'UPGRADE'); }

// ───────── GAME function spawnPart(){ G.parts.push({x:W,y:H/2+20+Math.random()*100,bad:Math.random()<0.3}); }

function drawGame(){ r(0,0,W,H,'#000');

// player r(100,H/2+50+G.lane*60,30,30,'#0ff');

G.parts.forEach(p=>{ r(p.x,p.y,20,20,p.bad?'#f00':'#0f0'); });

txt('$ '+G.money,20,30,20,'#fff'); }

function updateGame(){ G.t++; G.shiftTime++;

if(G.t%60===0) spawnPart();

G.parts.forEach(p=>p.x-=4+G.upgrades.speed);

G.parts=G.parts.filter(p=>{ if(p.x<120 && Math.abs(p.y-(H/2+50+G.lane*60))<30){ if(!p.bad) G.money+=10; return false; } return p.x>0; });

if(G.shiftTime>1800){ // 30 sec G.scene='result'; } }

// ───────── RESULT function drawResult(){ r(0,0,W,H,'#111'); txt('SHIFT COMPLETE',W/2-100,H/2-40,24,'#0ff'); txt('EARNED: $'+G.money,W/2-100,H/2,20,'#0f0'); btn(W/2-100,H/2+60,200,50,'BACK TO GARAGE'); }

// ───────── INPUT onclick=(e)=>{ const x=e.clientX,y=e.clientY;

if(G.scene==='menu') G.scene='garage';

else if(G.scene==='garage'){ if(x>W-220&&x<W-20&&y>100&&y<150){ G.scene='game';G.parts=[];G.shiftTime=0; } if(x>W-220&&x<W-20&&y>170&&y<220){ if(G.money>=100){G.money-=100;G.upgrades.speed++} } }

else if(G.scene==='result') G.scene='garage'; }

onkeydown=(e)=>{ if(e.key==='ArrowUp') G.lane=Math.max(0,G.lane-1); if(e.key==='ArrowDown') G.lane=Math.min(2,G.lane+1); }

// ───────── LOOP function loop(){ if(G.scene==='menu') drawMenu(); if(G.scene==='garage') drawGarage(); if(G.scene==='game'){updateGame();drawGame();} if(G.scene==='result') drawResult(); requestAnimationFrame(loop); } loop();

</script>
</body>
</html>
