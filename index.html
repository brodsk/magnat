// ═══════════════════════════════════════════════════════════════════════
//  LISOVNA  –  PIXEL CAR RACER  visual exact clone  –  factory edition
//  Native resolution: 240 × 320  (PCR style portrait)
//  All UI elements match PCR: speedometer, tachometer, gear, side panel
// ═══════════════════════════════════════════════════════════════════════

const NW = 240, NH = 320;   // native resolution (PCR portrait)
const cv = document.getElementById('c');
const cx = cv.getContext('2d');

// Off-screen buffer
const buf = document.createElement('canvas');
buf.width = NW; buf.height = NH;
const b = buf.getContext('2d');
b.imageSmoothingEnabled = false;

let SC = 1;

function resize() {
  const aw = window.innerWidth, ah = window.innerHeight;
  SC = Math.min(Math.floor(aw / NW), Math.floor(ah / NH));
  SC = Math.max(SC, 1);
  cv.width = NW * SC;
  cv.height = NH * SC;
  cx.imageSmoothingEnabled = false;
}
resize();
window.addEventListener('resize', () => { resize(); render(); });

// ═══════════════════════════════════════════════════════════════════════
//  PIXEL DRAW HELPERS
// ═══════════════════════════════════════════════════════════════════════
function px(x,y,w,h,col){ b.fillStyle=col; b.fillRect(~~x,~~y,w,h); }
function ft(txt, x, y, col, sz=6, align='left') {
  b.font = `${sz}px 'Press Start 2P'`;
  b.textAlign = align;
  b.fillStyle = col;
  b.fillText(txt, ~~x, ~~y);
  b.textAlign = 'left';
}

// ═══════════════════════════════════════════════════════════════════════
//  PCR DASHBOARD (exact style: speedometer, tachometer, gear, side logo)
// ═══════════════════════════════════════════════════════════════════════
let dashNeedle = 0; // for animation

function drawPCRDashboard(score, speedVal, level, lives, turbo) {
  // Bottom dashboard area (PCR style black panel)
  px(0, NH-88, NW, 88, C.dashBg);
  px(0, NH-88, NW, 2, C.sideAccent);
  
  // LEFT: SPEEDOMETER (round gauge)
  const spdX = 12, spdY = NH-82, spdR = 34;
  // outer ring
  b.beginPath();
  b.arc(spdX+spdR, spdY+spdR, spdR, 0, Math.PI*2);
  b.fillStyle = C.gaugeBg;
  b.fill();
  b.strokeStyle = C.gaugeBorder;
  b.lineWidth = 2;
  b.stroke();
  // inner numbers
  ft('MPH', spdX+spdR-14, spdY+spdR-8, C.gaugeText, 5);
  ft(Math.min(199, Math.floor(speedVal*3.5)).toString().padStart(3,'0'), spdX+spdR-14, spdY+spdR+10, C.digitOn, 7);
  // speed needle
  const angle = -Math.PI/2 + (Math.min(1, speedVal/12) * Math.PI * 1.4);
  const nx = spdX+spdR + Math.cos(angle)*28;
  const ny = spdY+spdR + Math.sin(angle)*28;
  b.beginPath();
  b.moveTo(spdX+spdR, spdY+spdR);
  b.lineTo(nx, ny);
  b.strokeStyle = C.gaugeNeedle;
  b.lineWidth = 2;
  b.stroke();
  px(spdX+spdR-2, spdY+spdR-2, 4, 4, C.gaugeNeedle);
  
  // CENTER: DIGITAL SCORE / LEVEL PANEL (PCR style)
  panelRect(70, NH-78, 98, 28, C.dashPanel);
  ft('SCORE', 74, NH-65, C.uiDim, 5);
  ft(Math.floor(score).toString().padStart(5,'0'), 110, NH-58, C.digitOn, 8);
  ft('LV', 74, NH-44, C.uiDim, 5);
  ft(level, 106, NH-38, C.neonCyan, 7);
  
  // RIGHT: TURBO / NITRO GAUGE (vertical bar, PCR style)
  const tX = 198, tY = NH-80, tH = 48;
  px(tX, tY, 10, tH, C.dashLight);
  const fillH = Math.min(tH, (turbo/100) * tH);
  px(tX, tY + tH - fillH, 10, fillH, C.neonPink);
  ft('N', tX-8, tY+22, C.neonCyan, 5);
  ft('2O', tX-8, tY+34, C.neonCyan, 5);
  
  // GEAR INDICATOR (PCR style bottom right)
  const gearVal = Math.min(6, 1 + Math.floor(level/2));
  px(204, NH-32, 30, 24, C.dashPanel);
  ft(gearVal.toString(), 218, NH-16, C.digitOn, 12);
  ft('GEAR', 210, NH-24, C.uiDim, 4);
  
  // SIDE PANEL LEFT (PCR logo strip)
  px(0, 0, 28, NH, C.sidePanel);
  ft('LIS', 5, 14, C.sideAccent, 6);
  ft('OVNA', 5, 32, C.sideAccent, 5);
  // Magna logo
  px(5, 52, 4, 4, '#cc3300');
  px(9, 52, 2, 4, '#cc3300');
  ft('MAGNA', 5, 68, C.uiDim, 4);
  // small dots
  for(let i=0;i<6;i++) px(12, 90+i*12, 2, 2, i%2?C.neonCyan:C.neonPink);
}

function panelRect(x,y,w,h,col){ px(x,y,w,h,col); px(x,y,w,1,C.sideAccent); px(x,y+h-1,w,1,'#000'); px(x,y,1,h,C.sideAccent); px(x+w-1,y,1,h,'#000'); }

// ═══════════════════════════════════════════════════════════════════════
//  NIGHT STREET / FACTORY BACKGROUND (PCR style with road)
// ═══════════════════════════════════════════════════════════════════════
let roadOffset = 0;

function drawPCRBackground(frame) {
  // Sky gradient (dark to midnight blue)
  for(let i=0;i<NH-100;i++) {
    const t = i/(NH-100);
    const r = 5 + t*8, g = 6 + t*12, b2 = 14 + t*22;
    px(28, i, NW-28, 1, `rgb(${r},${g},${b2})`);
  }
  // stars (PCR pixel stars)
  for(let s=0;s<40;s++) {
    if((s*131+frame)%255 > 200) {
      px(32 + (s*19)%(NW-40), 12 + (s*7)%50, 1, 1, '#fff');
    }
  }
  
  // ROAD (asphalt with lane markings) - PCR style
  px(28, NH-110, NW-28, 110, C.asphalt);
  // road lines (dashed)
  const dashOff = (roadOffset + frame) % 40;
  for(let y = NH-110 + dashOff - 40; y < NH; y += 40) {
    px(NW/2-10, y, 20, 6, C.roadLine);
  }
  // side lines
  px(32, NH-110, 4, 110, C.sideAccent+'88');
  px(NW-36, NH-110, 4, 110, C.sideAccent+'88');
  
  // Factory buildings on sides (PCR style industrial)
  for(let i=0;i<4;i++) {
    const bx = 32 + i*38;
    const bh = 38 + Math.sin(i)*12;
    px(bx, NH-140-bh, 28, bh, '#18202e');
    px(bx+4, NH-140-bh+6, 20, 8, '#2a3850');
    for(let ww=0;ww<3;ww++) px(bx+8+ww*8, NH-140-bh+18, 4, 8, '#ffaa3366');
  }
  // Right side factories
  for(let i=0;i<4;i++) {
    const bx = NW-60 - i*34;
    const bh = 42 + Math.cos(i)*10;
    px(bx, NH-144-bh, 26, bh, '#1a2236');
    px(bx+4, NH-144-bh+8, 18, 12, '#2a3a60');
  }
  
  // FLOOR (factory interior floor for machines)
  px(28, NH-108, NW-28, 4, '#334455');
  px(28, NH-104, NW-28, 4, '#223344');
  px(28, NH-100, NW-28, 98, C.factoryFloor);
  // floor grid
  for(let fx=28; fx<NW; fx+=24) px(fx, NH-100, 12, 98, '#0a0c1a');
}

// ═══════════════════════════════════════════════════════════════════════
//  MACHINE (ENGEL PRESS) PCR pixel style
// ═══════════════════════════════════════════════════════════════════════
function drawMachine(x, y, w, h, active, frame) {
  // base
  px(x, y+h-6, w, 6, C.machineDark);
  px(x+2, y, w-4, h-6, C.machineGreen);
  // shading
  px(x+2, y, 4, h-6, '#2a6010');
  px(x+w-6, y, 4, h-6, '#2a6010');
  // panel lines
  for(let i=6; i<h-8; i+=8) px(x+8, y+i, w-16, 1, '#1e3a0a');
  // control panel (PCR digital style)
  const cpx = x+w-14, cpy = y+4;
  px(cpx, cpy, 12, 22, '#0a0a1a');
  px(cpx+1, cpy+2, 10, 8, '#1e2a3a');
  if(active && (frame>>2)&1) px(cpx+3, cpy+4, 6, 3, C.neonCyan);
  // buttons
  px(cpx+2, cpy+12, 3, 4, active?C.neonCyan:'#335');
  px(cpx+7, cpy+12, 3, 4, '#c33');
  // Engel logo
  ft('ENGEL', x+4, y+h-5, '#8bc84a', 4);
  // Mold area (center cavity)
  const mgx = x+Math.floor(w*0.28), mgw = Math.floor(w*0.44);
  px(mgx, y+4, mgw, h-12, '#0a0f18');
  px(mgx, y+4, 3, h-12, '#4a6a30');
  px(mgx+mgw-3, y+4, 3, h-12, '#4a6a30');
}

function drawConveyor(x, y, w, frame) {
  px(x, y, w, 6, C.conveyor);
  const off = (frame*2) % 16;
  for(let bx=x+off-16; bx<x+w; bx+=16) {
    if(bx+8 > x && bx < x+w) px(Math.max(x,bx), y+2, 8, 3, '#6a6c88');
  }
  px(x, y, w, 1, '#8a8aaa');
  px(x, y+5, w, 1, '#2a2c3a');
}

  'C': C.partGood, 'c': '#6aaee8', 'V': C.partBad, 'v': '#e86a6a', 'U': '#f0b020',
};

function drawSprite(spr, x, y, flip=false) {
  if(flip) {
    b.save(); b.translate(x+11, y); b.scale(-1,1); x=0;
  }
  spr.forEach((row, ry) => {
    for(let rx=0; rx<row.length; rx++) {
      const ch = row[rx];
      if(ch !== '.' && PAL[ch]) {
        b.fillStyle = PAL[ch];
        b.fillRect(~~x+rx, ~~y+ry, 1, 1);
      }
    }
  });
  if(flip) b.restore();
}

function drawChar(spr, x, y, frame, flip=false) {
  const bob = Math.sin(frame*0.2)*1;
  drawSprite(spr, x, y+~~bob, flip);
}

// ═══════════════════════════════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════════════════════════════
let G = {
  scene: 'menu', // menu, game, over
  running: false,
  frame: 0,
  score: 0, lives: 3, level: 1, turbo: 40,
  char: 'm',
  numLanes: 3, laneX: [], laneW: 0, laneY: 0, convY: 0, floorY: 0,
  playerLane: 1, playerX: 0, targetX: 0,
  parts: [],
  partSpeed: 1.4, spawnRate: 55, spawnTimer: 0,
  predak: {active:false, x:0, dir:-1, frame:0, timer:0, bubble:0},
  nastav: {active:false, x:-30, frame:0, timer:0, bubble:0, stopped:false},
  skladnik: {active:false, x:0, frame:0, timer:280},
  flash: 0, hitAnim: 0,
  quotes: ['PRESSURE!','FORM SHIFT','QUALITY?','CHECK GAUGE','OVERHEAT'],
};

function layout() {
  G.numLanes = Math.min(2 + Math.floor(G.level/2), 5);
  G.laneW = Math.floor((NW-56) / G.numLanes);
  G.laneY = NH-108;
  G.convY = G.laneY + 36;
  G.floorY = G.laneY + 58;
  G.laneX = [];
  for(let i=0;i<G.numLanes;i++) G.laneX.push(32 + i*(G.laneW+2));
  G.playerLane = Math.min(G.playerLane, G.numLanes-1);
  G.targetX = G.laneX[G.playerLane] + G.laneW/2 - 8;
  G.playerX = G.targetX;
}

function startGame() {
  G.scene = 'game';
  G.running = true;
  G.score = 0; G.lives = 3; G.level = 1; G.turbo = 35;
  G.frame = 0;
  G.partSpeed = 1.4;
  G.spawnRate = 55;
  G.parts = [];
  G.spawnTimer = 0;
  G.predak.active = false;
  G.nastav.active = false;
  G.skladnik.active = false;
  G.skladnik.timer = 300;
  G.flash = 0;
  G.hitAnim = 0;
  layout();
}

function gameOver() {
  G.running = false;
  G.scene = 'over';
  G.flash = 0;
}

// ═══════════════════════════════════════════════════════════════════════
//  UPDATE
// ═══════════════════════════════════════════════════════════════════════
function update() {
  if(!G.running) return;
  G.frame++;
  roadOffset = (roadOffset + G.partSpeed) % 60;
  
  // smooth player movement
  G.targetX = G.laneX[G.playerLane] + G.laneW/2 - 8;
  G.playerX += (G.targetX - G.playerX) * 0.25;
  
  // spawn parts
  G.spawnTimer++;
  if(!G.nastav.active && G.spawnTimer >= G.spawnRate) {
    G.spawnTimer = 0;
    const lane = Math.floor(Math.random() * G.numLanes);
    const bad = Math.random() < (0.15 + G.level*0.02 + (G.predak.active?0.08:0));
    G.parts.push({
      lane: lane,
      x: G.laneX[lane] + G.laneW - 14,
      y: G.convY,
      bad: bad,
      speed: G.partSpeed + Math.random()*0.6 + (G.predak.active?0.7:0)
    });
  }
  
  // move and catch parts
  for(let i=G.parts.length-1; i>=0; i--) {
    const p = G.parts[i];
    p.x -= p.speed;
    if(p.lane === G.playerLane && p.x+8 > G.playerX-4 && p.x+4 < G.playerX+24) {
      if(!p.bad) {
        G.score += 10 * G.level;
        G.turbo = Math.min(100, G.turbo + 4);
        G.hitAnim = 12;
      } else {
        G.lives--;
        G.flash = 12;
        G.turbo = Math.max(0, G.turbo - 15);
        if(G.lives <= 0) { gameOver(); return; }
      }
      G.parts.splice(i,1);
      continue;
    }
    if(p.x < G.laneX[p.lane] - 20) {
      if(!p.bad) { G.lives--; G.flash = 10; if(G.lives<=0) gameOver(); }
      G.parts.splice(i,1);
    }
  }
  
  // level up
  if(G.score > 0 && G.score % (180 * G.level) === 0 && G.frame%3===0 && !G.predak.active) {
    G.level++;
    G.partSpeed = Math.min(G.partSpeed + 0.12, 4.2);
    G.spawnRate = Math.max(32, G.spawnRate - 3);
    layout();
  }
  
  // Predak (speed up event)
  if(!G.predak.active && !G.nastav.active && G.frame>200 && G.frame%580===0) {
    G.predak.active = true;
    G.predak.timer = 280;
    G.predak.x = NW+20;
    G.predak.dir = -1;
    G.predak.bubble = 180;
    G.partSpeed = Math.min(G.partSpeed + 1.0, 7.5);
    const newLanes = Math.min(G.numLanes+1, 5);
    if(newLanes !== G.numLanes) { G.numLanes = newLanes; layout(); }
  }
  if(G.predak.active) {
    G.predak.frame++;
    G.predak.x += G.predak.dir * 1.5;
    G.predak.bubble--;
    if(G.predak.x < 25 && G.predak.dir < 0) G.predak.dir = 1;
    if(G.predak.x > NW-45 && G.predak.dir > 0) G.predak.dir = -1;
    G.predak.timer--;
    if(G.predak.timer <= 0) {
      G.predak.active = false;
      G.partSpeed = Math.max(G.partSpeed - 0.7, 1.4 + G.level*0.08);
    }
  }
  
  // Nastavovac (stops parts)
  if(!G.nastav.active && !G.predak.active && G.frame>300 && G.frame%720===0) {
    G.nastav.active = true;
    G.nastav.timer = 180;
    G.nastav.x = -25;
    G.nastav.stopped = false;
    G.nastav.bubble = 150;
  }
  if(G.nastav.active) {
    G.nastav.frame++;
    G.nastav.bubble--;
    if(!G.nastav.stopped) {
      G.nastav.x += 1.2;
      if(G.nastav.x > NW*0.3) G.nastav.stopped = true;
    }
    G.nastav.timer--;
    if(G.nastav.timer <= 0) G.nastav.active = false;
  } else if(G.nastav.x > -30 && G.nastav.x < NW+30) {
    G.nastav.x += 1.3;
    G.nastav.frame++;
  }
  
  // Skladnik (cart)
  G.skladnik.timer--;
  if(G.skladnik.timer <= 0 && !G.skladnik.active) {
    G.skladnik.active = true;
    G.skladnik.x = NW+40;
    G.skladnik.frame = 0;
    G.skladnik.timer = 450 + Math.floor(Math.random()*350);
  }
  if(G.skladnik.active) {
    G.skladnik.x -= 1.0;
    G.skladnik.frame++;
    if(G.skladnik.x < -60) G.skladnik.active = false;
  }
  
  if(G.flash > 0) G.flash--;
  if(G.hitAnim > 0) G.hitAnim--;
  
  // turbo auto-use
  if(G.turbo >= 80 && !G.predak.active && Math.random()<0.02) {
    G.turbo -= 35;
    G.flash = 8;
  }
}

// ═══════════════════════════════════════════════════════════════════════
//  DRAW
// ═══════════════════════════════════════════════════════════════════════
function draw() {
  drawPCRBackground(G.frame);
  
  // Machines and conveyors
  for(let i=0;i<G.numLanes;i++) {
    drawMachine(G.laneX[i]-4, G.laneY-38, G.laneW+8, 52, i===G.playerLane, G.frame);
    drawConveyor(G.laneX[i]-2, G.convY, G.laneW+4, G.frame);
  }
  
  // Parts
  for(let p of G.parts) {
    drawSprite(p.bad ? PART_BAD : PART_GOOD, ~~p.x, p.y);
  }
  
  // Skladnik with cart
  if(G.skladnik.active) {
    const sy = G.floorY - 8;
    px(G.skladnik.x+8, sy-6, 28, 8, '#3a3c5a');
    for(let bi=0;bi<4;bi++) px(G.skladnik.x+10+bi*8, sy-12, 6, 6, ['#c33','#3a8','#ea0','#5ac'][bi]);
    drawChar(SPR_SKLADNIK, G.skladnik.x, sy-20, G.skladnik.frame);
  }
  
  // Player
  drawChar(G.char==='m'?SPR_MALE:SPR_FEMALE, ~~G.playerX, G.floorY-28, G.frame);
  if(G.hitAnim>0) { b.globalAlpha=0.5; px(G.playerX-4, G.floorY-32, 28, 40, C.neonCyan); b.globalAlpha=1; }
  
  // Predak
  if(G.predak.active) {
    drawChar(SPR_PREDAK, ~~G.predak.x, G.floorY-28, G.predak.frame, G.predak.dir>0);
    if(G.predak.bubble>0) {
      px(G.predak.x+6, G.floorY-44, 48, 22, '#0a0a1a');
      ft('TAKE BOTH', G.predak.x+10, G.floorY-36, C.neonCyan, 5);
      ft('PRESS!', G.predak.x+14, G.floorY-28, C.neonCyan, 5);
    }
  }
  
  // Nastavovac
  if(G.nastav.active || (G.nastav.x>-30 && G.nastav.x<NW+30)) {
    drawChar(SPR_NAST, ~~G.nastav.x, G.floorY-28, G.nastav.frame);
    if(G.nastav.bubble>0 && G.nastav.active) {
      px(G.nastav.x+10, G.floorY-44, 48, 22, '#0a0a1a');
      ft('FORM ERROR', G.nastav.x+14, G.floorY-36, C.neonPink, 5);
    }
  }
  
  // Flash effect
  if(G.flash>0) {
    b.globalAlpha = G.flash/12;
    px(0,0,NW,NH, G.flash>8?'#ff8844':'#ff2222');
    b.globalAlpha=1;
  }
  
  // PCR DASHBOARD (always on top)
  const speedVal = G.partSpeed * 1.8 + (G.predak.active?2.5:0);
  drawPCRDashboard(G.score, speedVal, G.level, G.lives, G.turbo);
  
  // small combo text
  if(G.hitAnim>6) ft('+'+10*G.level, G.playerX+18, G.floorY-38, C.digitOn, 5);
  
  // scanlines (PCR effect)
  b.globalAlpha=0.07;
  for(let sy=0; sy<NH; sy+=3) px(0,sy,NW,1,'#000');
  b.globalAlpha=1;
}

// ═══════════════════════════════════════════════════════════════════════
//  MENU SCREEN
// ═══════════════════════════════════════════════════════════════════════
function drawMenu() {
  drawPCRBackground(G.frame);
  b.globalAlpha=0.7; px(0,0,NW,NH,C.dashBg); b.globalAlpha=1;
  
  // PCR title
  ft('LISOVNA', NW/2, 38, C.sideAccent, 12, 'center');
  ft('FACTORY PRESS', NW/2, 58, C.neonCyan, 6, 'center');
  
  // character select
  panelRect(28, 74, 184, 70, C.dashPanel);
  ft('SELECT WORKER', NW/2, 86, C.uiDim, 5, 'center');
  const charX = [NW/2-40, NW/2+12];
  for(let i=0;i<2;i++) {
    const g = i===0?'m':'f';
    const sel = G.char===g;
    px(charX[i], 98, 28, 40, sel?C.sideAccent:C.dashLight);
    drawChar(g==='m'?SPR_MALE:SPR_FEMALE, charX[i]+2, 100, G.frame);
    if(sel) px(charX[i], 98, 28, 2, C.neonCyan);
    ft(g==='m'?'MALE':'FEMALE', charX[i]+4, 142, sel?C.digitOn:C.uiDim, 4);
  }
  
  // start button (PCR style)
  panelRect(60, 170, 120, 28, C.sideAccent);
  ft('START', NW/2, 190, C.dashBg, 8, 'center');
  ft('TAP TO PLAY', NW/2, 222, C.uiDim, 4, 'center');
  ft('←  →  OR SWIPE', NW/2, 238, C.uiDim, 4, 'center');
}

function drawGameOver() {
  drawPCRBackground(G.frame);
  b.globalAlpha=0.85; px(0,0,NW,NH,'#0a0a1a'); b.globalAlpha=1;
  ft('GAME OVER', NW/2, 70, C.gaugeNeedle, 10, 'center');
  drawChar(SPR_NAST, NW/2-18, 90, G.frame);
  ft('SCORE '+Math.floor(G.score), NW/2, 170, C.digitOn, 7, 'center');
  ft('LEVEL '+G.level, NW/2, 200, C.neonCyan, 6, 'center');
  panelRect(50, 230, 140, 28, C.sideAccent);
  ft('RESTART', NW/2, 250, C.dashBg, 6, 'center');
  ft('MENU', NW/2, 280, C.uiDim, 5, 'center');
}

// ═══════════════════════════════════════════════════════════════════════
//  RENDER & INPUT
// ═══════════════════════════════════════════════════════════════════════
function render() {
  b.clearRect(0,0,NW,NH);
  if(G.scene === 'menu') drawMenu();
  else if(G.scene === 'game') draw();
  else drawGameOver();
  cx.clearRect(0,0,cv.width,cv.height);
  cx.drawImage(buf,0,0,cv.width,cv.height);
}

let animId = null;
function loop() {
  if(G.running) update();
  else G.frame++;
  render();
  animId = requestAnimationFrame(loop);
}

// Controls
function moveLeft() { if(G.scene==='game' && G.playerLane>0) G.playerLane--; }
function moveRight() { if(G.scene==='game' && G.playerLane<G.numLanes-1) G.playerLane++; }

cv.addEventListener('click', (e) => {
  const rect = cv.getBoundingClientRect();
  const nx = (e.clientX - rect.left) / rect.width * NW;
  const ny = (e.clientY - rect.top) / rect.height * NH;
  if(G.scene === 'menu') {
    // char select
    if(ny>98 && ny<138) {
      if(nx>NW/2-44 && nx<NW/2-16) G.char='m';
      if(nx>NW/2+8 && nx<NW/2+36) G.char='f';
    }
    // start button area
    if(ny>170 && ny<198) startGame();
  } else if(G.scene === 'over') {
    if(ny>230 && ny<258) startGame();
    else if(ny>270 && ny<290) { G.scene='menu'; G.running=false; }
  } else if(G.scene === 'game') {
    if(ny > NH-50) nx<NW/2 ? moveLeft() : moveRight();
    else nx<NW/2 ? moveLeft() : moveRight();
  }
});

// touch and keyboard
cv.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const rect = cv.getBoundingClientRect();
  const nx = (e.touches[0].clientX - rect.left) / rect.width * NW;
  const ny = (e.touches[0].clientY - rect.top) / rect.height * NH;
  if(G.scene === 'game') {
    if(ny > NH-50) nx<NW/2 ? moveLeft() : moveRight();
    else nx<NW/2 ? moveLeft() : moveRight();
  }
}, {passive:false});

document.addEventListener('keydown', (e) => {
  if(e.key === 'ArrowLeft') { e.preventDefault(); moveLeft(); }
  if(e.key === 'ArrowRight') { e.preventDefault(); moveRight(); }
  if(e.key === 'Enter' && G.scene !== 'game') startGame();
});

layout();
loop();
</script>
</body>
</html>
