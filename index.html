<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>MAGNA FACTORY - Pixel Style</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    background: #0a0a0f;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    position: fixed;
    font-family: 'Courier New', monospace;
  }

  /* Fullscreen canvas */
  #gameCanvas {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: contain;
    image-rendering: crisp-edges;
    image-rendering: pixelated;
    image-rendering: pixelated;
    cursor: pointer;
    background: #0a0a12;
  }

  /* Mobile touch controls - pixel style */
  .touch-panel {
    position: fixed;
    bottom: 15px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 10px;
    z-index: 100;
    pointer-events: none;
    flex-wrap: wrap;
  }

  .pixel-btn {
    pointer-events: auto;
    background: #1a1a2a;
    border: 3px solid #5a5a7a;
    color: #ffdd99;
    font-family: 'Courier New', monospace;
    font-weight: bold;
    font-size: 14px;
    padding: 8px 14px;
    cursor: pointer;
    image-rendering: pixelated;
    box-shadow: 3px 3px 0 #000;
    transition: 0.02s linear;
    text-shadow: 1px 1px 0 #000;
  }

  .pixel-btn:active {
    transform: translate(2px, 2px);
    box-shadow: 1px 1px 0 #000;
    background: #2a2a3e;
    border-color: #ffaa66;
  }

  .ctrl-btn {
    min-width: 60px;
    font-size: 18px;
    background: #2a2a3e;
    border-color: #7a7aaa;
  }

  .action-btn {
    background: #2a4a2a;
    border-color: #6a9a6a;
    color: #aaffaa;
  }

  .special-btn {
    background: #4a2a2a;
    border-color: #aa6a6a;
    color: #ffaa88;
  }

  @media (max-width: 700px) {
    .pixel-btn { padding: 6px 10px; font-size: 10px; }
    .ctrl-btn { font-size: 14px; min-width: 50px; }
  }

  /* UI overlays - pixel style */
  .pixel-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 200;
    image-rendering: pixelated;
  }

  .pixel-overlay.visible {
    display: flex;
  }

  .pixel-window {
    background: #1a1a2a;
    border: 4px solid #ffaa66;
    padding: 25px 35px;
    text-align: center;
    box-shadow: 8px 8px 0 #000;
    max-width: 85%;
  }

  .pixel-window h1 {
    color: #ffaa66;
    font-size: 24px;
    margin-bottom: 15px;
    text-shadow: 3px 3px 0 #000;
    letter-spacing: 2px;
  }

  .pixel-window button {
    background: #2a2a3e;
    border: 3px solid #ffaa66;
    color: #ffdd99;
    padding: 10px 25px;
    margin: 8px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    font-family: monospace;
  }

  .pixel-window button:active {
    transform: translate(2px, 2px);
  }

  .stat-line {
    color: #ddd;
    font-size: 12px;
    margin: 8px 0;
    text-align: left;
    font-family: monospace;
  }

  .notification-pixel {
    position: fixed;
    top: 70px;
    left: 50%;
    transform: translateX(-50%);
    background: #000000cc;
    border: 3px solid #ffaa66;
    padding: 8px 18px;
    color: #ffdd99;
    font-size: 10px;
    font-family: monospace;
    white-space: nowrap;
    z-index: 150;
    display: none;
    text-shadow: 1px 1px 0 #000;
    backdrop-filter: blur(2px);
  }

  /* Top HUD - pixel style */
  .pixel-hud {
    position: fixed;
    top: 8px;
    left: 8px;
    right: 8px;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 6px;
    z-index: 50;
    pointer-events: none;
  }

  .hud-item {
    background: #0a0a1acc;
    border: 2px solid #5a7a9a;
    padding: 4px 10px;
    font-size: 10px;
    font-weight: bold;
    color: #ffdd99;
    font-family: monospace;
    backdrop-filter: blur(2px);
    text-shadow: 1px 1px 0 #000;
  }

  .task-pixel {
    position: fixed;
    top: 50px;
    right: 8px;
    background: #0a0a1acc;
    border: 2px solid #ffaa66;
    padding: 6px;
    font-size: 7px;
    color: #ccc;
    font-family: monospace;
    pointer-events: none;
    z-index: 50;
    backdrop-filter: blur(2px);
    min-width: 120px;
  }

  .task-item {
    margin: 3px 0;
    border-left: 2px solid #ffaa66;
    padding-left: 5px;
  }

  .task-done {
    color: #8f8;
    border-left-color: #8f8;
    text-decoration: line-through;
  }
</style>
</head>
<body>
<canvas id="gameCanvas" width="800" height="600"></canvas>

<!-- Mobile touch controls -->
<div class="touch-panel">
  <button class="pixel-btn ctrl-btn" id="btnLeft">◀</button>
  <button class="pixel-btn action-btn" id="btnPickup">✋ KUS</button>
  <button class="pixel-btn action-btn" id="btnBox">📦 BOX</button>
  <button class="pixel-btn action-btn" id="btnCart">🛒 VOZÍK</button>
  <button class="pixel-btn special-btn" id="btnLabel">🏷️ ETIKETA</button>
  <button class="pixel-btn special-btn" id="btnWarehouse">🚛 ODTOČ</button>
  <button class="pixel-btn ctrl-btn" id="btnRight">▶</button>
</div>

<!-- HUD -->
<div class="pixel-hud">
  <div class="hud-item">🔧 KUSY: <span id="uiParts">0</span></div>
  <div class="hud-item">📦 BOXY: <span id="uiBoxes">0</span></div>
  <div class="hud-item">🛒 VOZÍK: <span id="uiCart">0</span>/6</div>
  <div class="hud-item">💰 €: <span id="uiMoney">0</span></div>
</div>

<div class="task-pixel" id="taskPanel">
  <div style="color:#ffaa66;">⚙ ÚLOHY</div>
  <div class="task-item" id="task1">📦 20 kusov = BOX</div>
  <div class="task-item" id="task2">🏭 6 boxov = VOZÍK</div>
  <div class="task-item" id="task3">🏷️ Predačka → ETIKETA</div>
  <div class="task-item" id="task4">🚛 Skladník → ODTOZ</div>
</div>

<div id="notification" class="notification-pixel"></div>

<!-- Menus -->
<div id="menuOverlay" class="pixel-overlay">
  <div class="pixel-window">
    <h1>🏭 MAGNA</h1>
    <p style="color:#88ff88; margin:10px;">PIXEL FACTORY</p>
    <p style="color:#aaa; font-size:10px;">LISY & KUSY</p>
    <button id="startBtn">▶ ZAČAŤ ZMENU</button>
    <button id="statsBtn">📊 ŠTATISTIKA</button>
  </div>
</div>

<div id="statsOverlay" class="pixel-overlay">
  <div class="pixel-window">
    <h2>📊 ŠTATISTIKA</h2>
    <div id="statsContent"></div>
    <button id="closeStatsBtn">SPÄŤ</button>
  </div>
</div>

<div id="poruchaOverlay" class="pixel-overlay">
  <div class="pixel-window" style="border-color:#ff6666;">
    <h2 style="color:#ff6666;">⚠ PORUCHA FORMY!</h2>
    <p style="color:#ffaa88;">Prvé kusy sú chybné!</p>
    <button id="fixBtn">🔧 OPRAVIŤ</button>
  </div>
</div>

<div id="endOverlay" class="pixel-overlay">
  <div class="pixel-window">
    <h2>ZMENA SKONČILA</h2>
    <p id="endText" style="color:#ddd; margin:15px;"></p>
    <button id="endMenuBtn">MENU</button>
  </div>
</div>

<script>
// ========== PIXEL STYLE GAME ==========
// Canvas setup
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

// Game state
let gameRunning = false;
let money = 0, totalParts = 0, shiftParts = 0, badPassed = 0;
let boxes = []; // {count}
let cartBoxes = []; // max 6 boxes
let heldPart = null; // {bad}
let playerX = 380;
let moveLeft = false, moveRight = false;
let shiftTime = 0, shiftDuration = 180; // 3 minutes
let shiftInterval = null;
let partsOnConveyor = [];
let partId = 0;
let labelPrinted = false;
let poruchaActive = false;
let poruchaTimer = null;
let spawnInterval = null;
let frame = 0;

// UI update
function updateUI() {
  document.getElementById('uiParts').innerText = shiftParts;
  document.getElementById('uiBoxes').innerText = boxes.filter(b => b.count >= 20).length;
  document.getElementById('uiCart').innerText = cartBoxes.length;
  document.getElementById('uiMoney').innerText = money;
}

function showNotif(msg, isError = false) {
  const n = document.getElementById('notification');
  n.textContent = msg;
  n.style.display = 'block';
  setTimeout(() => n.style.display = 'none', 1500);
}

// Game mechanics
function spawnPart() {
  if (!gameRunning || poruchaActive) return;
  let isBad = false;
  if (poruchaActive && shiftParts < 8) isBad = true;
  else isBad = Math.random() < 0.18;
  
  partsOnConveyor.push({
    id: partId++,
    x: 140,
    y: 395,
    bad: isBad,
    wobble: Math.random() * Math.PI * 2
  });
}

function pickupPart() {
  if (!gameRunning) return;
  if (heldPart) { showNotif('Už držíš kus!', true); return; }
  let nearest = null;
  let minDist = 55;
  for (let p of partsOnConveyor) {
    let dist = Math.abs(p.x - playerX);
    if (dist < minDist) {
      minDist = dist;
      nearest = p;
    }
  }
  if (nearest) {
    if (nearest.bad) {
      showNotif('⚠️ CHYBNÝ KUS! Vyhoď!', true);
      partsOnConveyor = partsOnConveyor.filter(p => p.id !== nearest.id);
    } else {
      heldPart = { bad: false };
      partsOnConveyor = partsOnConveyor.filter(p => p.id !== nearest.id);
      showNotif('✅ Kus v ruke', false);
    }
  } else {
    showNotif('Žiadny kus nablízku!', true);
  }
}

function placeToBox() {
  if (!gameRunning) return;
  if (!heldPart) { showNotif('Nemáš nič v ruke!', true); return; }
  if (heldPart.bad) { showNotif('Chybný kus nejde do boxu!', true); heldPart = null; return; }
  
  let currentBox = boxes.find(b => b.count < 20);
  if (!currentBox) {
    currentBox = { count: 0 };
    boxes.push(currentBox);
  }
  currentBox.count++;
  shiftParts++;
  totalParts++;
  heldPart = null;
  
  if (currentBox.count === 20) {
    showNotif('📦 Box naplnený! (20 kusov)', false);
  }
  updateUI();
}

function loadBoxToCart() {
  if (!gameRunning) return;
  let fullBoxIndex = boxes.findIndex(b => b.count >= 20);
  if (fullBoxIndex === -1) { showNotif('Žiadny plný box!', true); return; }
  if (cartBoxes.length >= 6) { showNotif('Vozík je plný (6 boxov)!', true); return; }
  cartBoxes.push(boxes[fullBoxIndex]);
  boxes.splice(fullBoxIndex, 1);
  showNotif('📦 Box naložený na vozík', false);
  updateUI();
}

function callPredacka() {
  if (!gameRunning) return;
  if (cartBoxes.length === 0) { showNotif('Vozík je prázdny!', true); return; }
  if (labelPrinted) { showNotif('Etiketa už je vytlačená!', true); return; }
  labelPrinted = true;
  showNotif('🏷️ Predačka vytlačila paletovú etiketu!', false);
}

function callSkladnik() {
  if (!gameRunning) return;
  if (!labelPrinted) { showNotif('Najprv etiketa od predačky!', true); return; }
  if (cartBoxes.length === 0) { showNotif('Vozík je prázdny!', true); return; }
  
  let reward = cartBoxes.length * 11;
  money += reward;
  showNotif(`🚛 Skladník odviezol vozík! +${reward}€`, false);
  cartBoxes = [];
  labelPrinted = false;
  updateUI();
  
  if (shiftTime >= shiftDuration) endShift();
}

function startPorucha() {
  if (poruchaActive || !gameRunning) return;
  poruchaActive = true;
  document.getElementById('poruchaOverlay').classList.add('visible');
  showNotif('⚠️ PORUCHA FORMY! Prvé kusy budú chybné!', true);
}

function fixPorucha() {
  poruchaActive = false;
  document.getElementById('poruchaOverlay').classList.remove('visible');
  showNotif('🔧 Porucha opravená!', false);
  clearTimeout(poruchaTimer);
  poruchaTimer = setTimeout(() => startPorucha(), 25000 + Math.random() * 20000);
}

function endShift() {
  if (!gameRunning) return;
  gameRunning = false;
  clearInterval(shiftInterval);
  clearInterval(spawnInterval);
  clearTimeout(poruchaTimer);
  
  let bonus = Math.floor(totalParts * 0.5) + (cartBoxes.length * 8);
  money += bonus;
  document.getElementById('endText').innerHTML = `Vyrobených: ${totalParts} kusov<br>Boxov: ${boxes.filter(b=>b.count>=20).length + cartBoxes.length}<br>Zárobok: ${money} €`;
  document.getElementById('endOverlay').classList.add('visible');
  updateUI();
}

function startShift() {
  gameRunning = true;
  money = 0;
  totalParts = 0;
  shiftParts = 0;
  badPassed = 0;
  boxes = [];
  cartBoxes = [];
  heldPart = null;
  partsOnConveyor = [];
  partId = 0;
  labelPrinted = false;
  poruchaActive = false;
  playerX = 380;
  moveLeft = false;
  moveRight = false;
  shiftTime = 0;
  
  clearInterval(shiftInterval);
  clearInterval(spawnInterval);
  clearTimeout(poruchaTimer);
  
  shiftInterval = setInterval(() => {
    if (!gameRunning) return;
    shiftTime++;
    if (shiftTime >= shiftDuration) endShift();
  }, 1000);
  
  spawnInterval = setInterval(() => spawnPart(), 1900);
  poruchaTimer = setTimeout(() => startPorucha(), 18000);
  
  updateUI();
  
  document.getElementById('menuOverlay').classList.remove('visible');
  document.getElementById('statsOverlay').classList.remove('visible');
  document.getElementById('endOverlay').classList.remove('visible');
  document.getElementById('poruchaOverlay').classList.remove('visible');
  
  showNotif('🔧 ZMENA ZAČALA! Zbieraj kusy, plň boxy, volaj predačku a skladníka!', false);
}

function showStats() {
  document.getElementById('statsContent').innerHTML = `
    <div class="stat-line">💰 Celkom zarobené: ${money} €</div>
    <div class="stat-line">📦 Vyrobených kusov: ${totalParts}</div>
    <div class="stat-line">🏭 Dokončených boxov: ${boxes.filter(b=>b.count>=20).length + cartBoxes.length}</div>
    <div class="stat-line">⚠️ Chybných kusov: ${badPassed}</div>
  `;
  document.getElementById('statsOverlay').classList.add('visible');
}

// ========== PIXEL CAR RACER STYLE DRAWING ==========
function drawPixelArt() {
  // Dark gradient background like Pixel Car Racer
  const grad = ctx.createLinearGradient(0, 0, 0, 600);
  grad.addColorStop(0, '#0a0a18');
  grad.addColorStop(1, '#12122a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 800, 600);
  
  // Grid floor pattern
  ctx.fillStyle = '#2a2a3a';
  for (let i = 0; i < 20; i++) {
    ctx.fillRect(i * 40, 430, 2, 150);
    ctx.fillRect(0, 430 + i * 8, 800, 1);
  }
  
  // Factory floor
  ctx.fillStyle = '#2a2a2e';
  ctx.fillRect(0, 420, 800, 180);
  ctx.fillStyle = '#3a3a4a';
  for (let i = 0; i < 30; i++) ctx.fillRect(i * 30, 418, 15, 4);
  
  // Engel machine - pixel style
  ctx.fillStyle = '#4a6a4a';
  ctx.fillRect(18, 340, 100, 82);
  ctx.fillStyle = '#6a8a6a';
  ctx.fillRect(25, 332, 86, 12);
  ctx.fillStyle = '#2a4a2a';
  ctx.fillRect(28, 338, 80, 6);
  // Light
  ctx.fillStyle = poruchaActive ? '#ff6666' : '#66ff66';
  ctx.fillRect(100, 348, 12, 12);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 10px "Courier New", monospace';
  ctx.fillText('ENGEL', 45, 390);
  ctx.fillText('ES 200', 48, 405);
  
  // Conveyor belt - animated
  ctx.fillStyle = '#4a3a2a';
  ctx.fillRect(125, 390, 620, 24);
  let offset = (Date.now() / 25) % 24;
  ctx.fillStyle = '#8a6a3a';
  for (let i = 0; i < 30; i++) {
    ctx.fillRect(125 + offset + i * 24, 394, 12, 16);
  }
  
  // Parts on conveyor - pixel style
  for (let p of partsOnConveyor) {
    if (p.bad) {
      ctx.fillStyle = '#cc5555';
      ctx.fillRect(p.x, p.y, 22, 16);
      ctx.fillStyle = '#aa3333';
      ctx.fillRect(p.x + 5, p.y + 4, 12, 8);
      ctx.fillStyle = '#ff8888';
      ctx.fillRect(p.x + 9, p.y + 7, 4, 4);
    } else {
      ctx.fillStyle = '#e8d898';
      ctx.fillRect(p.x, p.y, 22, 16);
      ctx.fillStyle = '#c8a858';
      ctx.fillRect(p.x + 4, p.y + 3, 14, 10);
      ctx.fillStyle = '#f8e8a8';
      ctx.fillRect(p.x + 8, p.y + 7, 6, 4);
    }
  }
  
  // Boxes storage
  let bx = 25;
  for (let i = 0; i < boxes.length && i < 10; i++) {
    let box = boxes[i];
    let isFull = box.count >= 20;
    ctx.fillStyle = isFull ? '#e8c86a' : '#b89a58';
    ctx.fillRect(bx, 455, 32, 28);
    ctx.fillStyle = '#8a6a3a';
    ctx.fillRect(bx + 4, 460, 24, 18);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 9px monospace';
    ctx.fillText(`${box.count}`, bx + 12, 476);
    if (isFull) {
      ctx.fillStyle = '#ffdd88';
      ctx.fillRect(bx + 22, 457, 6, 6);
    }
    bx += 38;
  }
  
  // Roller cart - pixel style
  ctx.fillStyle = '#6a5a4a';
  ctx.fillRect(640, 415, 145, 42);
  ctx.fillStyle = '#4a3a2a';
  ctx.fillRect(643, 418, 139, 36);
  for (let i = 0; i < 6; i++) {
    let filled = i < cartBoxes.length;
    ctx.fillStyle = filled ? '#6a9a4a' : '#5a4a2a';
    ctx.fillRect(648 + i * 22, 422, 19, 28);
    if (filled) {
      ctx.fillStyle = '#ffdd88';
      ctx.fillRect(651 + i * 22, 426, 13, 20);
      ctx.fillStyle = '#aa8866';
      ctx.fillRect(654 + i * 22, 440, 7, 6);
    } else {
      ctx.fillStyle = '#7a6a4a';
      ctx.fillRect(651 + i * 22, 428, 13, 18);
    }
  }
  
  // Player - Pixel Car Racer style character
  ctx.fillStyle = '#5a7aaa';
  ctx.fillRect(playerX, 402, 28, 44);
  ctx.fillStyle = '#ffcc88';
  ctx.fillRect(playerX + 4, 396, 20, 14);
  ctx.fillStyle = '#2a2a3a';
  ctx.fillRect(playerX + 8, 400, 4, 4);
  ctx.fillRect(playerX + 16, 400, 4, 4);
  ctx.fillStyle = '#aa8866';
  ctx.fillRect(playerX + 10, 412, 8, 6);
  ctx.fillStyle = '#4a6aaa';
  ctx.fillRect(playerX + 6, 425, 16, 12);
  ctx.fillStyle = '#ffaa66';
  ctx.fillRect(playerX + 12, 432, 4, 8);
  // Helmet / hair
  ctx.fillStyle = '#8b5a2b';
  ctx.fillRect(playerX + 6, 392, 16, 6);
  
  // Held part indicator
  if (heldPart) {
    ctx.fillStyle = '#e8d898';
    ctx.fillRect(playerX + 32, 412, 18, 14);
    ctx.fillStyle = '#c8a858';
    ctx.fillRect(playerX + 35, 416, 12, 8);
  }
  
  // NPC - Predačka (orange shirt, pixel style)
  ctx.fillStyle = '#e07a2a';
  ctx.fillRect(560, 402, 28, 44);
  ctx.fillStyle = '#ffccaa';
  ctx.fillRect(564, 396, 20, 14);
  ctx.fillStyle = '#2a1a0a';
  ctx.fillRect(568, 400, 4, 4);
  ctx.fillRect(576, 400, 4, 4);
  ctx.fillStyle = '#cc8844';
  ctx.fillRect(566, 422, 16, 12);
  // Speech bubble indicator
  if (labelPrinted) {
    ctx.fillStyle = '#ffaa66';
    ctx.fillRect(550, 375, 48, 18);
    ctx.fillStyle = '#000';
    ctx.font = 'bold 7px monospace';
    ctx.fillText('ETIKETA', 558, 388);
  }
  
  // NPC - Skladník (red stripe shirt)
  ctx.fillStyle = '#cc4422';
  ctx.fillRect(700, 402, 28, 44);
  ctx.fillStyle = '#2a8a2a';
  ctx.fillRect(704, 410, 20, 10);
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(708, 414, 12, 4);
  ctx.fillStyle = '#ffccaa';
  ctx.fillRect(704, 396, 20, 14);
  
  // NPC - Kvalitár (green shirt)
  ctx.fillStyle = '#3a8a3a';
  ctx.fillRect(460, 402, 28, 44);
  ctx.fillStyle = '#ffccaa';
  ctx.fillRect(464, 396, 20, 14);
  ctx.fillStyle = '#ffff88';
  ctx.fillRect(468, 420, 12, 8);
  
  // NPC - Naštavovač (black shirt, walking)
  let navX = 210 + Math.sin(Date.now() / 500) * 12;
  ctx.fillStyle = '#222222';
  ctx.fillRect(navX, 402, 28, 44);
  ctx.fillStyle = '#ffaa66';
  ctx.fillRect(navX + 4, 396, 20, 14);
  ctx.fillStyle = '#cc5555';
  ctx.fillRect(navX + 10, 428, 8, 10);
  
  // Shift timer bar
  let pct = (shiftTime / shiftDuration) * 220;
  ctx.fillStyle = '#2a2a3a';
  ctx.fillRect(15, 28, 220, 14);
  ctx.fillStyle = '#6a9a3a';
  ctx.fillRect(15, 28, Math.min(pct, 220), 14);
  ctx.fillStyle = '#ffdd99';
  ctx.font = 'bold 8px monospace';
  let mins = Math.floor(shiftTime / 60);
  let secs = shiftTime % 60;
  ctx.fillText(`ZMENA ${mins}:${secs.toString().padStart(2, '0')}`, 15, 24);
  
  // Cart counter on cart
  ctx.fillStyle = '#ffdd99';
  ctx.font = 'bold 10px monospace';
  ctx.fillText(`${cartBoxes.length}/6`, 710, 445);
  
  // Task status icons
  let boxesFull = boxes.filter(b => b.count >= 20).length;
  ctx.fillStyle = boxesFull > 0 ? '#88ff88' : '#aaa';
  ctx.fillRect(25, 530, 12, 12);
  ctx.fillStyle = cartBoxes.length === 6 ? '#88ff88' : '#aaa';
  ctx.fillRect(25, 548, 12, 12);
  ctx.fillStyle = labelPrinted ? '#88ff88' : '#aaa';
  ctx.fillRect(25, 566, 12, 12);
  ctx.fillStyle = '#ddd';
  ctx.font = '7px monospace';
  ctx.fillText('BOX', 42, 540);
  ctx.fillText('VOZÍK 6/6', 42, 558);
  ctx.fillText('ETIKETA', 42, 576);
}

// Animation and movement
function gameLoop() {
  if (moveLeft && gameRunning) playerX = Math.max(35, playerX - 4.5);
  if (moveRight && gameRunning) playerX = Math.min(760, playerX + 4.5);
  
  // Move parts
  for (let p of partsOnConveyor) {
    p.x += 1.2;
  }
  partsOnConveyor = partsOnConveyor.filter(p => p.x < 780);
  
  drawPixelArt();
  requestAnimationFrame(gameLoop);
}

// Event handlers
document.getElementById('btnLeft').addEventListener('touchstart', (e) => { e.preventDefault(); moveLeft = true; });
document.getElementById('btnLeft').addEventListener('touchend', () => { moveLeft = false; });
document.getElementById('btnLeft').addEventListener('mousedown', () => { moveLeft = true; });
document.getElementById('btnLeft').addEventListener('mouseup', () => { moveLeft = false; });

document.getElementById('btnRight').addEventListener('touchstart', (e) => { e.preventDefault(); moveRight = true; });
document.getElementById('btnRight').addEventListener('touchend', () => { moveRight = false; });
document.getElementById('btnRight').addEventListener('mousedown', () => { moveRight = true; });
document.getElementById('btnRight').addEventListener('mouseup', () => { moveRight = false; });

document.getElementById('btnPickup').addEventListener('click', () => pickupPart());
document.getElementById('btnBox').addEventListener('click', () => placeToBox());
document.getElementById('btnCart').addEventListener('click', () => loadBoxToCart());
document.getElementById('btnLabel').addEventListener('click', () => callPredacka());
document.getElementById('btnWarehouse').addEventListener('click', () => callSkladnik());

document.getElementById('startBtn').addEventListener('click', () => startShift());
document.getElementById('statsBtn').addEventListener('click', () => showStats());
document.getElementById('closeStatsBtn').addEventListener('click', () => document.getElementById('statsOverlay').classList.remove('visible'));
document.getElementById('fixBtn').addEventListener('click', () => fixPorucha());
document.getElementById('endMenuBtn').addEventListener('click', () => {
  document.getElementById('endOverlay').classList.remove('visible');
  document.getElementById('menuOverlay').classList.add('visible');
});

// Keyboard support
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') moveLeft = true;
  if (e.key === 'ArrowRight') moveRight = true;
  if (e.key === ' ' || e.key === 'Space') pickupPart();
  if (e.key === 'b') placeToBox();
  if (e.key === 'c') loadBoxToCart();
  if (e.key === 'l') callPredacka();
  if (e.key === 's') callSkladnik();
});
document.addEventListener('keyup', (e) => {
  if (e.key === 'ArrowLeft') moveLeft = false;
  if (e.key === 'ArrowRight') moveRight = false;
});

// Start menu
document.getElementById('menuOverlay').classList.add('visible');
gameLoop();
updateUI();
</script>
</body>
</html>
