<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{
  width:100%;height:100%;

  touch-action:none;
}
#c{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;

  image-rendering:pixelated;
  image-rendering:crisp-edges;
  image-rendering:-moz-crisp-edges;

<script>
// ═══════════════════════════════════════════════════════════════════
//  LISOVNA  –  Pixel Car Racer style  –  full-screen canvas
//  The canvas IS the screen. No scaling containers.
//  We draw at the device's actual pixel resolution.
// ═══════════════════════════════════════════════════════════════════

const cv = document.getElementById('c');
const ctx = cv.getContext('2d');

// Pixel-size: 1 "game pixel" = this many CSS pixels
// We keep it as an integer so everything looks chunky/pixelated
let PX = 4;  // will be recalculated on resize

// Logical game grid (in game-pixels)
let GW, GH;

function resize() {
  const sw = window.innerWidth;
  const sh = window.innerHeight;
  cv.width  = sw;
  cv.height = sh;
  // Choose pixel size so we get ~80 game-pixels wide (PCR aesthetic)
  PX = Math.max(3, Math.floor(sw / 80));
  GW = Math.ceil(sw / PX);
  GH = Math.ceil(sh / PX);
  ctx.imageSmoothingEnabled = false;
}
resize();
window.addEventListener('resize', () => { resize(); });

// ─── DRAW HELPERS ───────────────────────────────────────────────────
// All coordinates are in GAME pixels; multiplied by PX when drawing

function gfx(x, y, w, h, col) {
  ctx.fillStyle = col;
  ctx.fillRect(x*PX, y*PX, w*PX, h*PX);
}

function gline(x, y, w, col) { gfx(x, y, w, 1, col); }
function gvline(x, y, h, col) { gfx(x, y, 1, h, col); }

// Text at game-pixel coords
function gtxt(text, x, y, col, gpSize=2, align='left') {
  ctx.font = `bold ${gpSize * PX}px 'Press Start 2P', monospace`;
  ctx.textAlign = align;
  ctx.fillStyle = col;
  ctx.fillText(text, x * PX, y * PX);
  ctx.textAlign = 'left';
}

// Panel: fill + border
function gpanel(x, y, w, h, fill, border) {
  gfx(x, y, w, h, fill);
  gline(x, y, w, border);
  gline(x, y+h-1, w, border);
  gvline(x, y, h, border);
  gvline(x+w-1, y, h, border);
}

// Button PCR style
function gbtn(x, y, w, h, label, bc, tc) {
  // shadow
  ctx.globalAlpha = 0.4;
  gfx(x+1, y+1, w, h, '#000');
  ctx.globalAlpha = 1;
  gfx(x, y, w, h, '#12152e');
  gline(x, y, w, bc);
  gline(x, y+h-1, w, '#000');
  gvline(x, y, h, bc);
  gvline(x+w-1, y, h, '#000');
  // inner highlight
  gline(x+1, y+1, w-2, bc+'55');
  gtxt(label, x + w/2, y + h/2 + 1, tc, 2, 'center');
}

// PCR orange-yellow gradient title bar
function gtitlebar(x, y, w, h, text) {
  // Draw row by row gradient orange→yellow
  for(let i = 0; i < h; i++) {
    const t = i / h;
    const r = Math.round(232 + t*23);
    const g = Math.round(93  + t*90);
    const b = 3;
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.fillRect(x*PX, (y+i)*PX, w*PX, PX);
  }
  // Text shadow
  gtxt(text, x+w/2+0.5, y+h/2+1.5, '#00000088', 3, 'center');
  gtxt(text, x+w/2, y+h/2+1, '#0a0c1e', 3, 'center');
}

// ─── SPRITE SYSTEM ──────────────────────────────────────────────────
// Each sprite = string[] where each char = palette key or '.' = transparent
// Rendered at 1 char = 1 game-pixel

const PAL = {
  // Skin tones
  'S': '#e8ae6e',
  's': '#f4c68e',
  // Hair
  'H': '#1c0a04',   // dark
  'A': '#8b3500',   // auburn
  'K': '#111111',   // black
  // Shirts
  'T': '#2d2d2d',   // dark gray (player)
  'O': '#d4580a',   // orange (predak)
  'B': '#0d0d0d',   // black (nast/majster)
  'R': '#b91c1c',   // red (skladnik)
  'W': '#e8e8e8',   // white stripe
  'E': '#e85d04',   // accent orange
  // Pants
  'P': '#1e3a5f',
  'Q': '#152a40',
  // Shoes
  'Z': '#0d0d0d',
  // Logos/details
  'X': '#cc0000',   // red dot
  'D': '#aaaaaa',   // gray detail
  'N': '#888888',   // wrench
  'G': '#2d7d46',   // green detail
  'F': '#ffffff',
  // Parts
  'C': '#1971c2',   // good part blue
  'c': '#4dabf7',   // light blue
  'V': '#c92a2a',   // bad part red
  'v': '#ff6b6b',   // light red
  'U': '#fab005',   // bad marker
  // Machine
  'M': '#3d8c1a',
  'm': '#52b822',
  'g': '#265c10',
  'd': '#0f2308',
  // Window colors
  'L': '#c8a84b',
  'J': '#2a8a9a',
  'j': '#3a6ea8',
  'Y': '#ffd60a',
};

function spr(data, gx, gy, scale=1) {
  data.forEach((row, ry) => {
    for(let rx = 0; rx < row.length; rx++) {
      const ch = row[rx];
      if(ch !== '.' && PAL[ch]) {
        ctx.fillStyle = PAL[ch];
        ctx.fillRect(
          Math.round((gx + rx*scale)*PX),
          Math.round((gy + ry*scale)*PX),
          Math.ceil(scale*PX),
          Math.ceil(scale*PX)
        );
      }
    }
  });
}

// Walking bob offset
function charBob(frame) { return ((frame >> 3) & 1); }

function drawChar(data, gx, gy, frame, scale=2, flipX=false) {
  const bob = charBob(frame);
  if(flipX) {
    ctx.save();
    ctx.translate((gx + data[0].length * scale) * PX, 0);
    ctx.scale(-1, 1);
    spr(data, 0, gy + bob, scale);
    ctx.restore();
  } else {
    spr(data, gx, gy + bob, scale);
  }
}

// ─── NIGHT CITY BACKGROUND ──────────────────────────────────────────
let bgOff = 0;

// Building templates [w, h, color_variant]
const BLDGS = [
  [9,16,0],[6,12,1],[7,20,2],[10,15,0],
  [5,18,1],[8,13,2],[11,17,0],[6,22,1],
  [9,14,2],[7,19,0],[10,16,1],[5,21,2],
  [8,12,0],[6,17,1],[9,20,2],[7,15,0],
];
const BCOLORS = ['#0d0f2b','#111430','#151838'];

function drawNightCity() {
  // Sky
  for(let y = 0; y < GH; y++) {
    const t = y / GH;
    const r = Math.round(2 + t*4);
    const g = Math.round(4 + t*5);
    const nb= Math.round(10 + t*15);
    ctx.fillStyle = `rgb(${r},${g},${nb})`;
    ctx.fillRect(0, y*PX, cv.width, PX);
  }

  // Stars
  const stars = [[4,2],[11,5],[19,1],[28,6],[36,3],[44,8],[52,2],[61,7],[69,4],[78,1]];
  stars.forEach(([sx,sy]) => {
    if(sx < GW && sy < GH*0.3)
      gfx(sx, sy, 1, 1, G.f%20<10 ? '#fff' : '#aaa');
  });

  // Buildings — 3 parallax layers
  drawBldLayer(bgOff * 0.3, Math.floor(GH*0.32), 13, 0.45);
  drawBldLayer(bgOff * 0.6, Math.floor(GH*0.38), 18, 0.7);
  drawBldLayer(bgOff * 1.0, Math.floor(GH*0.44), 22, 1.0);

  // Ground strip
  const gy = Math.floor(GH*0.44);
  gfx(0, gy, GW, GH - gy, '#080912');
  gfx(0, gy, GW, 1, '#1a1c34');
}

function drawBldLayer(scrollOff, baseY, maxH, alpha) {
  ctx.globalAlpha = alpha;
  let bx = 0;
  const repeat = 3;
  const totalW = BLDGS.reduce((s, b) => s + b[0] + 1, 0);

  for(let rep = 0; rep < repeat; rep++) {
    BLDGS.forEach(([bw, bh, bc]) => {
      const x = bx - (~~scrollOff % (totalW));
      const y = baseY - bh;
      if(x + bw > 0 && x < GW) {
        gfx(x, y, bw, bh, BCOLORS[bc]);
        // roof neon
        gfx(x, y, bw, 1, '#cc00ff33');
        // windows
        const cols = Math.floor((bw-2)/3);
        const rows = Math.floor((bh-4)/4);
        for(let wr=0;wr<rows;wr++) for(let wc=0;wc<cols;wc++) {
          const wx=x+1+wc*3, wy=y+2+wr*4;
          const seed = ((wx*7+wy*11+rep*77)%16);
          const wincol = seed<4 ? PAL['L'] : seed<8 ? PAL['J'] : seed<11 ? PAL['j'] : null;
          if(wincol) gfx(wx, wy, 2, 2, wincol);
          else gfx(wx, wy, 2, 2, '#131629');
        }
      }
      bx += bw + 1;
    });
  }

  // Magna factory building (fixed pos, shifts slowly)
  const mx = Math.floor(GW*0.15 - (scrollOff*0.1)%(GW));
  drawMagna(mx, baseY, maxH);

  ctx.globalAlpha = 1;
}

function drawMagna(bx, baseY, maxH) {
  const bw=22, bh=Math.floor(maxH*1.1);
  if(bx+bw<0||bx>GW) return;
  const by = baseY - bh;
  // White body
  gfx(bx, by, bw, bh, '#b8c0d4');
  // Blue accent bands
  gfx(bx, by, bw, 2, '#1a44cc');
  gfx(bx, by+bh-3, bw, 3, '#1a44cc');
  gfx(bx, by, 2, bh, '#1a44cc');
  gfx(bx+bw-2, by, 2, bh, '#1a44cc');
  // Horizontal panel lines
  for(let pl=by+4; pl<by+bh-3; pl+=4) gfx(bx+2, pl, bw-4, 1, '#9098b0');
  // Windows 2 rows
  for(let wr=0;wr<2;wr++) for(let wc=0;wc<4;wc++){
    const wx=bx+3+wc*5, wy=by+3+wr*6;
    gfx(wx,wy,4,4,'#1a44cc');
    gfx(wx+1,wy+1,2,2,'#1a3366');
  }
  // Red dot + MAGNA
  gfx(bx+3, by+2, 2, 2, '#cc0000');
  gtxt('MAGNA', bx+6, by+4, '#1a2255', 1);
}

// ─── FACTORY INTERIOR ───────────────────────────────────────────────
function drawFactory() {
  // Background wall
  gfx(0, 0, GW, GH, '#04060f');

  // Ceiling
  gfx(0, 0, GW, 4, '#080912');
  // Ceiling lights
  for(let lx=3; lx<GW; lx+=9) {
    gfx(lx, 0, 6, 3, '#0f1228');
    ctx.globalAlpha=0.3;
    gfx(lx+1, 1, 4, 1, '#ffeeaa');
    ctx.globalAlpha=1;
  }
  gfx(0, 3, GW, 1, '#cc00ff44');

  // Back wall
  gfx(0, 4, GW, 30, '#07081a');
  for(let wx=0; wx<GW; wx+=10) gfx(wx, 4, 9, 30, '#090b1e');
  gfx(0, 33, GW, 1, '#9d4edd44');

  // Floor
  const FY = G.flY;
  gfx(0, FY, GW, GH-FY, '#050610');
  for(let fx=0; fx<GW; fx+=7) {
    gfx(fx, FY, 6, GH-FY, '#070818');
    gfx(fx, FY, 6, 1, '#1a1c38');
  }
  gfx(0, FY, GW, 1, '#3a3c58');
}

// ─── ENGEL MACHINE ──────────────────────────────────────────────────
function drawMachine(gx, gy, gw, gh, isActive) {
  // Base
  gfx(gx, gy+gh-2, gw, 2, '#0a1008');
  // Body green
  gfx(gx+1, gy, gw-2, gh-2, PAL['M']);
  // Shading
  gfx(gx+1, gy, 2, gh-2, PAL['g']);
  gfx(gx+gw-3, gy, 2, gh-2, PAL['g']);
  gfx(gx+1, gy, gw-2, 1, PAL['m']);
  // Horizontal lines
  for(let py=gy+4; py<gy+gh-4; py+=5)
    gfx(gx+3, py, gw-6, 1, PAL['g']);

  // Control panel (right)
  const cpx=gx+gw-7, cpy=gy+2, cpw=6, cph=Math.floor(gh*0.55);
  gfx(cpx, cpy, cpw, cph, '#0b0d1e');
  gfx(cpx, cpy, cpw, 1, '#334');
  // Screen
  gfx(cpx+1, cpy+2, cpw-2, 5, '#0a1a2a');
  if((G.f>>3)&1) gfx(cpx+1, cpy+3, cpw-2, 2, '#00ff8833');
  // Buttons
  gfx(cpx+1, cpy+8, 2, 1, isActive?'#00ff44':'#115');
  gfx(cpx+4, cpy+8, 2, 1, '#ff2244');
  gfx(cpx+1, cpy+11, 4, 1, '#fb850077');

  // Mold cavity (dark center)
  const mgx=gx+Math.floor(gw*0.25), mgw=Math.floor(gw*0.42);
  gfx(mgx, gy+1, mgw, gh-5, '#060810');
  gfx(mgx, gy+1, 2, gh-5, '#2a3a4a');
  gfx(mgx+mgw-2, gy+1, 2, gh-5, '#2a3a4a');
  gfx(mgx+1, gy+2, mgw-2, 1, '#334');
  gfx(mgx+1, gy+gh-6, mgw-2, 1, '#334');

  // Injection barrel
  const ibx=gx+gw-3;
  gfx(ibx, gy+Math.floor(gh*0.2), 6, Math.floor(gh*0.28), PAL['g']);
  gfx(ibx+6, gy+Math.floor(gh*0.28), 2, 4, '#556');

  // Status LED blink
  const led = isActive && ((G.f>>2)&1);
  gfx(gx+2, gy+2, 3, 3, led?'#00ff44':'#0f3010');

  // ENGEL label
  gtxt('ENGEL', gx+2, gy+gh-3, '#6ecf38', 1);
}

// ─── CONVEYOR ───────────────────────────────────────────────────────
function drawConveyor(gx, gy, gw) {
  const bh = 4;
  gfx(gx, gy, gw, bh, PAL['g']+'44');
  gfx(gx, gy, gw, bh, '#1a1c2e');
  const off = (G.f*2) % 8;
  for(let bx=gx+gw-off; bx>=gx-8; bx-=8)
    if(bx+5>gx && bx<gx+gw)
      gfx(Math.max(gx,bx), gy+1, Math.min(5,bx+5-gx), bh-2, '#2a2c44');
  gfx(gx, gy, gw, 1, '#3a3c5a');
  gfx(gx, gy+bh-1, gw, 1, '#111');
  gfx(gx, gy-1, 2, bh+2, '#2a3a4a');
  gfx(gx+gw-2, gy-1, 2, bh+2, '#2a3a4a');
}

// ─── ROLLER CART ────────────────────────────────────────────────────
function drawCart(gx, gy) {
  gfx(gx, gy, 20, 5, '#1e2040');
  gfx(gx, gy, 20, 1, '#3a3c60');
  const bc=['#c92a2a','#1971c2','#2d7d46','#ffd60a'];
  bc.forEach((col,i)=>{
    gfx(gx+1+i*5, gy-5, 4, 5, col);
    ctx.globalAlpha=0.3; gfx(gx+1+i*5, gy-5, 4, 1, '#fff'); ctx.globalAlpha=1;
  });
  for(let r=0;r<3;r++){
    gfx(gx+2+r*7, gy+5, 4, 4, '#2a2c44');
    gfx(gx+3+r*7, gy+6, 2, 2, '#3a3c60');
  }
  gfx(gx-2, gy-5, 1, 10, '#2a2c44');
  gfx(gx-3, gy-5, 3, 1, '#3a3c60');
}

// ─── SPEECH BUBBLE ──────────────────────────────────────────────────
function speechBubble(gx, gy, lines, bc) {
  const sz = 1;
  ctx.font = `bold ${sz*PX}px 'Press Start 2P', monospace`;
  let maxW = 0;
  lines.forEach(l => { maxW = Math.max(maxW, ctx.measureText(l).width/PX); });
  const bw=Math.ceil(maxW)+3, bh=lines.length*5+4, lh=5;
  const bx=gx, by=gy-bh-3;

  ctx.globalAlpha=0.5; gfx(bx+1,by+1,bw,bh,'#000'); ctx.globalAlpha=1;
  gfx(bx, by, bw, bh, '#04060f');
  gfx(bx, by, bw, 1, bc);
  gfx(bx, by+bh-1, bw, 1, '#000');
  gfx(bx, by, 1, bh, bc);
  gfx(bx+bw-1, by, 1, bh, '#000');
  gfx(bx+3, by+bh, 2, 2, bc);

  lines.forEach((l,i) => gtxt(l, bx+2, by+3+i*lh+sz, bc, sz));
}

// ─── HUD ────────────────────────────────────────────────────────────
function drawHUD() {
  // Top bar
  gfx(0, 0, GW, 7, '#04060f');
  gfx(0, 6, GW, 1, '#9d4edd55');

  gtxt('SCR', 1, 5, '#00b4d8', 1);
  gtxt(String(G.score).padStart(5,'0'), 9, 5, '#ffd60a', 2);
  gtxt('HP', Math.floor(GW/2)-8, 5, '#00b4d8', 1);
  gtxt('♥'.repeat(Math.max(0,G.lives)), Math.floor(GW/2)-1, 5, '#ef233c', 2);
  gtxt('L'+G.level, GW-12, 5, '#06d6a0', 2);
  if(G.pred.on) gtxt('🔥',GW-20,5,'#ef233c',1);
  if(G.nast.on) gtxt('🔧',GW-25,5,'#ffd60a',1);
}

// ─── SCANLINES ──────────────────────────────────────────────────────
function drawScanlines() {
  ctx.globalAlpha = 0.07;
  for(let sy=0; sy<cv.height; sy+=PX*2)
    ctx.fillStyle='#000', ctx.fillRect(0, sy, cv.width, PX);
  ctx.globalAlpha = 1;
}

  ['NESPOKOJNY!','REKLAMACIA!!'],
  ['ZAJTRA AUDIT','A TY TOTO??'],
  ['KTO TA NAUCIL','ROBIT?!'],
];

function layout() {
  G.numL = Math.min(2 + Math.floor(G.level/2), 5);
  G.mh = Math.floor(GH * 0.22);
  G.mw = Math.floor((GW - 4) / G.numL) - 2;
  G.mY = 7;
  G.cvY = G.mY + G.mh - 4;
  G.flY = Math.floor(GH * 0.88);
  G.lXs = [];
  for(let i=0; i<G.numL; i++) G.lXs.push(2 + i*(G.mw+2));
  G.lane = Math.min(G.lane, G.numL-1);
  G.tplx = G.lXs[G.lane] + G.mw/2 - 5;
}

// ═══════════════════════════════════════════════════════════════════
//  SCREENS
// ═══════════════════════════════════════════════════════════════════

function drawMenu() {
  drawNightCity();

  // Dark overlay
  ctx.globalAlpha = 0.55; gfx(0,0,GW,GH,'#04060f'); ctx.globalAlpha = 1;

  // Title bar
  const tbh = Math.floor(GH*0.09);
  gtitlebar(2, 3, GW-4, tbh, 'LISOVNA');

  // Subtitle
  gtxt('FACTORY PRESS', GW/2, tbh+8, '#fb8500', 1.5, 'center');
  gtxt('CHYTAJ DIELY!', GW/2, tbh+14, '#adb5bd', 1, 'center');

  // Panel
  const py = tbh + 17;
  const ph = Math.floor(GH * 0.52);
  gpanel(2, py, GW-4, ph, '#0b0c1a', '#252850');

  // Select label
  gtxt('SELECT WORKER', GW/2, py+7, '#00b4d8', 1.5, 'center');
  gfx(2, py+9, GW-4, 1, '#252850');

  // Character cards
  const ch2 = Math.floor(ph * 0.65);
  const cw2 = Math.floor((GW-16)/2);
  const cx1 = 4, cx2 = cx1 + cw2 + 4;
  const ccy = py + 12;

  // Male card
  const mSel = G.char === 'm';
  gpanel(cx1, ccy, cw2, ch2, mSel?'#0a1a30':'#0b0c1a', mSel?'#ffd60a':'#252850');
  // Draw char centered in card, scale 2
  const charSprite = mSel ? M_MALE : M_MALE;
  const charScale = Math.max(1, Math.floor(Math.min(cw2,ch2) / 16));
  drawChar(M_MALE, cx1 + cw2/2 - 5*charScale, ccy+4, G.f, charScale);
  gtxt('MALE', cx1+cw2/2, ccy+ch2-4, mSel?'#ffd60a':'#adb5bd', 1.5, 'center');

  // Female card
  const fSel = G.char === 'f';
  gpanel(cx2, ccy, cw2, ch2, fSel?'#0a1a30':'#0b0c1a', fSel?'#ffd60a':'#252850');
  drawChar(M_FEMALE, cx2 + cw2/2 - 5*charScale, ccy+4, G.f, charScale);
  gtxt('FEMALE', cx2+cw2/2, ccy+ch2-4, fSel?'#ffd60a':'#adb5bd', 1.5, 'center');

  // Play button
  const bby = py + ph + 6;
  gbtn(4, bby, GW-8, Math.floor(GH*0.08), '▶  START', '#06d6a0', '#06d6a0');

  // Hints
  const hy = bby + Math.floor(GH*0.08) + 6;
  gtxt('TAP TO PLAY', GW/2, hy, '#3a4060', 1, 'center');
  gtxt('< > OR SWIPE', GW/2, hy+7, '#3a4060', 1, 'center');

  drawScanlines();
}

// ─────────────────────────────────────────────────────────────────
function drawGame() {
  drawFactory();
  drawHUD();

  // Machines + conveyors
  for(let i=0; i<G.numL; i++) {
    drawMachine(G.lXs[i], G.mY, G.mw, G.mh, i===G.lane);
    drawConveyor(G.lXs[i], G.cvY, G.mw);
  }

  // Parts
  G.parts.forEach(p => {
    if(p.x > G.lXs[p.l]-10 && p.x < G.lXs[p.l]+G.mw)
      spr(p.bad ? PART_BAD : PART_GOOD, p.x, p.y, 1);
  });

  // Skladnik
  if(G.skl.on) {
    const sy = G.flY - 28;
    drawCart(~~G.skl.x + 16, sy + 16);
    drawChar(M_SKLADNIK, ~~G.skl.x, sy, G.skl.f, 2);
  }

  // Player
  {
    const py2 = G.flY - 28;
    drawChar(G.char==='m'?M_MALE:M_FEMALE, ~~G.plx, py2, G.f, 2);
    // Lane glow
    if((G.f>>2)&1) {
      ctx.globalAlpha=0.15;
      gfx(G.lXs[G.lane], G.flY-2, G.mw, 2, '#06d6a0');
      ctx.globalAlpha=1;
    }
  }

  // Predak
  if(G.pred.on) {
    const flip = G.pred.dir > 0;
    drawChar(M_PREDAK, ~~G.pred.x, G.flY-28, G.pred.f, 2, flip);
    if(G.pred.bub > 0)
      speechBubble(~~G.pred.x, G.flY-28, ['VEZMI AJ','DRUHY LIS!'], '#fb8500');
  }

  // Nastavovac
  if(G.nast.on || (G.nast.x > -20 && G.nast.x < GW+20)) {
    drawChar(M_NAST, ~~G.nast.x, G.flY-28, G.nast.f, 2);
    if(G.nast.bub > 0 && G.nast.on)
      speechBubble(~~G.nast.x, G.flY-28, ['PORUCHA','FORMY!'], '#ffd60a');
  }

  // Flash
  if(G.flash > 0) {
    ctx.globalAlpha = G.flash / 18;
    gfx(0, 0, GW, GH, G.fCol);
    ctx.globalAlpha = 1;
  }

  // Hit popup
  if(G.hitAnim > 0)
    gtxt('+' + 10*G.level, ~~G.plx + 14, G.flY-32, '#06d6a0', 2);

  // Bottom controls (PCR style)
  const ctrlH = Math.floor(GH*0.1);
  const ctrlY = GH - ctrlH;
  gfx(0, ctrlY, GW, ctrlH, '#04060f');
  gfx(0, ctrlY, GW, 1, '#9d4edd44');
  gbtn(1, ctrlY+1, GW/2-2, ctrlH-2, '◀', '#00b4d8', '#00b4d8');
  gbtn(GW/2+1, ctrlY+1, GW/2-2, ctrlH-2, '▶', '#00b4d8', '#00b4d8');

  drawScanlines();
}

// ─────────────────────────────────────────────────────────────────
function drawOver() {
  // BG
  gfx(0,0,GW,GH,'#04060f');

  // Red title bar
  const tbh = Math.floor(GH*0.1);
  for(let i=0;i<tbh;i++){
    const t=i/tbh;
    ctx.fillStyle=`rgb(${~~(180+t*75)},${~~(20+t*15)},${~~(35+t*15)})`;
    ctx.fillRect(0,i*PX,cv.width,PX);
  }
  gtxt('GAME OVER', GW/2, tbh/2+1, '#0a0c1e', 3, 'center');

  // Majster (big)
  const mscale = Math.max(2, Math.floor(GH/60));
  drawChar(M_MAJSTER, GW/2 - 7*mscale, tbh+2, G.f, mscale);

  // Quote
  const qy = tbh + 16*mscale + 6;
  G.majQ.forEach((l,i) => gtxt(l, GW/2, qy+i*8, '#ef233c', 1.5, 'center'));

  // Score panel
  const spy = qy + G.majQ.length*8 + 6;
  const sph = Math.floor(GH*0.22);
  gpanel(4, spy, GW-8, sph, '#0b0c1a', '#252850');
  gtxt('SCORE', GW/2, spy+8, '#00b4d8', 1.5, 'center');
  gtxt(String(G.score).padStart(6,'0'), GW/2, spy+18, '#ffd60a', 3, 'center');
  gtxt('LEVEL '+G.level, GW/2, spy+28, '#06d6a0', 1.5, 'center');

  // Buttons
  const bby2 = spy+sph+5;
  gbtn(4, bby2, GW/2-6, Math.floor(GH*0.08), 'MENU', '#9d4edd', '#9d4edd');
  gbtn(GW/2+2, bby2, GW/2-6, Math.floor(GH*0.08), 'ZNOVA ▶', '#06d6a0', '#06d6a0');

  drawScanlines();
}

// ═══════════════════════════════════════════════════════════════════
//  UPDATE
// ═══════════════════════════════════════════════════════════════════
function update() {
  G.f++;
  bgOff += G.run ? 0.8 : 0.3;

  layout(); // recalculate layout each frame (handles resize)

  // Player smooth movement
  G.tplx = G.lXs[G.lane] + G.mw/2 - 5;
  G.plx += (G.tplx - G.plx) * 0.28;

  // Spawn parts
  G.spTimer++;
  if(!G.nast.on && G.spTimer >= G.spRate) {
    G.spTimer = 0;
    const ln = ~~(Math.random() * G.numL);
    const bad = Math.random() < (0.2 + G.level*0.03 + (G.pred.on?0.1:0));
    G.parts.push({
      l: ln,
      x: G.lXs[ln] + G.mw - 10,
      y: G.cvY + 1,
      bad,
      spd: G.pSpd + Math.random()*0.5 + (G.pred.on?0.8:0),
    });
  }

  // Move + catch
  for(let i=G.parts.length-1; i>=0; i--) {
    const p = G.parts[i];
    p.x -= p.spd;

    if(p.l === G.lane) {
      const pm = G.plx + 10;
      if(p.x+5 < pm+14 && p.x+5 > pm-14) {
        if(!p.bad) { G.score += 10*G.level; G.hitAnim=20; }
        else        { G.lives--; G.flash=16; G.fCol='#ef233c99'; }
        G.parts.splice(i,1);
        if(G.lives<=0){gameOver();return;}
        continue;
      }
    }
    if(p.x < G.lXs[p.l]-12) {
      if(!p.bad) { G.lives--; G.flash=12; G.fCol='#fb850077'; if(G.lives<=0){gameOver();return;} }
      G.parts.splice(i,1);
    }
  }

  // Level up
  if(G.score>0 && G.score%(180*G.level)===0 && G.f%4===0 && !G.pred.on){
    G.level++;
    G.pSpd = Math.min(G.pSpd+0.1, 4);
    G.spRate = Math.max(22, G.spRate-3);
  }

  // Predak
  if(!G.pred.on && !G.nast.on && G.f>120 && G.f%550===0){
    G.pred.on=true; G.pred.t=280; G.pred.x=GW+20; G.pred.dir=-1; G.pred.bub=220;
    G.pSpd = Math.min(G.pSpd+0.8, 8);
    const nn=Math.min(G.numL+1,5); if(nn!==G.numL) G.numL=nn;
  }
  if(G.pred.on){
    G.pred.f++; G.pred.x+=G.pred.dir*Math.max(0.8,GW/200); G.pred.t--;
    G.pred.bub = Math.max(0,G.pred.bub-1);
    if(G.pred.x<15&&G.pred.dir<0) G.pred.dir=1;
    if(G.pred.x>GW-25&&G.pred.dir>0) G.pred.dir=-1;
    if(G.pred.t<=0){G.pred.on=false; G.pSpd=Math.max(G.pSpd-0.4,1.0+G.level*0.08);}
  }

  // Nastavovac
  if(!G.nast.on && !G.pred.on && G.f>200 && G.f%700===0){
    G.nast.on=true; G.nast.t=200; G.nast.x=-20; G.nast.stop=false; G.nast.bub=180;
  }
  if(G.nast.on){
    G.nast.f++; G.nast.bub=Math.max(0,G.nast.bub-1);
    if(!G.nast.stop){G.nast.x+=Math.max(0.6,GW/260); if(G.nast.x>GW*0.38)G.nast.stop=true;}
    G.nast.t--;
    if(G.nast.t<=0){G.nast.on=false;}
  } else if(G.nast.x>-20&&G.nast.x<GW+20){G.nast.x+=GW/260;G.nast.f++;}

  // Skladnik
  G.skl.t--;
  if(G.skl.t<=0&&!G.skl.on){G.skl.on=true;G.skl.x=GW+60;G.skl.f=0;G.skl.t=500+~~(Math.random()*400);}
  if(G.skl.on){G.skl.x-=Math.max(0.5,GW/260);G.skl.f++;if(G.skl.x<-80)G.skl.on=false;}

  if(G.flash>0) G.flash--;
  if(G.hitAnim>0) G.hitAnim--;
}

function gameOver(){G.run=false;G.sc='over';G.majQ=QUOTES[~~(Math.random()*QUOTES.length)];}
function startGame(){
  G.sc='game';G.run=true;
  G.score=0;G.lives=3;G.level=1;G.f=0;
  G.pSpd=1.0;G.spRate=50;G.parts=[];G.spTimer=0;G.lane=1;
  G.pred.on=false;G.nast.on=false;G.nast.x=-20;
  G.skl.on=false;G.skl.t=300;
  G.flash=0;G.hitAnim=0;
  layout();
  G.plx=G.lXs[G.lane]+G.mw/2-5;
}

// ═══════════════════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════════════════
function render() {
  ctx.clearRect(0,0,cv.width,cv.height);
  if(G.sc==='menu')      drawMenu();
  else if(G.sc==='game') drawGame();
  else                   drawOver();
}

// ═══════════════════════════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════════════════════════
function loop() {
  if(G.run) update();
  else      G.f++;
  if(!G.run) bgOff += 0.3;
  render();
  requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════════════════════════
let lh=false, rh=false, mvI=null;
function mL(){if(G.sc!=='game')return; if(G.lane>0)G.lane--;}
function mR(){if(G.sc!=='game')return; if(G.lane<G.numL-1)G.lane++;}
function stL(e){if(e&&e.cancelable)e.preventDefault();mL();clearInterval(mvI);mvI=setInterval(()=>{if(lh)mL();},120);lh=true;}
function spL(){lh=false;clearInterval(mvI);}
function stR(e){if(e&&e.cancelable)e.preventDefault();mR();clearInterval(mvI);mvI=setInterval(()=>{if(rh)mR();},120);rh=true;}
function spR(){rh=false;clearInterval(mvI);}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft'){e.preventDefault();mL();}
  if(e.key==='ArrowRight'){e.preventDefault();mR();}
  if(e.key==='Enter'||e.key===' '){
    if(G.sc!=='game') startGame();
  }
});

// Touch handling — coords in game-pixels
function screenToGame(clientX, clientY) {
  const r=cv.getBoundingClientRect();
  return {
    x: (clientX-r.left) / r.width * GW,
    y: (clientY-r.top)  / r.height * GH,
  };
}

cv.addEventListener('pointerdown', e=>{
  e.preventDefault();
  const {x,y} = screenToGame(e.clientX, e.clientY);
  handleTap(x, y);
});

let tX0=null;
cv.addEventListener('touchstart', e=>{
  e.preventDefault();
  tX0=e.touches[0].clientX;
  const {x,y}=screenToGame(e.touches[0].clientX,e.touches[0].clientY);
  if(G.sc==='game') {
    const ctrlY=GH*(1-0.1);
    if(y>ctrlY){ x<GW/2?stL(e):stR(e); }
    else        { x<GW/2?mL():mR(); }
  } else handleTap(x,y);
},{passive:false});

cv.addEventListener('touchend', e=>{
  spL(); spR();
  // swipe
  if(tX0!==null&&G.sc==='game'){
    const dx=e.changedTouches[0].clientX-tX0;
    if(Math.abs(dx)>30){dx<0?mL():mR();}
    tX0=null;
  }
},{passive:true});

function handleTap(x,y) {
  if(G.sc==='menu') {
    // Character cards
    layout();
    const tbh=Math.floor(GH*0.09);
    const py=tbh+17;
    const ph=Math.floor(GH*0.52);
    const ch2=Math.floor(ph*0.65);
    const ccy=py+12;
    const cw2=Math.floor((GW-16)/2);
    if(y>ccy&&y<ccy+ch2) { G.char = x<GW/2?'m':'f'; }
    // Start button
    const bby=py+ph+6;
    const bh=Math.floor(GH*0.08);
    if(y>bby&&y<bby+bh) startGame();
  } else if(G.sc==='over') {
    const spy2 = Math.floor(GH*0.1)+16*Math.max(2,Math.floor(GH/60))+6;
    const sph = Math.floor(GH*0.22);
    const bby2 = spy2+sph+5;
    const bh=Math.floor(GH*0.08);
    if(y>bby2&&y<bby2+bh) {
      x<GW/2 ? (G.sc='menu',G.run=false) : startGame();
    }
  }
}

// ═══════════════════════════════════════════════════════════════════
//  START
// ═══════════════════════════════════════════════════════════════════
window.addEventListener('load', () => {
  resize();
  layout();
  loop();
});
</script>
