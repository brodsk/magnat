<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LISOVNA - Chytaj Diely | JIT Production</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-tap-highlight-color:transparent; }
body {
  font-family: 'Segoe UI', 'Courier New', monospace;
  background: #0a0f1a;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
  position: relative;
}

/* HERNÍ PLOCHA - HLAVNÍ OBRAZOVKA */
#gameFullscreen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 20;
  background: #1e2a2a;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  box-shadow: inset 0 0 100px rgba(0,0,0,0.6);
}
.game-container {
  background: #2c3e2f;
  border-radius: 28px;
  padding: 12px;
  box-shadow: 0 20px 35px rgba(0,0,0,0.5), inset 0 1px 4px rgba(255,255,255,0.1);
}
canvas {
  display: block;
  margin: 0 auto;
  border-radius: 18px;
  box-shadow: 0 0 0 3px #5a6e4a, 0 8px 25px black;
  cursor: pointer;
  touch-action: none;
}
.game-panel {
  margin-top: 14px;
  display: flex;
  gap: 28px;
  background: #191e1bdd;
  backdrop-filter: blur(10px);
  padding: 12px 32px;
  border-radius: 60px;
  font-weight: bold;
  font-size: 1.4rem;
  font-family: monospace;
  color: #e0f2c0;
  text-shadow: 0 2px 2px black;
  border: 1px solid #7faa5f;
}
.game-panel span { margin: 0 12px; }
.controls-hint {
  margin-top: 16px;
  font-size: 0.75rem;
  background: #000000aa;
  padding: 6px 18px;
  border-radius: 30px;
  color: #ccc;
}
button.game-btn {
  background: #3a5e2e;
  border: none;
  font-size: 1.2rem;
  font-weight: bold;
  padding: 8px 24px;
  margin: 6px;
  border-radius: 60px;
  color: white;
  cursor: pointer;
  font-family: monospace;
  transition: 0.1s linear;
  box-shadow: 0 3px 0 #1e3a1a;
}
button.game-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #1e3a1a; }

/* POZADÍ – BĚŽÍCÍ POSTAVY (ANIMOVANÉ) */
.background-stage {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
  pointer-events: none;
  overflow: hidden;
}
.bg-character {
  position: absolute;
  font-size: 2rem;
  white-space: nowrap;
  filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.4));
  transition: left 0.08s linear;
  z-index: 2;
  pointer-events: none;
  text-shadow: 0 0 2px black;
}
.bg-bubble {
  position: absolute;
  background: #fff9e8;
  color: #a1220a;
  font-weight: bold;
  font-size: 0.7rem;
  padding: 3px 8px;
  border-radius: 20px;
  top: -25px;
  left: 30px;
  white-space: nowrap;
  font-family: monospace;
  box-shadow: 0 1px 4px black;
  animation: fadeUp 1s ease-out forwards;
}
@keyframes fadeUp { 0% { opacity: 0; transform: translateY(10px); } 20% { opacity: 1; } 100% { opacity: 0; transform: translateY(-35px); } }

/* overlay menu start/game over */
.overlay-menu {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: #000000cc;
  backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 30;
  flex-direction: column;
  gap: 20px;
}
.menu-card {
  background: #232823e6;
  border-radius: 32px;
  padding: 24px 32px;
  text-align: center;
  color: #f2e8c9;
  border: 1px solid #b8865a;
  max-width: 360px;
  width: 80%;
}
.char-select {
  display: flex;
  gap: 24px;
  justify-content: center;
  margin: 20px 0;
}
.char-card {
  background: #3a2a1e;
  padding: 12px;
  border-radius: 28px;
  cursor: pointer;
  border: 2px solid #7a5a3a;
  transition: 0.1s;
}
.char-card.selected {
  border-color: #f5b642;
  background: #5e3e26;
  box-shadow: 0 0 12px gold;
}
.quote {
  font-style: italic;
  font-size: 0.8rem;
  margin-top: 16px;
  color: #ddbb88;
}
</style>
</head>
<body>

<!-- POZADÍ : ANIMOVANÍ PRACOVNÍCI + MISTR + SKLADNÍK + NASTAVOVAČ -->
<div class="background-stage" id="bgStage"></div>

<!-- HLAVNÍ HRA -->
<div id="gameFullscreen">
  <div class="game-container">
    <canvas id="gameCanvas" width="800" height="480"></canvas>
    <div class="game-panel">
      <span>🎯 SKÓRE: <span id="gameScore">0</span></span>
      <span>❤️ ŽIVOTY: <span id="gameLives">3</span></span>
      <span>⚙️ LISY: <span id="gamePressCount">1</span></span>
    </div>
    <div class="controls-hint">
      🎮  ←  →  |  Ťukni na ľavú/pravú stranu plátna  |  tlačidlá dole
    </div>
    <div style="display: flex; gap: 24px; margin-top: 12px;">
      <button class="game-btn" id="ctrlLeftBtn">◀ ĽAVO</button>
      <button class="game-btn" id="ctrlRightBtn">PRAVO ▶</button>
    </div>
  </div>
</div>

<script>
  // ----------------------- POZADÍ – BĚŽÍCÍ POSTAVY -------------------------
  const bgStage = document.getElementById('bgStage');
  let bgCharacters = [];
  let bgAnimationFrame = null;

  function createBgCharacter(type, yPos, speed, startX) {
    const div = document.createElement('div');
    div.className = 'bg-character';
    let html = '';
    let extraClass = '';
    if (type === 'worker') html = '👨‍🏭 <span style="background:#2c2c2c; padding:2px 6px; border-radius:20px;">🟤⚙️</span>';
    if (type === 'predak1') html = '👩‍🦰 <span style="background:#e86820; padding:2px 8px; border-radius:20px; color:white;">🧡 PREDÁK</span>';
    if (type === 'predak2') html = '👩‍🦳 <span style="background:#e86820; padding:2px 8px; border-radius:20px; color:white;">🧡 PREDÁK</span>';
    if (type === 'skladnik') html = '📦 <span style="background:#cc2222; padding:2px 8px; border-radius:20px; color:white;">⬜ SKLADNÍK</span>';
    if (type === 'nastavovac') html = '🧔‍♂️ <span style="background:#3a2a2a; padding:2px 8px; border-radius:20px; color:#ffaa66;">🔧 NASTAVOVAČ</span>';
    div.innerHTML = html;
    div.style.left = startX + 'px';
    div.style.top = yPos + 'px';
    div.style.fontSize = (18 + Math.random() * 10) + 'px';
    div.style.opacity = 0.8;
    bgStage.appendChild(div);
    return { element: div, type, x: startX, y: yPos, speed: speed, width: 140, lastBubble: 0 };
  }

  function updateBackgroundCharacters() {
    for (let i = 0; i < bgCharacters.length; i++) {
      const c = bgCharacters[i];
      c.x += c.speed;
      if (c.x > window.innerWidth + 200) c.x = -200;
      if (c.x < -200) c.x = window.innerWidth + 100;
      c.element.style.left = c.x + 'px';
      
      // náhodné bubliny podle typu
      if (Math.random() < 0.002 && (Date.now() - (c.lastBubble||0)) > 3000) {
        c.lastBubble = Date.now();
        let text = '';
        if (c.type === 'nastavovac') text = '🔧 PORUCHA FORMY! 🔧';
        else if (c.type === 'predak1') text = '🚨 RYCHLEJŠIE! ZABER!';
        else if (c.type === 'predak2') text = '📋 KVALITA? SÚSTREĎ SA!';
        else if (c.type === 'skladnik') text = '📦 NOVÉ BOXY!';
        else text = '🏭 tempo!';
        const bubble = document.createElement('div');
        bubble.className = 'bg-bubble';
        bubble.textContent = text;
        bubble.style.left = (c.x + 35) + 'px';
        bubble.style.top = (c.y - 10) + 'px';
        bgStage.appendChild(bubble);
        setTimeout(() => bubble.remove(), 1000);
      }
    }
    bgAnimationFrame = requestAnimationFrame(updateBackgroundCharacters);
  }

  function initBackground() {
    bgStage.innerHTML = '';
    bgCharacters = [];
    // tmavosiví dělnici
    for (let i = 0; i < 7; i++) {
      const y = 30 + Math.random() * (window.innerHeight - 120);
      const speed = (Math.random() * 0.8 + 0.4) * (Math.random() > 0.5 ? 1 : -1);
      const startX = Math.random() * window.innerWidth;
      bgCharacters.push(createBgCharacter('worker', y, speed, startX));
    }
    // predacka 1 - ryžové karé, oranžová
    for (let i=0;i<2;i++) bgCharacters.push(createBgCharacter('predak1', 80 + Math.random() * 200, 0.7 + Math.random() * 0.5, Math.random() * window.innerWidth));
    // predacka 2 - sedá, dlhé vlasy, oranžová
    for (let i=0;i<2;i++) bgCharacters.push(createBgCharacter('predak2', 140 + Math.random() * 220, -0.6 - Math.random() * 0.5, Math.random() * window.innerWidth));
    // skladnici s rolermi
    for (let i=0;i<3;i++) bgCharacters.push(createBgCharacter('skladnik', 200 + Math.random() * 150, 0.5 + Math.random() * 0.8, Math.random() * window.innerWidth));
    // nastavovaci – jeden borodaty
    for (let i=0;i<2;i++) bgCharacters.push(createBgCharacter('nastavovac', 300 + Math.random() * 100, -0.55 + Math.random() * 1.1, Math.random() * window.innerWidth));
    updateBackgroundCharacters();
  }
  window.addEventListener('resize', () => { initBackground(); });
  
  // ------------------------ HRA LISOVNA ---------------------------------
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const W = 800, H = 480;
  canvas.width = W; canvas.height = H;
  
  // Herní proměnné
  let gameRunning = false;
  let score = 0;
  let lives = 3;
  let pressCount = 1;          // počet lisů (výchozí 1, predák přidá další)
  let baseSpeed = 2.6;
  let spawnRate = 52;          // frames mezi spawnem
  let frame = 0;
  let items = [];
  let predakActive = false;
  let predakTimer = 0;
  let predakX = W+80;
  let predakDir = -1;
  let pressLevelBoost = false;    // predák zvýšil počet lisů
  let animationId = null;
  let selectedChar = 'male';     // muž/žena pro hráče
  
  // Hráč
  const LANES = [W*0.22, W*0.38, W*0.54, W*0.7, W*0.86]; // 5 drah pro pestrost
  let player = { lane: 2, x: LANES[2], y: H-58, armAngle: 0, armDir: 1 };
  
  // Funkce pro aktualizaci UI
  function updateUI() {
    document.getElementById('gameScore').innerText = score;
    document.getElementById('gameLives').innerHTML = '❤️'.repeat(lives);
    document.getElementById('gamePressCount').innerText = pressCount;
  }
  
  // Spawn dílů (dobrý / špatný)
  function spawnItem() {
    const laneIdx = Math.floor(Math.random() * LANES.length);
    const isBad = Math.random() < (0.2 + (pressCount > 1 ? 0.08 : 0) + (predakActive ? 0.1 : 0));
    items.push({
      lane: laneIdx,
      x: LANES[laneIdx],
      y: -24,
      bad: isBad,
      speed: baseSpeed + Math.random() * 1.2 + (pressCount > 1 ? 0.7 : 0)
    });
  }
  
  // Kolize a chytání
  function updateItems() {
    for (let i=items.length-1; i>=0; i--) {
      const it = items[i];
      it.y += it.speed;
      const catchZone = (it.y > H-88 && it.y < H-46 && Math.abs(it.x - player.x) < 36);
      if (catchZone) {
        if (!it.bad) {
          score += 10 * pressCount;
          updateUI();
        } else {
          lives--;
          updateUI();
          if (lives <= 0) gameOverSequence();
        }
        items.splice(i,1);
        continue;
      }
      if (it.y > H+30) {
        if (!it.bad) {
          lives--;
          updateUI();
          if (lives <= 0) gameOverSequence();
        }
        items.splice(i,1);
      }
    }
  }
  
  // Predák (přijde a zvýší počet lisů = těžší spawn, rychlejší)
  function updatePredak() {
    if (!gameRunning) return;
    if (!predakActive && frame > 180 && frame % 650 === 0 && pressCount<3) {
      predakActive = true;
      predakTimer = 380;
      predakX = W+70;
      predakDir = -1;
      // predák přidá lis! zvýší obtížnost
      pressCount = Math.min(3, pressCount+1);
      pressLevelBoost = true;
      baseSpeed = Math.min(5.2, baseSpeed + 0.9);
      spawnRate = Math.max(32, spawnRate - 12);
      updateUI();
      // bublina v pozadí
      const bubbleDiv = document.createElement('div');
      bubbleDiv.className = 'bg-bubble';
      bubbleDiv.textContent = '⚠️ ZABER ĎALŠÍ LIS! RYCHLEJŠIE! ⚠️';
      bubbleDiv.style.left = '30%'; bubbleDiv.style.top = '80px';
      document.getElementById('bgStage').appendChild(bubbleDiv);
      setTimeout(()=>bubbleDiv.remove(),1800);
    }
    if (predakActive) {
      predakX += predakDir * 1.5;
      if (predakX < 30 && predakDir<0) predakDir = 1;
      if (predakX > W-60 && predakDir>0) predakDir = -1;
      predakTimer--;
      if (predakTimer <= 0) {
        predakActive = false;
        // po odchodu predáka zůstane lis navždy aktivní, obtížnost zůstává
      }
    }
  }
  
  // Kreslení
  function drawBackgroundFactory() {
    ctx.fillStyle = '#19221b';
    ctx.fillRect(0,0,W,H);
    // pás
    ctx.fillStyle = '#343d2e';
    for(let i=0;i<W;i+=40){
      ctx.fillRect(i, H-46, 24, 8);
    }
    ctx.fillStyle = '#4e6040';
    ctx.fillRect(0, H-38, W, 38);
    // světla
    ctx.fillStyle = '#f5c542';
    ctx.shadowBlur=0;
    for(let i=0;i<6;i++) ctx.fillRect(40+i*130, 12, 20, 8);
    ctx.fillStyle = '#7f6b3a';
    for(let i=0;i<4;i++) ctx.fillRect(W-150+i*45, 12, 15, 6);
  }
  
  function drawPart(x,y,bad) {
    ctx.save();
    ctx.translate(x,y);
    ctx.fillStyle = bad ? '#b32b2b' : '#4d8c5a';
    ctx.shadowBlur = 2;
    ctx.beginPath(); ctx.roundRect(-15, -9, 30, 18, 6); ctx.fill();
    ctx.fillStyle = bad ? '#d86c6c' : '#90c290';
    ctx.fillRect(-8, -4, 5, 8);
    ctx.fillRect(3, -4, 5, 8);
    if(bad){
      ctx.strokeStyle = '#ffd966'; ctx.lineWidth=2.5;
      ctx.beginPath(); ctx.moveTo(-8,-6); ctx.lineTo(8,2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(8,-6); ctx.lineTo(-8,2); ctx.stroke();
    } else {
      ctx.fillStyle = '#f7e05e';
      ctx.beginPath(); ctx.arc(0, 2, 3, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }
  
  function drawPlayer() {
    const x = player.x, y = player.y;
    ctx.save(); ctx.translate(x,y);
    ctx.fillStyle = '#1f2f1a'; // tmavá kombinéza
    ctx.beginPath(); ctx.roundRect(-14, -8, 28, 26, 6); ctx.fill();
    ctx.fillStyle = '#2f4025';
    ctx.fillRect(-8, -2, 16, 8);
    // paže
    ctx.fillStyle = '#b78f60';
    ctx.save(); ctx.translate(-14, -2); ctx.rotate(player.armAngle-0.2); ctx.fillRect(-4,-2,7,14); ctx.restore();
    ctx.save(); ctx.translate(14, -2); ctx.rotate(-player.armAngle+0.2); ctx.fillRect(-3,-2,7,14); ctx.restore();
    // hlava
    ctx.fillStyle = '#e0ac77';
    ctx.beginPath(); ctx.arc(0, -14, 12, 0, Math.PI*2); ctx.fill();
    if(selectedChar === 'female') {
      ctx.fillStyle = '#654321'; ctx.fillRect(-7, -21, 14, 6);
      ctx.fillStyle = '#4a2c1a'; ctx.beginPath(); ctx.ellipse(-6, -18, 3, 6, -0.2,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(6, -18, 3, 6, 0.2,0,Math.PI*2); ctx.fill();
    } else {
      ctx.fillStyle = '#2b1e0e'; ctx.fillRect(-9, -21, 18, 5);
    }
    ctx.fillStyle = '#1e1e1e';
    ctx.beginPath(); ctx.arc(-4, -15, 2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(4, -15, 2,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#f5bc70'; ctx.beginPath(); ctx.ellipse(0, -9, 3, 2,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
  
  function drawPredak() {
    if(!predakActive) return;
    ctx.save(); ctx.translate(predakX, H-58);
    if(predakDir>0) ctx.scale(-1,1);
    ctx.fillStyle = '#e86820'; ctx.beginPath(); ctx.roundRect(-16, -28, 32, 28, 6); ctx.fill();
    ctx.fillStyle = '#c06020'; ctx.fillRect(-16, -12, 32, 6);
    ctx.fillStyle = '#bd7a4a';
    ctx.fillRect(-5, -32, 10, 8);
    ctx.beginPath(); ctx.arc(0, -44, 12,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#9a4220'; // vlasy kare / sedá
    if(predakTimer % 200 < 100) ctx.fillStyle = '#b86a30';
    ctx.fillRect(-10, -50, 20, 8);
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(-4, -46, 1.8,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(4, -46, 1.8,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff6cf'; ctx.font = "bold 11px monospace"; ctx.fillText("🚨 RYCHLEJŠIE!", -28, -56);
    ctx.restore();
  }
  
  // Mistr v černém (game over)
  function drawMasterAngry() {
    ctx.fillStyle = '#0c0c0c'; ctx.fillRect(0,0,W,H);
    ctx.font = 'bold 28px monospace'; ctx.fillStyle = '#d44'; ctx.shadowBlur=0;
    ctx.fillText('💀 MAJSTER ŤA NAKLADAL!', W/2-180, H/2-50);
    ctx.font = '16px monospace'; ctx.fillStyle = '#c9a87b';
    const quotes = ['"Čo to robíš?! Zajtra výpoveď!"','"Kvalita je katastrofa! PORUCHA FORMY!"','"Takto sa lisuje? HANBA!"'];
    ctx.fillText(quotes[Math.floor(Math.random()*quotes.length)], W/2-160, H/2+20);
    // nakreslit mistra v černém
    ctx.save(); ctx.translate(W/2, H/2+90);
    ctx.fillStyle = '#111'; ctx.fillRect(-20, -10, 40, 30);
    ctx.fillStyle = '#2b2b2b'; ctx.fillRect(-22, -30, 44, 25);
    ctx.fillStyle = '#a56b3e'; ctx.beginPath(); ctx.arc(0, -40, 14,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#000'; ctx.fillRect(-10, -45, 20, 6);
    ctx.fillStyle = '#d00'; ctx.beginPath(); ctx.moveTo(-5, -33); ctx.lineTo(0, -28); ctx.lineTo(5, -33); ctx.fill();
    ctx.restore();
  }
  
  // Level up (predák přidal lis)
  function gameLoop() {
    if(!gameRunning) return;
    frame++;
    // pohyb hráče směrem k lane
    player.x += (LANES[player.lane] - player.x) * 0.22;
    player.armAngle += 0.12 * player.armDir;
    if(Math.abs(player.armAngle)>0.65) player.armDir*=-1;
    if(frame % spawnRate === 0) spawnItem();
    updateItems();
    updatePredak();
    drawBackgroundFactory();
    for(let it of items) drawPart(it.x, it.y, it.bad);
    drawPlayer();
    drawPredak();
    // zobrazení stavu lisů
    ctx.font = 'bold 14px monospace'; ctx.fillStyle = '#efebc0'; ctx.fillText(`⚙️ LISY AKTÍVNE: ${pressCount}`, 20, 45);
    if(predakActive) ctx.fillStyle = '#ffaa44'; ctx.fillText('🔥 PREDÁK DOHĽADÁ!', W-150, 38);
    if(lives<=0) return;
    animationId = requestAnimationFrame(gameLoop);
  }
  
  function gameOverSequence() {
    gameRunning = false;
    cancelAnimationFrame(animationId);
    drawMasterAngry();
    const overlay = document.createElement('div');
    overlay.className = 'overlay-menu';
    overlay.innerHTML = `<div class="menu-card"><h2>💀 KONIEC HRY 💀</h2><p>Skóre: ${score} | Úroveň lisov: ${pressCount}</p><div class="quote">"Mistr v čiernom ťa vyhodil z linky!"</div><button class="game-btn" id="restartBtn">ZNOVU LISOVAŤ 🔄</button><button class="game-btn" id="menuBtn">HLAVNÉ MENU</button></div>`;
    document.body.appendChild(overlay);
    document.getElementById('restartBtn').onclick = () => { overlay.remove(); fullRestart(); };
    document.getElementById('menuBtn').onclick = () => { overlay.remove(); showStartMenu(); };
  }
  
  function fullRestart() {
    score = 0; lives = 3; pressCount = 1; baseSpeed = 2.6; spawnRate = 52; frame = 0; items = [];
    predakActive = false; predakTimer = 0; pressLevelBoost = false;
    player.lane = 2; player.x = LANES[2];
    gameRunning = true;
    updateUI();
    if(animationId) cancelAnimationFrame(animationId);
    animationId = requestAnimationFrame(gameLoop);
  }
  
  // Start menu s výběrem postavy
  function showStartMenu() {
    if(animationId) cancelAnimationFrame(animationId);
    gameRunning = false;
    const menuDiv = document.createElement('div');
    menuDiv.className = 'overlay-menu';
    menuDiv.innerHTML = `
      <div class="menu-card">
        <h2>🏭 LISOVNA MAGNA 🏭</h2>
        <p>Chytaj plastové diely! Červené = šrot → strata života.<br>⭐ PREDÁK ti pridá ďalší lis!</p>
        <div class="char-select">
          <div class="char-card" data-char="male">👨 MUŽ <canvas id="previewMale" width="48" height="60"></canvas></div>
          <div class="char-card" data-char="female">👩 ŽENA <canvas id="previewFemale" width="48" height="60"></canvas></div>
        </div>
        <button class="game-btn" id="startGameBtn">▶ SPUSTIŤ VÝROBU</button>
        <div class="quote">"Zober si rukavice a chytaj!"</div>
      </div>`;
    document.body.appendChild(menuDiv);
    // náhled postav
    const cm = document.getElementById('previewMale')?.getContext('2d');
    const cf = document.getElementById('previewFemale')?.getContext('2d');
    if(cm) { cm.fillStyle='#b68b60'; cm.fillRect(0,20,48,20); cm.beginPath(); cm.arc(24,24,14,0,Math.PI*2); cm.fill(); cm.fillStyle='#2c2c2c'; cm.fillRect(18,12,12,4); }
    if(cf) { cf.fillStyle='#cf9f70'; cf.fillRect(0,20,48,20); cf.beginPath(); cf.arc(24,24,14,0,Math.PI*2); cf.fill(); cf.fillStyle='#7a3a1a'; cf.fillRect(15,11,18,5); }
    document.querySelectorAll('.char-card').forEach(card => {
      card.addEventListener('click', () => {
        document.querySelectorAll('.char-card').forEach(c=>c.classList.remove('selected'));
        card.classList.add('selected');
        selectedChar = card.getAttribute('data-char');
      });
    });
    document.getElementById('startGameBtn').onclick = () => {
      menuDiv.remove();
      fullRestart();
    };
    document.querySelector('.char-card').classList.add('selected');
    selectedChar = 'male';
  }
  
  // Ovládání
  function moveLeft() { if(gameRunning && player.lane > 0) player.lane--; }
  function moveRight() { if(gameRunning && player.lane < LANES.length-1) player.lane++; }
  
  document.getElementById('ctrlLeftBtn').addEventListener('click', moveLeft);
  document.getElementById('ctrlRightBtn').addEventListener('click', moveRight);
  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const touchX = e.touches[0].clientX - rect.left;
    if(touchX < W/2) moveLeft(); else moveRight();
  }, {passive:false});
  canvas.addEventListener('mousedown', (e) => {
    const rect = canvas.getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    if(mouseX < W/2) moveLeft(); else moveRight();
  });
  document.addEventListener('keydown', (e) => {
    if(e.key === 'ArrowLeft') { e.preventDefault(); moveLeft(); }
    if(e.key === 'ArrowRight') { e.preventDefault(); moveRight(); }
  });
  
  // Spuštění hry + pozadí
  initBackground();
  showStartMenu();
</script>
</body>
</html>
