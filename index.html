<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>PIXEL CAR RACER - LISOVNA STYLE</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
html,body { width:100%; height:100%; overflow:hidden; background:#0a0f1a; font-family:'Courier New', monospace; }

#app {
  width:100%; height:100%;
  display:flex; flex-direction:column;
  align-items:center; justify-content:flex-start;
  background:linear-gradient(135deg, #0a1f1a 0%, #1a2f1f 100%);
  position:relative; overflow:hidden;
}

#hud {
  width:100%; max-width:550px;
  display:flex; gap:0; font-family:monospace;
  font-size:clamp(12px,3vw,16px); font-weight:bold;
  background:#0a0a0acc; backdrop-filter:blur(8px);
  border-bottom:2px solid #dba553;
  flex-shrink:0;
  padding:6px 0;
}
#hud span { flex:1; text-align:center; padding:4px; color:#f9efb8; text-shadow:0 1px 1px black; }
#hud .hs { color:#0f0; }
#hud .hh { color:#f44; }
#hud .hl { color:#ffa500; }

#canvasWrap {
  position:relative; flex:1;
  display:flex; align-items:center; justify-content:center;
  width:100%; max-width:550px;
  overflow:hidden;
  margin:8px 0;
}
#gameCanvas { 
  display:block; 
  touch-action:none; 
  background:linear-gradient(180deg, #1a2a2a 0%, #0e1a1a 100%);
  border-radius:16px; 
  box-shadow:0 8px 25px rgba(0,0,0,0.5), inset 0 0 0 2px rgba(255,200,100,0.2);
  image-rendering:pixelated;
  image-rendering:crisp-edges;
}

#controls {
  width:100%; max-width:550px;
  display:flex; gap:12px; padding:10px;
  background:#0a0a0acc; backdrop-filter:blur(8px);
  border-top:2px solid #dba553;
  flex-shrink:0;
}
#controls button {
  flex:1; background:linear-gradient(145deg, #4a3e2e, #2a1e12);
  color:#ffefb0; border:none; padding:12px 0;
  font-size:26px; cursor:pointer; border-radius:60px;
  touch-action:manipulation; transition:0.05s linear;
  font-family:monospace; font-weight:bold;
  box-shadow:0 5px 0 #3a2a1a;
  border:1px solid #b8865a;
}
#controls button:active, #controls button.held { transform:translateY(2px); box-shadow:0 2px 0 #3a2a1a; }

#overlay {
  position:absolute; top:0; left:0; right:0; bottom:0;
  background:rgba(0,0,0,0.92);
  backdrop-filter:blur(8px);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:14px; z-index:20; padding:20px;
}
#overlay.hidden { display:none; }

.ov-title { font-size:clamp(28px,8vw,48px); font-weight:900; color:#ffaa44; letter-spacing:4px; text-shadow:0 0 20px #ff6600; font-family:monospace; }
.ov-sub { font-size:clamp(11px,3vw,14px); color:#aaa; text-align:center; line-height:1.5; }
.ov-btn {
  background:linear-gradient(180deg,#dba553,#b87a2a);
  color:#fff; border:none; padding:12px 36px;
  font-size:clamp(16px,4vw,20px); cursor:pointer;
  border-radius:40px; font-weight:bold;
  box-shadow:0 5px 0 #6a4a1a;
  transition:transform 0.1s;
  font-family:monospace;
}
.ov-btn:active { transform:translateY(2px); box-shadow:0 2px 0 #6a4a1a; }
.ov-btn-sec { background:#222; color:#aaa; border:1px solid #444; padding:9px 22px; font-size:14px; cursor:pointer; border-radius:6px; }

.name-input {
  background:#2a2a2a; border:2px solid #dba553; padding:10px 16px;
  font-size:18px; text-align:center; border-radius:40px;
  color:#ffefb0; font-family:monospace; width:220px;
}
.name-input:focus { outline:none; border-color:#ffaa44; }

.leaderboard {
  background:#0a0a0aaa; border-radius:16px; padding:12px; margin-top:12px;
  width:100%; max-width:280px; max-height:180px; overflow-y:auto;
  border:1px solid #dba553;
}
.leaderboard h4 { color:#ffaa44; margin-bottom:8px; font-size:14px; }
.leaderboard-item { display:flex; justify-content:space-between; padding:4px 8px; border-bottom:1px solid #333; font-size:12px; color:#ccc; }
.leaderboard-rank { color:#ffaa44; width:30px; }
.leaderboard-name { flex:1; text-align:left; }
.leaderboard-score { color:#0f0; font-weight:bold; }

.hint { font-size:10px; color:#888; text-align:center; font-family:monospace; padding:2px 0; flex-shrink:0; }
.road-stripe { position:absolute; bottom:20px; left:0; right:0; height:4px; background:repeating-linear-gradient(90deg, #ffaa44, #ffaa44 20px, #aaa 20px, #aaa 40px); pointer-events:none; }
</style>
</head>
<body>
<div id="app">
  <div id="hud">
    <span class="hs">🏁 SKÓRE <span id="hScore">0</span></span>
    <span class="hh">❤️ ŽIVOTY <span id="hLives">3</span></span>
    <span class="hl">⚡ RÝCHLOSŤ <span id="hSpeed">0</span></span>
  </div>

  <div id="canvasWrap">
    <canvas id="gameCanvas"></canvas>
  </div>

  <div id="overlay">
    <div id="scrMenu" style="display:flex;flex-direction:column;align-items:center;gap:12px;">
      <div class="ov-title">🏎️ PIXEL CAR RACER</div>
      <div class="ov-sub">Vyhýbaj sa červeným autám!<br>Zelené = body | Červené = strata života</div>
      <input type="text" id="playerName" class="name-input" placeholder="TVOJE MENO" maxlength="15" autocomplete="off">
      <button class="ov-btn" onclick="startGame()">START RACE ▶</button>
      
      <div class="leaderboard">
        <h4>🏆 REKORDY 🏆</h4>
        <div id="leaderboardList"></div>
      </div>
      <div class="ov-sub" style="font-size:10px;">← → klávesy | tlačidlá | ťukni na plátno</div>
    </div>

    <div id="scrOver" style="display:none;flex-direction:column;align-items:center;gap:12px;">
      <div class="ov-title" style="font-size:32px;">💥 GAME OVER 💥</div>
      <div class="go-score" id="goScore" style="font-size:24px;color:#ffaa44;">Skóre: 0</div>
      <div class="go-quote" id="goQuote" style="color:#ff9999;font-style:italic;text-align:center;">Crash!</div>
      <div class="go-btns" style="display:flex;gap:10px;">
        <button class="ov-btn-sec" onclick="showMenu()">← MENU</button>
        <button class="ov-btn" onclick="startGame()">ZNOVA ▶</button>
      </div>
    </div>
  </div>

  <div class="hint">← → pohyb | Ťukni na plátno | tlačidlá dole</div>
  <div id="controls">
    <button id="btnL" ontouchstart="startL(event)" ontouchend="stopL()" onmousedown="startL()" onmouseup="stopL()" onmouseleave="stopL()">◀ ĽAVO</button>
    <button id="btnR" ontouchstart="startR(event)" ontouchend="stopR()" onmousedown="startR()" onmouseup="stopR()" onmouseleave="stopR()">PRAVO ▶</button>
  </div>
</div>

<script>
// ============================================================
//  ZVUKOVÉ EFEKTY (Web Audio API)
// ============================================================
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let audioEnabled = false;

function playBeep(freq, duration, type='sine', volume=0.2) {
  if(!audioEnabled) return;
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.value = volume;
    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
    osc.stop(audioCtx.currentTime + duration);
  } catch(e) {}
}

function playScore() { playBeep(880, 0.08, 'square', 0.12); }
function playCrash() { playBeep(150, 0.25, 'sawtooth', 0.25); playBeep(120, 0.2, 'sawtooth', 0.2); }
function playEngine() { playBeep(200, 0.05, 'sawtooth', 0.05); }

// ============================================================
//  TABUĽKA REKORDOV
// ============================================================
let leaderboard = [];

function loadLeaderboard() {
  try {
    const saved = localStorage.getItem('pixel_racer_leaderboard');
    if(saved) leaderboard = JSON.parse(saved);
    else leaderboard = [];
    leaderboard.sort((a,b) => b.score - a.score);
    leaderboard = leaderboard.slice(0, 8);
  } catch(e) { leaderboard = []; }
  updateLeaderboardDisplay();
}

function saveLeaderboard() {
  leaderboard.sort((a,b) => b.score - a.score);
  leaderboard = leaderboard.slice(0, 8);
  localStorage.setItem('pixel_racer_leaderboard', JSON.stringify(leaderboard));
  updateLeaderboardDisplay();
}

function addScore(name, score) {
  if(!name || name.trim() === '') name = 'DRIVER';
  leaderboard.push({ name: name.trim().substring(0, 15), score: score });
  leaderboard.sort((a,b) => b.score - a.score);
  leaderboard = leaderboard.slice(0, 8);
  saveLeaderboard();
}

function updateLeaderboardDisplay() {
  const container = document.getElementById('leaderboardList');
  if(!container) return;
  if(leaderboard.length === 0) {
    container.innerHTML = '<div class="leaderboard-item">Zatiaľ žiadne rekordy</div>';
    return;
  }
  container.innerHTML = leaderboard.map((entry, idx) => `
    <div class="leaderboard-item">
      <span class="leaderboard-rank">${idx+1}.</span>
      <span class="leaderboard-name">${escapeHtml(entry.name)}</span>
      <span class="leaderboard-score">${entry.score}</span>
    </div>
  `).join('');
}

function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

// ============================================================
//  PIXEL CAR RACER - HERNÁ LOGIKA
// ============================================================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let GW = 400, GH = 550;

function resizeCanvas(){
  const wrap = document.getElementById('canvasWrap');
  const w = Math.min(wrap.clientWidth, 500);
  const h = wrap.clientHeight;
  if(w > 0 && h > 0) { GW = w; GH = h; canvas.width = GW; canvas.height = GH; }
}
window.addEventListener('resize', ()=>{ resizeCanvas(); if(!running) drawMenuBg(); });
resizeCanvas();

// Herné premenné
let running = false, raf = null;
let score = 0, lives = 3, speed = 0;
let player = { x: 0, lane: 1, width: 24, height: 32 };
let enemies = [];
let powerups = [];
let frame = 0;
let spawnCounter = 0;
let playerName = '';

// Dráhy (3 pruhy)
const LANE_COUNT = 3;
let lanes = [];

function updateLanes(){
  lanes = [];
  const laneWidth = GW / LANE_COUNT;
  for(let i = 0; i < LANE_COUNT; i++){
    lanes.push({
      x: i * laneWidth + laneWidth/2 - 12,
      centerX: i * laneWidth + laneWidth/2
    });
  }
  player.x = lanes[player.lane].x;
}

function initGame(){
  updateLanes();
  player = { x: lanes[1].x, lane: 1, width: 24, height: 32, y: GH - 70 };
  enemies = [];
  powerups = [];
  score = 0;
  lives = 3;
  speed = 2;
  frame = 0;
  spawnCounter = 0;
  updateHUD();
}

function updateHUD(){
  document.getElementById('hScore').textContent = score;
  document.getElementById('hLives').textContent = lives;
  document.getElementById('hSpeed').textContent = Math.floor(speed * 20);
}

function showMenu(){
  if(running) stopGame();
  document.getElementById('scrMenu').style.display = 'flex';
  document.getElementById('scrOver').style.display = 'none';
  document.getElementById('overlay').classList.remove('hidden');
  drawMenuBg();
}

function showGameOver(){
  playCrash();
  document.getElementById('scrMenu').style.display = 'none';
  document.getElementById('scrOver').style.display = 'flex';
  document.getElementById('goScore').textContent = 'Skóre: ' + score;
  const quotes = ['HAVÁRIA!', 'PRÍLIŠ RÝCHLY!', 'DÁVAJ POZOR!', 'CRASH!', 'WRECK!'];
  document.getElementById('goQuote').textContent = quotes[Math.floor(Math.random() * quotes.length)];
  document.getElementById('overlay').classList.remove('hidden');
  if(score > 0) addScore(playerName, score);
}

function stopGame(){ running=false; if(raf) cancelAnimationFrame(raf); raf=null; }

function startGame(){
  const nameInput = document.getElementById('playerName');
  playerName = nameInput.value.trim();
  if(playerName === '') playerName = 'DRIVER';
  
  if(!audioEnabled) {
    audioCtx.resume().then(() => { audioEnabled = true; });
  }
  
  document.getElementById('overlay').classList.add('hidden');
  initGame();
  running = true;
  if(raf) cancelAnimationFrame(raf);
  raf = requestAnimationFrame(gameLoop);
}

// Herná smyčka
function gameLoop(){
  if(!running) return;
  frame++;
  update();
  draw();
  raf = requestAnimationFrame(gameLoop);
}

function update(){
  // Zvyšovanie rýchlosti so skóre (ako dinosaurus)
  speed = 2 + Math.floor(score / 300);
  if(speed > 12) speed = 12;
  
  // Spawn nepriateľov
  spawnCounter--;
  if(spawnCounter <= 0){
    const lane = Math.floor(Math.random() * LANE_COUNT);
    const isEnemy = Math.random() < 0.7; // 70% nepriateľ, 30% powerup
    if(isEnemy){
      enemies.push({
        lane: lane,
        x: lanes[lane].x,
        y: -40,
        width: 24,
        height: 32,
        type: 'enemy',
        color: '#cc3333'
      });
    } else {
      powerups.push({
        lane: lane,
        x: lanes[lane].x,
        y: -30,
        width: 20,
        height: 20,
        type: 'powerup',
        color: '#33cc33'
      });
    }
    spawnCounter = Math.max(25, 45 - Math.floor(score / 200));
  }
  
  // Pohyb nepriateľov
  for(let i = enemies.length-1; i >= 0; i--){
    const e = enemies[i];
    e.y += speed;
    if(e.y > GH){
      enemies.splice(i,1);
      continue;
    }
    // Kolízia s hráčom
    if(e.y + e.height > player.y && e.y < player.y + player.height &&
       e.x + e.width > player.x && e.x < player.x + player.width){
      lives--;
      playCrash();
      updateHUD();
      enemies.splice(i,1);
      if(lives <= 0){
        gameOver();
        return;
      }
    }
  }
  
  // Pohyb powerupov
  for(let i = powerups.length-1; i >= 0; i--){
    const p = powerups[i];
    p.y += speed;
    if(p.y > GH){
      powerups.splice(i,1);
      continue;
    }
    // Kolízia s hráčom - zber powerupu
    if(p.y + p.height > player.y && p.y < player.y + player.height &&
       p.x + p.width > player.x && p.x < player.x + player.width){
      score += 50;
      playScore();
      updateHUD();
      powerups.splice(i,1);
    }
  }
  
  // Plynulý pohyb hráča
  player.x += (lanes[player.lane].x - player.x) * 0.25;
}

function gameOver(){
  running = false;
  showGameOver();
}

// ========== KRESLENIE (Pixel Car Racer štýl) ==========
function drawMenuBg(){
  if(!ctx) return;
  ctx.fillStyle = '#1a2a2a';
  ctx.fillRect(0,0,GW,GH);
  // Cesta
  ctx.fillStyle = '#2a3a2a';
  ctx.fillRect(0, GH-80, GW, 80);
  ctx.fillStyle = '#3a4a3a';
  for(let i=0;i<GW;i+=40){
    ctx.fillRect(i, GH-75, 20, 8);
  }
  // Čiary
  ctx.strokeStyle = '#ffaa44';
  ctx.lineWidth = 3;
  for(let i=1;i<LANE_COUNT;i++){
    const x = (i * GW / LANE_COUNT);
    ctx.beginPath();
    ctx.setLineDash([15, 20]);
    ctx.moveTo(x, 0);
    ctx.lineTo(x, GH);
    ctx.stroke();
  }
  ctx.setLineDash([]);
  // Auto
  ctx.fillStyle = '#dba553';
  ctx.fillRect(GW/2-15, GH-70, 30, 25);
  ctx.fillStyle = '#333';
  ctx.fillRect(GW/2-12, GH-65, 24, 18);
  ctx.fillStyle = '#111';
  ctx.fillRect(GW/2-10, GH-62, 20, 12);
}

function draw(){
  if(!ctx) return;
  
  // Asfalt
  ctx.fillStyle = '#1a2a2a';
  ctx.fillRect(0, 0, GW, GH);
  
  // Cesta s pixelovým vzorom
  ctx.fillStyle = '#2a3a2a';
  ctx.fillRect(0, GH-80, GW, 80);
  
  // Pixelové škvrny na ceste
  ctx.fillStyle = '#3a4a3a';
  for(let i=0;i<GW;i+=35){
    ctx.fillRect(i, GH-75, 18, 6);
    ctx.fillRect(i+15, GH-68, 12, 4);
  }
  
  // Biele čiary (prerušované)
  ctx.strokeStyle = '#ffaa44';
  ctx.lineWidth = 3;
  for(let i=1;i<LANE_COUNT;i++){
    const x = (i * GW / LANE_COUNT);
    ctx.beginPath();
    ctx.setLineDash([18, 25]);
    ctx.moveTo(x, 0);
    ctx.lineTo(x, GH);
    ctx.stroke();
  }
  ctx.setLineDash([]);
  
  // Okrajové čiary
  ctx.strokeStyle = '#ffaa44';
  ctx.lineWidth = 2;
  ctx.strokeRect(5, 0, GW-10, GH);
  
  // Powerupy (zelené hviezdy / kocky)
  for(const p of powerups){
    ctx.fillStyle = '#33cc33';
    ctx.shadowBlur = 0;
    ctx.fillRect(p.x, p.y, p.width, p.height);
    ctx.fillStyle = '#88ff88';
    ctx.fillRect(p.x+4, p.y+4, 12, 12);
    ctx.fillStyle = '#ffff00';
    ctx.fillRect(p.x+7, p.y+7, 6, 6);
  }
  
  // Nepriatelia (červené autá)
  for(const e of enemies){
    // Karoséria
    ctx.fillStyle = '#cc3333';
    ctx.fillRect(e.x, e.y, e.width, e.height);
    ctx.fillStyle = '#aa2222';
    ctx.fillRect(e.x+2, e.y+5, e.width-4, 8);
    ctx.fillStyle = '#ff6666';
    ctx.fillRect(e.x+4, e.y+12, 6, 6);
    ctx.fillRect(e.x+14, e.y+12, 6, 6);
    // Okná
    ctx.fillStyle = '#88aaff';
    ctx.fillRect(e.x+4, e.y+2, 6, 5);
    ctx.fillRect(e.x+14, e.y+2, 6, 5);
    // Kolesá
    ctx.fillStyle = '#111';
    ctx.fillRect(e.x+2, e.y+24, 5, 6);
    ctx.fillRect(e.x+17, e.y+24, 5, 6);
  }
  
  // Hráčovo auto (pixelový štýl)
  const px = player.x;
  const py = player.y;
  
  // Karoséria - zlatá / oranžová
  ctx.fillStyle = '#dba553';
  ctx.fillRect(px, py, 24, 28);
  ctx.fillStyle = '#b87a2a';
  ctx.fillRect(px+2, py+4, 20, 20);
  
  // Čierny pruh
  ctx.fillStyle = '#333';
  ctx.fillRect(px+2, py+8, 20, 6);
  
  // Okná
  ctx.fillStyle = '#88aaff';
  ctx.fillRect(px+4, py+2, 6, 5);
  ctx.fillRect(px+14, py+2, 6, 5);
  
  // Strešné svetlo
  ctx.fillStyle = '#ffaa44';
  ctx.fillRect(px+10, py-2, 4, 4);
  
  // Kolesá
  ctx.fillStyle = '#111';
  ctx.fillRect(px+2, py+22, 5, 6);
  ctx.fillRect(px+17, py+22, 5, 6);
  ctx.fillRect(px+2, py+4, 4, 4);
  ctx.fillRect(px+18, py+4, 4, 4);
  
  // Predné svetlá
  ctx.fillStyle = '#ffffaa';
  ctx.fillRect(px+2, py+26, 4, 2);
  ctx.fillRect(px+18, py+26, 4, 2);
  
  // Pixelový efekt - iskry pri vysokej rýchlosti
  if(speed > 8){
    ctx.fillStyle = `rgba(255,200,100,${0.3+Math.sin(Date.now()*0.02)*0.1})`;
    for(let i=0;i<3;i++){
      ctx.fillRect(px-5 + Math.random()*30, py+25 + Math.random()*10, 2, 2);
    }
  }
  
  // Rýchlostný efekt (pixelové čiary)
  if(speed > 5){
    ctx.fillStyle = `rgba(255,255,200,${0.2+Math.sin(frame*0.1)*0.1})`;
    for(let i=0;i<speed;i++){
      ctx.fillRect(5 + Math.random() * (GW-10), GH-10 - Math.random()*30, 2, 4);
    }
  }
  
  // Skóre na plátne (pixelový font)
  ctx.font = 'bold 16px monospace';
  ctx.fillStyle = '#ffaa44';
  ctx.shadowBlur = 2;
  ctx.fillText(`🏁 ${score}`, 10, 35);
  ctx.fillStyle = '#f44';
  ctx.fillText(`❤️ ${lives}`, GW-55, 35);
  ctx.fillStyle = '#ffaa44';
  ctx.fillText(`⚡ ${Math.floor(speed*15)}`, GW-100, 35);
  ctx.shadowBlur = 0;
}

// ========== OVLÁDANIE ==========
let leftHeld = false, rightHeld = false, moveInterval = null;

function moveLeft(){ 
  if(running && player.lane > 0){ 
    player.lane--; 
    playEngine();
  } 
}
function moveRight(){ 
  if(running && player.lane < LANE_COUNT-1){ 
    player.lane++; 
    playEngine();
  } 
}

function startLeft(e){ 
  if(e && e.cancelable) e.preventDefault(); 
  if(!running) return; 
  moveLeft(); 
  clearInterval(moveInterval); 
  moveInterval = setInterval(()=>{ if(leftHeld) moveLeft(); }, 100); 
  leftHeld = true; 
  const btn = document.getElementById('btnL'); 
  if(btn) btn.classList.add('held'); 
}
function stopLeft(){ 
  leftHeld = false; 
  clearInterval(moveInterval); 
  const btn = document.getElementById('btnL'); 
  if(btn) btn.classList.remove('held'); 
}
function startRight(e){ 
  if(e && e.cancelable) e.preventDefault(); 
  if(!running) return; 
  moveRight(); 
  clearInterval(moveInterval); 
  moveInterval = setInterval(()=>{ if(rightHeld) moveRight(); }, 100); 
  rightHeld = true; 
  const btn = document.getElementById('btnR'); 
  if(btn) btn.classList.add('held'); 
}
function stopRight(){ 
  rightHeld = false; 
  clearInterval(moveInterval); 
  const btn = document.getElementById('btnR'); 
  if(btn) btn.classList.remove('held'); 
}

document.addEventListener('keydown', e => {
  if(!running) return;
  if(e.key === 'ArrowLeft'){ e.preventDefault(); moveLeft(); }
  if(e.key === 'ArrowRight'){ e.preventDefault(); moveRight(); }
});

let touchStartX = null;
canvas.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, {passive: true});
canvas.addEventListener('touchend', e => {
  if(touchStartX === null) return;
  const rect = canvas.getBoundingClientRect();
  const tx = e.changedTouches[0].clientX - rect.left;
  if(tx < rect.width/2) moveLeft();
  else moveRight();
  touchStartX = null;
}, {passive: true});

// Inicializácia
window.addEventListener('load', () => {
  resizeCanvas();
  loadLeaderboard();
  updateLanes();
  drawMenuBg();
  document.getElementById('overlay').classList.remove('hidden');
  document.getElementById('scrMenu').style.display = 'flex';
  document.getElementById('scrOver').style.display = 'none';
  document.getElementById('playerName').value = '';
});
</script>
</body>
