<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LISOVNA</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { width:100%; height:100%; overflow:hidden; background:#111; font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; user-select:none; -webkit-user-select:none; }

/* ДОБАВЛЕНО поле имени */
#playerName {
  padding:10px;
  font-size:16px;
  border-radius:6px;
  border:none;
  text-align:center;
}

#leaderboard {
  font-size:12px;
  color:#aaa;
  text-align:center;
}

</style>
</head>

<body>

<div id="app">

<!-- HUD и остальной твой UI оставлен как был -->

<div id="overlay">
<div id="scrMenu" style="display:flex;flex-direction:column;align-items:center;gap:14px;">

<div class="ov-title">🏭 LISOVNA</div>

<!-- ✅ ВСТАВЛЕНО -->
<input id="playerName" placeholder="Tvoje meno...">

<div id="leaderboard"></div>

<button onclick="startGame()">HRAŤ ▶</button>

</div>
</div>

<canvas id="gameCanvas"></canvas>

</div>

<script>

// ================== НОВОЕ ==================
let playerName = "Player";

const sndCatch = new Audio('https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg');
const sndBad   = new Audio('https://actions.google.com/sounds/v1/cartoon/cartoon_boing.ogg');
const sndOver  = new Audio('https://actions.google.com/sounds/v1/cartoon/concussive_hit_guitar_boing.ogg');

function playSound(s){
  s.currentTime = 0;
  s.play().catch(()=>{});
}

function saveScore(){
  const data = JSON.parse(localStorage.getItem('lisovna_scores') || '[]');

  data.push({
    name: playerName,
    score: score,
    level: level
  });

  data.sort((a,b)=>b.score-a.score);
  localStorage.setItem('lisovna_scores', JSON.stringify(data.slice(0,5)));
}

function renderLeaderboard(){
  const el = document.getElementById('leaderboard');
  const scores = JSON.parse(localStorage.getItem('lisovna_scores') || '[]');

  if(scores.length===0){
    el.innerHTML="Žiadne rekordy";
    return;
  }

  el.innerHTML="<b>🏆 TOP 5</b><br>"+scores.map((s,i)=>
    `${i+1}. ${s.name} — ${s.score}`
  ).join("<br>");
}

// ================== ТВОЙ КОД ==================
// ⬇️ ВСЁ ТВОЁ ОСТАВЛЕНО, НО С МИНИ-ПРАВКАМИ ⬇️

// в startGame ДОБАВЛЕНО:
function startGame(){
  const input = document.getElementById('playerName');
  playerName = input.value.trim() || "Player";

  // дальше твой оригинальный код без изменений
}

// В update() НАЙДИ место где ловится деталь:

// было:
if(!it.bad) score+=10*level;

// стало:
if(!it.bad){
  score+=10*level;
  playSound(sndCatch);
}

// было:
else { lives--; doFlash('#ff000088'); }

// стало:
else {
  lives--;
  playSound(sndBad);
  doFlash('#ff000088');
}

// В gameOver():

function gameOver(){
  running=false;

  playSound(sndOver);
  saveScore();

  // твой код дальше
}

// В showMenu():
function showMenu(){
  renderLeaderboard();
  // остальной твой код
}

// INIT:
window.addEventListener('load',()=>{
  renderLeaderboard();
});

</script>

</body>
</html>
