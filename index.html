<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LISOVNA - PIXEL EDITION</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#05050a;}

#app{
  width:100%;height:100%;
  display:flex;flex-direction:column;
  align-items:center;
  background:#05050a;
  position:relative;
  overflow:hidden;
}

canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;}

.pf{font-family:'Press Start 2P',monospace;}

#hud{
  width:100%;max-width:600px;
  display:flex;gap:0;
  background:#0a0a0f;
  border-bottom:4px solid #1a1a2e;
  flex-shrink:0;
  font-family:'Press Start 2P',monospace;
  font-size:clamp(8px,2vw,11px);
}
#hud .hcell{
  flex:1;padding:8px 4px;
  text-align:center;
  border-right:2px solid #1a1a2e;
}
#hud .hcell:last-child{border-right:none;}
.hv{font-size:clamp(10px,2.5vw,14px);font-weight:bold;margin-top:4px;}
#hScore .hv{color:#0ff; text-shadow: 0 0 8px #00ffffaa;}
#hLives .hv{color:#f35; text-shadow: 0 0 8px #ff3355aa;}
#hLevel .hv{color:#f0f; text-shadow: 0 0 8px #ff00ffaa;}

#gw{
  position:relative;flex:1;
  width:100%;max-width:600px;
  overflow:hidden;
  border-left: 2px solid #111;
  border-right: 2px solid #111;
}
#gc{width:100%;height:100%;}

.banner{
  position:absolute;top:0;left:0;right:0;
  font-family:'Press Start 2P',monospace;
  font-size:clamp(7px,1.8vw,10px);
  text-align:center;padding:8px 4px;
  z-index:15;display:none;
  box-shadow: 0 5px 15px rgba(0,0,0,0.5);
}
#bPredak{background:#e86820;color:#fff;}
#bNast{background:#111;color:#ff0;border-bottom:2px solid #ff0;}

#ctrl{
  width:100%;max-width:600px;
  display:flex;gap:8px;padding:12px;
  background:#0a0a0f;border-top:4px solid #1a1a2e;
  flex-shrink:0;
}
#ctrl button{
  flex:1;
  font-family:'Press Start 2P',monospace;
  font-size:24px;
  background:#161625;
  color:#0ff;
  border:3px solid #0ff;
  padding:15px 0;
  cursor:pointer;
  transition: all 0.1s;
  box-shadow: 0 4px 0 #008888;
}
#ctrl button:active,#ctrl button.held{
    background:#00ffff;
    color:#000;
    transform: translateY(4px);
    box-shadow: 0 0 0 #000;
}

#ov{
  position:absolute;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.4);
  backdrop-filter: blur(2px);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:20;
  font-family:'Press Start 2P',monospace;
}
#ov.hidden{display:none;}

#sMenu, #sOver{
  display:flex;flex-direction:column;
  align-items:center;gap:15px;
  background:rgba(5, 5, 15, 0.95);
  border:4px solid #0ff;
  padding:25px;
  max-width:360px;width:90%;
  box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
}
.mtitle{
  font-size:clamp(16px,5vw,24px);
  color:#0ff;
  text-shadow:3px 3px 0 #006666;
  text-align:center;
}
.msub{font-size:9px;color:#667;text-align:center;line-height:1.6;}

.ccards{display:flex;gap:15px;margin:10px 0;}
.ccard{
  border:3px solid #222;
  background:#0a0a1a;
  padding:10px;cursor:pointer;
  text-align:center;
  transition: 0.2s;
}
.ccard.sel{border-color:#0ff;background:#001a1a;transform: scale(1.05);}
.ccard canvas{display:block;margin:0 auto;}

.mbtn{
  font-family:'Press Start 2P',monospace;
  background:#00ff88;color:#000;
  border:none;
  padding:12px 30px;cursor:pointer;
  font-size:12px;
  box-shadow: 0 4px 0 #008844;
}
.mbtn:active{transform:translateY(4px); box-shadow: 0 0 0 #000;}
</style>
</head>
<body>
<div id="app">
  <div id="hud">
    <div class="hcell pf" id="hScore"><div style="color:#556;font-size:0.7em;">SCORE</div><div class="hv" id="hSv">0</div></div>
    <div class="hcell pf" id="hLives"><div style="color:#556;font-size:0.7em;">LIVES</div><div class="hv" id="hLv">❤❤❤</div></div>
    <div class="hcell pf" id="hLevel"><div style="color:#556;font-size:0.7em;">LEVEL</div><div class="hv" id="hLLv">1</div></div>
  </div>

  <div id="gw">
    <canvas id="gc"></canvas>
    <div class="banner" id="bPredak">⚠ PREDAK: ZVYŠUJEME VÝKON! ⚠</div>
    <div class="banner" id="bNast">▶ NASTAVOVAČ: SERVIS FORMY! ◀</div>

    <div id="ov">
      <div id="sMenu">
        <div class="mtitle">🏭 LISOVŇA</div>
        <div class="msub">MAGNA INDUSTRY SIMULATOR</div>
        <div class="ccards">
          <div class="ccard sel" id="cM" onclick="selChar('m')">
            <canvas id="pM" width="40" height="56"></canvas>
            <div class="cn" style="font-size:8px;color:#0ff;margin-top:5px;">MUŽ</div>
          </div>
          <div class="ccard" id="cF" onclick="selChar('f')">
            <canvas id="pF" width="40" height="56"></canvas>
            <div class="cn" style="font-size:8px;color:#0ff;margin-top:5px;">ŽENA</div>
          </div>
        </div>
        <button class="mbtn" onclick="startGame()">ŠTART SMENY</button>
      </div>

      <div id="sOver" style="display:none; border-color: #f35;">
        <div class="mtitle" style="color:#f35; text-shadow: 3px 3px 0 #600;">KONIEC SMENY</div>
        <canvas id="majPrev" width="60" height="90"></canvas>
        <div id="goS" style="color:#fff; font-size:12px;"></div>
        <div id="goQ" class="msub" style="color:#f99;"></div>
        <button class="mbtn" style="background:#f35; box-shadow: 0 4px 0 #800;" onclick="startGame()">SKÚSIŤ ZNOVA</button>
      </div>
    </div>
  </div>

  <div id="ctrl">
    <button id="bL" ontouchstart="sl(event)" ontouchend="el()" onmousedown="sl()" onmouseup="el()">◀</button>
    <button id="bR" ontouchstart="sr(event)" ontouchend="er()" onmousedown="sr()" onmouseup="er()">▶</button>
  </div>
</div>

<script>
const gc = document.getElementById('gc');
const ctx = gc.getContext('2d');
ctx.imageSmoothingEnabled = false;

let GW=400, GH=300;
const PSCALE = 3;

// Цветовая палитра в стиле Pixel Car Racer
const P = {
  bg: '#05050a',
  floor: '#0a0a14',
  floorLine: '#151525',
  reflection: 'rgba(255, 255, 255, 0.15)',
  engGr: '#2d5a1e',
  engHighlight: '#4a9a20',
  neonG: '#00ff88',
  neonB: '#00ffff'
};

function resize(){
  const wrap = document.getElementById('gw');
  GW = wrap.clientWidth;
  GH = wrap.clientHeight;
  gc.width = GW;
  gc.height = GH;
}
window.addEventListener('resize', resize);
resize();

// Вспомогательная функция для рисования пикселей
function px(c,x,y,w,h,col){ c.fillStyle=col; c.fillRect(Math.round(x),Math.round(y),w,h); }

function drawBg(){
  // Градиентный фон цеха
  for(let i=0; i<10; i++){
    px(ctx, 0, (GH*0.45/10)*i, GW, GH*0.45/10 + 1, `rgb(5, 5, ${15+i*2})`);
  }
  
  // Дальняя стена (панели)
  px(ctx, 0, GH*0.2, GW, 4, '#111120');
  
  // Пол с эффектом глянца
  px(ctx, 0, GH*0.45, GW, GH*0.55, P.floor);
  for(let i=0; i<GH*0.55; i+=10){
    px(ctx, 0, GH*0.45 + i, GW, 1, P.floorLine);
  }
}

// РИСОВАНИЕ С ОТРАЖЕНИЕМ (Главная фишка Pixel Car Racer)
function drawWithReflection(c, x, y, w, h, drawFn) {
    c.save();
    // Отражение
    c.save();
    c.translate(0, y + h * 2 - 4); 
    c.scale(1, -0.4); // Сплюснутое по вертикали
    c.globalAlpha = 0.2;
    drawFn(c, x, 0, true); 
    c.restore();
    // Оригинал
    drawFn(c, x, y, false);
    c.restore();
}

function drawMachine(c, x, y, w, h, active) {
    const gh = Math.floor(h*0.85);
    const gy = y + h - gh;

    // Корпус станка (Engel)
    px(c, x, gy, w, gh, '#1a3310'); // Тень
    px(c, x+2, gy, w-4, gh-4, P.engGr); // Основной цвет
    px(c, x+2, gy, w-4, 4, P.engHighlight); // Свет сверху
    
    // Экран
    px(c, x+w-20, gy+10, 15, 20, '#111');
    if(active && Math.floor(gframe/10)%2==0) {
        ctx.shadowBlur = 10;
        ctx.shadowColor = P.neonG;
        px(c, x+w-18, gy+12, 11, 5, P.neonG);
        ctx.shadowBlur = 0;
    }

    // Конвейер
    const beltY = gy+gh-12;
    px(c, x-5, beltY, w+10, 8, '#222');
    for(let i=0; i<w; i+=15) {
        px(c, x-5 + ((i+gframe)%w), beltY+2, 8, 2, '#333');
    }
}

function pixChar(c, x, y, gender, frame) {
    const s = PSCALE;
    const bob = Math.floor(Math.sin(frame*0.2)*2);
    const cy = y + bob;
    
    const skin = gender === 'm' ? '#e8b87a' : '#ecc090';
    const hair = gender === 'm' ? '#1a0e06' : '#7a3008';

    // Ноги
    px(c, x+s, cy+10*s, 3*s, 5*s, '#223344');
    px(c, x+5*s, cy+10*s, 3*s, 5*s, '#223344');
    // Туловище
    px(c, x, cy+5*s, 9*s, 6*s, '#333');
    // Голова
    px(c, x+s, cy, 7*s, 5*s, skin);
    px(c, x+s, cy, 7*s, 2*s, hair);
    // Глаза
    px(c, x+2*s, cy+2*s, s, s, '#000');
    px(c, x+5*s, cy+2*s, s, s, '#000');
}

// --- ЛОГИКА ИГРЫ (Упрощенная и стабильная) ---
let running=false, score=0, lives=3, level=1, gframe=0;
let player = { lane: 0, x: 50, targetX: 50 };
let selectedChar = 'm';
let parts = [];
let numLanes = 3;
let laneWidth = 0;

function startGame() {
    score=0; lives=3; level=1; running=true;
    parts = [];
    document.getElementById('ov').classList.add('hidden');
    updateHUD();
    loop();
}

function updateHUD() {
    document.getElementById('hSv').textContent = score;
    document.getElementById('hLv').textContent = '❤'.repeat(lives);
    document.getElementById('hLLv').textContent = level;
}

function loop() {
    if(!running) return;
    gframe++;
    update();
    draw();
    requestAnimationFrame(loop);
}

function update() {
    laneWidth = GW / numLanes;
    player.targetX = player.lane * laneWidth + (laneWidth/2) - (9*PSCALE/2);
    player.x += (player.targetX - player.x) * 0.2;

    if(gframe % Math.max(20, 60 - level*5) == 0) {
        parts.push({ 
            lane: Math.floor(Math.random()*numLanes), 
            y: GH*0.35, 
            bad: Math.random() > 0.8,
            speed: 2 + level*0.5
        });
    }

    for(let i=parts.length-1; i>=0; i--) {
        parts[i].y += parts[i].speed;
        
        // Проверка столкновения
        if(parts[i].y > GH*0.75 && parts[i].y < GH*0.85 && parts[i].lane === player.lane) {
            if(parts[i].bad) { lives--; updateHUD(); }
            else { score += 10; updateHUD(); }
            parts.splice(i, 1);
            if(lives <= 0) gameOver();
        } else if(parts[i].y > GH) {
            if(!parts[i].bad) { lives--; updateHUD(); if(lives<=0) gameOver(); }
            parts.splice(i, 1);
        }
    }
    
    if(score > level*100) level++;
}

function gameOver() {
    running = false;
    document.getElementById('ov').classList.remove('hidden');
    document.getElementById('sMenu').style.display = 'none';
    document.getElementById('sOver').style.display = 'flex';
    document.getElementById('goS').textContent = "SCORE: " + score;
}

function draw() {
    ctx.clearRect(0,0,GW,GH);
    drawBg();

    // Станки
    for(let i=0; i<numLanes; i++) {
        drawMachine(ctx, i*laneWidth + 10, GH*0.2, laneWidth-20, GH*0.3, player.lane === i);
    }

    // Детали
    parts.forEach(p => {
        const px_val = p.lane * laneWidth + laneWidth/2 - 10;
        px(ctx, px_val, p.y, 20, 15, p.bad ? '#f35' : '#0ff');
        // Свечение деталей
        ctx.shadowBlur = 8;
        ctx.shadowColor = p.bad ? '#f35' : '#0ff';
        px(ctx, px_val+5, p.y+5, 10, 5, '#fff');
        ctx.shadowBlur = 0;
    });

    // Игрок с отражением
    drawWithReflection(ctx, player.x, GH*0.7, 9*PSCALE, 16*PSCALE, (c, x, y) => {
        pixChar(c, x, y, selectedChar, gframe);
    });

    // Эффект старого монитора (Scanlines)
    ctx.globalAlpha = 0.05;
    for(let i=0; i<GH; i+=4) px(ctx, 0, i, GW, 2, '#fff');
    ctx.globalAlpha = 1.0;
}

// Управление
function selChar(g) {
    selectedChar = g;
    document.getElementById('cM').classList.toggle('sel', g==='m');
    document.getElementById('cF').classList.toggle('sel', g==='f');
}

function sl(e) { if(e) e.preventDefault(); if(player.lane > 0) player.lane--; }
function sr(e) { if(e) e.preventDefault(); if(player.lane < numLanes-1) player.lane++; }

document.addEventListener('keydown', e => {
    if(e.key === 'ArrowLeft') sl();
    if(e.key === 'ArrowRight') sr();
});

// Превью персонажей в меню
function drawPreviews() {
    const pM = document.getElementById('pM').getContext('2d');
    const pF = document.getElementById('pF').getContext('2d');
    pixChar(pM, 5, 5, 'm', 0);
    pixChar(pF, 5, 5, 'f', 0);
}
drawPreviews();
drawBg();
</script>
</body>
</html>
