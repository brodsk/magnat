<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MAGNA — Triedenie dielov</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap');
:root{
  --g:#00ff88;--r:#ff3344;--y:#ffcc00;
  --dk:#0a0e14;--pn:#111820;--bd:#1e3a4a;--bt:#2d7a4a;
  --cw:clamp(130px,34vw,230px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;touch-action:none}
body{background:var(--dk);font-family:'Share Tech Mono',monospace;color:#cde;display:flex;flex-direction:column}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 4px);pointer-events:none;z-index:998}

/* ── HEADER ── */
header{background:var(--pn);border-bottom:2px solid var(--bd);display:flex;align-items:center;justify-content:space-between;padding:5px 10px;flex-shrink:0;gap:6px}
.logo{font-family:'Orbitron',monospace;font-weight:900;font-size:clamp(.58rem,2.3vw,.88rem);color:#fff;letter-spacing:2px;white-space:nowrap}
.logo span{color:var(--y)}
.hud{display:flex;gap:clamp(4px,1.6vw,12px);align-items:center}
.hi{display:flex;flex-direction:column;align-items:center;gap:1px}
.hl{font-size:clamp(.34rem,.72vw,.47rem);color:#789;letter-spacing:1px;text-transform:uppercase}
.hv{font-family:'Orbitron',monospace;font-size:clamp(.7rem,1.85vw,.9rem);font-weight:700;color:var(--g)}
.hv.r{color:var(--r)}.hv.y{color:var(--y)}
#btnPause{background:none;border:2px solid var(--bd);border-radius:5px;color:#cde;font-family:'Orbitron',monospace;font-weight:700;font-size:clamp(.55rem,1.8vw,.8rem);padding:4px 9px;cursor:pointer;letter-spacing:1px;flex-shrink:0;white-space:nowrap;transition:border-color .15s,color .15s}
#btnPause:active{border-color:var(--y);color:var(--y)}

/* ── GAME AREA ── */
#gw{position:relative;flex:1;overflow:hidden}
#tb-w{position:absolute;top:0;left:0;right:0;height:4px;background:#1a2a35;z-index:20}
#tb{height:100%;background:var(--g);transition:width .1s linear,background .3s}

/* ── КОНВЕЙЕР ── */
#conv{
  position:absolute;left:50%;transform:translateX(-50%);
  width:var(--cw);top:4px;bottom:100px;
  background:var(--bt);
  border-left:5px solid #1a5530;border-right:5px solid #1a5530;
  overflow:hidden;z-index:10;
}
.belt-stripe{position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 10px,rgba(0,0,0,.15) 10px,rgba(0,0,0,.15) 20px);animation:belt .8s linear infinite}
@keyframes belt{to{background-position:40px 0}}
#conv-lbl{position:absolute;top:8px;left:50%;transform:translateX(-50%);font-family:'Orbitron',monospace;font-size:clamp(.3rem,.62vw,.42rem);color:var(--y);letter-spacing:1px;z-index:5;white-space:nowrap;pointer-events:none}

/* ── БОКСЫ ── */
.box{
  position:absolute;top:4px;bottom:100px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
  border:3px solid var(--g);
  background:rgba(0,255,136,.06);color:var(--g);
  cursor:pointer;z-index:5;
  -webkit-user-select:none;user-select:none;
  transition:background .12s,box-shadow .15s;
}
.box:active{background:rgba(0,255,136,.22)}
#box-L{left:0;right:calc(50% + var(--cw)/2 + 5px);border-left:none}
#box-R{right:0;left:calc(50% + var(--cw)/2 + 5px);border-right:none}
.box-icon{font-size:clamp(1.3rem,4.5vw,2.2rem);line-height:1}
.box-lbl{font-family:'Orbitron',monospace;font-size:clamp(.34rem,1.1vw,.5rem);font-weight:700;letter-spacing:.5px;text-align:center;line-height:1.5}
.box-cnt{font-family:'Orbitron',monospace;font-size:clamp(1rem,3.8vw,1.7rem);font-weight:900}
.box-hint{font-size:clamp(.26rem,.6vw,.38rem);color:rgba(255,255,255,.22);letter-spacing:.5px;text-align:center}

/* ── БЕДНИЧКА ── */
#trash{
  position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:var(--cw);height:96px;
  background:rgba(160,10,20,.18);border:3px solid var(--r);border-bottom:none;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  color:var(--r);cursor:pointer;z-index:11;
  -webkit-user-select:none;user-select:none;
  transition:background .12s,box-shadow .15s;
}
#trash:active{background:rgba(255,30,50,.35)}
.t-icon{font-size:clamp(1.2rem,4vw,1.9rem);line-height:1}
.t-lbl{font-family:'Orbitron',monospace;font-size:clamp(.38rem,1.1vw,.53rem);font-weight:700;letter-spacing:1px}
.t-cnt{font-family:'Orbitron',monospace;font-size:clamp(.82rem,2.8vw,1.1rem);font-weight:900}

/* ── ДЕТАЛИ ── */
.part{position:absolute;touch-action:none;-webkit-user-select:none;user-select:none;z-index:30;width:clamp(40px,10.5vw,65px);height:clamp(35px,9.5vw,55px)}
.part svg{width:100%;height:100%}
.pL{left:6%}.pR{right:6%}
.defect-badge{position:absolute;top:-9px;left:50%;transform:translateX(-50%);background:var(--r);color:#fff;font-size:clamp(.27rem,.58vw,.39rem);font-family:'Orbitron',monospace;padding:2px 5px;border-radius:3px;font-weight:700;animation:blink .55s ease-in-out infinite;white-space:nowrap}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.side-tag{position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);font-family:'Orbitron',monospace;font-size:clamp(.25rem,.52vw,.35rem);background:rgba(0,0,0,.75);color:var(--y);padding:1px 4px;border-radius:2px;white-space:nowrap}

/* ── FLASH ── */
#flash{position:fixed;top:36%;left:50%;transform:translate(-50%,-50%) scale(0);font-family:'Orbitron',monospace;font-size:clamp(.8rem,3.2vw,1.22rem);font-weight:900;padding:10px 18px;border-radius:6px;z-index:500;pointer-events:none;transition:transform .1s,opacity .28s;opacity:0;text-align:center;max-width:85vw}
#flash.show{transform:translate(-50%,-50%) scale(1);opacity:1}
#flash.good{background:var(--g);color:#000}
#flash.wrong{background:var(--y);color:#000}
#flash.bad{background:var(--r);color:#fff}

/* ── ОВЕРЛЕИ ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:900;gap:14px;backdrop-filter:blur(8px);padding:22px;text-align:center}
.overlay.active{display:flex}
.ov-sub{font-size:.56rem;letter-spacing:4px;color:#567;text-transform:uppercase}
.ov-h1{font-family:'Orbitron',monospace;font-size:clamp(1.15rem,4.8vw,1.9rem);font-weight:900;color:var(--y);letter-spacing:3px}
.grade{font-family:'Orbitron',monospace;font-size:clamp(3rem,12vw,5rem);font-weight:900;line-height:1}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px 18px;width:100%;max-width:270px}
.sv{font-family:'Orbitron',monospace;font-size:clamp(1.05rem,4.2vw,1.65rem);font-weight:700}
.sl{font-size:.52rem;letter-spacing:2px;color:#789}
.ov-sep{width:100%;height:1px;background:var(--bd);max-width:250px}

/* Кнопки оверлея */
.ov-btn{font-family:'Orbitron',monospace;font-size:clamp(.68rem,2.3vw,.85rem);font-weight:700;letter-spacing:2px;padding:13px 34px;border:none;border-radius:4px;cursor:pointer;min-width:175px;-webkit-user-select:none;user-select:none;transition:transform .1s,box-shadow .1s}
.ov-btn:active{transform:scale(.95)}
.btn-g{background:var(--g);color:#000}
.btn-r{background:var(--r);color:#fff}
.btn-d{background:#1e2e3e;color:#cde;border:2px solid var(--bd)}
.btn-g:active{box-shadow:0 0 20px rgba(0,255,136,.4)}
.btn-r:active{box-shadow:0 0 20px rgba(255,51,68,.4)}

/* Переключатель звука */
.sound-row{display:flex;align-items:center;gap:14px;font-size:.62rem;letter-spacing:1px;color:#789;cursor:pointer;padding:4px 0}
.toggle{width:42px;height:24px;background:#1a2a35;border:2px solid var(--bd);border-radius:12px;position:relative;transition:background .22s;flex-shrink:0}
.toggle.on{background:var(--g)}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:14px;height:14px;border-radius:50%;background:#fff;transition:left .22s}
.toggle.on::after{left:21px}

/* Шкала уровня на паузе */
.level-row{display:flex;align-items:center;gap:10px;font-size:.58rem;color:#567;letter-spacing:1px}
.level-dots{display:flex;gap:4px}
.ld{width:10px;height:10px;border-radius:50%;background:#1e2e3e;border:1px solid var(--bd);transition:background .2s}
.ld.on{background:var(--y);border-color:var(--y)}
</style>
</head>
<body>

<header>
  <div class="logo">▲ <span>MAGNA</span></div>
  <div class="hud">
    <div class="hi"><div class="hl">Skóre</div><div class="hv" id="hScore">0</div></div>
    <div class="hi"><div class="hl">Dobré</div><div class="hv" id="hGood">0</div></div>
    <div class="hi"><div class="hl">Zmätky</div><div class="hv r" id="hTrash">0</div></div>
    <div class="hi"><div class="hl">Chyby</div><div class="hv r" id="hErr">0</div></div>
    <div class="hi"><div class="hl">Životy</div><div class="hv r" id="hLives">❤❤❤</div></div>
    <div class="hi"><div class="hl">Čas</div><div class="hv y" id="hTime">60</div></div>
  </div>
  <button id="btnPause" onclick="togglePause()">⏸ PAUZA</button>
</header>

<div id="gw">
  <div id="tb-w"><div id="tb" style="width:100%"></div></div>

  <div id="box-L" class="box" onclick="sendGood('L')">
    <div class="box-icon">📦</div>
    <div class="box-lbl">ĽAVÁ<br>STRANA</div>
    <div class="box-cnt" id="cntGL">0</div>
    <div class="box-hint">← tap / A</div>
  </div>

  <div id="box-R" class="box" onclick="sendGood('R')">
    <div class="box-icon">📦</div>
    <div class="box-lbl">PRAVÁ<br>STRANA</div>
    <div class="box-cnt" id="cntGR">0</div>
    <div class="box-hint">tap / D →</div>
  </div>

  <div id="conv">
    <div class="belt-stripe"></div>
    <div id="conv-lbl">▼ DOPRAVNÍK ▼</div>
  </div>

  <div id="trash" onclick="sendTrash()">
    <div class="t-icon">🗑</div>
    <div class="t-lbl">KOŠ NA ZMÄTKY</div>
    <div class="t-cnt" id="cntT">0</div>
  </div>
</div>

<div id="flash"></div>

<!-- ══ МЕНЮ ПАУЗЫ ══ -->
<div class="overlay" id="ovPause">
  <div class="ov-sub">Hra pozastavená</div>
  <div class="ov-h1">⏸ PAUZA</div>
  <div class="ov-sep"></div>

  <!-- Уровень скорости -->
  <div class="level-row">
    RÝCHLOSŤ
    <div class="level-dots" id="levelDots">
      <div class="ld" id="ld1"></div>
      <div class="ld" id="ld2"></div>
      <div class="ld" id="ld3"></div>
      <div class="ld" id="ld4"></div>
      <div class="ld" id="ld5"></div>
    </div>
  </div>

  <!-- Переключатель звука -->
  <div class="sound-row" onclick="toggleSound()">
    🔊 Zvukové efekty
    <div class="toggle on" id="sndToggle"></div>
  </div>

  <div class="ov-sep"></div>
  <button class="ov-btn btn-g" onclick="togglePause()">▶ POKRAČOVAŤ</button>
  <button class="ov-btn btn-r" onclick="restartFromPause()">↺ REŠTARTOVAŤ</button>
</div>

<!-- ══ ИТОГОВЫЙ ЭКРАН ══ -->
<div class="overlay" id="ovEnd">
  <div class="ov-sub">Zmena skončila</div>
  <div class="ov-h1">SPRÁVA ZMENY</div>
  <div class="grade" id="gradeEl">–</div>
  <div class="stats">
    <div><div class="sv" id="fScore" style="color:var(--g)">0</div><div class="sl">SKÓRE</div></div>
    <div><div class="sv" id="fGood"  style="color:var(--g)">0</div><div class="sl">DOBRÝCH</div></div>
    <div><div class="sv" id="fTrash" style="color:var(--r)">0</div><div class="sl">ZMÄTKOV</div></div>
    <div><div class="sv" id="fAcc"   style="color:var(--y)">0%</div><div class="sl">PRESNOSŤ</div></div>
  </div>
  <button class="ov-btn btn-g" onclick="startGame()">▶ NOVÁ ZMENA</button>
</div>

<script>
// ══════════════════════════════════════════════════════
// AUDIO ENGINE — Web Audio API, без внешних файлов
// ══════════════════════════════════════════════════════
const AC = new (window.AudioContext || window.webkitAudioContext)();
let soundOn = true;

function acResume(){ if(AC.state==='suspended') AC.resume(); }

function tone(freq, dur, type='sine', vol=.15, slide=0){
  if(!soundOn) return;
  acResume();
  const o=AC.createOscillator(), g=AC.createGain();
  o.connect(g); g.connect(AC.destination);
  o.type=type;
  o.frequency.setValueAtTime(freq, AC.currentTime);
  if(slide) o.frequency.linearRampToValueAtTime(slide, AC.currentTime+dur);
  g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(.0001, AC.currentTime+dur);
  o.start(); o.stop(AC.currentTime+dur+.01);
}

function seq(notes, gap=55){ notes.forEach(([f,d,t,v,s],i)=>setTimeout(()=>tone(f,d,t,v,s),i*gap)); }

// Звуки
const SFX = {
  good:    ()=>{ tone(520,.06,'sine',.13); setTimeout(()=>tone(800,.09,'sine',.13),70); },
  combo:   ()=>seq([[440,.1,'sine',.16],[550,.1,'sine',.16],[700,.1,'sine',.16],[900,.15,'sine',.18]],55),
  error:   ()=>{ tone(200,.15,'sawtooth',.2); setTimeout(()=>tone(140,.2,'sawtooth',.15),90); },
  miss:    ()=>tone(180,.35,'sawtooth',.18,80),
  trash:   ()=>{ tone(350,.05,'square',.1); setTimeout(()=>tone(220,.1,'sawtooth',.12),55); },
  levelup: ()=>seq([[330,.08,'sine',.13],[440,.08,'sine',.13],[560,.08,'sine',.13],[700,.12,'sine',.15]],48),
  pause:   ()=>{ tone(400,.08,'sine',.1); setTimeout(()=>tone(300,.1,'sine',.08),100); },
  resume:  ()=>{ tone(300,.07,'sine',.09); setTimeout(()=>tone(450,.09,'sine',.12),90); },
  end:     ()=>seq([[600,.12,'sine',.15],[500,.12,'sine',.15],[380,.12,'sine',.15],[260,.18,'sine',.13],[180,.25,'sine',.12]],75),
  click:   ()=>tone(650,.04,'sine',.07),
};

function play(name){ SFX[name]?.(); }

function toggleSound(){
  soundOn=!soundOn;
  acResume();
  document.getElementById('sndToggle').classList.toggle('on',soundOn);
  if(soundOn) tone(500,.08,'sine',.1);
}

// ══════════════════════════════════════════════════════
// СТЕЙТ
// ══════════════════════════════════════════════════════
let score=0,cntGL=0,cntGR=0,cntT=0,errors=0;
let lives=3,timeLeft=60,timerInt=null;
let gameActive=false,paused=false,combo=0,level=1;
// Детали хранятся в объекте parts
const parts={L:null,R:null};

const DEFECTS=['TRHLINA','ODLOMENIE','DEFORMÁCIA','ZNEČISTENIE','OTREPA'];
const OVL={
  TRHLINA:    `<path d="M32 25L38 35L34 38L40 50" stroke="#ff3344" stroke-width="1.5" fill="none" opacity=".85"/>`,
  ZNEČISTENIE:`<ellipse cx="50" cy="40" rx="9" ry="5" fill="rgba(140,70,15,.6)"/>`,
  DEFORMÁCIA: `<path d="M55 30Q63 38 58 46" stroke="#888" stroke-width="2.5" fill="none" stroke-linecap="round"/>`,
  OTREPA:     `<path d="M70 34L76 26L73 37L79 30L74 43" stroke="#f60" stroke-width="1.2" fill="none"/>`,
  ODLOMENIE:  `<polygon points="22,51 29,41 19,39" fill="#181818" stroke="#666" stroke-width=".5"/>`
};

// ══════════════════════════════════════════════════════
// ГЕНЕРАЦИЯ ДЕТАЛЕЙ
// ══════════════════════════════════════════════════════
function mkData(side){
  const bad=Math.random()<(.28+level*.03);
  return{ side, bad,
    defect:bad?DEFECTS[Math.random()*DEFECTS.length|0]:null,
    tilt:(Math.random()-.5)*14,
    shade:bad?`hsl(${Math.random()>.5?'0,10%,15%':'30,20%,12%'})`:'hsl(220,5%,10%)'
  };
}

function mkEl(d){
  const el=document.createElement('div');
  el.className='part p'+d.side;
  el.style.cssText=`top:-80px;transform:rotate(${d.tilt}deg)`;
  el.innerHTML=`<svg viewBox="0 0 100 80" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="50" cy="75" rx="38" ry="5" fill="rgba(0,0,0,.4)"/>
    <path d="M15 55Q10 40 20 28Q30 15 50 12Q70 15 80 28Q90 40 85 55Q75 65 50 68Q25 65 15 55Z" fill="${d.shade}" stroke="#333" stroke-width="1"/>
    <path d="M30 20Q50 14 68 22Q55 18 40 20Z" fill="rgba(255,255,255,.08)"/>
    <ellipse cx="42" cy="28" rx="14" ry="7" fill="rgba(255,255,255,.05)" transform="rotate(-15,42,28)"/>
    <circle cx="50" cy="42" r="6" fill="#050505" stroke="#222" stroke-width="1"/>
    <circle cx="50" cy="42" r="3" fill="#111" stroke="#333" stroke-width=".5"/>
    ${d.bad?(OVL[d.defect]||''):'<path d="M25 38Q35 30 45 34" stroke="rgba(100,180,255,.18)" stroke-width="2" fill="none"/>'}
  </svg>`;
  if(d.bad){ const b=document.createElement('div'); b.className='defect-badge'; b.textContent=d.defect; el.appendChild(b); }
  const t=document.createElement('div'); t.className='side-tag'; t.textContent=d.side==='L'?'ĽAVÁ':'PRAVÁ'; el.appendChild(t);
  return el;
}

// ══════════════════════════════════════════════════════
// СПАВН И ДВИЖЕНИЕ
// ══════════════════════════════════════════════════════
function spawnPart(side){
  const p=parts[side];
  if(p){ clearTimeout(p.mt); p.el.remove(); parts[side]=null; }

  const data=mkData(side);
  const el=mkEl(data);
  document.getElementById('conv').appendChild(el);

  const dur=Math.max(600,2800-level*220);
  const targetY=document.getElementById('conv').offsetHeight-40;

  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    el.style.transition=`top ${dur}ms linear`;
    el.style.top=targetY+'px';
  }));

  const mt=setTimeout(()=>{
    if(parts[side]?.el===el && el.parentNode){
      parts[side]=null; el.remove();
      if(data.bad){
        // Бракованная деталь упала в бедничку сама — зачёт!
        combo++;
        const pts=10+(combo>2?combo>>1:0);
        score+=pts; cntT++;
        if(combo>2){ play('combo'); flash(`KOMBINÁCIA ×${combo}! +${pts}`,'good'); }
        else        { play('trash'); flash('✓ ZMÄTOK DO KOŠA! +'+pts,'good'); }
        glowEl('trash',true);
        updateHUD();
      } else {
        // Годная деталь пропущена — штраф
        penalize('DIEL PREŠIEL!');
      }
      if(gameActive&&!paused) setTimeout(()=>spawnPart(side),300);
    }
  }, dur+150);

  parts[side]={el,data,mt};
  attachSwipe(el,data,side);
}

function attachSwipe(el,data,side){
  let sx=0,sy=0;
  el.addEventListener('touchstart',e=>{
    const t=e.touches[0]; sx=t.clientX; sy=t.clientY;
  },{passive:true});
  el.addEventListener('touchmove',e=>{
    const t=e.touches[0],dx=t.clientX-sx,dy=t.clientY-sy;
    el.style.transform=`translateX(${dx*.4}px) translateY(${Math.max(0,dy*.3)}px) rotate(${data.tilt+dx*.03}deg)`;
  },{passive:true});
  el.addEventListener('touchend',e=>{
    const t=e.changedTouches[0],dx=t.clientX-sx,dy=t.clientY-sy;
    el.style.transform=`rotate(${data.tilt}deg)`;
    // Свайп вниз — только для брака (ускорить падение в бедничку)
    if(dy>50&&Math.abs(dx)<80){ if(data.bad) doAction(side,'trash'); return; }
    if(Math.abs(dx)>50&&Math.abs(dy)<90) doAction(dx<0?'L':'R','good');
  },{passive:true});
}

// ══════════════════════════════════════════════════════
// ЛОГИКА СОРТИРОВКИ
// ══════════════════════════════════════════════════════
function sendGood(side){ if(gameActive&&!paused){ acResume(); doAction(side,'good'); } }

function sendTrash(){
  if(!gameActive||paused) return;
  acResume();
  const {L,R}=parts;
  // Найти бракованную деталь, которая ближе к низу
  let side=null;
  const candidates=[];
  if(L?.data.bad) candidates.push({side:'L',y:parseInt(L.el.style.top)||0});
  if(R?.data.bad) candidates.push({side:'R',y:parseInt(R.el.style.top)||0});
  if(candidates.length) side=candidates.sort((a,b)=>b.y-a.y)[0].side;
  if(side) doAction(side,'trash');
}

function doAction(side,choice){
  if(!gameActive||paused) return;
  const p=parts[side]; if(!p) return;
  // Не давать отправить годную деталь в бедничку через кнопку
  if(choice==='trash'&&!p.data.bad) return;
  clearTimeout(p.mt);
  const d=p.data;
  p.el.remove(); parts[side]=null;

  const correct=(!d.bad&&choice==='good')||(d.bad&&choice==='trash');

  if(correct){
    combo++;
    const pts=10+(combo>2?combo>>1:0);
    score+=pts;
    if(choice==='good') d.side==='L'?cntGL++:cntGR++;
    else cntT++;
    if(combo>2){ play('combo'); flash(`KOMBINÁCIA ×${combo}! +${pts}`,'good'); }
    else        { play(choice==='trash'?'trash':'good'); flash(`✓ ${d.bad?'ZMÄTOK':'DOBRÝ'}! +${pts}`,'good'); }
    glowEl(choice==='good'?'box-'+side:'trash',true);
  } else {
    combo=0; errors++; lives--;
    score=Math.max(0,score-5);
    play('error');
    flash(`✗ CHYBA! ${d.bad?'TO JE ZMÄTOK':'DIEL JE DOBRÝ'}`,'wrong');
    glowEl(choice==='good'?'box-'+side:'trash',false);
    updateLives();
    if(lives<=0){ endGame(); return; }
  }
  updateHUD();
  if(gameActive&&!paused) setTimeout(()=>spawnPart(side),150);
}

function penalize(msg){
  if(!gameActive) return;
  combo=0; lives--; errors++;
  play('miss');
  flash('⚠ '+msg,'bad');
  updateLives();
  if(lives<=0) endGame(); else updateHUD();
}

// ══════════════════════════════════════════════════════
// ПАУЗА
// ══════════════════════════════════════════════════════
function togglePause(){
  if(!gameActive) return;
  acResume();
  paused=!paused;
  document.getElementById('ovPause').classList.toggle('active',paused);
  document.getElementById('btnPause').textContent=paused?'▶ ĎALEJ':'⏸ PAUZA';

  if(paused){
    play('pause');
    clearInterval(timerInt);
    // Заморозить детали — зафиксировать текущую позицию
    Object.values(parts).forEach(p=>{
      if(!p) return;
      const cur=parseInt(p.el.style.top)||0;
      clearTimeout(p.mt);
      p.el.style.transition='none';
      p.el.style.top=cur+'px';
      p._frozen=cur;
    });
    updateLevelDots();
  } else {
    play('resume');
    startTimer();
    // Возобновить движение деталей с текущей позиции
    ['L','R'].forEach(side=>{
      const p=parts[side];
      if(!p){ setTimeout(()=>spawnPart(side),200); return; }
      const convH=document.getElementById('conv').offsetHeight;
      const targetY=convH-40;
      const remaining=targetY-(p._frozen||0);
      const totalDur=2800-level*220;
      const dur=Math.max(200, remaining/convH*totalDur);
      p.el.style.transition=`top ${dur}ms linear`;
      p.el.style.top=targetY+'px';
      const mt=setTimeout(()=>{
        if(parts[side]?.el===p.el&&p.el.parentNode){
          parts[side]=null; p.el.remove();
          if(p.data.bad){
            combo++;
            const pts=10+(combo>2?combo>>1:0);
            score+=pts; cntT++;
            if(combo>2){ play('combo'); flash(`KOMBINÁCIA ×${combo}! +${pts}`,'good'); }
            else        { play('trash'); flash('✓ ZMÄTOK DO KOŠA! +'+pts,'good'); }
            glowEl('trash',true);
            updateHUD();
          } else {
            penalize('DIEL PREŠIEL!');
          }
          if(gameActive&&!paused) setTimeout(()=>spawnPart(side),300);
        }
      },dur+150);
      p.mt=mt;
    });
  }
}

function restartFromPause(){
  play('click');
  startGame();
}

function updateLevelDots(){
  for(let i=1;i<=5;i++)
    document.getElementById('ld'+i).classList.toggle('on',i<=level);
}

// ══════════════════════════════════════════════════════
// UI HELPERS
// ══════════════════════════════════════════════════════
function flash(msg,type){
  const f=document.getElementById('flash');
  f.textContent=msg; f.className=type+' show';
  clearTimeout(f._t); f._t=setTimeout(()=>f.className='',800);
}
function glowEl(id,ok){
  const el=document.getElementById(id); if(!el) return;
  el.style.boxShadow=ok?'0 0 28px rgba(0,255,136,.65)':'0 0 28px rgba(255,51,68,.65)';
  setTimeout(()=>el.style.boxShadow='',350);
}
function updateHUD(){
  document.getElementById('hScore').textContent=score;
  document.getElementById('hGood').textContent=cntGL+cntGR;
  document.getElementById('hTrash').textContent=cntT;
  document.getElementById('hErr').textContent=errors;
  document.getElementById('cntGL').textContent=cntGL;
  document.getElementById('cntGR').textContent=cntGR;
  document.getElementById('cntT').textContent=cntT;
}
function updateLives(){
  document.getElementById('hLives').textContent=['','❤','❤❤','❤❤❤'][Math.max(0,lives)];
}

// ══════════════════════════════════════════════════════
// ТАЙМЕР
// ══════════════════════════════════════════════════════
function startTimer(){
  clearInterval(timerInt);
  const bar=document.getElementById('tb');
  timerInt=setInterval(()=>{
    if(paused) return;
    timeLeft--;
    document.getElementById('hTime').textContent=timeLeft;
    bar.style.width=(timeLeft/60*100)+'%';
    bar.style.background=timeLeft<15?'var(--r)':timeLeft<30?'var(--y)':'var(--g)';
    if(timeLeft%15===0&&timeLeft>0){
      level=Math.min(level+1,5);
      play('levelup');
      flash('⚡ RÝCHLOSŤ +1','good');
    }
    if(timeLeft<=0) endGame();
  },1000);
}

// ══════════════════════════════════════════════════════
// СТАРТ / КОНЕЦ
// ══════════════════════════════════════════════════════
function killParts(){
  ['L','R'].forEach(side=>{
    const p=parts[side];
    if(p){ clearTimeout(p.mt); p.el.remove(); parts[side]=null; }
  });
}

function startGame(){
  acResume();
  score=cntGL=cntGR=cntT=errors=combo=0;
  lives=3; timeLeft=60; level=1; gameActive=true; paused=false;
  clearInterval(timerInt); killParts();
  document.getElementById('ovPause').classList.remove('active');
  document.getElementById('ovEnd').classList.remove('active');
  document.getElementById('btnPause').textContent='⏸ PAUZA';
  document.getElementById('tb').style.background='var(--g)';
  updateHUD(); updateLives();
  startTimer();
  spawnPart('L');
  setTimeout(()=>spawnPart('R'),500);
}

function endGame(){
  gameActive=false; paused=false;
  clearInterval(timerInt); killParts();
  play('end');
  const total=cntGL+cntGR+cntT+errors;
  const acc=total>0?Math.max(0,Math.round((cntGL+cntGR+cntT-errors)/total*100)):0;
  const grade=acc>=95?'S':acc>=80?'A':acc>=65?'B':acc>=50?'C':'F';
  const gc={S:'#ffcc00',A:'#00ff88',B:'#00aaff',C:'#ffaa00',F:'#ff3344'};
  document.getElementById('fScore').textContent=score;
  document.getElementById('fGood').textContent=cntGL+cntGR;
  document.getElementById('fTrash').textContent=cntT;
  document.getElementById('fAcc').textContent=acc+'%';
  const g=document.getElementById('gradeEl');
  g.textContent=grade; g.style.color=gc[grade];
  document.getElementById('ovEnd').classList.add('active');
}

// ══════════════════════════════════════════════════════
// КЛАВИАТУРА
// ══════════════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'||e.key.toLowerCase()==='p'){ togglePause(); return; }
  if(!gameActive||paused) return;
  switch(e.key){
    case 'ArrowLeft': case 'a': case 'A': sendGood('L'); break;
    case 'ArrowRight':case 'd': case 'D': sendGood('R'); break;
    case 'ArrowDown': case 's': case 'S': sendTrash(); break;
  }
});

startGame();
</script>
