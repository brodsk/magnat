<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LISOVNA PCR FULL+</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
body{margin:0;background:#04060f;overflow:hidden}
canvas{display:block;image-rendering:pixelated}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>// ───────── BASE ENGINE (СОХРАНЁН + РАСШИРЕН) const cv=document.getElementById('c'); const ctx=cv.getContext('2d'); let PX=4,GW,GH;

function resize(){ cv.width=innerWidth; cv.height=innerHeight; PX=Math.max(3,Math.floor(cv.width/90)); GW=Math.ceil(cv.width/PX); GH=Math.ceil(cv.height/PX); ctx.imageSmoothingEnabled=false; } resize();onresize=resize;

// ───────── DRAW HELPERS function gfx(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(xPX,yPX,wPX,hPX)} function gtxt(t,x,y,c,s=2,a='left'){ ctx.font=${s*PX}px 'Press Start 2P', monospace; ctx.fillStyle=c;ctx.textAlign=a; ctx.fillText(t,xPX,yPX); ctx.textAlign='left'; } function gbtn(x,y,w,h,t,c){ gfx(x,y,w,h,'#12152e'); gfx(x,y,w,1,c);gfx(x,y,1,h,c); gfx(x,y+h-1,w,1,'#000');gfx(x+w-1,y,1,h,'#000'); gtxt(t,x+w/2,y+h/2+1,c,2,'center'); }

// ───────── PIXEL SPRITES (PCR STYLE) const PAL={ 'S':'#e8ae6e','H':'#1c0a04','T':'#2d2d2d','P':'#1e3a5f','Z':'#0d0d0d', 'B':'#000','W':'#fff','R':'#ff2a2a','G':'#00ff88' };

const PLAYER=[ '.HHHHHH....', '.H.SSSH....', '.SSSSSS....', '.S.SS.S....', '.SSSSSS....', 'STTTTTS....', 'STTTTTS....', 'STTTTTS....', '.PP.PP.....', '.PP.PP.....', '.ZZ.ZZ.....', '.ZZZ.ZZZ...' ];

const NPC_PREDAK=[ '.AAAAAA....', '.ASSSSA....', '.SSSSS.....', '.S.SS.S....', '.SSSSS.....', 'SOOOOOS....', '.OOOOO.....' ];

function spr(data,x,y){ data.forEach((r,ry)=>{ [...r].forEach((c,rx)=>{ if(PAL[c]){ ctx.fillStyle=PAL[c]; ctx.fillRect((x+rx)*PX,(y+ry)*PX,PX,PX); } }); }); }

// ───────── GAME STATE const G={ sc:'garage', lane:1, parts:[], money:0, level:1, lives:3, f:0, upgrades:{speed:1,quality:1}, npc:{x:GW,active:false} };

// ───────── GARAGE function drawGarage(){ gfx(0,0,GW,GH,'#04060f');

// title for(let i=0;i<6;i++){ ctx.fillStyle=rgb(${232+i*5},${93+i*10},3); ctx.fillRect(0,i*PX,cv.width,PX); } gtxt('LISOVNA',GW/2,4,'#0a0c1e',3,'center');

// shelves for(let i=0;i<3;i++){ let y=12+i10; gfx(5,y,20,1,'#222'); for(let j=0;j<4;j++){ gfx(6+j4,y-3,3,3,['#ff595e','#ffca3a','#8ac926','#1982c4'][j]); } }

// machine gfx(GW/2-12,GH/2-3,24,6,'#000'); gfx(GW/2-12,GH/2-3,24,1,'#00e5ff');

// reflection ctx.globalAlpha=0.2; gfx(GW/2-12,GH/2+4,24,3,'#00e5ff'); ctx.globalAlpha=1;

// UI gbtn(GW-22,10,20,6,'START','#00e5ff'); gbtn(GW-22,18,20,6,'UPGR','#ffd60a');

gtxt('$'+G.money,2,8,'#ffd60a'); }

// ───────── GAME function spawn(){ G.parts.push({x:GW,y:20+Math.random()*20,bad:Math.random()<0.3}); }

function update(){ G.f++; if(G.f%40===0) spawn();

// NPC spawn if(G.f%600===0){G.npc.active=true;G.npc.x=GW;}

if(G.npc.active){ G.npc.x-=0.5; if(G.npc.x<0) G.npc.active=false; }

G.parts.forEach(p=>p.x-=1.5+G.upgrades.speed*0.5);

G.parts=G.parts.filter(p=>{ if(p.x<10){ if(!p.bad){G.lives--;} return false; } return true; });

if(G.lives<=0) G.sc='garage'; }

function drawGame(){ gfx(0,0,GW,GH,'#04060f');

// conveyor for(let i=0;i<3;i++) gfx(0,20+i*10,GW,1,'#333');

// player spr(PLAYER,5,20+G.lane*10);

// npc if(G.npc.active) spr(NPC_PREDAK,G.npc.x,10);

// parts G.parts.forEach(p=>{ gfx(p.x,p.y,3,3,p.bad?'#ff0033':'#00ff88'); });

// effects (flash) if(G.f%20<5){ctx.globalAlpha=0.1;gfx(0,0,GW,GH,'#ffffff');ctx.globalAlpha=1;}

gtxt('$'+G.money,2,5,'#fff'); gtxt('HP:'+G.lives,2,8,'#ff2a2a'); }

// ───────── INPUT cv.addEventListener('pointerdown',e=>{ const x=e.clientX/PX; if(G.sc==='garage'){ if(x>GW-22) G.sc='game'; } else G.sc='garage'; });

document.addEventListener('keydown',e=>{ if(e.key==='ArrowUp') G.lane=Math.max(0,G.lane-1); if(e.key==='ArrowDown') G.lane=Math.min(2,G.lane+1); });

// ───────── LOOP function loop(){ ctx.clearRect(0,0,cv.width,cv.height); if(G.sc==='garage') drawGarage(); if(G.sc==='game'){update();drawGame();} requestAnimationFrame(loop); } loop();

</script>
</body>
</html>
