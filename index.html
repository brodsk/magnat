<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>MAGNA FABRIKA - Lisy a Kusy</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    background: #0a0a1a;
    font-family: 'Courier New', 'Press Start 2P', monospace;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* FULLSCREEN FLEX CONTAINER */
  .game-wrapper {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
  }

  #game-container {
    position: relative;
    background: #3a4a5a;
    overflow: hidden;
    box-shadow: 0 0 0 4px #2a2a3a;
    width: 100%;
    height: 100%;
    max-width: 1200px;
    max-height: 800px;
  }

  /* Responsive scaling - keep game area visible */
  @media (min-aspect-ratio: 4/3) {
    #game-container { width: auto; height: 100%; aspect-ratio: 4/3; margin: auto; }
  }
  @media (max-aspect-ratio: 4/3) {
    #game-container { width: 100%; height: auto; aspect-ratio: 4/3; margin: auto; }
  }

  .screen { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; background: #2a3a3a; overflow-y: auto; }
  .screen.active { display: block; }

  /* MENU */
  #menu-screen { background: linear-gradient(135deg, #1a3a2a, #0a2a2a); display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .menu-card { background: #000000aa; backdrop-filter: blur(4px); padding: 30px; border: 4px solid #ffaa44; text-align: center; border-radius: 20px; margin: 20px; }
  .menu-card h1 { font-size: 2.5rem; color: #ffcc66; text-shadow: 3px 3px 0 #5a3a1a; }
  .menu-btn { display: block; width: 200px; margin: 15px auto; padding: 12px; background: #2a4a3a; border: 2px solid #ffaa66; color: #ffdd99; font-weight: bold; cursor: pointer; font-size: 1rem; }
  .menu-btn:active { transform: scale(0.96); background: #4a6a4a; }

  /* HUD */
  .top-hud { position: absolute; top: 5px; left: 5px; right: 5px; display: flex; justify-content: space-between; z-index: 100; gap: 5px; flex-wrap: wrap; }
  .hud-box { background: #111122cc; backdrop-filter: blur(2px); border: 2px solid #88aaff; padding: 4px 8px; font-size: 10px; color: #ffdd99; font-weight: bold; border-radius: 4px; }

  /* FACTORY FLOOR */
  #game-screen { position: relative; background: #5a6e7a; }
  .floor { position: absolute; bottom: 0; width: 100%; height: 100px; background: #4a5a4a; border-top: 3px solid #8a9a6a; }
  .wall { position: absolute; top: 0; width: 100%; height: calc(100% - 100px); background: #7a8e9a; }

  /* ENGEL MACHINE */
  .engel { position: absolute; bottom: 100px; left: 15px; width: 100px; height: 80px; background: #5a8a4a; border: 3px solid #2a5a1a; border-radius: 8px; }
  .engel-light { width: 12px; height: 12px; border-radius: 50%; background: #0f0; position: absolute; top: 5px; right: 5px; }
  .engel-light.red { background: #f00; animation: blink 0.3s infinite; }

  /* CONVEYOR */
  .conveyor { position: absolute; bottom: 100px; left: 130px; right: 150px; height: 28px; background: #4a3a2a; border-top: 3px solid #8a6a3a; border-bottom: 3px solid #2a1a0a; overflow: hidden; }
  .conveyor-stripes { width: 200%; height: 100%; background: repeating-linear-gradient(90deg, #6a5a3a 0px, #6a5a3a 20px, #4a3a1a 20px, #4a3a1a 24px); animation: moveStripes 1s linear infinite; }
  @keyframes moveStripes { from { transform: translateX(0); } to { transform: translateX(-24px); } }

  /* PARTS (kusy) */
  .part { position: absolute; bottom: 112px; width: 24px; height: 18px; background: #c0a86a; border: 2px solid #8a6a3a; cursor: pointer; z-index: 20; }
  .part.bad { background: #c86a6a; border-color: #a22; }

  /* BOX (krabica na 20 kusov) */
  .box { position: absolute; bottom: 100px; width: 40px; height: 32px; background: #c8b87a; border: 2px solid #8a6a2a; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; color: #2a1a0a; cursor: pointer; z-index: 15; }
  .box-full { background: #e8d89a; border: 3px solid #ffcc44; }

  /* ROLLER CART (vozík) */
  .roller-cart { position: absolute; bottom: 100px; right: 10px; width: 140px; height: 55px; background: #8a7a5a; border: 3px solid #5a4a2a; border-radius: 6px; transition: left 0.2s; z-index: 25; }
  .cart-slots { display: flex; height: 100%; padding: 5px; gap: 5px; overflow-x: auto; }
  .cart-slot { min-width: 45px; background: #5a4a2a; border: 2px solid #2a1a0a; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 8px; color: #ffdd99; }
  .cart-slot.filled { background: #6a8a3a; color: #fff; }

  /* NPCs - pixel style */
  .npc { position: absolute; bottom: 100px; width: 32px; height: 52px; z-index: 30; }
  .npc-sprite { width: 32px; height: 52px; position: relative; background: #ddbb88; border-radius: 4px; }
  .npc-shirt { width: 28px; height: 20px; position: absolute; bottom: 20px; left: 2px; background: #444; }
  .npc-head { width: 24px; height: 20px; background: #f5d8a0; position: absolute; top: 2px; left: 4px; border-radius: 4px; }

  /* colors */
  .shirt-orange { background: #e07a2a; }
  .shirt-red-stripe { background: #c82222; background-image: linear-gradient(90deg, #c82222 0%, #c82222 40%, #2a8a2a 40%, #2a8a2a 60%, #ffffff 60%, #ffffff 80%, #c82222 80%); }
  .shirt-green { background: #3a8a3a; }
  .shirt-black { background: #222; }

  /* warehouse worker moving cart */
  .warehouse-cart { position: absolute; bottom: 100px; width: 90px; height: 50px; background: #6a5a3a; border: 2px solid #ffaa44; transition: left 0.1s linear; z-index: 28; display: flex; align-items: center; justify-content: center; font-size: 12px; color: white; }

  .speech { position: absolute; background: white; border: 2px solid black; padding: 2px 6px; font-size: 8px; white-space: nowrap; bottom: 55px; left: 50%; transform: translateX(-50%); z-index: 100; }

  /* TASKS */
  #task-panel { position: absolute; top: 45px; right: 5px; background: #111122cc; border: 2px solid #ffaa66; padding: 6px; width: 140px; font-size: 8px; z-index: 40; }
  .task-item { margin: 3px 0; padding: 2px; border-left: 2px solid #ffaa66; color: #ccc; }
  .task-item.done { color: #8f8; border-left-color: #8f8; text-decoration: line-through; }

  /* CONTROLS */
  #controls { position: absolute; bottom: 5px; left: 5px; right: 5px; display: flex; justify-content: center; gap: 10px; z-index: 50; flex-wrap: wrap; }
  .ctrl-btn { padding: 8px 16px; background: #2a2a3e; border: 2px solid #ffaa66; color: #ffdd99; font-size: 12px; font-weight: bold; cursor: pointer; min-width: 60px; }
  .ctrl-btn:active { background: #4a4a6e; }

  .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000000cc; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 200; }
  .overlay.visible { display: flex; }
  .overlay-btn { padding: 12px 24px; background: #ffaa44; border: none; margin: 10px; font-size: 14px; cursor: pointer; }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
  .notification { position: absolute; top: 80px; left: 50%; transform: translateX(-50%); background: black; border: 2px solid gold; padding: 6px 12px; color: gold; font-size: 10px; z-index: 150; display: none; white-space: nowrap; }
</style>
</head>
<body>
<div class="game-wrapper">
<div id="game-container">

  <!-- MENU -->
  <div id="menu-screen" class="screen active">
    <div class="menu-card">
      <h1>🏭 MAGNA</h1>
      <p style="color:#ffcc88; margin:10px;">LISY & KUSY</p>
      <button class="menu-btn" onclick="startGame()">▶ ZAČAŤ ZMENU</button>
      <button class="menu-btn" onclick="showStats()">📊 ŠTATISTIKA</button>
    </div>
  </div>

  <!-- GAME -->
  <div id="game-screen" class="screen">
    <div class="wall"></div><div class="floor"></div>
    
    <!-- Engel machine -->
    <div class="engel" id="engel"><div class="engel-light green" id="engelLight"></div><div style="font-size:8px; text-align:center; margin-top:30px;">ENGEL</div></div>
    
    <!-- Conveyor -->
    <div class="conveyor"><div class="conveyor-stripes"></div></div>
    
    <!-- Roller cart (vozík) -->
    <div class="roller-cart" id="rollerCart"><div class="cart-slots" id="cartSlots"></div></div>
    
    <!-- Warehouse worker cart (skladník vozíky) -->
    <div id="warehouseCart" class="warehouse-cart" style="left:-100px;">🛒</div>
    
    <!-- NPCs -->
    <div id="predacka" class="npc" style="left: 550px;"><div class="npc-sprite"><div class="npc-head"></div><div class="npc-shirt shirt-orange"></div></div><div id="predackaSpeech"></div></div>
    <div id="skladnik" class="npc" style="left: 700px;"><div class="npc-sprite"><div class="npc-head"></div><div class="npc-shirt shirt-red-stripe"></div></div><div id="skladnikSpeech"></div></div>
    <div id="kvalitar" class="npc" style="left: 400px;"><div class="npc-sprite"><div class="npc-head"></div><div class="npc-shirt shirt-green"></div></div><div id="kvalitarSpeech"></div></div>
    <div id="nastavovach" class="npc" style="left: 200px;"><div class="npc-sprite"><div class="npc-head"></div><div class="npc-shirt shirt-black"></div></div><div id="nastavovachSpeech"></div></div>
    
    <!-- HUD -->
    <div class="top-hud"><div class="hud-box">📦 KUSY: <span id="hudParts">0</span></div><div class="hud-box">📦 BOXY: <span id="hudBoxes">0</span></div><div class="hud-box">🛒 VOZÍKY: <span id="hudCarts">0/6</span></div><div class="hud-box">💰 €: <span id="hudMoney">0</span></div></div>
    
    <div id="task-panel"><h3>⚙ ÚLOHY</h3><div class="task-item" id="task1">📦 20 kusov = 1 box</div><div class="task-item" id="task2">🏭 6 boxov = vozík</div><div class="task-item" id="task3">🏷️ Predačka: etiketa</div><div class="task-item" id="task4">🚛 Skladník odvoz</div></div>
    
    <div id="controls"><button class="ctrl-btn" ontouchstart="moveLeft=true" ontouchend="moveLeft=false" onmousedown="moveLeft=true" onmouseup="moveLeft=false">◀ LIS</button><button class="ctrl-btn" onclick="pickupPart()">✋ ZOBRAŤ KUS</button><button class="ctrl-btn" onclick="placeToBox()">📦 DO BOXA</button><button class="ctrl-btn" onclick="loadBoxToCart()">📦→VOZÍK</button><button class="ctrl-btn" onclick="callPredacka()">🏷️ ETIKETA</button><button class="ctrl-btn" ontouchstart="moveRight=true" ontouchend="moveRight=false" onmousedown="moveRight=true" onmouseup="moveRight=false">LIS ▶</button></div>
    
    <div id="poruchaOverlay" class="overlay"><h2 style="color:red">⚠ PORUCHA FORMY!</h2><p>Prvé kusy sú chybné!</p><button class="overlay-btn" onclick="fixPorucha()">🔧 OPRAVIŤ</button></div>
    <div id="endOverlay" class="overlay"><h2>ZMENA SKONČILA</h2><p id="endText"></p><button class="overlay-btn" onclick="backToMenu()">MENU</button></div>
    <div id="notification" class="notification"></div>
    
    <!-- Player indicator -->
    <div id="player" style="position:absolute; bottom:102px; width:28px; height:48px; background:#4466aa; border:2px solid #ffcc88; left:300px; z-index:35; transition:left 0.05s linear;"></div>
  </div>
  
  <!-- STATS -->
  <div id="stats-screen" class="screen"><div style="padding:30px; color:white;"><h2>📊 ŠTATISTIKA</h2><div id="statsContent"></div><button class="menu-btn" onclick="backToMenu()">SPÄŤ</button></div></div>
</div>
</div>

<script>
// GAME STATE
let money = 0, totalPartsMade = 0, shiftParts = 0, badPassed = 0, poruchaActive = false, poruchaTimer = null;
let boxes = []; // array of {full: false, count:0}
let currentBoxIndex = 0;
let cartBoxes = []; // max 6 boxes in cart
let heldPart = null; // {bad: false}
let playerX = 300;
let moveLeft = false, moveRight = false;
let shiftTime = 0, shiftDuration = 180; // 3 minuty = cca 65€
let shiftInterval = null;
let partsOnConveyor = [];
let partId = 0;
let warehouseCartX = -100, warehouseTarget = false;
let labelPrinted = false; // predačka must print label before skladník takes
let gameRunning = true;

// DOM elements
const gameScreen = document.getElementById('game-screen');
const playerEl = document.getElementById('player');
const hudParts = document.getElementById('hudParts');
const hudBoxes = document.getElementById('hudBoxes');
const hudCarts = document.getElementById('hudCarts');
const hudMoney = document.getElementById('hudMoney');
const cartSlotsDiv = document.getElementById('cartSlots');
const notification = document.getElementById('notification');
const poruchaOverlay = document.getElementById('poruchaOverlay');

function showNotif(msg, time=1500) {
  notification.innerText = msg;
  notification.style.display = 'block';
  setTimeout(() => notification.style.display = 'none', time);
}

function updateUI() {
  hudParts.innerText = shiftParts;
  hudBoxes.innerText = boxes.filter(b => b.full).length;
  hudCarts.innerText = cartBoxes.length + "/6";
  hudMoney.innerText = money;
  // update cart slots visual
  cartSlotsDiv.innerHTML = '';
  for(let i=0;i<6;i++){
    let slot = document.createElement('div');
    slot.className = 'cart-slot' + (cartBoxes[i] ? ' filled' : '');
    slot.innerText = cartBoxes[i] ? '📦' : '□';
    cartSlotsDiv.appendChild(slot);
  }
}

// Spawn part (kus) from Engel
function spawnPart() {
  if(!gameRunning || poruchaActive) return;
  let isBad = false;
  if(poruchaActive && shiftParts < 10) isBad = true; // first parts after porucha are bad
  else isBad = Math.random() < 0.15;
  
  let el = document.createElement('div');
  el.className = 'part' + (isBad ? ' bad' : '');
  el.id = 'part'+partId++;
  el.style.left = '140px';
  el.onclick = () => pickupSpecificPart(el.id);
  gameScreen.appendChild(el);
  partsOnConveyor.push({id:el.id, el:el, x:140, bad:isBad});
  animatePart(el.id);
}

function animatePart(pid) {
  let interval = setInterval(() => {
    let p = partsOnConveyor.find(pp => pp.id === pid);
    if(!p) { clearInterval(interval); return; }
    p.x += 1.2;
    p.el.style.left = p.x + 'px';
    if(p.x > 780) {
      if(p.bad) badPassed++;
      p.el.remove();
      partsOnConveyor = partsOnConveyor.filter(pp => pp.id !== pid);
      clearInterval(interval);
    }
  }, 20);
}

function pickupSpecificPart(pid) {
  if(heldPart) { showNotif('Už držíš kus!'); return; }
  let part = partsOnConveyor.find(p => p.id === pid);
  if(!part) return;
  let playerRect = {x: playerX, width:28};
  let partX = part.x;
  if(Math.abs(playerX - partX) < 45) {
    heldPart = {bad: part.bad};
    part.el.remove();
    partsOnConveyor = partsOnConveyor.filter(p => p.id !== pid);
    if(heldPart.bad) showNotif('⚠️ CHYBNÝ KUS! Nechaj ho!', 800);
    else showNotif('✅ Kus v ruke', 600);
  } else showNotif('❌ Si príďaleko!', 500);
}

function pickupPart() {
  if(heldPart) { showNotif('Už držíš kus!'); return; }
  let nearest = null, minDist = 70;
  for(let p of partsOnConveyor) {
    let dist = Math.abs(p.x - playerX);
    if(dist < minDist) { minDist = dist; nearest = p; }
  }
  if(nearest) {
    heldPart = {bad: nearest.bad};
    nearest.el.remove();
    partsOnConveyor = partsOnConveyor.filter(p => p.id !== nearest.id);
    if(heldPart.bad) showNotif('⚠️ CHYBNÝ KUS!', 800);
    else showNotif('✅ Kus v ruke', 600);
  } else showNotif('Žiadny kus nablízku', 500);
}

function placeToBox() {
  if(!heldPart) { showNotif('Nemáš nič v ruke!'); return; }
  if(heldPart.bad) { showNotif('❌ Chybný kus nemôžeš dať do boxu!', 1000); heldPart = null; return; }
  // find or create current box
  let currentBox = boxes.find(b => !b.full);
  if(!currentBox) {
    currentBox = {full: false, count:0};
    boxes.push(currentBox);
  }
  currentBox.count++;
  shiftParts++;
  totalPartsMade++;
  if(currentBox.count >= 20) {
    currentBox.full = true;
    showNotif('📦 Box naplnený! (20 kusov)', 1200);
  }
  heldPart = null;
  updateUI();
  // kvalitar reaction
  let kvalitarSpeech = document.getElementById('kvalitarSpeech');
  kvalitarSpeech.innerHTML = '<div class="speech">✅ OK</div>';
  setTimeout(() => kvalitarSpeech.innerHTML = '', 1000);
}

function loadBoxToCart() {
  let fullBoxIndex = boxes.findIndex(b => b.full);
  if(fullBoxIndex === -1) { showNotif('Žiadny plný box!', 800); return; }
  if(cartBoxes.length >= 6) { showNotif('Vozík je plný (6 boxov)!', 800); return; }
  let box = boxes[fullBoxIndex];
  cartBoxes.push({box: box});
  boxes.splice(fullBoxIndex,1);
  showNotif('📦 Box naložený na vozík', 800);
  updateUI();
}

function callPredacka() {
  if(cartBoxes.length === 0) { showNotif('Vozík je prázdny!', 800); return; }
  if(labelPrinted) { showNotif('Etiketa už je vytlačená! Zavolaj skladníka.', 1000); return; }
  labelPrinted = true;
  let predackaSpeech = document.getElementById('predackaSpeech');
  predackaSpeech.innerHTML = '<div class="speech">🏷️ Etiketa pripravená!</div>';
  setTimeout(() => predackaSpeech.innerHTML = '', 1500);
  showNotif('Predačka vytlačila paletovú etiketu! Môžeš zavolať skladníka.', 2000);
  // trigger warehouse worker
  triggerWarehouse();
}

function triggerWarehouse() {
  if(!labelPrinted || cartBoxes.length === 0) { showNotif('Najprv etiketa od predačky!', 1000); return; }
  // skladnik comes to pick cart
  let skladnikSpeech = document.getElementById('skladnikSpeech');
  skladnikSpeech.innerHTML = '<div class="speech">🚛 Odvážam vozík!</div>';
  setTimeout(() => skladnikSpeech.innerHTML = '', 1500);
  // reward: 65€ per shift approximate, but per cart: ~10.8€ (6 boxes = 65€)
  let reward = Math.floor(cartBoxes.length * 10.8);
  money += reward;
  showNotif(`💰 Skladník odviezol vozík! +${reward}€`, 1800);
  cartBoxes = [];
  labelPrinted = false;
  updateUI();
}

// Porucha system
function startPorucha() {
  if(poruchaActive) return;
  poruchaActive = true;
  document.getElementById('engelLight').className = 'engel-light red';
  poruchaOverlay.classList.add('visible');
  let nastSpeech = document.getElementById('nastavovachSpeech');
  nastSpeech.innerHTML = '<div class="speech">⚠️ PORUCHA! Oprav to!</div>';
  setTimeout(() => nastSpeech.innerHTML = '', 2000);
  showNotif('⚠️ PORUCHA FORMY! Prvé kusy budú chybné!', 2000);
}

function fixPorucha() {
  poruchaActive = false;
  poruchaOverlay.classList.remove('visible');
  document.getElementById('engelLight').className = 'engel-light green';
  showNotif('🔧 Porucha opravená!', 1000);
  // schedule next porucha
  clearTimeout(poruchaTimer);
  poruchaTimer = setTimeout(() => startPorucha(), 25000 + Math.random() * 20000);
}

// Shift timer
function startShiftTimer() {
  shiftTime = 0;
  shiftInterval = setInterval(() => {
    if(!gameRunning) return;
    shiftTime++;
    if(shiftTime >= shiftDuration) {
      endShift();
    }
    // every 3 seconds spawn part
  }, 1000);
  // spawn parts every 2 seconds
  window.partSpawner = setInterval(() => spawnPart(), 2100);
}

function endShift() {
  gameRunning = false;
  clearInterval(shiftInterval);
  clearInterval(window.partSpawner);
  clearTimeout(poruchaTimer);
  let finalBonus = Math.floor(totalPartsMade * 0.8) + (cartBoxes.length * 5);
  money += finalBonus;
  document.getElementById('endText').innerHTML = `Vyrobených kusov: ${totalPartsMade}<br>Boxov: ${boxes.filter(b=>b.full).length + cartBoxes.length}<br>Zárobok: ${money}€`;
  document.getElementById('endOverlay').classList.add('visible');
  updateUI();
}

// Player movement
function moveUpdate() {
  if(!gameRunning) return;
  if(moveLeft) playerX = Math.max(20, playerX - 6);
  if(moveRight) playerX = Math.min(760, playerX + 6);
  playerEl.style.left = playerX + 'px';
  requestAnimationFrame(moveUpdate);
}
setInterval(() => { if(moveLeft || moveRight) moveUpdate(); }, 16);

// Warehouse cart animation (skladník s vozíkom)
let warehouseInterval = setInterval(() => {
  if(!gameRunning) return;
  let cart = document.getElementById('warehouseCart');
  if(labelPrinted && cartBoxes.length > 0) {
    // move warehouse cart to roller cart
    if(warehouseCartX < 650) warehouseCartX += 8;
    else {
      // pick cart
      if(labelPrinted && cartBoxes.length > 0) {
        let reward = Math.floor(cartBoxes.length * 10.8);
        money += reward;
        cartBoxes = [];
        labelPrinted = false;
        updateUI();
        showNotif(`🚛 Skladník odviezol +${reward}€`, 1500);
        warehouseCartX = -100;
      }
    }
  } else {
    if(warehouseCartX > -100) warehouseCartX -= 5;
    else warehouseCartX = -100;
  }
  cart.style.left = warehouseCartX + 'px';
}, 100);

// Reset game
function startGame() {
  money = 0; totalPartsMade = 0; shiftParts = 0; badPassed = 0; poruchaActive = false;
  boxes = []; cartBoxes = []; heldPart = null; labelPrinted = false;
  partsOnConveyor.forEach(p => p.el.remove());
  partsOnConveyor = [];
  gameRunning = true;
  playerX = 300;
  playerEl.style.left = '300px';
  poruchaOverlay.classList.remove('visible');
  document.getElementById('engelLight').className = 'engel-light green';
  clearInterval(shiftInterval);
  clearInterval(window.partSpawner);
  clearTimeout(poruchaTimer);
  startShiftTimer();
  poruchaTimer = setTimeout(() => startPorucha(), 20000);
  updateUI();
  document.getElementById('endOverlay').classList.remove('visible');
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  gameScreen.classList.add('active');
  showNotif('🔧 ZMENA ZAČALA! Lisuj kusy, plň boxy, volaj predačku a skladníka!', 3000);
}

function showStats() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('stats-screen').classList.add('active');
  document.getElementById('statsContent').innerHTML = `
    <div>💰 Celkom zarobené: ${money}€</div>
    <div>📦 Vyrobených kusov: ${totalPartsMade}</div>
    <div>🏭 Dokončených boxov: ${boxes.filter(b=>b.full).length}</div>
    <div>⚠️ Chybných kusov: ${badPassed}</div>
  `;
}

function backToMenu() {
  gameRunning = false;
  clearInterval(shiftInterval);
  clearInterval(window.partSpawner);
  clearTimeout(poruchaTimer);
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('menu-screen').classList.add('active');
  document.getElementById('endOverlay').classList.remove('visible');
}

// Touch/mouse movement
document.addEventListener('mousemove', (e) => {});
window.moveLeft = false; window.moveRight = false;
</script>
</body>
</html>
