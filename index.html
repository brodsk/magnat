<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>MAGNA FABRIKA - 8bit Factory</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    background: #000;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    position: fixed;
    touch-action: none;
  }

  /* Fullscreen wrapper */
  .game-fullscreen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #0a0a1a;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #gameCanvas {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: contain;
    image-rendering: crisp-edges;
    image-rendering: pixelated;
    image-rendering: pixelated;
    cursor: pointer;
    background: #1a2a2a;
  }

  /* Mobile controls overlay */
  .touch-controls {
    position: fixed;
    bottom: 10px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    gap: 15px;
    padding: 10px;
    z-index: 100;
    pointer-events: none;
  }
  
  .touch-btn {
    pointer-events: auto;
    width: 70px;
    height: 70px;
    background: rgba(0,0,0,0.7);
    border: 3px solid #ffaa44;
    border-radius: 12px;
    color: #ffaa44;
    font-size: 28px;
    font-family: monospace;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    backdrop-filter: blur(4px);
    touch-action: manipulation;
    box-shadow: 0 0 10px rgba(0,0,0,0.5);
  }
  
  .touch-btn:active {
    background: #ffaa44;
    color: #000;
    transform: scale(0.95);
  }
  
  .action-btn {
    background: rgba(0,0,0,0.8);
    border-color: #88ff88;
    color: #88ff88;
    font-size: 16px;
    padding: 0 12px;
    width: auto;
    min-width: 80px;
  }
  
  @media (max-width: 600px) {
    .touch-btn { width: 55px; height: 55px; font-size: 22px; }
    .action-btn { min-width: 65px; font-size: 12px; }
  }
  
  /* UI overlay for text */
  .ui-overlay {
    position: fixed;
    top: 5px;
    left: 5px;
    right: 5px;
    pointer-events: none;
    z-index: 50;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 5px;
  }
  
  .ui-panel {
    background: rgba(0,0,0,0.8);
    border: 2px solid #ffaa66;
    padding: 4px 8px;
    font-size: 10px;
    font-weight: bold;
    color: #ffdd99;
    font-family: monospace;
    backdrop-filter: blur(2px);
    white-space: nowrap;
  }
  
  .task-panel {
    position: fixed;
    top: 45px;
    right: 5px;
    background: rgba(0,0,0,0.85);
    border: 2px solid #ffaa66;
    padding: 6px;
    font-size: 8px;
    color: #ccc;
    font-family: monospace;
    pointer-events: none;
    z-index: 50;
    max-width: 140px;
  }
  
  .task-item { margin: 3px 0; border-left: 2px solid #ffaa66; padding-left: 4px; }
  .task-done { color: #8f8; border-left-color: #8f8; text-decoration: line-through; }
  
  .notification {
    position: fixed;
    top: 100px;
    left: 50%;
    transform: translateX(-50%);
    background: #000000cc;
    border: 2px solid #ffaa44;
    padding: 8px 16px;
    color: #ffdd99;
    font-size: 10px;
    font-family: monospace;
    white-space: nowrap;
    z-index: 200;
    display: none;
    backdrop-filter: blur(4px);
    pointer-events: none;
  }
  
  .overlay-full {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 300;
    font-family: monospace;
  }
  
  .overlay-full.visible { display: flex; }
  
  .overlay-btn {
    background: #ffaa44;
    border: none;
    padding: 12px 24px;
    margin: 10px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    font-family: monospace;
  }
  
  .menu-btn {
    background: #2a4a3a;
    border: 2px solid #ffaa66;
    color: #ffdd99;
    padding: 12px 24px;
    margin: 8px;
    font-size: 14px;
    cursor: pointer;
    font-family: monospace;
  }
</style>
</head>
<body>
<div class="game-fullscreen">
  <canvas id="gameCanvas" width="800" height="600"></canvas>
</div>

<!-- Touch controls -->
<div class="touch-controls">
  <button class="touch-btn" id="btnLeft">◀</button>
  <button class="touch-btn action-btn" id="btnPickup">✋</button>
  <button class="touch-btn action-btn" id="btnBox">📦</button>
  <button class="touch-btn action-btn" id="btnCart">🛒</button>
  <button class="touch-btn action-btn" id="btnLabel">🏷️</button>
  <button class="touch-btn" id="btnRight">▶</button>
</div>

<div class="ui-overlay">
  <div class="ui-panel">🔧 KUSY: <span id="uiParts">0</span></div>
  <div class="ui-panel">📦 BOXY: <span id="uiBoxes">0</span></div>
  <div class="ui-panel">🛒 VOZÍK: <span id="uiCart">0</span>/6</div>
  <div class="ui-panel">💰 €: <span id="uiMoney">0</span></div>
</div>

<div class="task-panel" id="taskPanel">
  <div style="color:#ffaa66;">⚙ ÚLOHY</div>
  <div class="task-item" id="task1">📦 20 kusov = box</div>
  <div class="task-item" id="task2">🏭 6 boxov = vozík</div>
  <div class="task-item" id="task3">🏷️ Predačka → etiketa</div>
  <div class="task-item" id="task4">🚛 Skladník odvoz</div>
</div>

<div id="notification" class="notification"></div>

<div id="menuOverlay" class="overlay-full">
  <div style="background:#1a2a2a; padding:30px; border:4px solid #ffaa66; text-align:center;">
    <h1 style="color:#ffaa66;">🏭 MAGNA</h1>
    <p style="color:#88ff88; margin:10px;">LISY & KUSY</p>
    <p style="color:#aaa; font-size:10px;">8-bit Factory Simulator</p>
    <button class="menu-btn" id="startBtn">▶ ZAČAŤ ZMENU</button>
    <button class="menu-btn" id="statsBtn">📊 ŠTATISTIKA</button>
  </div>
</div>

<div id="statsOverlay" class="overlay-full">
  <div style="background:#1a2a2a; padding:30px; border:4px solid #ffaa66; min-width:250px;">
    <h2 style="color:#ffaa66;">📊 ŠTATISTIKA</h2>
    <div id="statsContent" style="color:#ddd; margin:15px 0;"></div>
    <button class="overlay-btn" id="closeStatsBtn">SPÄŤ</button>
  </div>
</div>

<div id="poruchaOverlay" class="overlay-full">
  <div style="background:#aa3333; padding:30px; border:4px solid #ffaa00; text-align:center;">
    <h2 style="color:#fff;">⚠ PORUCHA FORMY!</h2>
    <p style="color:#ffdd88;">Prvé kusy sú chybné!</p>
    <button class="overlay-btn" id="fixBtn">🔧 OPRAVIŤ</button>
  </div>
</div>

<div id="endOverlay" class="overlay-full">
  <div style="background:#1a2a2a; padding:30px; border:4px solid #ffaa66; text-align:center;">
    <h2 style="color:#ffaa66;">ZMENA SKONČILA</h2>
    <p id="endText" style="color:#ddd; margin:15px;"></p>
    <button class="overlay-btn" id="endMenuBtn">MENU</button>
  </div>
</div>

<script>
// ========== 8-BIT AUDIO SYSTEM ==========
class Audio8bit {
  constructor() {
    this.audioCtx = null;
    this.enabled = true;
  }
  
  init() {
    if(!this.audioCtx) {
      this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
  }
  
  playTone(freq, duration, type='square', volume=0.2) {
    if(!this.enabled) return;
    try {
      this.init();
      const ctx = this.audioCtx;
      const now = ctx.currentTime;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      gain.gain.value = volume;
      gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      osc.stop(now + duration);
    } catch(e) {}
  }
  
  pickupSound() { this.playTone(880, 0.1, 'square', 0.15); }
  boxSound() { this.playTone(440, 0.15, 'triangle', 0.2); }
  cartSound() { this.playTone(330, 0.2, 'sawtooth', 0.2); }
  labelSound() { this.playTone(660, 0.12, 'square', 0.18); }
  rewardSound() { this.playTone(523, 0.1); this.playTone(659, 0.1); this.playTone(784, 0.2); }
  poruchaSound() { this.playTone(220, 0.3, 'sawtooth', 0.25); this.playTone(180, 0.4); }
  fixSound() { this.playTone(523, 0.1); this.playTone(659, 0.1); this.playTone(784, 0.15); }
  errorSound() { this.playTone(220, 0.2, 'square', 0.2); }
  stepSound() { this.playTone(120, 0.03, 'triangle', 0.05); }
  machineSound() { this.playTone(260, 0.08, 'square', 0.1); }
  
  startMusic() {
    if(this.musicInterval) clearInterval(this.musicInterval);
    this.musicInterval = setInterval(() => {
      if(Math.random() < 0.3) this.playTone(196 + Math.random()*100, 0.08, 'triangle', 0.04);
    }, 600);
  }
  stopMusic() { if(this.musicInterval) clearInterval(this.musicInterval); }
}

const audio = new Audio8bit();

// ========== GAME STATE ==========
let gameRunning = false;
let money = 0, totalParts = 0, shiftParts = 0, badPassed = 0;
let boxes = []; // {count}
let cartBoxes = []; // max 6
let heldPart = null; // {bad}
let playerX = 380;
let moveLeft = false, moveRight = false;
let shiftTime = 0, shiftDuration = 180;
let shiftInterval = null;
let partsOnConveyor = [];
let partId = 0;
let labelPrinted = false;
let poruchaActive = false;
let poruchaTimer = null;
let spawnInterval = null;

// Canvas and animation
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

// UI Elements
function showNotif(msg, isError=false) {
  const n = document.getElementById('notification');
  n.textContent = msg;
  n.style.display = 'block';
  setTimeout(() => n.style.display = 'none', 1500);
  if(isError) audio.errorSound();
  else audio.pickupSound();
}

function updateUI() {
  document.getElementById('uiParts').innerText = shiftParts;
  document.getElementById('uiBoxes').innerText = boxes.filter(b => b.count >= 20).length;
  document.getElementById('uiCart').innerText = cartBoxes.length;
  document.getElementById('uiMoney').innerText = money;
}

// Game mechanics
function spawnPart() {
  if(!gameRunning || poruchaActive) return;
  audio.machineSound();
  let isBad = false;
  if(poruchaActive && shiftParts < 8) isBad = true;
  else isBad = Math.random() < 0.18;
  
  partsOnConveyor.push({
    id: partId++,
    x: 150,
    y: 390,
    bad: isBad,
    age: 0
  });
}

function pickupPart() {
  if(!gameRunning) return;
  if(heldPart) { showNotif('Už držíš kus!', true); return; }
  let nearest = null;
  let minDist = 55;
  for(let p of partsOnConveyor) {
    let dist = Math.abs(p.x - playerX);
    if(dist < minDist) {
      minDist = dist;
      nearest = p;
    }
  }
  if(nearest) {
    heldPart = {bad: nearest.bad};
    partsOnConveyor = partsOnConveyor.filter(p => p.id !== nearest.id);
    if(heldPart.bad) {
      showNotif('⚠️ CHYBNÝ KUS! Vyhoď!', true);
      heldPart = null;
    } else {
      audio.pickupSound();
      showNotif('✅ Kus v ruke', false);
    }
  } else {
    showNotif('Žiadny kus nablízku!', true);
  }
}

function placeToBox() {
  if(!gameRunning) return;
  if(!heldPart) { showNotif('Nemáš nič v ruke!', true); return; }
  if(heldPart.bad) { showNotif('Chybný kus nejde do boxu!', true); heldPart = null; return; }
  
  let currentBox = boxes.find(b => b.count < 20);
  if(!currentBox) {
    currentBox = {count: 0};
    boxes.push(currentBox);
  }
  currentBox.count++;
  shiftParts++;
  totalParts++;
  heldPart = null;
  audio.boxSound();
  
  if(currentBox.count === 20) {
    showNotif('📦 Box naplnený! (20 kusov)', false);
    audio.rewardSound();
  }
  updateUI();
}

function loadBoxToCart() {
  if(!gameRunning) return;
  let fullBoxIndex = boxes.findIndex(b => b.count >= 20);
  if(fullBoxIndex === -1) { showNotif('Žiadny plný box!', true); return; }
  if(cartBoxes.length >= 6) { showNotif('Vozík je plný (6 boxov)!', true); return; }
  cartBoxes.push(boxes[fullBoxIndex]);
  boxes.splice(fullBoxIndex, 1);
  audio.cartSound();
  showNotif('📦 Box naložený na vozík', false);
  updateUI();
}

function callPredacka() {
  if(!gameRunning) return;
  if(cartBoxes.length === 0) { showNotif('Vozík je prázdny!', true); return; }
  if(labelPrinted) { showNotif('Etiketa už je vytlačená!', true); return; }
  labelPrinted = true;
  audio.labelSound();
  showNotif('🏷️ Predačka vytlačila paletovú etiketu!', false);
}

function callSkladnik() {
  if(!gameRunning) return;
  if(!labelPrinted) { showNotif('Najprv etiketa od predačky!', true); return; }
  if(cartBoxes.length === 0) { showNotif('Vozík je prázdny!', true); return; }
  
  let reward = cartBoxes.length * 11;
  money += reward;
  showNotif(`🚛 Skladník odviezol vozík! +${reward}€`, false);
  audio.rewardSound();
  cartBoxes = [];
  labelPrinted = false;
  updateUI();
  
  // Check shift end condition
  if(shiftTime >= shiftDuration) endShift();
}

function startPorucha() {
  if(poruchaActive || !gameRunning) return;
  poruchaActive = true;
  audio.poruchaSound();
  document.getElementById('poruchaOverlay').classList.add('visible');
  showNotif('⚠️ PORUCHA FORMY! Prvé kusy budú chybné!', true);
}

function fixPorucha() {
  poruchaActive = false;
  document.getElementById('poruchaOverlay').classList.remove('visible');
  audio.fixSound();
  showNotif('🔧 Porucha opravená!', false);
  clearTimeout(poruchaTimer);
  poruchaTimer = setTimeout(() => startPorucha(), 25000 + Math.random() * 20000);
}

function endShift() {
  if(!gameRunning) return;
  gameRunning = false;
  clearInterval(shiftInterval);
  clearInterval(spawnInterval);
  clearTimeout(poruchaTimer);
  audio.stopMusic();
  
  let bonus = Math.floor(totalParts * 0.5) + (cartBoxes.length * 8);
  money += bonus;
  document.getElementById('endText').innerHTML = `Vyrobených: ${totalParts} kusov<br>Boxov: ${boxes.filter(b=>b.count>=20).length + cartBoxes.length}<br>Zárobok: ${money} €`;
  document.getElementById('endOverlay').classList.add('visible');
  updateUI();
}

function startShift() {
  // Reset all
  gameRunning = true;
  money = 0;
  totalParts = 0;
  shiftParts = 0;
  badPassed = 0;
  boxes = [];
  cartBoxes = [];
  heldPart = null;
  partsOnConveyor = [];
  partId = 0;
  labelPrinted = false;
  poruchaActive = false;
  playerX = 380;
  moveLeft = false;
  moveRight = false;
  shiftTime = 0;
  
  clearInterval(shiftInterval);
  clearInterval(spawnInterval);
  clearTimeout(poruchaTimer);
  
  shiftInterval = setInterval(() => {
    if(!gameRunning) return;
    shiftTime++;
    if(shiftTime >= shiftDuration) endShift();
  }, 1000);
  
  spawnInterval = setInterval(() => spawnPart(), 1900);
  poruchaTimer = setTimeout(() => startPorucha(), 18000);
  
  audio.startMusic();
  updateUI();
  
  document.getElementById('menuOverlay').classList.remove('visible');
  document.getElementById('statsOverlay').classList.remove('visible');
  document.getElementById('endOverlay').classList.remove('visible');
  document.getElementById('poruchaOverlay').classList.remove('visible');
  
  showNotif('🔧 ZMENA ZAČALA! Zbieraj kusy, plň boxy, volaj predačku a skladníka!', false);
}

function showStats() {
  document.getElementById('statsContent').innerHTML = `
    <div>💰 Celkom zarobené: ${money} €</div>
    <div>📦 Vyrobených kusov: ${totalParts}</div>
    <div>🏭 Dokončených boxov: ${boxes.filter(b=>b.count>=20).length + cartBoxes.length}</div>
    <div>⚠️ Chybných kusov: ${badPassed}</div>
  `;
  document.getElementById('statsOverlay').classList.add('visible');
}

// ========== 8-BIT DRAWING ==========
function drawPixelArt() {
  ctx.fillStyle = '#1a2a2a';
  ctx.fillRect(0, 0, 800, 600);
  
  // Floor
  ctx.fillStyle = '#4a5a3a';
  ctx.fillRect(0, 420, 800, 180);
  ctx.fillStyle = '#6a8a5a';
  for(let i=0;i<20;i++) ctx.fillRect(i*40, 415, 20, 5);
  
  // Engel machine
  ctx.fillStyle = '#5a7a4a';
  ctx.fillRect(20, 340, 100, 80);
  ctx.fillStyle = '#7a9a6a';
  ctx.fillRect(30, 330, 80, 15);
  ctx.fillStyle = poruchaActive ? '#ff6666' : '#66ff66';
  ctx.fillRect(100, 345, 12, 12);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('ENGEL', 45, 390);
  
  // Conveyor
  ctx.fillStyle = '#5a4a2a';
  ctx.fillRect(130, 385, 600, 22);
  ctx.fillStyle = '#8a6a3a';
  for(let i=0;i<30;i++) ctx.fillRect(130 + (Date.now()/30 + i*22) % 600, 387, 18, 18);
  
  // Parts on conveyor
  for(let p of partsOnConveyor) {
    if(p.bad) {
      ctx.fillStyle = '#cc6666';
      ctx.fillRect(p.x, p.y, 22, 16);
      ctx.fillStyle = '#aa4444';
      ctx.fillRect(p.x+6, p.y+4, 10, 8);
    } else {
      ctx.fillStyle = '#d8c878';
      ctx.fillRect(p.x, p.y, 22, 16);
      ctx.fillStyle = '#b89a48';
      ctx.fillRect(p.x+4, p.y+5, 14, 6);
    }
  }
  
  // Boxes area
  let bx = 20;
  for(let i=0; i<boxes.length && i<8; i++) {
    let box = boxes[i];
    ctx.fillStyle = '#c8b86a';
    ctx.fillRect(bx, 460, 32, 28);
    ctx.fillStyle = '#a89648';
    ctx.fillRect(bx+8, 465, 16, 18);
    ctx.fillStyle = '#000';
    ctx.font = 'bold 10px monospace';
    ctx.fillText(box.count, bx+12, 482);
    bx += 38;
  }
  
  // Roller cart (right side)
  ctx.fillStyle = '#8a7a5a';
  ctx.fillRect(660, 420, 120, 38);
  ctx.fillStyle = '#6a5a3a';
  for(let i=0; i<6; i++) {
    let filled = i < cartBoxes.length;
    ctx.fillStyle = filled ? '#6a9a4a' : '#5a4a2a';
    ctx.fillRect(665 + i*19, 425, 17, 28);
    if(filled) ctx.fillStyle = '#ffdd88';
    else ctx.fillStyle = '#aa9966';
    ctx.fillRect(668 + i*19, 430, 11, 18);
  }
  
  // Player (8-bit character)
  ctx.fillStyle = '#6688cc';
  ctx.fillRect(playerX, 400, 28, 42);
  ctx.fillStyle = '#ffcc88';
  ctx.fillRect(playerX+6, 395, 16, 12);
  ctx.fillStyle = '#000';
  ctx.fillRect(playerX+10, 400, 3, 3);
  ctx.fillRect(playerX+16, 400, 3, 3);
  ctx.fillStyle = '#aa8866';
  ctx.fillRect(playerX+12, 412, 6, 6);
  ctx.fillStyle = '#ffaa44';
  ctx.fillRect(playerX+10, 428, 8, 8);
  
  // Held part indicator
  if(heldPart && !heldPart.bad) {
    ctx.fillStyle = '#d8c878';
    ctx.fillRect(playerX+32, 410, 18, 14);
  }
  
  // NPCs - Predačka (orange)
  ctx.fillStyle = '#e07a2a';
  ctx.fillRect(560, 400, 28, 42);
  ctx.fillStyle = '#ffccaa';
  ctx.fillRect(566, 395, 16, 12);
  ctx.fillStyle = '#fff';
  ctx.fillRect(570, 402, 3, 3);
  ctx.fillRect(576, 402, 3, 3);
  
  // Skladník (red stripe)
  ctx.fillStyle = '#cc2222';
  ctx.fillRect(700, 400, 28, 42);
  ctx.fillStyle = '#2a8a2a';
  ctx.fillRect(704, 408, 20, 8);
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(708, 412, 12, 4);
  
  // Kvalitár (green)
  ctx.fillStyle = '#3a8a3a';
  ctx.fillRect(460, 400, 28, 42);
  ctx.fillStyle = '#ffccaa';
  ctx.fillRect(466, 395, 16, 12);
  
  // Naštavovač (black)
  ctx.fillStyle = '#222222';
  let navX = 220 + Math.sin(Date.now()/800) * 15;
  ctx.fillRect(navX, 400, 28, 42);
  ctx.fillStyle = '#ffaa66';
  ctx.fillRect(navX+10, 428, 8, 8);
  
  // Label printed indicator
  if(labelPrinted) {
    ctx.fillStyle = '#ffdd88';
    ctx.fillRect(660, 380, 80, 18);
    ctx.fillStyle = '#000';
    ctx.font = 'bold 8px monospace';
    ctx.fillText('ETIKETA', 680, 393);
  }
  
  // Task progress indicators
  ctx.fillStyle = '#ffaa66';
  ctx.font = '8px monospace';
  ctx.fillText('20ks=box', 20, 520);
  ctx.fillText(`Boxy: ${boxes.filter(b=>b.count>=20).length}`, 20, 535);
  ctx.fillText(`Vozík: ${cartBoxes.length}/6`, 20, 550);
  
  // Shift timer
  let pct = (shiftTime / shiftDuration) * 200;
  ctx.fillStyle = '#3a6a2a';
  ctx.fillRect(20, 30, 200, 12);
  ctx.fillStyle = '#8acc4a';
  ctx.fillRect(20, 30, pct, 12);
  ctx.fillStyle = '#fff';
  ctx.fillText(`ZMENA ${Math.floor(shiftTime/60)}:${(shiftTime%60).toString().padStart(2,'0')}`, 20, 25);
}

// Animation loop
let lastMove = 0;
function gameLoop() {
  // Player movement
  if(moveLeft && gameRunning) playerX = Math.max(40, playerX - 4);
  if(moveRight && gameRunning) playerX = Math.min(740, playerX + 4);
  
  // Move parts
  for(let p of partsOnConveyor) {
    p.x += 1.1;
  }
  // Remove parts that fell off
  let before = partsOnConveyor.length;
  partsOnConveyor = partsOnConveyor.filter(p => p.x < 780);
  if(partsOnConveyor.length < before && gameRunning) audio.stepSound();
  
  drawPixelArt();
  requestAnimationFrame(gameLoop);
}

// ========== EVENT HANDLERS ==========
document.getElementById('btnLeft').addEventListener('touchstart', (e) => { e.preventDefault(); moveLeft = true; });
document.getElementById('btnLeft').addEventListener('touchend', () => { moveLeft = false; });
document.getElementById('btnLeft').addEventListener('mousedown', () => { moveLeft = true; });
document.getElementById('btnLeft').addEventListener('mouseup', () => { moveLeft = false; });

document.getElementById('btnRight').addEventListener('touchstart', (e) => { e.preventDefault(); moveRight = true; });
document.getElementById('btnRight').addEventListener('touchend', () => { moveRight = false; });
document.getElementById('btnRight').addEventListener('mousedown', () => { moveRight = true; });
document.getElementById('btnRight').addEventListener('mouseup', () => { moveRight = false; });

document.getElementById('btnPickup').addEventListener('click', () => pickupPart());
document.getElementById('btnBox').addEventListener('click', () => placeToBox());
document.getElementById('btnCart').addEventListener('click', () => loadBoxToCart());
document.getElementById('btnLabel').addEventListener('click', () => callPredacka());
// Long press on label also calls skladnik? Separate button - add warehouse call
// Add hidden double tap? Better: add 6th button for skladnik
const skladnikBtn = document.createElement('button');
skladnikBtn.className = 'touch-btn action-btn';
skladnikBtn.innerHTML = '🚛';
skladnikBtn.style.background = 'rgba(0,0,0,0.8)';
skladnikBtn.style.borderColor = '#ff8866';
skladnikBtn.onclick = () => callSkladnik();
document.querySelector('.touch-controls').appendChild(skladnikBtn);

document.getElementById('startBtn').addEventListener('click', () => startShift());
document.getElementById('statsBtn').addEventListener('click', () => showStats());
document.getElementById('closeStatsBtn').addEventListener('click', () => document.getElementById('statsOverlay').classList.remove('visible'));
document.getElementById('fixBtn').addEventListener('click', () => fixPorucha());
document.getElementById('endMenuBtn').addEventListener('click', () => {
  document.getElementById('endOverlay').classList.remove('visible');
  document.getElementById('menuOverlay').classList.add('visible');
});

// Keyboard support
document.addEventListener('keydown', (e) => {
  if(e.key === 'ArrowLeft') moveLeft = true;
  if(e.key === 'ArrowRight') moveRight = true;
  if(e.key === ' ' || e.key === 'Space') pickupPart();
  if(e.key === 'b') placeToBox();
  if(e.key === 'c') loadBoxToCart();
  if(e.key === 'l') callPredacka();
  if(e.key === 's') callSkladnik();
});
document.addEventListener('keyup', (e) => {
  if(e.key === 'ArrowLeft') moveLeft = false;
  if(e.key === 'ArrowRight') moveRight = false;
});

// Initialize audio on first touch
function initAudio() {
  audio.init();
  audio.playTone(440, 0.1);
  document.removeEventListener('touchstart', initAudio);
  document.removeEventListener('click', initAudio);
}
document.addEventListener('touchstart', initAudio);
document.addEventListener('click', initAudio);

// Show menu on load
document.getElementById('menuOverlay').classList.add('visible');
gameLoop();
updateUI();
</script>
