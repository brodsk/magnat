Zde je plně přizpůsobená a optimalizovaná mobilní verze hry. Rozložení, ovládání i vizuály jsou nyní navrženy pro pohodlné hraní na dotykových telefonech.

```html
<!DOCTYPE html>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

body {
  background: #0a0f12;
  font-family: 'Segoe UI', system-ui, -apple-system, 'Roboto', sans-serif;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
  position: fixed;
  touch-action: pan-x pan-y; /* povolený swipe, ale hra reaguje na ťuky */
}

/* HLAVNÍ HERNÍ OBRAZOVKA - FULLSCREEN MOBILE FIRST */
#gameFullscreen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 20;
  background: #1a2a1f;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 8px;
}

.game-wrapper {
  width: 100%;
  max-width: 550px;
  background: #2c4028;
  border-radius: 32px;
  padding: 12px 10px 16px 10px;
  box-shadow: 0 15px 30px rgba(0,0,0,0.5), inset 0 1px 2px rgba(255,255,255,0.1);
}

canvas {
  display: block;
  width: 100%;
  height: auto;
  background: #1e2a1a;
  border-radius: 24px;

  cursor: pointer;
  touch-action: none;
}

  display: flex;

  margin-bottom: 12px;
  padding: 8px 16px;

  flex-wrap: wrap;
}

  background: #00000066;
  padding: 4px 12px;

}

  font-weight: 800;

  padding: 4px 14px;
  border-radius: 30px;
  font-family: monospace;
}

/* POZADÍ - BĚŽÍCÍ POSTAVY (optimalizované) */
.background-stage {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
  pointer-events: none;
  overflow: hidden;
}

.bg-character {
  position: absolute;
  font-size: clamp(14px, 5vw, 22px);
  white-space: nowrap;
  filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.5));
  transition: left 0.05s linear;
  pointer-events: none;
  text-shadow: 0 0 2px black;
  font-weight: 500;
  background: rgba(0,0,0,0.3);
  padding: 2px 8px;
  border-radius: 40px;
  backdrop-filter: blur(2px);
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.bg-bubble {
  position: absolute;
  background: #fff9e0;
  color: #b22d0a;
  font-weight: bold;
  font-size: 0.7rem;
  padding: 4px 12px;
  border-radius: 30px;
  white-space: nowrap;
  font-family: monospace;
  box-shadow: 0 2px 8px black;
  animation: fadeUpMobile 0.9s ease-out forwards;
  z-index: 3;
  pointer-events: none;
}

@keyframes fadeUpMobile {
  0% { opacity: 0; transform: translateY(5px); }
  20% { opacity: 1; }
  100% { opacity: 0; transform: translateY(-40px); }
}

/* MODÁLNÍ MENU (start / game over) */
.overlay-menu {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(6px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  padding: 20px;
}

.menu-card {
  background: #262e22e6;
  border-radius: 48px;
  padding: 28px 20px;
  text-align: center;
  color: #f7efcf;
  border: 1px solid #daa45a;
  max-width: 90%;
  width: 340px;
  box-shadow: 0 20px 35px black;
}

.menu-card h2 {
  font-size: 1.6rem;
  margin-bottom: 8px;
}

.menu-card p {
  font-size: 0.8rem;
  opacity: 0.9;
  margin: 8px 0;
}

.char-select {
  display: flex;
  gap: 20px;
  justify-content: center;
  margin: 20px 0;
}

.char-card {
  background: #3a2c1e;
  padding: 12px 8px;
  border-radius: 36px;
  cursor: pointer;
  border: 2px solid #7a623a;
  transition: 0.1s;
  flex: 1;
  text-align: center;
}

.char-card.selected {
  border-color: #f5b642;
  background: #685434;
  box-shadow: 0 0 10px gold;
}

.char-emoji {
  font-size: 2.2rem;
}

.game-btn {
  background: #5b8c4e;
  border: none;
  font-size: 1.2rem;
  font-weight: bold;
  padding: 12px 20px;
  margin-top: 12px;
  border-radius: 60px;
  color: white;
  cursor: pointer;
  width: 80%;
  font-family: monospace;
  transition: 0.05s linear;
  box-shadow: 0 3px 0 #2d4a24;
}

.game-btn:active {
  transform: translateY(2px);
  box-shadow: 0 1px 0 #2d4a24;
}

.quote {
  font-style: italic;
  font-size: 0.7rem;
  margin-top: 16px;
  color: #e7c882;
}

/* responzivní drobnosti */
@media (max-width: 500px) {
  .mobile-btn { padding: 10px 20px; font-size: 1.4rem; }
  .stat-item { font-size: 0.7rem; padding: 3px 8px; }
  .stat-value { font-size: 1rem; }
}
</style>
</head>
<body>

<div class="background-stage" id="bgStage"></div>

<div id="gameFullscreen">
  <div class="game-wrapper">
    <canvas id="gameCanvas" width="700" height="420" style="width:100%; height:auto; aspect-ratio:700/420"></canvas>
    
    <div class="game-stats">
      <div class="stat-item">🎯 SKÓRE <span class="stat-value" id="gameScore">0</span></div>
      <div class="stat-item">❤️ ŽIVOTY <span class="stat-value" id="gameLives">3</span></div>
      <div class="stat-item">⚙️ LISY <span class="stat-value" id="gamePressCount">1</span></div>
    </div>
    
    <div class="controls-row">
      <button class="mobile-btn" id="ctrlLeftBtn">◀ ĽAVO</button>
      <button class="mobile-btn" id="ctrlRightBtn">PRAVO ▶</button>
    </div>
    <div class="tap-hint">
      ↙️ Ťukni na ľavú/pravú stranu plátna  |  tlačidlá dole
    </div>
  </div>
</div>

<script>
  (function(){
    // ---------- POZADÍ S OPTIMALIZACÍ PRO MOBIL (méně postav, plynulost) ----------
    const bgStage = document.getElementById('bgStage');
    let bgCharacters = [];
    let bgAnimationId = null;
    let bgActive = true;

    function createBgCharacter(type, yPercent, speed, startXPercent) {
      const div = document.createElement('div');
      div.className = 'bg-character';
      let html = '';
      if (type === 'worker') html = '👨‍🏭 🛠️ tmavý';
      if (type === 'predak1') html = '👩‍🦰 🧡 PREDÁK';
      if (type === 'predak2') html = '👩‍🦳 🧡 PREDÁK';
      if (type === 'skladnik') html = '📦 🟥 SKLADNÍK';
      if (type === 'nastavovac') html = '🧔‍♂️ 🔧 NASTAVOVAČ';
      div.innerHTML = html;
      const y = (window.innerHeight * yPercent) % (window.innerHeight - 60);
      div.style.top = y + 'px';
      div.style.left = startXPercent + '%';
      div.style.fontSize = (13 + Math.random() * 8) + 'px';
      div.style.opacity = 0.75;
      bgStage.appendChild(div);
      return { element: div, type, x: (startXPercent / 100) * window.innerWidth, y: y, speed: speed, width: 120, lastBubble: 0 };
    }

    function updateBackgroundMobile() {
      if (!bgActive) return;
      for (let i = 0; i < bgCharacters.length; i++) {
        const c = bgCharacters[i];
        c.x += c.speed;
        const maxX = window.innerWidth + 150;
        const minX = -180;
        if (c.x > maxX) c.x = minX;
        if (c.x < minX) c.x = maxX;
        c.element.style.left = c.x + 'px';
        
        if (Math.random() < 0.0025 && (Date.now() - (c.lastBubble||0)) > 3800) {
          c.lastBubble = Date.now();
          let text = '';
          if (c.type === 'nastavovac') text = '🔧 PORUCHA FORMY! 🔧';
          else if (c.type === 'predak1') text = '🚨 RYCHLEJŠIE! ZABER!';
          else if (c.type === 'predak2') text = '📋 KVALITA? PRIDAJ LIS!';
          else if (c.type === 'skladnik') text = '📦 NOVÉ BOXY!';
          else text = '🏭 TEMPO!';
          const bubble = document.createElement('div');
          bubble.className = 'bg-bubble';
          bubble.textContent = text;
          bubble.style.left = (c.x + 30) + 'px';
          bubble.style.top = (c.y - 18) + 'px';
          bgStage.appendChild(bubble);
          setTimeout(() => bubble.remove(), 950);
        }
      }
      bgAnimationId = requestAnimationFrame(updateBackgroundMobile);
    }

    function initBackgroundMobile() {
      if(bgAnimationId) cancelAnimationFrame(bgAnimationId);
      bgStage.innerHTML = '';
      bgCharacters = [];
      // redukovaný počet pro mobil (plynulost)
      for (let i = 0; i < 5; i++) {
        const yPerc = 20 + Math.random() * 65;
        const speed = (Math.random() * 0.55 + 0.3) * (Math.random() > 0.5 ? 1 : -1);
        const startXPerc = Math.random() * 100;
        bgCharacters.push(createBgCharacter('worker', yPerc/100, speed, startXPerc));
      }
      // predacky
      bgCharacters.push(createBgCharacter('predak1', 0.25, 0.48, Math.random()*100));
      bgCharacters.push(createBgCharacter('predak2', 0.55, -0.5, Math.random()*100));
      // skladnici
      bgCharacters.push(createBgCharacter('skladnik', 0.7, 0.52, Math.random()*100));
      bgCharacters.push(createBgCharacter('skladnik', 0.4, -0.45, Math.random()*100));
      // nastavovaci (jeden borodaty)
      bgCharacters.push(createBgCharacter('nastavovac', 0.85, 0.6, Math.random()*100));
      bgCharacters.push(createBgCharacter('nastavovac', 0.15, -0.55, Math.random()*100));
      
      updateBackgroundMobile();
    }
    window.addEventListener('resize', () => { initBackgroundMobile(); });
    
    // ---------- HRA LISOVNA (optimalizace pro dotyky a výkon) ----------
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let W = 700, H = 420;
    canvas.width = W; canvas.height = H;
    
    let gameRunning = false;
    let score = 0, lives = 3, pressCount = 1;
    let baseSpeed = 2.2;
    let spawnRate = 54;
    let frame = 0;
    let items = [];
    let predakActive = false;
    let predakTimer = 0;
    let predakX = W+80;
    let predakDir = -1;
    let animationId = null;
    let selectedChar = 'male';
    
    // 5 jízdních pruhů
    const LANES = [W*0.18, W*0.34, W*0.5, W*0.66, W*0.82];
    let player = { lane: 2, x: LANES[2], y: H-52, armAngle: 0, armDir: 1 };
    
    function updateUI() {
      document.getElementById('gameScore').innerText = score;
      document.getElementById('gameLives').innerHTML = lives;
      document.getElementById('gamePressCount').innerText = pressCount;
    }
    
    function spawnItem() {
      const laneIdx = Math.floor(Math.random() * LANES.length);
      const isBad = Math.random() < (0.2 + (pressCount > 1 ? 0.08 : 0) + (predakActive ? 0.12 : 0));
      items.push({
        lane: laneIdx,
        x: LANES[laneIdx],
        y: -20,
        bad: isBad,
        speed: baseSpeed + Math.random() * 1.0 + (pressCount > 1 ? 0.5 : 0)
      });
    }
    
    function updateItemsAndCollision() {
      for (let i=items.length-1; i>=0; i--) {
        const it = items[i];
        it.y += it.speed;
        const catchZone = (it.y > H-72 && it.y < H-38 && Math.abs(it.x - player.x) < 32);
        if (catchZone) {
          if (!it.bad) {
            score += 10 * pressCount;
            updateUI();
          } else {
            lives--;
            updateUI();
            if (lives <= 0) gameOverSequence();
          }
          items.splice(i,1);
          continue;
        }
        if (it.y > H+25) {
          if (!it.bad) {
            lives--;
            updateUI();
            if (lives <= 0) gameOverSequence();
          }
          items.splice(i,1);
        }
      }
    }
    
    function updatePredakLogic() {
      if (!gameRunning) return;
      if (!predakActive && frame > 160 && frame % 620 === 0 && pressCount < 3) {
        predakActive = true;
        predakTimer = 360;
        predakX = W+70;
        predakDir = -1;
        // predák pridá lis
        pressCount = Math.min(3, pressCount+1);
        baseSpeed = Math.min(5.0, baseSpeed + 0.9);
        spawnRate = Math.max(32, spawnRate - 12);
        updateUI();
        // bublina v pozadí
        const bubbleDiv = document.createElement('div');
        bubbleDiv.className = 'bg-bubble';
        bubbleDiv.textContent = '⚠️ PRIDANÝ LIS! RYCHLEJŠIE! ⚠️';
        bubbleDiv.style.left = '30%'; bubbleDiv.style.top = '70px';
        document.getElementById('bgStage').appendChild(bubbleDiv);
        setTimeout(()=>bubbleDiv.remove(),1600);
      }
      if (predakActive) {
        predakX += predakDir * 1.7;
        if (predakX < 25 && predakDir<0) predakDir = 1;
        if (predakX > W-60 && predakDir>0) predakDir = -1;
        predakTimer--;
        if (predakTimer <= 0) predakActive = false;
      }
    }
    
    // KRESLENÍ (odlehčené pro mobil)
    function drawBackground() {
      ctx.fillStyle = '#1d2b1a';
      ctx.fillRect(0,0,W,H);
      ctx.fillStyle = '#3b5433';
      for(let i=0;i<W+30;i+=38) ctx.fillRect(i, H-38, 24, 6);
      ctx.fillStyle = '#5b7c48';
      ctx.fillRect(0, H-32, W, 32);
      ctx.fillStyle = '#dbba6a';
      for(let i=0;i<4;i++) ctx.fillRect(30+i*140, 12, 18, 6);
    }
    
    function drawPart(x,y,bad) {
      ctx.save();
      ctx.translate(x,y);
      ctx.fillStyle = bad ? '#b42b2b' : '#538c4a';
      ctx.shadowBlur = 0;
      ctx.beginPath(); ctx.roundRect(-13, -8, 26, 16, 5); ctx.fill();
      ctx.fillStyle = bad ? '#e07a7a' : '#a0d08c';
      ctx.fillRect(-6, -3, 4, 6);
      ctx.fillRect(2, -3, 4, 6);
      if(bad){
        ctx.strokeStyle = '#ffcc55'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(-7,-5); ctx.lineTo(7,3); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(7,-5); ctx.lineTo(-7,3); ctx.stroke();
      } else {
        ctx.fillStyle = '#f5cf6a';
        ctx.beginPath(); ctx.arc(0, 2, 2.8, 0, Math.PI*2); ctx.fill();
      }
      ctx.restore();
    }
    
    function drawPlayerMobile() {
      const x = player.x, y = player.y;
      ctx.save(); ctx.translate(x,y);
      ctx.fillStyle = '#2f4025'; ctx.beginPath(); ctx.roundRect(-13, -6, 26, 24, 6); ctx.fill();
      ctx.fillStyle = '#5f7540'; ctx.fillRect(-7, 0, 14, 6);
      ctx.fillStyle = '#d9a56c';
      ctx.save(); ctx.translate(-12, -1); ctx.rotate(player.armAngle-0.2); ctx.fillRect(-3,-1,6,12); ctx.restore();
      ctx.save(); ctx.translate(12, -1); ctx.rotate(-player.armAngle+0.2); ctx.fillRect(-3,-1,6,12); ctx.restore();
      ctx.fillStyle = '#e7b87a';
      ctx.beginPath(); ctx.arc(0, -11, 10, 0, Math.PI*2); ctx.fill();
      if(selectedChar === 'female') {
        ctx.fillStyle = '#8b5a2e'; ctx.fillRect(-5, -17, 10, 4);
        ctx.fillStyle = '#b46a2a'; ctx.beginPath(); ctx.ellipse(-4, -14, 2, 3, -0.1,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(4, -14, 2, 3, 0.1,0,Math.PI*2); ctx.fill();
      } else {
        ctx.fillStyle = '#2d2a18'; ctx.fillRect(-7, -17, 14, 4);
      }
      ctx.fillStyle = '#1f1f1f';
      ctx.beginPath(); ctx.arc(-3, -12, 1.5,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(3, -12, 1.5,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#fecc88';
      ctx.beginPath(); ctx.ellipse(0, -7, 2.5, 1.8,0,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }
    
    function drawPredakMobile() {
      if(!predakActive) return;
      ctx.save(); ctx.translate(predakX, H-54);
      if(predakDir>0) ctx.scale(-1,1);
      ctx.fillStyle = '#e87c30'; ctx.beginPath(); ctx.roundRect(-14, -24, 28, 24, 6); ctx.fill();
      ctx.fillStyle = '#b85c20'; ctx.fillRect(-14, -9, 28, 5);
      ctx.fillStyle = '#cd8e60';
      ctx.fillRect(-4, -28, 8, 7);
      ctx.beginPath(); ctx.arc(0, -37, 10,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#bc5a2a'; ctx.fillRect(-8, -43, 16, 7);
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.arc(-3, -38, 1.5,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(3, -38, 1.5,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#fff7cf'; ctx.font = "bold 9px monospace"; ctx.fillText("🔥 RÝCHLO!", -24, -46);
      ctx.restore();
    }
    
    function drawMasterOverlay() {
      ctx.fillStyle = '#070707dd'; ctx.fillRect(0,0,W,H);
      ctx.font = 'bold 18px monospace'; ctx.fillStyle = '#e66';
      ctx.fillText('💀 MAJSTER V ČIERNEJ', W/2-100, H/2-40);
      ctx.font = '12px monospace'; ctx.fillStyle = '#edb87a';
      ctx.fillText('"PORUCHA FORMY! KVALITA KATASTROFA!"', W/2-170, H/2+10);
      ctx.save(); ctx.translate(W/2, H/2+70);
      ctx.fillStyle = '#1a1a1a'; ctx.fillRect(-22, -15, 44, 32);
      ctx.fillStyle = '#262626'; ctx.fillRect(-24, -35, 48, 24);
      ctx.fillStyle = '#ac784e'; ctx.beginPath(); ctx.arc(0, -45, 15,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#000'; ctx.fillRect(-12, -49, 24, 7);
      ctx.fillStyle = '#e00'; ctx.beginPath(); ctx.moveTo(-4, -36); ctx.lineTo(0, -32); ctx.lineTo(4, -36); ctx.fill();
      ctx.restore();
    }
    
    function gameLoop() {
      if(!gameRunning) return;
      frame++;
      player.x += (LANES[player.lane] - player.x) * 0.24;
      player.armAngle += 0.11 * player.armDir;
      if(Math.abs(player.armAngle)>0.6) player.armDir*=-1;
      if(frame % spawnRate === 0) spawnItem();
      updateItemsAndCollision();
      updatePredakLogic();
      drawBackground();
      for(let it of items) drawPart(it.x, it.y, it.bad);
      drawPlayerMobile();
      drawPredakMobile();
      ctx.font = 'bold 10px monospace'; ctx.fillStyle = '#ecd97a';
      ctx.fillText(`⚙️ LISY: ${pressCount}`, 12, 32);
      if(predakActive) ctx.fillStyle = '#ffaa55', ctx.fillText('👩‍🦰 PREDÁK', W-70, 32);
      if(lives<=0) return;
      animationId = requestAnimationFrame(gameLoop);
    }
    
    function gameOverSequence() {
      gameRunning = false;
      cancelAnimationFrame(animationId);
      drawMasterOverlay();
      const menuDiv = document.createElement('div');
      menuDiv.className = 'overlay-menu';
      menuDiv.innerHTML = `<div class="menu-card"><h2>💀 KONIEC VÝROBY 💀</h2><p>Skóre: ${score} | Počet lisov: ${pressCount}</p><div class="quote">"Mistr v čiernom ťa vyhodil z linky!"</div><button class="game-btn" id="restartGameBtn">🔄 ZNOVU LISOVAŤ</button><button class="game-btn" id="mainMenuBtn">🏠 HLAVNÉ MENU</button></div>`;
      document.body.appendChild(menuDiv);
      document.getElementById('restartGameBtn').onclick = () => { menuDiv.remove(); fullRestart(); };
      document.getElementById('mainMenuBtn').onclick = () => { menuDiv.remove(); showStartMenu(); };
    }
    
    function fullRestart() {
      score = 0; lives = 3; pressCount = 1; baseSpeed = 2.2; spawnRate = 54; frame = 0;
      items = []; predakActive = false; predakTimer = 0;
      player.lane = 2; player.x = LANES[2];
      gameRunning = true;
      updateUI();
      if(animationId) cancelAnimationFrame(animationId);
      animationId = requestAnimationFrame(gameLoop);
    }
    
    function showStartMenu() {
      if(animationId) cancelAnimationFrame(animationId);
      gameRunning = false;
      const menuDiv = document.createElement('div');
      menuDiv.className = 'overlay-menu';
      menuDiv.innerHTML = `
        <div class="menu-card">
          <h2>🏭 LISOVNA MAGNA 🏭</h2>
          <p>Chytaj plastové diely na zrkadlá! Červené = šrot → strata života.<br>⭐ PREDÁK pridá ďalší lis!</p>
          <div class="char-select">
            <div class="char-card" data-char="male">
              <div class="char-emoji">👨‍🏭</div>
              <div>MUŽ</div>
            </div>
            <div class="char-card" data-char="female">
              <div class="char-emoji">👩‍🏭</div>
              <div>ŽENA</div>
            </div>
          </div>
          <button class="game-btn" id="startGameFinal">▶ SPUSTIŤ LIS</button>
          <div class="quote">"Ťukni na plátno alebo tlačidlá"</div>
        </div>`;
      document.body.appendChild(menuDiv);
      document.querySelectorAll('.char-card').forEach(card => {
        card.addEventListener('click', () => {

        });
      });

        menuDiv.remove();
        fullRestart();
      };
    }
    
    // OVLÁDÁNÍ DOTYKY + tlačítka
    function moveLeft() { if(gameRunning && player.lane > 0) player.lane--; }
    function moveRight() { if(gameRunning && player.lane < LANES.length-1) player.lane++; }
    
    document.getElementById('ctrlLeftBtn').addEventListener('click', moveLeft);
    document.getElementById('ctrlRightBtn').addEventListener('click', moveRight);
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const touchX = (e.touches[0].clientX - rect.left) / rect.width * W;
      if(touchX < W/2) moveLeft(); else moveRight();
    }, {passive: false});
    canvas.addEventListener('mousedown', (e) => {
      const rect = canvas.getBoundingClientRect();
      const mouseX = (e.clientX - rect.left) / rect.width * W;
      if(mouseX < W/2) moveLeft(); else moveRight();
    });
    document.addEventListener('keydown', (e) => {
      if(e.key === 'ArrowLeft') { e.preventDefault(); moveLeft(); }
      if(e.key === 'ArrowRight') { e.preventDefault(); moveRight(); }
    });
    
    // Spustenie
    initBackgroundMobile();
    showStartMenu();
  })();
