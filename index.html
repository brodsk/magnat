html,body { width:100%; height:100%; overflow:hidden; background:#000; }
#app { width:100%; height:100%; display:flex; align-items:center; justify-content:center; background:#000; }

//  LISOVNA  –  Pixel Car Racer  visual clone  –  factory edition
//  Native resolution: 160 × 256  (PCR portrait ratio)
//  Everything drawn pixel-perfect, then scaled ×N to fill screen
// ═══════════════════════════════════════════════════════════════════════

const NW = 160, NH = 256;   // native resolution
const cv = document.getElementById('c');
const cx = cv.getContext('2d');

// Off-screen buffer at native res
const buf = document.createElement('canvas');
buf.width = NW; buf.height = NH;
const b = buf.getContext('2d');
b.imageSmoothingEnabled = false;

let SC = 1; // pixel scale

function resize() {
  const aw = window.innerWidth, ah = window.innerHeight;
  SC = Math.min(Math.floor(aw / NW), Math.floor(ah / NH));
  SC = Math.max(SC, 1);
  cv.width  = NW * SC;
  cv.height = NH * SC;
  cx.imageSmoothingEnabled = false;
}
resize();
window.addEventListener('resize', () => { resize(); render(); });

// ───────────────────────────────────────────────────────
//  PIXEL DRAWING PRIMITIVES
// ───────────────────────────────────────────────────────
function px(x,y,w,h,c){ b.fillStyle=c; b.fillRect(~~x,~~y,w,h); }

// PCR-style font helper (Press Start 2P)
function ft(text, x, y, col, sz=5, align='left') {
  b.font = `${sz}px 'Press Start 2P'`;
  b.textAlign = align;
  b.fillStyle = col;
  b.fillText(text, ~~x, ~~y);
  b.textAlign = 'left';
}

// PCR panel: dark fill + top-lighter border + bottom-darker border
function panel(x,y,w,h, col=C.uiPanel, borderT=C.uiLine, borderB='#000') {
  px(x,y,w,h,col);
  px(x,y,w,1,borderT);
  px(x,y+h-1,w,1,borderB);
  px(x,y,1,h,borderT);
  px(x+w-1,y,1,h,borderB);
}

// PCR button (dark body, lighter top, drop shadow)
function btn(x,y,w,h, label, lc=C.white, bc=C.neonB) {
  // shadow
  px(x+2, y+2, w, h, '#00000088');
  // body
  px(x,y,w,h,C.btnBg);
  // top highlight
  px(x,y,w,1,C.btnTop);
  px(x,y,1,h,C.btnTop);
  // accent border
  px(x,y,w,1,bc+'88');
  px(x,y+h-1,w,1,C.btnBot);
  // label
  ft(label, x+w/2, y+h/2+2, lc, 5, 'center');
}

// PCR title bar (orange→yellow gradient faked with rows)
function titleBar(x,y,w,h,text) {
  const steps=h;
  for(let i=0;i<steps;i++){
    const t=i/steps;
    const r2=Math.round(0xe8+t*(0xff-0xe8));
    const g2=Math.round(0x5d+t*(0xb7-0x5d));
    const b2=Math.round(0x04+t*(0x03-0x04));
    b.fillStyle=`rgb(${r2},${g2},${b2})`;
    b.fillRect(~~x,~~(y+i),w,1);
  }
  // text shadow
  ft(text, x+w/2+1, y+h/2+3, '#00000066', 6, 'center');
  ft(text, x+w/2, y+h/2+2, '#0b0c1a', 6, 'center');
}

  'Z': C.shoe,  // shoe
  'X': '#cc0000',// red dot (logo)
  'Y': C.neonY, // yellow
  'G': '#2d7d46',// dark green detail
  'N': '#888',  // gray (wrench)
  'D': '#ddd',  // light detail
  'M': C.mGrn,  // machine green
  'F': '#ffffff',// white
  'E': '#e86820',// orange
  'C': '#1971c2',// blue part
  'c': '#4dabf7',// light blue
  'V': '#c92a2a',// red part
  'v': '#ff6b6b',// light red part
  'U': '#fab005',// yellow marker on bad part
  'L': '#c8a84b',// window yellow
  'J': '#2a8a9a',// window cyan
};

function drawSprite(sprite, x, y) {
  sprite.forEach((row, ry) => {
    for(let rx=0;rx<row.length;rx++){
      const ch=row[rx];
      if(ch!=='.'&&PAL[ch]){
        b.fillStyle=PAL[ch];
        b.fillRect(~~x+rx, ~~y+ry, 1, 1);
      }
    }
  });
}

// Walking animation: flip left arm/leg every N frames
function drawChar(spr, x, y, frame, flip=false) {
  const bob = (frame>>3)&1;
  const ay = ~~y + bob;
  if(flip) {
    b.save();
    b.translate(~~x + spr[0].length, 0);
    b.scale(-1, 1);
    drawSprite(spr, 0, ay);
    b.restore();
  } else {
    drawSprite(spr, ~~x, ay);
  }
}

// ───────────────────────────────────────────────────────
//  INJECTION MOLDING MACHINE  (Engel style, 32×50)
// ───────────────────────────────────────────────────────
function drawMachine(x, y, w, h, active, frame) {
  // Base
  px(x,y+h-4,w,4,C.mGrnDk);
  // Body
  px(x+2,y,w-4,h-4,C.mGrn);
  // Left shading
  px(x+2,y,3,h-4,C.mGrnD);
  // Right shading
  px(x+w-5,y,3,h-4,C.mGrnD);
  // Top shine
  px(x+2,y,w-4,1,C.mGrnL);
  // Panel lines
  for(let i=6;i<h-8;i+=8) px(x+6,y+i,w-12,1,C.mGrnD);

  // Control panel box (right)
  const cpx=x+w-13, cpy=y+3;
  px(cpx,cpy,11,Math.floor(h*0.5),C.mGrnDk);
  px(cpx,cpy,11,1,'#335');
  // Screen
  px(cpx+1,cpy+2,9,8,'#0a0a1a');
  px(cpx+2,cpy+3,7,4,'#0a2a4a');
  // blinking line
  if((frame>>3)&1) px(cpx+2,cpy+4,7,1,C.neonG+'99');
  // Buttons
  px(cpx+2,cpy+11,3,2,active?C.neonG:'#115');
  px(cpx+6,cpy+11,3,2,C.neonR);
  px(cpx+2,cpy+15,7,2,C.neonO+'99');

  // Mold gap (center dark cavity)
  const mgx=x+Math.floor(w*0.25), mgw=Math.floor(w*0.42);
  px(mgx,y+2,mgw,h-10,C.mGrnDk);
  px(mgx,y+2,3,h-10,C.mGray);
  px(mgx+mgw-3,y+2,3,h-10,C.mGray);
  px(mgx+1,y+3,mgw-2,1,'#334');
  px(mgx+1,y+h-12,mgw-2,1,'#334');

  // Injection barrel
  const ibx=x+w-5;
  px(ibx,y+Math.floor(h*0.2),10,Math.floor(h*0.3),C.mGray);
  px(ibx+1,y+Math.floor(h*0.2)+1,8,Math.floor(h*0.3)-2,C.mGrnDk);
  px(ibx+10,y+Math.floor(h*0.28),4,6,'#556');

  // Status LED
  px(x+3,y+3,4,4,active&&(frame>>2)&1?C.neonG:C.mGrnDk);

  // ENGEL label
  ft('ENGEL',x+5,y+h-6,C.engLbl,4);
}

// ───────────────────────────────────────────────────────
//  CONVEYOR BELT  (horizontal, exits left of machine)
// ───────────────────────────────────────────────────────
function drawConveyor(x, y, w, frame) {
  const bh=5;
  px(x,y,w,bh,C.cv1);
  const off=(frame*2)%12;
  for(let bx=x+w-off;bx>=x-12;bx-=12) {
    if(bx+8>x&&bx<x+w) px(Math.max(x,bx),y+1,Math.min(8,bx+8-x),bh-2,C.cv2);
  }
  px(x,y,w,1,C.cv3);
  px(x,y+bh-1,w,1,'#111');
  px(x,y-1,3,bh+2,C.mGray);
  px(x+w-3,y-1,3,bh+2,C.mGray);
}

// ───────────────────────────────────────────────────────
//  NIGHT CITY BACKGROUND  (PCR side-scrolling style)
// ───────────────────────────────────────────────────────
let bgOff=0;

function drawNightCity(ctx2, frame) {
  // Sky — PCR uses 3-4 tone horizontal bands very dark
  for(let y2=0;y2<NH;y2++){
    const t=y2/NH;
    b.fillStyle = t<0.3 ? C.sky0 : t<0.6 ? C.sky1 : C.sky2;
    b.fillRect(0,y2,NW,1);
  }

  // Stars
  [[8,4],[22,9],[47,3],[73,11],[99,5],[128,8],[151,2]].forEach(([sx,sy])=>{
    px(sx,sy,1,1,(frame>>4)&1?'#ffffff':'#aaaaaa');
  });

  // ── Far buildings (slow scroll)
  const far = ~~(bgOff*0.4)%160;
  drawBldLayer(far, 28, 30, 0.55);
  // ── Mid buildings
  const mid = ~~(bgOff*0.7)%160;
  drawBldLayer(mid, 42, 40, 0.8);
  // ── Near buildings
  const near = ~~bgOff%160;
  drawBldLayer(near, 56, 50, 1.0);

  // Road
  px(0,62,NW,6,'#111122');
  px(0,64,NW,2,'#1a1a30');
  // Dashes
  const dash=(~~bgOff*3)%24;
  for(let dx=-dash;dx<NW;dx+=24) px(dx,65,12,1,C.neonY+'aa');
  // Curb
  px(0,67,NW,1,'#2a2a44');
}

// Template building data (width, height, col-index)
const BTEMPLATE=[
  {w:18,h:26,c:0},{w:12,h:20,c:1},{w:14,h:32,c:2},
  {w:20,h:24,c:0},{w:10,h:36,c:1},{w:16,h:22,c:2},
  {w:22,h:28,c:0},{w:12,h:18,c:1},{w:18,h:34,c:2},
  {w:14,h:26,c:0},{w:20,h:20,c:1},{w:10,h:30,c:2},
];
const BCOLS=[C.bld0,C.bld1,C.bld2];

function drawBldLayer(scrollOff, baseY, maxH, alpha) {
  b.globalAlpha=alpha;
  let bx=0;
  // repeat the template list until we fill 2× the screen width
  for(let rep=0;rep<3;rep++){
    BTEMPLATE.forEach(bt=>{
      const x2=bx-scrollOff;
      if(x2+bt.w>0&&x2<NW){
        const by=baseY-bt.h;
        // body
        px(x2,by,bt.w,bt.h,BCOLS[bt.c]);
        // roof neon line
        px(x2,by,bt.w,1,'#cc00ff44');
        // windows (4×4 grid of 2×2 pixels)
        const cols=Math.floor((bt.w-4)/5);
        const rows=Math.floor((bt.h-6)/6);
        for(let wr=0;wr<rows;wr++) for(let wc=0;wc<cols;wc++){
          const wx=x2+2+wc*5, wy=by+3+wr*6;
          const seed=(wx*7+wy*13+rep*100)%17;
          if(seed<8){
            const col=seed<3?C.winYel:seed<6?C.winBlu:C.winCyn;
            px(wx,wy,2,3,col);
          } else {
            px(wx,wy,2,3,C.winOff);
          }
        }
      }
      bx+=bt.w+2;
    });
  }

  // Magna factory (always visible, large building)
  const mx=(200-~~(scrollOff*0.3))%(NW+60)-20;
  drawMagnaBuilding(mx,baseY);

  b.globalAlpha=1;
}

function drawMagnaBuilding(bx,baseY){
  if(bx+50<0||bx>NW) return;
  const bh=44, by=baseY-bh;
  // body
  px(bx,by,50,bh,'#b8bfd4');
  // blue accents
  px(bx,by,50,3,'#1a44cc');
  px(bx,by+bh-4,50,4,'#1a44cc');
  px(bx,by,3,bh,'#1a44cc');
  px(bx+47,by,3,bh,'#1a44cc');
  // panel lines
  for(let pl=by+7;pl<by+bh-4;pl+=8) px(bx+3,pl,44,1,'#9098b0');
  // windows (2 rows × 5 cols)
  for(let wr=0;wr<2;wr++) for(let wc=0;wc<5;wc++){
    const wx=bx+5+wc*9, wy=by+6+wr*12;
    px(wx,wy,7,8,'#1a44cc');
    px(wx+1,wy+1,5,6,'#1a3366');
    px(wx+1,wy+1,2,2,'#334466');
  }
  // Magna sign
  px(bx+4,by+3,3,3,'#cc0000');
  ft('MAGNA',bx+9,by+8,'#1a2255',4);
}

// ───────────────────────────────────────────────────────
//  SPEECH BUBBLE  (PCR style: black box, coloured border)
// ───────────────────────────────────────────────────────
function speechBubble(x,y,lines,bc) {
  const lh=8, pad=3;
  let maxW=0;
  b.font="4px 'Press Start 2P'";
  lines.forEach(l=>{ maxW=Math.max(maxW,b.measureText(l).width); });
  const bw=Math.ceil(maxW)+pad*2+2, bh=lines.length*lh+pad*2;
  // shadow
  px(x+2,y-bh+2,bw,bh,'#00000099');
  // box
  px(x,y-bh,bw,bh,C.uiBg);
  px(x,y-bh,bw,1,bc);
  px(x,y-1,bw,1,bc);
  px(x,y-bh,1,bh,bc);
  px(x+bw-1,y-bh,1,bh,bc);
  // tail
  px(x+4,y,2,3,bc);
  px(x+5,y+1,1,2,C.uiBg);
  // text
  lines.forEach((l,i)=>ft(l,x+pad,y-bh+pad+5+i*lh,bc,4));
}

// ───────────────────────────────────────────────────────
//  PCR SCANLINES EFFECT
// ───────────────────────────────────────────────────────
function scanlines() {
  b.globalAlpha=0.09;
  for(let y2=0;y2<NH;y2+=2) px(0,y2,NW,1,'#000');
  b.globalAlpha=1;
}

// ───────────────────────────────────────────────────────
//  GAME STATE
// ───────────────────────────────────────────────────────
const G={
  sc:'menu',  // menu|game|over
  run:false,
  f:0,        // frame
  score:0, lives:3, level:1,
  char:'m',
  // layout
  numL:3, lXs:[], mw:0, mh:0, mY:0, cvY:0, flY:0,
  // player
  lane:1, px:0, tpx:0,
  // parts
  parts:[],
  pSpd:1.2, spRate:60, spTimer:0,
  // NPCs
  pred:{x:180,y:0,dir:-1,f:0,on:false,t:0,bub:0},
  nast:{x:-20,y:0,f:0,on:false,t:0,bub:0,stop:false},
  skl: {x:200,y:0,f:0,on:false,t:350},
  // feedback
  flash:0, fCol:'#f00',
  hitAnim:0,
  majQ:[],
};

const QUOTES=[
  ['CO TO ROBIS?!','MOJA BABICKA','RYCHLEJSIE!'],
  ['NESPOKOJNY!','REKLAMACIA!!'],
  ['ZAJTRA AUDIT','A TY TOTO??'],
  ['KTO TA NAUCIL','TAKTO ROBIT?'],
];

function layout(){
  G.numL=Math.min(2+Math.floor(G.level/2),5);
  G.mh=52; G.mw=Math.floor((NW-4)/G.numL)-2;
  G.mY=13; G.cvY=G.mY+G.mh-7; G.flY=NH-28;
  G.lXs=[]; for(let i=0;i<G.numL;i++) G.lXs.push(2+i*(G.mw+2));
  G.lane=Math.min(G.lane,G.numL-1);
  G.tpx=G.lXs[G.lane]+G.mw/2-5;
}

// ───────────────────────────────────────────────────────
//  SCREENS
// ───────────────────────────────────────────────────────
function drawMenu(){
  // Animated night city behind
  drawNightCity(b,G.f);

  // Dark overlay so menu is readable
  b.globalAlpha=0.6; px(0,0,NW,NH,C.uiBg); b.globalAlpha=1;

  // ── Title bar ──
  titleBar(4,4,NW-8,16,'LISOVNA');

  // ── Main panel ──
  panel(4,22,NW-8,NH-50,C.uiPanel,'#252850','#000');

  // Subtitle
  ft('FACTORY EDITION',NW/2,32,C.neonO,4,'center');
  ft('CHYTAJ DIELY!',NW/2,41,C.dimW,4,'center');

  // ── Character select ──
  px(4,45,NW-8,1,C.uiLine);
  ft('VYBER POSTAVU',NW/2,53,C.neonB,4,'center');

  // Cards
  const cw=48, ch=62, gap=8;
  const total=2*cw+gap, cx1=NW/2-total/2, cx2=cx1+cw+gap, cy=57;

  // Male card
  const msel=G.char==='m';
  px(cx1,cy,cw,ch,msel?'#0a1a2a':C.uiPanel);
  px(cx1,cy,cw,1,msel?C.neonY:C.uiLine);
  px(cx1,cy+ch-1,cw,1,msel?C.neonY:'#000');
  px(cx1,cy,1,ch,msel?C.neonY:C.uiLine);
  px(cx1+cw-1,cy,1,ch,msel?C.neonY:'#000');
  // char sprite (scaled 3×)
  b.save(); b.translate(cx1+4,cy+6); b.scale(3,3);
  drawChar(SPR_MALE,0,0,G.f); b.restore();
  ft('MUZ',cx1+cw/2,cy+ch-5,msel?C.neonY:C.dimW,4,'center');

  // Female card
  const fsel=G.char==='f';
  px(cx2,cy,cw,ch,fsel?'#0a1a2a':C.uiPanel);
  px(cx2,cy,cw,1,fsel?C.neonY:C.uiLine);
  px(cx2,cy+ch-1,cw,1,fsel?C.neonY:'#000');
  px(cx2,cy,1,ch,fsel?C.neonY:C.uiLine);
  px(cx2+cw-1,cy,1,ch,fsel?C.neonY:'#000');
  b.save(); b.translate(cx2+4,cy+6); b.scale(3,3);
  drawChar(SPR_FEMALE,0,0,G.f); b.restore();
  ft('ZENA',cx2+cw/2,cy+ch-5,fsel?C.neonY:C.dimW,4,'center');

  // ── Play button (PCR big green button) ──
  const by2=cy+ch+6;
  btn(8,by2,NW-16,16,'▶  HRAT',C.neonG,C.neonG);

  // How to play
  ft('< POHYB >',NW/2,by2+22,C.uiLine,4,'center');
  ft('TAP: LAVY / PRAVY',NW/2,by2+30,C.uiLine,3,'center');

  scanlines();
}

function drawGame(){
  // Factory interior bg
  px(0,0,NW,NH,C.wall);
  // Ceiling band
  px(0,0,NW,12,C.uiBg);
  for(let lx=8;lx<NW;lx+=18){ px(lx,1,12,4,C.wallA); px(lx+2,2,8,2,'#ffeeaa11'); }
  px(0,11,NW,1,'#cc00ff33');
  // Wall
  px(0,12,NW,60,'#0d0e1e');
  for(let wx=0;wx<NW;wx+=20){ px(wx,12,18,60,'#0f1022'); px(wx,12,18,1,'#1a1c38'); }
  // Floor
  px(0,G.flY,NW,NH-G.flY,C.floor);
  for(let fx=0;fx<NW;fx+=14){ px(fx,G.flY,12,NH-G.flY,C.floorT); px(fx,G.flY,12,1,'#1a1c30'); }
  px(0,G.flY,NW,1,'#2a2c44');

  // ── HUD top bar (PCR style) ──
  px(0,0,NW,11,C.uiBg);
  px(0,10,NW,1,'#cc00ff55');
  ft('SCR',3,9,C.neonB,4);
  ft(String(G.score).padStart(5,'0'),22,9,C.neonY,5);
  ft('HP',83,9,C.neonB,4);
  ft('♥'.repeat(Math.max(0,G.lives)),99,9,C.neonR,5);
  ft('L'+G.level,145,9,C.neonG,5);

  // ── Machines + conveyors ──
  for(let i=0;i<G.numL;i++){
    drawMachine(G.lXs[i], G.mY, G.mw, G.mh, i===G.lane, G.f);
    drawConveyor(G.lXs[i], G.cvY, G.mw, G.f);
  }

  // ── Parts ──
  G.parts.forEach(p=>{
    if(p.x>G.lXs[p.l]-14&&p.x<G.lXs[p.l]+G.mw)
      drawSprite(p.bad?PART_BAD:PART_GOOD, ~~p.x, p.y);
  });

  // ── Skladnik ──
  if(G.skl.on){
    const sy=G.flY-16;
    drawCart(~~G.skl.x+14, sy);
    b.save(); b.translate(~~G.skl.x, sy-16); b.scale(2,2);
    drawChar(SPR_SKLADNIK,0,0,G.skl.f); b.restore();
  }

  // ── Player ──
  {
    const py2=G.flY-32;
    b.save(); b.translate(~~G.px, py2); b.scale(2,2);
    drawChar(G.char==='m'?SPR_MALE:SPR_FEMALE,0,0,G.f);
    b.restore();
    // Lane glow under player
    if((G.f>>2)&1) px(G.lXs[G.lane],G.flY-1,G.mw,2,C.neonG+'33');
  }

  // ── Predak ──
  if(G.pred.on){
    const py2=G.flY-32;
    const flip=G.pred.dir>0;
    b.save(); b.translate(~~G.pred.x, py2); b.scale(2,2);
    drawChar(SPR_PREDAK,0,0,G.pred.f,flip); b.restore();
    if(G.pred.bub>0) speechBubble(~~G.pred.x, py2, ['VEZMI AJ','DRUHY LIS!'], C.neonO);
  }

  // ── Nastavovac ──
  if(G.nast.on||(G.nast.x>-16&&G.nast.x<NW+16)){
    const py2=G.flY-32;
    b.save(); b.translate(~~G.nast.x, py2); b.scale(2,2);
    drawChar(SPR_NAST,0,0,G.nast.f); b.restore();
    if(G.nast.bub>0&&G.nast.on) speechBubble(~~G.nast.x, py2, ['PORUCHA','FORMY!'], C.neonY);
  }

  // ── Flash ──
  if(G.flash>0){ b.globalAlpha=G.flash/16; px(0,0,NW,NH,G.fCol); b.globalAlpha=1; }

  // ── Hit score popup ──
  if(G.hitAnim>0){ ft('+'+10*G.level, ~~G.px+16, G.flY-38, C.neonG, 5); G.hitAnim--; }

  // ── Bottom controls (PCR style) ──
  px(0,NH-12,NW,12,C.uiBg);
  px(0,NH-12,NW,1,'#cc00ff44');
  btn(1,NH-11,NW/2-2,10,'◀',C.neonB,C.neonB);
  btn(NW/2+1,NH-11,NW/2-2,10,'▶',C.neonB,C.neonB);

  scanlines();
}

function drawOver(){
  px(0,0,NW,NH,C.uiBg);

  // Red title bar
  for(let i=0;i<14;i++){
    const t=i/14, r2=~~(0xef+t*(-0x50)), g2=~~(0x23+t*(-0x10)), b2=~~(0x3c+t*(-0x1f));
    b.fillStyle=`rgb(${r2},${g2},${b2})`; b.fillRect(0,i,NW,1);
  }
  ft('GAME OVER',NW/2,11,'#0b0c1a',7,'center');

  // Majster (big, angry)
  b.save(); b.translate(NW/2-10,30); b.scale(3,3);
  drawChar(SPR_MAJSTER,0,0,G.f); b.restore();

  // Quote
  G.majQ.forEach((l,i)=>ft(l,NW/2,78+i*9,C.neonR,4,'center'));

  // Score panel
  panel(8,104,NW-16,50,C.uiPanel,C.uiLine);
  ft('SKORE',NW/2,116,C.neonB,4,'center');
  ft(String(G.score).padStart(6,'0'),NW/2,128,C.neonY,7,'center');
  ft('LEVEL '+G.level,NW/2,140,C.neonG,4,'center');

  // Buttons
  btn(8,156,NW/2-12,14,'MENU',C.neonB,C.neonB);
  btn(NW/2+4,156,NW/2-12,14,'ZNOVA ▶',C.neonG,C.neonG);

  scanlines();
}

// ───────────────────────────────────────────────────────
//  UPDATE
// ───────────────────────────────────────────────────────
function update(){
  G.f++; bgOff+=0.5;

  // smooth player
  G.tpx=G.lXs[G.lane]+G.mw/2-5;
  G.px+=(G.tpx-G.px)*0.3;

  // spawn parts
  G.spTimer++;
  if(!G.nast.on && G.spTimer>=G.spRate){
    G.spTimer=0;
    const ln=~~(Math.random()*G.numL);
    const bad=Math.random()<(0.2+G.level*0.03+(G.pred.on?0.1:0));
    G.parts.push({l:ln, x:G.lXs[ln]+G.mw-14, y:G.cvY, bad,
      spd:G.pSpd+Math.random()*0.5+(G.pred.on?0.8:0)});
  }

  // move + catch parts
  for(let i=G.parts.length-1;i>=0;i--){
    const p=G.parts[i];
    p.x-=p.spd;
    if(p.l===G.lane){
      const pm=G.px+10;
      if(p.x+6<pm+12&&p.x+6>pm-16){
        if(!p.bad){ G.score+=10*G.level; G.hitAnim=18; }
        else { G.lives--; G.flash=14; G.fCol=C.neonR+'aa'; }
        G.parts.splice(i,1);
        if(G.lives<=0){gameOver();return;}
        continue;
      }
    }
    if(p.x<G.lXs[p.l]-16){
      if(!p.bad){ G.lives--; G.flash=10; G.fCol='#ff660088';
        if(G.lives<=0){gameOver();return;} }
      G.parts.splice(i,1);
    }
  }

  // level up
  if(G.score>0&&G.score%(160*G.level)===0&&G.f%4===0&&!G.pred.on){
    G.level++; G.pSpd=Math.min(G.pSpd+0.1,4); G.spRate=Math.max(24,G.spRate-3);
    layout();
  }

  // ── Predak ──
  if(!G.pred.on&&!G.nast.on&&G.f>150&&G.f%580===0){
    G.pred.on=true; G.pred.t=300; G.pred.x=NW+20; G.pred.dir=-1; G.pred.bub=220;
    G.pSpd=Math.min(G.pSpd+0.9,8);
    const nn=Math.min(G.numL+1,5); if(nn!==G.numL){G.numL=nn;layout();}
  }
  if(G.pred.on){
    G.pred.f++; G.pred.x+=G.pred.dir*1.4; G.pred.t--;
    G.pred.bub=Math.max(0,G.pred.bub-1);
    if(G.pred.x<18&&G.pred.dir<0) G.pred.dir=1;
    if(G.pred.x>NW-28&&G.pred.dir>0) G.pred.dir=-1;
    if(G.pred.t<=0){G.pred.on=false; G.pSpd=Math.max(G.pSpd-0.5,1.2+G.level*0.08);}
  }

  // ── Nastavovac ──
  if(!G.nast.on&&!G.pred.on&&G.f>250&&G.f%750===0){
    G.nast.on=true; G.nast.t=200; G.nast.x=-20; G.nast.stop=false; G.nast.bub=170;
  }
  if(G.nast.on){
    G.nast.f++; G.nast.bub=Math.max(0,G.nast.bub-1);
    if(!G.nast.stop){G.nast.x+=1.2; if(G.nast.x>NW*0.35) G.nast.stop=true;}
    G.nast.t--;
    if(G.nast.t<=0){G.nast.on=false;}
  } else if(G.nast.x>-20&&G.nast.x<NW+20){G.nast.x+=1.5;G.nast.f++;}

  // ── Skladnik ──
  G.skl.t--;
  if(G.skl.t<=0&&!G.skl.on){G.skl.on=true;G.skl.x=NW+60;G.skl.f=0;G.skl.t=550+~~(Math.random()*400);}
  if(G.skl.on){G.skl.x-=1.1;G.skl.f++;if(G.skl.x<-80)G.skl.on=false;}

  if(G.flash>0)G.flash--;
}

function gameOver(){G.run=false;G.sc='over';G.majQ=QUOTES[~~(Math.random()*QUOTES.length)];}

// ───────────────────────────────────────────────────────
//  RENDER
// ───────────────────────────────────────────────────────
function render(){
  b.clearRect(0,0,NW,NH);
  if(G.sc==='menu') drawMenu();
  else if(G.sc==='game') drawGame();
  else drawOver();
  cx.clearRect(0,0,cv.width,cv.height);
  cx.imageSmoothingEnabled=false;
  cx.drawImage(buf,0,0,cv.width,cv.height);
}

let raf2=null;
function loop(){
  if(G.run) update();
  else if(G.sc==='menu'||G.sc==='over') G.f++;
  bgOff+=G.run?0:0.3;
  render();
  raf2=requestAnimationFrame(loop);
}

// ───────────────────────────────────────────────────────
//  GAME FLOW
// ───────────────────────────────────────────────────────
function startGame(){
  G.sc='game'; G.run=true;
  G.score=0;G.lives=3;G.level=1;G.f=0;
  G.pSpd=1.2;G.spRate=60;G.parts=[];G.spTimer=0;G.lane=1;
  G.pred.on=false;G.nast.on=false;G.skl.on=false;
  G.skl.t=350;G.nast.x=-20;G.pred.x=NW+20;
  G.flash=0;G.hitAnim=0;
  layout();
  G.px=G.lXs[G.lane]+G.mw/2-5;
}

// ───────────────────────────────────────────────────────
//  INPUT
// ───────────────────────────────────────────────────────
let lh=false,rh=false,mi=null;
function mL(){if(G.sc!=='game')return;if(G.lane>0)G.lane--;}
function mR(){if(G.sc!=='game')return;if(G.lane<G.numL-1)G.lane++;}
function stL(e){if(e&&e.cancelable)e.preventDefault();mL();clearInterval(mi);mi=setInterval(()=>{if(lh)mL();},130);lh=true;}
function spL(){lh=false;clearInterval(mi);}
function stR(e){if(e&&e.cancelable)e.preventDefault();mR();clearInterval(mi);mi=setInterval(()=>{if(rh)mR();},130);rh=true;}
function spR(){rh=false;clearInterval(mi);}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft'){e.preventDefault();mL();}
  if(e.key==='ArrowRight'){e.preventDefault();mR();}
  if(e.key==='Enter'||e.key===' '){
    if(G.sc==='menu') startGame();
    else if(G.sc==='over') startGame();
  }
});

cv.addEventListener('pointerdown',e=>{
  e.preventDefault();
  const r2=cv.getBoundingClientRect();
  const nx=(e.clientX-r2.left)/r2.width*NW;
  const ny=(e.clientY-r2.top)/r2.height*NH;

  if(G.sc==='menu'){
    // char cards
    const cw=48,ch=62,gap=8,total=2*cw+gap,cx1=NW/2-total/2,cx2=cx1+cw+gap,cy=57;
    if(ny>cy&&ny<cy+ch){
      if(nx>cx1&&nx<cx1+cw) G.char='m';
      else if(nx>cx2&&nx<cx2+cw) G.char='f';
    }
    // play btn
    const by2=cy+ch+6;
    if(ny>by2&&ny<by2+16) startGame();
  } else if(G.sc==='game'){
    if(ny>NH-12){ nx<NW/2?mL():mR(); return; }
    nx<NW/2?mL():mR();
  } else if(G.sc==='over'){
    if(ny>156&&ny<170){
      if(nx<NW/2){ G.sc='menu'; G.run=false; }
      else startGame();
    }
  }
});

cv.addEventListener('touchstart',e=>{
  e.preventDefault();
  const r2=cv.getBoundingClientRect();
  const nx=(e.touches[0].clientX-r2.left)/r2.width*NW;
  const ny=(e.touches[0].clientY-r2.top)/r2.height*NH;
  if(G.sc==='game'){
    if(ny>NH-12){ if(nx<NW/2)stL(e);else stR(e);}
    else{nx<NW/2?mL():mR();}
  } else {
    // trigger pointerdown logic
  }
},{passive:false});
cv.addEventListener('touchend',()=>{spL();spR();},{passive:true});

// ───────────────────────────────────────────────────────
//  START
// ───────────────────────────────────────────────────────
window.addEventListener('load',()=>{
  layout();
  loop();
});
</script>
