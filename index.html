<!DOCTYPE html><html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LISOVNA PCR GARAGE</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
body{margin:0;background:#04060f;overflow:hidden}
canvas{display:block;image-rendering:pixelated}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const c=document.getElementById('c');
const ctx=c.getContext('2d');
let W,H;
function resize(){W=c.width=innerWidth;H=c.height=innerHeight;ctx.imageSmoothingEnabled=false}
resize();onresize=resize;// ───────── HELPERS function r(x,y,w,h,col){ctx.fillStyle=col;ctx.fillRect(x,y,w,h)} function txt(t,x,y,s=10,c='#fff',align='left'){ ctx.font=s+"px 'Press Start 2P'"; ctx.textAlign=align; ctx.fillStyle=c; ctx.fillText(t,x,y); ctx.textAlign='left'; }

function btn(x,y,w,h,label,color){ r(x,y,w,h,'#12152e'); r(x,y, w,2,color); r(x,y+h-2,w,2,'#000'); r(x,y,2,h,color); r(x+w-2,y,2,h,'#000'); txt(label,x+w/2,y+h/2+3,8,color,'center'); }

function titleBar(){ for(let i=0;i<30;i++){ ctx.fillStyle=rgb(${232+i*2},${93+i*3},3); ctx.fillRect(0,i,W,1); } txt('LISOVNA',W/2,20,12,'#0a0c1e','center'); }

// ───────── GAME STATE const G={scene:'garage',money:1200,level:3};

// ───────── GARAGE FULL PCR STYLE function drawGarage(){ r(0,0,W,H,'#0a0b18'); titleBar();

// back wall r(0,30,W,H/2,'#0b0c1a');

// shelves for(let i=0;i<4;i++){ let y=80+i*60; r(50,y,200,6,'#222');

// boxes/tools for(let j=0;j<4;j++){ r(60+j*45,y-20,20,20,['#ff595e','#ffca3a','#8ac926','#1982c4'][j%4]); } }

// tool rack for(let i=0;i<6;i++){ r(300+i*20,120,4,30,'#888'); }

// hanging light glow ctx.globalAlpha=0.2; r(W/2-100,60,200,100,'#ffffaa'); ctx.globalAlpha=1;

// machine (centerpiece like car) r(W/2-120,H/2-20,240,40,'#000'); r(W/2-120,H/2-20,240,5,'#00e5ff');

// reflection ctx.globalAlpha=0.2; r(W/2-120,H/2+25,240,20,'#00e5ff'); ctx.globalAlpha=1;

// floor r(0,H/2,W,H/2,'#0f1022');

// floor shine lines for(let i=0;i<10;i++){ r(0,H/2+i*20,W,1,'#1a1c30'); }

// right UI panel btn(W-180,80,160,40,'START','#00e5ff'); btn(W-180,130,160,40,'UPGRADE','#ffd60a'); btn(W-180,180,160,40,'CUSTOM','#00b4d8'); btn(W-180,230,160,40,'PARTS','#06d6a0');

// stats txt('$ '+G.money,20,60,10,'#ffd60a'); txt('LVL '+G.level,20,80,10,'#06d6a0'); }

// ───────── LOOP function loop(){ if(G.scene==='garage') drawGarage(); requestAnimationFrame(loop); } loop(); </script>

</body>
</html>
