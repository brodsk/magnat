<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pixel Lisovna — Magna Slovteca</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
html,body{width:100%;height:100%;overflow:hidden;background:#111}
#wrap{display:flex;flex-direction:column;width:100%;height:100vh;height:100dvh;background:#111}
#cv{display:block;image-rendering:pixelated;image-rendering:crisp-edges;width:100%;flex:1;min-height:0;touch-action:none}
#hud{display:flex;gap:0;background:#0a0f1a;border-top:1px solid #223;flex-shrink:0}
.stat{flex:1;text-align:center;padding:4px 2px;border-right:1px solid #223}
.stat:last-child{border-right:none}
.sl{font-size:9px;color:#556;font-family:monospace;text-transform:uppercase;letter-spacing:1px}
.sv{font-size:14px;font-weight:bold;font-family:monospace;color:#aee}
#msgbar{font-family:monospace;font-size:11px;text-align:center;padding:3px;background:#0a0e18;color:#ffd700;min-height:20px;flex-shrink:0;border-top:1px solid #223}
#dpad{position:fixed;bottom:90px;left:12px;width:130px;height:130px;opacity:0.75;pointer-events:none}
#dpad button{position:absolute;width:42px;height:42px;background:rgba(40,80,140,0.7);border:1px solid #446;border-radius:8px;color:#adf;font-size:18px;display:flex;align-items:center;justify-content:center;pointer-events:all;user-select:none;-webkit-user-select:none}
#dpad button:active{background:rgba(60,120,200,0.9)}
#btn-u{top:0;left:44px}#btn-d{bottom:0;left:44px}#btn-l{left:0;top:44px}#btn-r{right:0;top:44px}
#btn-act{position:fixed;bottom:90px;right:12px;width:70px;height:70px;background:rgba(30,120,60,0.8);border:2px solid #4f8;border-radius:50%;color:#afa;font-size:11px;font-family:monospace;font-weight:bold;display:flex;align-items:center;justify-content:center;text-align:center;pointer-events:all;user-select:none;-webkit-user-select:none;line-height:1.2}
#btn-act:active{background:rgba(50,180,90,0.95);transform:scale(0.95)}
</style>
</head>
<body>
<div id="wrap">
<canvas id="cv"></canvas>
<div id="msgbar">Vitaj v Lisovni! Dobrú zmenu! 🏭</div>
<div id="hud">
  <div class="stat"><div class="sl">Čas</div><div class="sv" id="timer">06:00</div></div>
  <div class="stat"><div class="sl">Rollery</div><div class="sv" id="rollers">0</div></div>
  <div class="stat"><div class="sl">Skóre</div><div class="sv" id="score">0</div></div>
  <div class="stat"><div class="sl">Zmätok</div><div class="sv" id="scrap" style="color:#f88">0</div></div>
</div>
</div>

<div id="dpad">
  <button id="btn-u">▲</button>
  <button id="btn-d">▼</button>
  <button id="btn-l">◀</button>
  <button id="btn-r">▶</button>
</div>
<button id="btn-act">INTER<br>AGUJ</button>

<script>
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
ctx.imageSmoothingEnabled=false;

let W,H,SCALE;
function resize(){
  const wrap=document.getElementById('wrap');
  W=wrap.clientWidth;H=wrap.clientHeight;
  cv.width=Math.round(W);cv.height=Math.round(H);
  SCALE=W/480;
}
resize();
window.addEventListener('resize',()=>{resize();});

// ---- AUDIO ----
let AC;
function getAC(){if(!AC){AC=new(window.AudioContext||window.webkitAudioContext)();}return AC;}
function beep(freq,dur,type='square',vol=0.08,detune=0){
  try{const a=getAC();const o=a.createOscillator();const g=a.createGain();
  o.type=type;o.frequency.value=freq;o.detune.value=detune;
  g.gain.setValueAtTime(vol,a.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+dur);
  o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+dur);}catch(e){}
}
function sndStep(){beep(80+Math.random()*30,0.04,'square',0.04);}
function sndSort(){beep(440,0.05,'square',0.09);setTimeout(()=>beep(550,0.05,'square',0.07),60);}
function sndPrint(){for(let i=0;i<8;i++)setTimeout(()=>beep(200+i*30,0.04,'sawtooth',0.05),i*40);}
function sndPorucha(){
  beep(200,0.15,'sawtooth',0.15);setTimeout(()=>beep(150,0.2,'sawtooth',0.18),180);
  setTimeout(()=>beep(100,0.3,'sawtooth',0.2),420);
}
function sndFixed(){beep(523,0.1,'square',0.09);setTimeout(()=>beep(659,0.1,'square',0.09),120);setTimeout(()=>beep(784,0.15,'square',0.1),240);}
function sndBonus(){for(let i=0;i<5;i++)setTimeout(()=>beep(440+i*110,0.1,'square',0.08),i*80);}
function playHum(mid){
  try{
    const a=getAC();
    const buf=a.createBuffer(1,a.sampleRate*0.5,a.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*0.02*Math.sin(i*0.08+mid*0.5);
    const src=a.createBufferSource();src.buffer=buf;src.loop=true;
    const g=a.createGain();g.gain.value=0.15;
    src.connect(g);g.connect(a.destination);src.start();
    return {src,gain:g};
  }catch(e){return null;}
}
let humStarted=false;

// ---- GAME STATE ----
let score=0,rollers=0,scrap=0,tick=0,shiftSec=0;
const msgs=[];
function addMsg(t,c,d){
  msgs.push({txt:t,col:c||'#ffd700',t:0,dur:d||140});
  document.getElementById('msgbar').textContent=t;
  document.getElementById('msgbar').style.color=c||'#ffd700';
}

const MX_BASE=[30,120,210,300,390];
const MY_BASE=40;
const MW=80,MH=110;

const MACHINES=MX_BASE.map((bx,i)=>({
  x:bx,y:MY_BASE,w:MW,h:MH,id:i,
  state:'running',cycleT:0,cycleMax:140+i*22,
  partReady:false,
  bedL:{count:0,max:8,full:false},
  bedR:{count:0,max:8,full:false},
  rollerCount:0,
  labelPrintingL:false,labelPrintingR:false,
  printT:0,brokeT:0,animF:0,hum:null
}));

function startHums(){
  if(humStarted)return;humStarted=true;
  MACHINES.forEach(m=>{if(m.state==='running'){m.hum=playHum(m.id);}});
}

let P={x:240,y:220,dx:0,dy:0,moving:false,frame:0,fT:0,action:null,aT:0,tgt:-1,stepT:0};
const keys={up:false,down:false,left:false,right:false};

window.addEventListener('keydown',e=>{
  if(e.key==='ArrowUp'||e.key==='w')keys.up=true;
  if(e.key==='ArrowDown'||e.key==='s')keys.down=true;
  if(e.key==='ArrowLeft'||e.key==='a')keys.left=true;
  if(e.key==='ArrowRight'||e.key==='d')keys.right=true;
  if(e.key===' '){startHums();doInteract();}
  ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)&&e.preventDefault();
});
window.addEventListener('keyup',e=>{
  if(e.key==='ArrowUp'||e.key==='w')keys.up=false;
  if(e.key==='ArrowDown'||e.key==='s')keys.down=false;
  if(e.key==='ArrowLeft'||e.key==='a')keys.left=false;
  if(e.key==='ArrowRight'||e.key==='d')keys.right=false;
});

function holdBtn(id,key){
  const el=document.getElementById(id);
  el.addEventListener('touchstart',e=>{e.preventDefault();startHums();keys[key]=true;},{passive:false});
  el.addEventListener('touchend',e=>{e.preventDefault();keys[key]=false;},{passive:false});
  el.addEventListener('mousedown',()=>{startHums();keys[key]=true;});
  el.addEventListener('mouseup',()=>{keys[key]=false;});
}
holdBtn('btn-u','up');holdBtn('btn-d','down');holdBtn('btn-l','left');holdBtn('btn-r','right');
document.getElementById('btn-act').addEventListener('touchstart',e=>{e.preventDefault();startHums();doInteract();},{passive:false});
document.getElementById('btn-act').addEventListener('click',()=>{startHums();doInteract();});

cv.addEventListener('click',e=>{startHums();
  const rect=cv.getBoundingClientRect();
  const vx=(e.clientX-rect.left)/SCALE,vy=(e.clientY-rect.top)/SCALE;
  for(let i=0;i<MACHINES.length;i++){
    const m=MACHINES[i];
    if(vx>=m.x-5&&vx<=m.x+m.w+5&&vy>=m.y-20&&vy<=m.y+m.h+50){
      if(dist2(P,{x:m.x+m.w/2,y:m.y+m.h})<120)playerInteract(i);
    }
  }
},{passive:true});

function dist2(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}
function doInteract(){
  let ni=-1,nd=9999;
  for(let i=0;i<MACHINES.length;i++){
    const m=MACHINES[i],d=dist2(P,{x:m.x+m.w/2,y:m.y+m.h+8});
    if(d<nd){nd=d;ni=i;}
  }
  if(nd<130)playerInteract(ni);
  else addMsg('Choď bližšie k lisu!','#aabbcc');
}

function playerInteract(mi){
  const m=MACHINES[mi];
  if(m.state==='broken'){addMsg('Čakaj — Rado opravuje lis '+mi+'!','#ff6644');sndPorucha();return;}
  if(m.partReady&&P.action===null){
    P.action='sort';P.aT=0;P.tgt=mi;
    sndSort();addMsg('Triedim diely do bedničiek...','#ffd700');
  } else {
    if(m.bedL.full&&!m.labelPrintingL){m.labelPrintingL=true;m.printT=0;sndPrint();addMsg('Tlačím etiketu L — lis '+mi,'#44ffaa');}
    if(m.bedR.full&&!m.labelPrintingR){m.labelPrintingR=true;m.printT=0;sndPrint();addMsg('Tlačím etiketu R — lis '+mi,'#44ffaa');}
    if(!m.partReady&&!m.bedL.full&&!m.bedR.full)addMsg('Lis '+mi+' ešte pracuje...','#8899aa');
  }
}

const NPCS=[
  {type:'master',x:450,y:240,path:[],frame:0,facing:'left'},
  {type:'verka',x:60,y:280,path:[],frame:0,facing:'right'},
  {type:'silvia',x:420,y:285,path:[],frame:0,facing:'left'},
  {type:'andrej',x:30,y:260,path:[],frame:0,facing:'right'},
  {type:'rodo',x:200,y:240,path:[],frame:0,facing:'right'},
  {type:'kvality',x:350,y:275,path:[],frame:0,facing:'left'},
];

function updatePlayer(){
  const spd=2.2;
  P.dx=0;P.dy=0;
  if(keys.left)P.dx=-spd;if(keys.right)P.dx=spd;
  if(keys.up)P.dy=-spd;if(keys.down)P.dy=spd;
  P.x=Math.max(15,Math.min(465,P.x+P.dx));
  P.y=Math.max(175,Math.min(315,P.y+P.dy));
  P.moving=(P.dx!==0||P.dy!==0);
  if(P.moving){P.fT++;if(P.fT>7){P.frame=(P.frame+1)%4;P.fT=0;}P.stepT++;if(P.stepT%18===0)sndStep();}
  if(P.action==='sort'){
    P.aT++;
    if(P.aT>50){
      const m=MACHINES[P.tgt];
      if(m&&m.partReady){
        m.bedL.count=Math.min(m.bedL.max,m.bedL.count+1);
        m.bedR.count=Math.min(m.bedR.max,m.bedR.count+1);
        m.partReady=false;score+=10;
        if(Math.random()<0.07){scrap++;addMsg('Zmätok! Pozor na kvalitu!','#ff5544');score=Math.max(0,score-5);}
        if(m.bedL.count>=m.bedL.max)m.bedL.full=true;
        if(m.bedR.count>=m.bedR.max)m.bedR.full=true;
      }
      P.action=null;P.aT=0;P.tgt=-1;
    }
  }
}

function updateMachines(){
  for(const m of MACHINES){
    m.animF++;
    if(m.state==='running'){
      m.cycleT++;
      if(m.cycleT>=m.cycleMax){
        m.cycleT=0;m.partReady=true;
        if(Math.random()<0.1){
          m.state='broken';m.brokeT=0;
          if(m.hum){try{m.hum.src.stop();}catch(e){}m.hum=null;}
          triggerPorucha(m.id);
        }
      }
      if(m.labelPrintingL){m.printT++;if(m.printT>100){m.labelPrintingL=false;m.bedL={count:0,max:8,full:false};m.rollerCount++;checkRoller(m);}}
      if(m.labelPrintingR&&m.printT>100){m.labelPrintingR=false;m.bedR={count:0,max:8,full:false};}
    } else if(m.state==='broken'){
      m.brokeT++;
      if(m.brokeT>320){
        m.state='running';m.brokeT=0;
        sndFixed();addMsg('Lis '+m.id+' opravený! ✓','#44ffaa');
        if(humStarted&&!m.hum)m.hum=playHum(m.id);
      }
    }
  }
}

function checkRoller(m){
  if(m.rollerCount>=6){m.rollerCount=0;rollers++;score+=60;sndBonus();addMsg('Roller hotový! +60 bodov 🎉','#44ffaa',180);}
}

function triggerPorucha(mid){
  const rodo=NPCS.find(c=>c.type==='rodo');
  if(rodo)rodo.path=[{x:MACHINES[mid].x+40,y:MACHINES[mid].y+MH+5}];
  sndPorucha();
  addMsg('🔴 PORUCHA FORMY! Lis '+mid,'#ff3333',220);
}

function updateNPCs(){
  tick++;
  for(const c of NPCS){
    if(c.path&&c.path.length>0){
      const t=c.path[0],dx=t.x-c.x,dy=t.y-c.y,d=Math.hypot(dx,dy);
      const spd=c.type==='rodo'?3.5:1.4;
      if(d<4){c.path.shift();}
      else{c.x+=dx/d*spd;c.y+=dy/d*spd;c.facing=Math.abs(dx)>Math.abs(dy)?(dx>0?'right':'left'):(dy>0?'down':'up');}
      c.frame=(c.frame+1)%60;
    } else if(tick%220===0&&Math.random()<0.45){
      const mi=Math.floor(Math.random()*MACHINES.length);
      const mx=MACHINES[mi].x+MW/2,my=MACHINES[mi].y+MH+5;
      if(c.type==='verka')c.path=[{x:mx,y:my},{x:55,y:280}];
      else if(c.type==='silvia')c.path=[{x:mx,y:my},{x:430,y:282}];
      else if(c.type==='andrej')c.path=[{x:30+Math.random()*420,y:265}];
      else if(c.type==='kvality')c.path=[{x:MACHINES[mi].x+10,y:MACHINES[mi].y+MH+15},{x:360,y:275}];
      else if(c.type==='master'&&Math.random()<0.2)c.path=[{x:mx,y:my},{x:450,y:245}];
      else if(c.type==='rodo')c.path=[{x:MACHINES[Math.floor(Math.random()*5)].x+40,y:MY_BASE+MH+5}];
    }
  }
}

function updateUI(){
  shiftSec++;
  const h=6+Math.floor(shiftSec/120),m=Math.floor((shiftSec%120)/2);
  document.getElementById('timer').textContent=(h<10?'0':'')+h+':'+(m<10?'0':'')+m;
  document.getElementById('rollers').textContent=rollers;
  document.getElementById('score').textContent=score;
  document.getElementById('scrap').textContent=scrap;
}

function px(v){return Math.round(v*SCALE);}
function r(x,y,w,h,col){ctx.fillStyle=col;ctx.fillRect(px(x),px(y),Math.max(1,px(w)),Math.max(1,px(h)));}

function drawAll(){
  ctx.clearRect(0,0,W,H);
  drawBG();drawConveyors();
  for(const m of MACHINES)drawMachine(m);
  for(const c of NPCS)drawNPC(c);
  drawPlayer();drawOverlay();
}

function drawBG(){
  r(0,0,480,30,'#1e1e30');r(0,30,480,14,'#2a2a44');
  for(let i=0;i<5;i++){
    const lx=48+i*96;
    r(lx-6,2,12,8,'#3a3a54');r(lx-4,4,8,4,'#ffff99');
    ctx.save();ctx.globalAlpha=0.07;ctx.fillStyle='#ffffcc';
    ctx.beginPath();ctx.moveTo(px(lx),px(10));ctx.lineTo(px(lx-30),px(320));ctx.lineTo(px(lx+30),px(320));ctx.closePath();ctx.fill();
    ctx.restore();
  }
  r(0,44,480,130,'#252538');
  for(let p2=0;p2<480;p2+=96){r(p2,50,3,120,'#1a1a2e');}
  r(8,55,14,22,'#1a2a3a');r(10,57,10,18,'#223344');r(11,62,2,2,'#ff4444');r(14,62,2,2,'#44ff44');
  r(458,55,14,22,'#1a2a3a');r(460,57,10,18,'#223344');r(461,62,2,2,'#ff4444');r(464,62,2,2,'#44ff44');
  r(0,174,480,146,'#1e1e2e');
  for(let tx=0;tx<480;tx+=48){for(let ty=174;ty<320;ty+=48){r(tx,ty,47,47,'#202030');r(tx,ty,47,1,'rgba(255,255,255,0.03)');r(tx,ty,1,47,'rgba(255,255,255,0.03)');}}
  for(const m of MACHINES){ctx.save();ctx.globalAlpha=0.15;ctx.fillStyle='#4466aa';ctx.fillRect(px(m.x+2),px(m.y+m.h+4),px(m.w-4),px(40));ctx.restore();}
  for(let sx=0;sx<480;sx+=24){const odd=Math.floor(sx/24)%2===0;r(sx,172,12,3,odd?'#ffcc00':'#1e1e2e');}
  r(0,44,8,276,'#1a1a2c');r(472,44,8,276,'#1a1a2c');
  for(let sy=80;sy<170;sy+=40){r(0,sy,22,5,'#2a3a4a');for(let bi=2;bi<20;bi+=5)r(bi,sy-12,3,12,'#1e2e3e');}
}

function drawConveyors(){
  for(const m of MACHINES){
    const cx=m.x+4,cy=m.y+m.h,cw=m.w-8;
    r(cx,cy,cw,14,'#2a2a3a');
    const off=(tick*1.5)%16;
    for(let bx=cx-off;bx<cx+cw;bx+=16){const bw=Math.min(8,cx+cw-bx);if(bw>0)r(bx,cy+1,bw,12,'#2c3c4c');}
    r(cx,cy,cw,1,'#445566');r(cx,cy+13,cw,1,'#445566');
    if(m.partReady&&Math.floor(m.animF/8)%2===0){r(cx+4,cy+3,10,8,'#7799bb');r(cx+cw-14,cy+3,10,8,'#bb9977');}
  }
}

function drawMachine(m){
  const {x,y,w,h,state,bedL,bedR,cycleT,cycleMax,labelPrintingL,rollerCount,animF}=m;
  const brk=state==='broken';
  ctx.save();ctx.globalAlpha=0.25;r(x+2,y+2,w,h,'#000');ctx.restore();
  r(x,y,w,h,brk?'#2e1e1e':'#1e2e3e');
  r(x,y,w-3,h-3,brk?'#3e2020':'#263646');
  r(x,y,w,5,brk?'#ff2222':Math.floor(animF/15)%2===0&&!brk?'#00aaff':'#0077bb');
  r(x+4,y+6,w-10,42,'#0f1f2f');
  const ledC=brk?'#ff3333':cycleT/cycleMax>0.5?'#00ff88':'#00aaff';
  r(x+7,y+9,5,5,ledC);
  if(!brk){r(x+7,y+9,5,5,'rgba(0,200,255,'+(0.3+0.3*Math.sin(animF*0.2))+')');}
  r(x+14,y+9,20,10,'#001122');
  if(!brk){const p=cycleT/cycleMax;r(x+15,y+10,Math.round(18*p),8,'#00cc66');}
  else if(Math.floor(animF/10)%2===0){r(x+14,y+9,20,10,'#330000');}
  r(x+36,y+9,5,5,'#223344');r(x+43,y+9,5,5,'#332211');
  r(x+4,y+50,w-10,18,'#162636');r(x+4,y+52,(w-10)/2-1,14,'#1a2f3f');
  const stamping=!brk&&cycleT>cycleMax*0.82;
  const sc=stamping?'#5588aa':'#2a3a4a';
  r(x+6,y+52,14,8,sc);r(x+w-22,y+52,14,8,sc);
  if(stamping){
    const sh=Math.sin(animF*0.5)*3;
    r(x+6,y+60+sh,14,5,'#3a5566');r(x+w-22,y+60+sh,14,5,'#3a5566');
    if(Math.floor(animF/4)%3===0){ctx.fillStyle='#ffff88';ctx.fillRect(px(x+13),px(y+60+sh),2,2);ctx.fillStyle='#ffff88';ctx.fillRect(px(x+w-15),px(y+60+sh),2,2);}
  }
  r(x+4,y+70,w-10,20,'#0e1c2a');
  drawBednicka(x+5,y+71,bedL,'L');drawBednicka(x+w/2-1,y+71,bedR,'R');
  r(x+4,y+91,w-10,14,'#0a1520');
  if(labelPrintingL){
    r(x+5,y+93,28,10,'#ffffff');
    ctx.fillStyle='#000';ctx.font=px(5)+'px monospace';ctx.textAlign='left';
    ctx.fillText('ETK',px(x+6),px(y+99));ctx.fillText('####',px(x+17),px(y+99));
    if(Math.floor(animF/5)%2===0){r(x+5,y+93,28,10,'rgba(100,200,255,0.4)');}
  }
  r(x+5,y+h-5,12,5,'#1a2a38');r(x+w-17,y+h-5,12,5,'#1a2a38');
  ctx.fillStyle=brk?'#ff5555':'#5588aa';ctx.font='bold '+px(5)+'px monospace';ctx.textAlign='center';
  ctx.fillText('ENGEL '+m.id,px(x+w/2-1),px(y+h-1));
  if(brk){
    ctx.save();ctx.globalAlpha=0.4;r(x,y,w,h,'#ff0000');ctx.restore();
    if(Math.floor(animF/12)%2===0){ctx.fillStyle='#ff2222';ctx.font='bold '+px(6)+'px monospace';ctx.textAlign='center';ctx.fillText('PORUCHA!',px(x+w/2-1),px(y+h/2+2));}
  }
  for(let i=0;i<rollerCount;i++){
    const rx=x+4+i*(Math.floor((w-10)/6));
    r(rx,y+h+16,Math.floor((w-10)/6)-1,14,'#334455');r(rx+1,y+h+17,Math.floor((w-10)/6)-3,4,'#445566');
  }
}

function drawBednicka(x,y,bed,lbl){
  const fw=28,fh=18;
  r(x,y,fw,fh,'#1a2a3a');r(x+1,y+1,fw-2,fh-2,bed.full?'#112244':'#1e2e3e');
  if(bed.count>0){const bh=Math.round((fh-2)*bed.count/bed.max);r(x+1,y+1+fh-2-bh,fw-2,bh,bed.full?'#2255bb':'#224488');}
  r(x+1,y+1,fw-2,2,'rgba(255,255,255,0.1)');
  ctx.fillStyle=bed.full?'#88aaff':'#4466aa';ctx.font=px(5)+'px monospace';ctx.textAlign='center';
  ctx.fillText(lbl,px(x+fw/2),px(y+fh-2));
  if(bed.count>0&&bed.count<bed.max){for(let i=0;i<Math.min(bed.count,4);i++){r(x+3+i*5,y+8,3,3,'#3366cc');}}
}

function drawNPC(c){
  const {x,y,frame,type}=c;
  const moving=c.path&&c.path.length>0;
  let shirt='#111122';
  if(type==='verka')shirt='#cc6600';
  else if(type==='silvia')shirt='#bb5500';
  else if(type==='andrej')shirt='#991111';
  else if(type==='kvality')shirt='#116622';
  const leg=moving&&Math.floor(frame/12)%2===0?2:-2;
  ctx.save();ctx.globalAlpha=0.2;ctx.fillStyle='#000';ctx.beginPath();ctx.ellipse(px(x),px(y+2),px(6),px(2),0,0,Math.PI*2);ctx.fill();ctx.restore();
  r(x-4,y-2+(moving?leg:0),3,9,'#1e2e4e');r(x+1,y-2-(moving?leg:0),3,9,'#1e2e4e');
  r(x-5,y+7+(moving?leg:0),5,2,'#111');r(x,y+7-(moving?leg:0),5,2,'#111');
  r(x-5,y-12,10,10,shirt);
  if(type==='andrej'){r(x-5,y-8,10,2,'#22aa22');r(x-5,y-6,10,2,'#eeeeee');}
  r(x-4,y-20,8,8,'#b08060');
  if(type==='verka'){r(x-4,y-24,8,6,'#cccccc');}
  else if(type==='silvia'){r(x-4,y-23,8,5,'#bb4422');}
  else{r(x-4,y-22,8,4,'#111');}
  if(type==='andrej'){r(x+7,y-4,2,18,'#445');r(x+7,y-4,12,3,'#334');for(let bi=0;bi<3;bi++){r(x+8,y-2+bi*6,10,5,'#2a3a4a');r(x+9,y-1+bi*6,8,3,'#334455');}}
  if(type==='kvality'){r(x+5,y-10,5,7,'#eeee99');r(x+6,y-9,3,1,'#333');r(x+6,y-7,3,1,'#333');}
}

function drawPlayer(){
  const {x,y,moving,frame,action,aT}=P;
  const leg=moving&&frame%2===0?2:-2;
  ctx.save();ctx.globalAlpha=0.2;ctx.strokeStyle='#00aaff';ctx.lineWidth=px(1.5);
  ctx.beginPath();ctx.arc(px(x),px(y-8),px(9),0,Math.PI*2);ctx.stroke();ctx.restore();
  ctx.save();ctx.globalAlpha=0.3;ctx.fillStyle='#000';ctx.beginPath();ctx.ellipse(px(x),px(y+2),px(7),px(2.5),0,0,Math.PI*2);ctx.fill();ctx.restore();
  r(x-4,y-2+(moving?leg:0),3,10,'#1e2e4e');r(x+1,y-2-(moving?leg:0),3,10,'#1e2e4e');
  r(x-5,y+8+(moving?leg:0),5,2,'#0a0a1a');r(x,y+8-(moving?leg:0),5,2,'#0a0a1a');
  r(x-6,y-14,12,12,'#2a2a3e');r(x-6,y-14,12,2,'#333348');
  if(action==='sort'){
    r(x-10,y-12,5,4,'#b08060');r(x+5,y-12,5,4,'#b08060');
    r(x-12,y-12,4,4,'#7799bb');r(x+8,y-12,4,4,'#bb9977');
    r(x-8,y-18,16,3,'#223344');r(x-8,y-18,Math.round(16*aT/50),3,'#00ffaa');
  } else {
    r(x-10,y-11,4,3,'#b08060');r(x+6,y-11,4,3,'#b08060');
  }
  r(x-4,y-22,8,8,'#b08060');
  r(x-4,y-27,8,7,'#1a1a2e');r(x-5,y-24,10,3,'#223');
  ctx.fillStyle='#00aaff';ctx.font='bold '+px(7)+'px monospace';ctx.textAlign='center';
  ctx.fillText('▼',px(x),px(y-28));
}

function drawOverlay(){
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(0,0,px(480),px(14));
  for(let i=0;i<MACHINES.length;i++){
    const m=MACHINES[i];
    const sx=px(m.x),sw=px(m.w-4);
    ctx.fillStyle=m.state==='broken'?'#553333':(m.partReady?'#335533':'#222233');
    ctx.fillRect(sx,0,sw,px(10));
    if(m.state==='running'){const p=m.cycleT/m.cycleMax;ctx.fillStyle=m.partReady?'#44ff88':'#0088ff';ctx.fillRect(sx,0,Math.round(sw*p),px(10));}
    if(m.state==='broken'&&Math.floor(m.animF/10)%2===0){ctx.fillStyle='#ff4444';ctx.fillRect(sx,0,sw,px(10));}
    ctx.fillStyle='#aaa';ctx.font='bold '+px(5)+'px monospace';ctx.textAlign='center';
    ctx.fillText(i,px(m.x+m.w/2-2),px(8));
  }
}

let lastT=0;
function loop(ts){
  const dt=ts-lastT;lastT=ts;
  updatePlayer();updateMachines();updateNPCs();
  if(Math.floor(ts/500)!==Math.floor((ts-dt)/500))updateUI();
  drawAll();requestAnimationFrame(loop);
}

setTimeout(()=>addMsg('WASD/šípky = pohyb | MEDZERA = interakcia','#88aacc',200),100);
setTimeout(()=>addMsg('Choď k lisu a stlač INTERAGUJ!','#ffd700',180),3000);
setTimeout(()=>addMsg('Trieď diely L a R — tlač etikety!','#44ffaa',180),6000);
requestAnimationFrame(loop);
</script>
